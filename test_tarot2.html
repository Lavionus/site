<!DOCTYPE html>
<html><body>
<iframe id="f" src="http://127.0.0.1:8099/obsah/tarot_reading.html" style="width:1px;height:1px"></iframe>
<pre id="result">waiting</pre>
<script>
window.addEventListener('load', ()=>{
  setTimeout(()=>{
    try{
      const w = document.getElementById('f').contentWindow;
      const d = w.document;
      let out = '';

      // pocet karet v referenci (vsechny detaily v seznamu)
      const refCount = d.querySelectorAll('#refList details').length;
      out += 'Karet v referenci: ' + refCount + '\n';
      const names = [...d.querySelectorAll('#refList summary')].map(s=>s.firstChild.textContent.trim());
      out += 'Unikatnich jmen: ' + new Set(names).size + '\n';

      // keltsky kriz - 10 karet
      d.querySelector('[data-spread="10"]').click();
      d.getElementById('btnDraw').click();
      const drawCards = [...d.querySelectorAll('.drawCard .name')].map(x=>x.textContent);
      out += 'Vylozeno karet: ' + drawCards.length + '\n';
      out += 'Unikatni v tahu: ' + (new Set(drawCards).size === drawCards.length) + '\n';
      const positions = [...d.querySelectorAll('.drawCard .pos')].map(x=>x.textContent);
      out += 'Pozice: ' + positions.join(' | ') + '\n';

      d.getElementById('btnSaveReading').click();
      const saved = JSON.parse(w.localStorage.getItem('tarot_journal_v1'));
      out += 'Ulozeno v deniku: ' + (saved ? saved.length : 0) + ' zaznam(u)\n';

      document.getElementById('result').textContent = out;
    }catch(e){
      document.getElementById('result').textContent = 'ERROR: ' + e.message + '\n' + e.stack;
    }
  }, 300);
});
</script>
</body></html>
