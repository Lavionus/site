<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Webová Aplikace | Dashboard</title>
  <link rel="stylesheet" href="common.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧰</text></svg>" />
  <meta name="theme-color" content="#2d2d2d" />
  <script>
    // téma nastavit co nejdřív, ať stránka neblikne
    (function () {
      const t = localStorage.getItem('webapp_theme');
      if (t === 'light') document.documentElement.dataset.theme = 'light';
    })();
  </script>
  <style>
    body {
      height: 100vh;
      overflow: hidden;
    }

    /* Layout */
    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Hlavička */
    .hlavicka {
      background-color: var(--bg-elevated);
      color: var(--text);
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .hlavicka-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .hlavicka h1 {
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Hamburger – jen na malých obrazovkách */
    .hamburger {
      display: none;
      align-items: center;
      justify-content: center;
      background-color: var(--bg-control);
      border: 1px solid var(--border-strong);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 1.1rem;
      line-height: 1;
      cursor: pointer;
      transition: all 0.15s ease;
      flex-shrink: 0;
    }

    .hamburger:hover {
      background-color: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* Tmavé pozadí pod vysunutým menu */
    .menu-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    /* Hlavní obsah */
    .obsah {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Menu */
    .menu {
      width: 240px;
      background-color: var(--bg-panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      flex-shrink: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--border) var(--bg-panel);
    }

    /* Lepkavá horní lišta menu: hledání + filtrovací pilulky */
    .menu-top {
      position: sticky;
      top: 0;
      z-index: 5;
      background-color: var(--bg-panel);
      border-bottom: 1px solid var(--border);
    }

    .menu-search-wrap {
      padding: 10px 10px 6px 10px;
    }

    .menu-search {
      width: 100%;
      background-color: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 12px;
      font-size: 0.85rem;
    }

    .menu-search:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }

    /* Filtrovací pilulky nadřazených témat */
    .skupiny {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 4px 10px 10px 10px;
    }

    .skupina-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 14px;
      padding: 4px 10px;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .skupina-pill:hover {
      background-color: var(--bg-hover);
      color: var(--text);
    }

    .skupina-pill.active {
      background-color: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .skupina-pill .pill-pocet {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-faint);
      background-color: var(--bg-input);
      border-radius: 9px;
      padding: 0 6px;
      line-height: 1.4;
    }

    .skupina-pill:hover .pill-pocet,
    .skupina-pill.active .pill-pocet {
      color: #fff;
      background-color: rgba(0, 0, 0, 0.25);
    }

    /* Hláška, když hledání nic nenajde */
    .bez-vysledku {
      display: none;
      padding: 18px 16px;
      color: var(--text-faint);
      font-size: 0.85rem;
      text-align: center;
    }
    .bez-vysledku.zobraz { display: block; }

    .sekce {
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .sekce:last-child {
      border-bottom: none;
    }

    .sekce h2 {
      font-size: 0.75rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 10px 15px 8px 15px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      border-radius: 4px;
      padding: 4px 6px;
      transition: background-color 0.15s ease;
    }

    .sekce h2:hover {
      background-color: var(--bg-elevated);
      color: var(--accent-hover);
    }

    .sekce h2 .pocet {
      margin-left: auto;
      font-size: 0.7rem;
      color: var(--text-faint);
      background-color: var(--bg-hover);
      border-radius: 10px;
      padding: 1px 7px;
      font-weight: 600;
    }

    .sekce h2 .sipka {
      font-size: 0.7rem;
      color: var(--text-faint);
      transition: transform 0.2s ease;
    }

    .sekce.collapsed h2 .sipka {
      transform: rotate(-90deg);
    }

    .sekce.collapsed ul {
      display: none;
    }

    .sekce ul {
      list-style: none;
    }

    .sekce li {
      position: relative;
    }

    .sekce a {
      display: block;
      padding: 8px 32px 8px 25px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: all 0.2s ease;
      border-left: 3px solid transparent;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sekce a:hover,
    .sekce a.kb-focus {
      background-color: var(--bg-hover);
      color: var(--text);
      padding-left: 30px;
    }

    .sekce a.active {
      background-color: var(--bg-control);
      border-left-color: var(--accent);
      color: var(--accent);
      font-weight: 500;
    }

    /* Hvězdička oblíbených */
    .hvezda {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      color: var(--text-faint);
      opacity: 0;
      padding: 2px 4px;
      transition: opacity 0.15s ease, color 0.15s ease;
    }

    .sekce li:hover .hvezda { opacity: 0.7; }
    .hvezda:hover { opacity: 1 !important; color: var(--warn); }
    .hvezda.je-oblibena { opacity: 0.9; color: var(--warn); }

    /* Ovládání v hlavičce */
    .ovladani {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .ovladani #hledat {
      background-color: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 12px;
      font-size: 0.85rem;
      width: 200px;
    }

    .ovladani #hledat:focus {
      outline: none;
      border-color: var(--accent);
    }

    .ovladani button {
      background-color: var(--bg-control);
      border: 1px solid var(--border-strong);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .ovladani button:hover {
      background-color: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* zvýraznění při hledání */
    .sekce a.zvyrazneno {
      background-color: var(--accent-soft);
      color: var(--text);
    }

    .sekce.skryto { display: none; }
    .sekce li.skryto { display: none; }

    @media (max-width: 768px) {
      .ovladani #hledat { display: none; }
      .ovladani .jen-desktop { display: none; }
    }

    /* Pracovní plocha */
    .pracovni-plocha {
      flex: 1;
      background-color: var(--bg-deep);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .pracovni-plocha iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Responzivita – telefon a tablet: menu skryté v hamburgeru */
    @media (max-width: 1024px) {
      .hamburger { display: inline-flex; }

      .menu {
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        width: 80%;
        max-width: 300px;
        z-index: 1000;
        border-right: 1px solid var(--border);
        transform: translateX(-100%);
        transition: transform 0.25s ease;
        box-shadow: 2px 0 14px rgba(0, 0, 0, 0.55);
      }
      .menu.open { transform: translateX(0); }

      .menu-overlay { display: block; }
      .menu-overlay.show { opacity: 1; pointer-events: auto; }

      .pracovni-plocha { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <header class="hlavicka">
      <div class="hlavicka-left">
        <button id="hamburger" class="hamburger" aria-label="Otevřít menu" aria-expanded="false" aria-controls="hlavniMenu">☰</button>
        <h1>Webový systém</h1>
      </div>
      <div class="ovladani">
        <input type="search" id="hledat" placeholder="🔍 Hledat nástroj… (Ctrl+K)" autocomplete="off" />
        <button id="btnDomu" title="Úvodní přehled">🏠</button>
        <button id="btnNoveOkno" title="Otevřít aktuální aplikaci v novém okně">🗗</button>
        <button id="btnTema" title="Přepnout světlý / tmavý režim">🌓</button>
        <button id="rozbalitVse" class="jen-desktop" title="Rozbalit vše">⊞ Rozbalit</button>
        <button id="sbalitVse" class="jen-desktop" title="Sbalit vše">⊟ Sbalit</button>
      </div>
    </header>

    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="obsah">
      <nav class="menu" id="hlavniMenu">
        <div class="menu-top">
          <div class="menu-search-wrap">
            <input type="search" id="hledatMenu" class="menu-search" placeholder="🔍 Hledat aplikaci…" autocomplete="off" />
          </div>
          <div class="skupiny" id="skupiny"></div>
        </div>
        <div id="menuSekce"></div>
        <div class="bez-vysledku" id="bezVysledku">Žádná aplikace neodpovídá hledání.</div>
      </nav>

      <main class="pracovni-plocha">
        <iframe name="okno" src="obsah/aplikace.html" title="Aktivní aplikace"></iframe>
      </main>
    </div>
  </div>

  <script src="apps.js"></script>
  <script>
    /* ============================================================
       Rozcestník: menu se generuje z katalogu v apps.js.
       Stav: hash v URL (deep-link), localStorage (téma, oblíbené,
       nedávné, sbalené sekce, skupina), sessionStorage (poslední
       otevřená stránka).
       ============================================================ */
    const DOMOVSKA = 'obsah/aplikace.html';
    const KEY_PAGE = 'webapp_current_page';
    const KEY_COLLAPSE = 'webapp_collapsed_sections';
    const KEY_SKUPINA = 'webapp_skupina';
    const KEY_OBLIBENE = 'webapp_oblibene';
    const KEY_NEDAVNE = 'webapp_nedavne';
    const KEY_TEMA = 'webapp_theme';

    const iframe = document.querySelector('iframe[name="okno"]');
    const menuEl = document.getElementById('hlavniMenu');
    const menuSekceEl = document.getElementById('menuSekce');
    const skupinyEl = document.getElementById('skupiny');
    const bezVysledku = document.getElementById('bezVysledku');

    const nactiJson = (key, def) => {
      try { return JSON.parse(localStorage.getItem(key)) ?? def; }
      catch { return def; }
    };

    let collapsedSet = new Set(nactiJson(KEY_COLLAPSE, []));
    let aktivniSkupina = localStorage.getItem(KEY_SKUPINA) || 'vse';
    let oblibene = nactiJson(KEY_OBLIBENE, []);
    let nedavne = nactiJson(KEY_NEDAVNE, []);

    // index katalogu: soubor -> {nazev, tagy}
    const podleSouboru = new Map();
    KATALOG_SEKCE.forEach(s => s.polozky.forEach(p => podleSouboru.set(p.soubor, p)));

    // hledání bez diakritiky
    const norm = s => s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');

    /* ---- Stavba menu z katalogu ---- */
    function vytvorPolozku(p) {
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + p.soubor;               // klik = změna hashe -> hashchange otevře aplikaci
      a.dataset.page = p.soubor;
      a.textContent = p.nazev;
      a.dataset.hledani = norm(p.nazev + ' ' + (p.tagy || []).join(' '));
      const st = document.createElement('button');
      st.className = 'hvezda';
      st.title = 'Přidat / odebrat z oblíbených';
      st.textContent = '★';
      st.addEventListener('click', e => {
        e.preventDefault();
        e.stopPropagation();
        toggleOblibena(p.soubor);
      });
      li.appendChild(a);
      li.appendChild(st);
      return li;
    }

    function vytvorSekci(nazev, skupina, polozky, special) {
      const div = document.createElement('div');
      div.className = 'sekce';
      div.dataset.nazev = nazev;
      div.dataset.skupina = skupina;
      if (special) div.dataset.special = '1';
      const h2 = document.createElement('h2');
      const span = document.createElement('span');
      span.textContent = nazev;
      const badge = document.createElement('span');
      badge.className = 'pocet';
      badge.textContent = polozky.length;
      const sipka = document.createElement('span');
      sipka.className = 'sipka';
      sipka.textContent = '▾';
      h2.append(span, badge, sipka);
      const ul = document.createElement('ul');
      polozky.forEach(p => ul.appendChild(vytvorPolozku(p)));
      div.append(h2, ul);
      if (collapsedSet.has(nazev)) div.classList.add('collapsed');
      h2.addEventListener('click', () => {
        setCollapsed(div, !div.classList.contains('collapsed'));
        saveCollapsed();
      });
      return div;
    }

    function renderMenu() {
      menuSekceEl.innerHTML = '';
      // speciální sekce nahoře
      const obl = oblibene.map(f => podleSouboru.get(f)).filter(Boolean);
      if (obl.length) menuSekceEl.appendChild(vytvorSekci('⭐ Oblíbené', 'vse', obl, true));
      const ned = nedavne.map(f => podleSouboru.get(f)).filter(Boolean);
      if (ned.length) menuSekceEl.appendChild(vytvorSekci('🕘 Nedávné', 'vse', ned, true));
      // katalogové sekce
      KATALOG_SEKCE.forEach(s => menuSekceEl.appendChild(vytvorSekci(s.nazev, s.skupina, s.polozky, false)));
      obnovHvezdy();
      updateActiveLink(aktualni);
      aplikujFiltr();
    }

    /* ---- Sbalování sekcí ---- */
    function saveCollapsed() {
      localStorage.setItem(KEY_COLLAPSE, JSON.stringify([...collapsedSet]));
    }
    function setCollapsed(s, collapsed) {
      s.classList.toggle('collapsed', collapsed);
      if (collapsed) collapsedSet.add(s.dataset.nazev);
      else collapsedSet.delete(s.dataset.nazev);
    }
    const vsechnySekce = () => [...menuSekceEl.querySelectorAll('.sekce')];

    document.getElementById('rozbalitVse').addEventListener('click', () => {
      vsechnySekce().forEach(s => setCollapsed(s, false));
      saveCollapsed();
    });
    document.getElementById('sbalitVse').addEventListener('click', () => {
      vsechnySekce().forEach(s => setCollapsed(s, true));
      saveCollapsed();
    });

    /* ---- Oblíbené & nedávné ---- */
    function toggleOblibena(soubor) {
      const i = oblibene.indexOf(soubor);
      if (i >= 0) oblibene.splice(i, 1);
      else oblibene.push(soubor);
      localStorage.setItem(KEY_OBLIBENE, JSON.stringify(oblibene));
      renderMenu();
    }
    function obnovHvezdy() {
      menuSekceEl.querySelectorAll('li').forEach(li => {
        const a = li.querySelector('a[data-page]');
        const st = li.querySelector('.hvezda');
        if (a && st) st.classList.toggle('je-oblibena', oblibene.includes(a.dataset.page));
      });
    }
    function pridejNedavnou(soubor) {
      if (soubor === DOMOVSKA) return;
      nedavne = [soubor, ...nedavne.filter(f => f !== soubor)].slice(0, 8);
      localStorage.setItem(KEY_NEDAVNE, JSON.stringify(nedavne));
    }

    /* ---- Otevírání aplikací (hash = deep-link) ---- */
    let aktualni = null;

    function updateActiveLink(page) {
      menuSekceEl.querySelectorAll('a[data-page]').forEach(a => {
        a.classList.toggle('active', a.dataset.page === page);
      });
    }

    function otevri(page) {
      if (!page || page === aktualni) return;
      if (!podleSouboru.has(page) && page !== DOMOVSKA) {
        // neznámý hash – nechodit mimo katalog
        page = DOMOVSKA;
      }
      aktualni = page;
      iframe.src = page;
      sessionStorage.setItem(KEY_PAGE, page);
      pridejNedavnou(page);
      updateActiveLink(page);
      // sekci s aktivní aplikací rozbalit
      const a = menuSekceEl.querySelector(`a[data-page="${CSS.escape(page)}"]`);
      if (a) {
        const s = a.closest('.sekce');
        if (s && !s.dataset.special) { setCollapsed(s, false); saveCollapsed(); }
      }
      if (window.matchMedia('(max-width: 1024px)').matches) closeMenu();
      // nedávné se překreslí bez ztráty pozice scrollu menu
      obnovNedavneSekci();
    }

    function obnovNedavneSekci() {
      const stara = menuSekceEl.querySelector('.sekce[data-nazev="🕘 Nedávné"]');
      const ned = nedavne.map(f => podleSouboru.get(f)).filter(Boolean);
      if (!ned.length) { if (stara) stara.remove(); return; }
      const nova = vytvorSekci('🕘 Nedávné', 'vse', ned, true);
      if (stara) stara.replaceWith(nova);
      else {
        const obl = menuSekceEl.querySelector('.sekce[data-nazev="⭐ Oblíbené"]');
        menuSekceEl.insertBefore(nova, obl ? obl.nextSibling : menuSekceEl.firstChild);
      }
      obnovHvezdy();
      updateActiveLink(aktualni);
      aplikujFiltr();
    }

    window.addEventListener('hashchange', () => {
      otevri(decodeURIComponent(location.hash.slice(1)) || DOMOVSKA);
    });

    // dashboard (v iframe) může požádat o otevření aplikace
    window.addEventListener('message', e => {
      if (e.data && typeof e.data.otevri === 'string') {
        location.hash = e.data.otevri;
        otevri(e.data.otevri);
      }
    });

    document.getElementById('btnDomu').addEventListener('click', () => {
      history.pushState(null, '', location.pathname);
      otevri(DOMOVSKA);
    });
    document.getElementById('btnNoveOkno').addEventListener('click', () => {
      window.open(aktualni || DOMOVSKA, '_blank');
    });

    /* ---- Světlý / tmavý režim ---- */
    document.getElementById('btnTema').addEventListener('click', () => {
      const svetly = document.documentElement.dataset.theme === 'light';
      if (svetly) {
        delete document.documentElement.dataset.theme;
        localStorage.setItem(KEY_TEMA, 'dark');
      } else {
        document.documentElement.dataset.theme = 'light';
        localStorage.setItem(KEY_TEMA, 'light');
      }
    });

    /* ---- Skupinové pilulky ---- */
    const pills = [];
    function skupinaPocet(id) {
      return KATALOG_SEKCE.reduce((n, s) =>
        n + ((id === 'vse' || s.skupina === id) ? s.polozky.length : 0), 0);
    }
    function updatePillState() {
      pills.forEach(p => p.classList.toggle('active', p.dataset.skupina === aktivniSkupina));
    }
    function makePill(id, label) {
      const b = document.createElement('button');
      b.className = 'skupina-pill';
      b.dataset.skupina = id;
      b.innerHTML = `<span>${label}</span><span class="pill-pocet">${skupinaPocet(id)}</span>`;
      b.addEventListener('click', () => {
        aktivniSkupina = id;
        localStorage.setItem(KEY_SKUPINA, id);
        nastavDotaz('');
        updatePillState();
        aplikujFiltr();
      });
      skupinyEl.appendChild(b);
      pills.push(b);
    }
    makePill('vse', '⭐ Vše');
    KATALOG_SKUPINY.forEach(g => {
      if (KATALOG_SEKCE.some(s => s.skupina === g.id)) makePill(g.id, g.label);
    });
    if (!pills.some(p => p.dataset.skupina === aktivniSkupina)) aktivniSkupina = 'vse';
    updatePillState();

    /* ---- Hledání (hlavička + menu) + filtr skupin ---- */
    const hledat = document.getElementById('hledat');
    const hledatMenu = document.getElementById('hledatMenu');
    const searchInputs = [hledat, hledatMenu];

    function nastavDotaz(val) {
      searchInputs.forEach(i => { i.value = val; });
    }
    function aktualniDotaz() {
      const i = searchInputs.find(x => x.value.trim());
      return i ? norm(i.value.trim()) : '';
    }

    function aplikujFiltr() {
      const q = aktualniDotaz();
      zrusKbFokus();
      if (q) {
        let celkemShod = 0;
        vsechnySekce().forEach(s => {
          if (s.dataset.special) { s.classList.add('skryto'); return; } // oblíbené/nedávné při hledání schovat (duplicity)
          let shoda = 0;
          s.querySelectorAll('li').forEach(li => {
            const a = li.querySelector('a[data-page]');
            const match = a.dataset.hledani.includes(q);
            li.classList.toggle('skryto', !match);
            a.classList.toggle('zvyrazneno', match);
            if (match) shoda++;
          });
          s.classList.toggle('skryto', shoda === 0);
          if (shoda > 0) s.classList.remove('collapsed');
          celkemShod += shoda;
        });
        bezVysledku.classList.toggle('zobraz', celkemShod === 0);
        return;
      }
      bezVysledku.classList.remove('zobraz');
      vsechnySekce().forEach(s => {
        const patri = s.dataset.special || aktivniSkupina === 'vse' || s.dataset.skupina === aktivniSkupina;
        s.classList.toggle('skryto', !patri);
        s.classList.toggle('collapsed', collapsedSet.has(s.dataset.nazev));
        s.querySelectorAll('li').forEach(li => li.classList.remove('skryto'));
        s.querySelectorAll('a[data-page]').forEach(a => a.classList.remove('zvyrazneno'));
      });
    }

    searchInputs.forEach(input => {
      input.addEventListener('input', () => {
        nastavDotaz(input.value);
        aplikujFiltr();
      });
    });

    /* ---- Klávesové ovládání ---- */
    let kbIndex = -1;
    function viditelneOdkazy() {
      return vsechnySekce()
        .filter(s => !s.classList.contains('skryto') && !s.classList.contains('collapsed'))
        .flatMap(s => [...s.querySelectorAll('li:not(.skryto) a[data-page]')]);
    }
    function zrusKbFokus() {
      kbIndex = -1;
      menuSekceEl.querySelectorAll('a.kb-focus').forEach(a => a.classList.remove('kb-focus'));
    }
    function posunKbFokus(smer) {
      const odkazy = viditelneOdkazy();
      if (!odkazy.length) return;
      kbIndex = (kbIndex + smer + odkazy.length) % odkazy.length;
      menuSekceEl.querySelectorAll('a.kb-focus').forEach(a => a.classList.remove('kb-focus'));
      const cil = odkazy[kbIndex];
      cil.classList.add('kb-focus');
      cil.scrollIntoView({ block: 'nearest' });
    }

    document.addEventListener('keydown', e => {
      const vInputu = /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        (window.matchMedia('(max-width: 1024px)').matches ? openMenu : () => {})();
        hledatMenu.focus();
        hledatMenu.select();
        return;
      }
      if (e.key === '/' && !vInputu) {
        e.preventDefault();
        hledatMenu.focus();
        hledatMenu.select();
        return;
      }
      if (e.key === 'Escape') {
        if (aktualniDotaz()) { nastavDotaz(''); aplikujFiltr(); }
        closeMenu();
        return;
      }
      if (vInputu && searchInputs.includes(document.activeElement)) {
        if (e.key === 'ArrowDown') { e.preventDefault(); posunKbFokus(1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); posunKbFokus(-1); }
        else if (e.key === 'Enter') {
          const foc = menuSekceEl.querySelector('a.kb-focus') || viditelneOdkazy()[0];
          if (foc) { location.hash = foc.dataset.page; nastavDotaz(''); aplikujFiltr(); }
        }
      }
    });

    /* ---- Hamburger: vysouvací menu na telefonu a tabletu ---- */
    const hamburger = document.getElementById('hamburger');
    const menuOverlay = document.getElementById('menuOverlay');

    function openMenu() {
      menuEl.classList.add('open');
      menuOverlay.classList.add('show');
      hamburger.setAttribute('aria-expanded', 'true');
    }
    function closeMenu() {
      menuEl.classList.remove('open');
      menuOverlay.classList.remove('show');
      hamburger.setAttribute('aria-expanded', 'false');
    }
    hamburger.addEventListener('click', () =>
      menuEl.classList.contains('open') ? closeMenu() : openMenu());
    menuOverlay.addEventListener('click', closeMenu);
    window.addEventListener('resize', () => {
      if (!window.matchMedia('(max-width: 1024px)').matches) closeMenu();
    });

    /* ---- Start ---- */
    renderMenu();
    const zHashe = decodeURIComponent(location.hash.slice(1));
    otevri(zHashe || sessionStorage.getItem(KEY_PAGE) || DOMOVSKA);

    /* ---- PWA ---- */
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
