<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎴 Kartičky (flashcards)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:720px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:16px;font-weight:600;text-align:center}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
.tab{padding:9px 18px;background:#2a2a2a;border:1px solid #404040;border-radius:8px;cursor:pointer;color:#bbb}
.tab.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
.pane{display:none}.pane.active{display:block}
.toolbar{display:flex;gap:10px;align-items:center;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
select,.btn{padding:9px 16px;border-radius:6px;font-size:.88rem}
select{background:#404040;border:1px solid #555;color:#e0e0e0}
.btn{background:#6aa6fd;color:#fff;border:none;cursor:pointer;font-weight:600}
.btn-sec{background:#404040}
.flashcard{perspective:1000px;height:280px;margin-bottom:18px;cursor:pointer}
.inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.flashcard.flipped .inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;font-size:1.6rem}
.front{background:#2a2a2a;border:1px solid #404040}
.back{background:#2a3548;border:1px solid #6aa6fd;transform:rotateY(180deg);color:#dde}
.face .hint{position:absolute;bottom:14px;font-size:.78rem;color:#888}
.nav{display:flex;gap:10px;justify-content:center;align-items:center}
.counter{color:#888;min-width:80px;text-align:center}
.editor textarea{width:100%;min-height:220px;background:#1e1e1e;border:1px solid #555;border-radius:8px;color:#e0e0e0;padding:14px;font-family:monospace;font-size:.92rem;resize:vertical;line-height:1.6}
.editor .help{font-size:.8rem;color:#888;margin:10px 0}
.deck-empty{text-align:center;color:#666;padding:40px}
</style>
</head>
<body>
<div class="container">
  <h1>🎴 Kartičky (flashcards)</h1>
  <div class="tabs">
    <div class="tab active" data-pane="study">📚 Učení</div>
    <div class="tab" data-pane="edit">✏️ Sada</div>
  </div>

  <div class="pane active" id="study">
    <div class="toolbar">
      <button class="btn btn-sec" id="shuffleBtn">🔀 Zamíchat</button>
      <span class="counter" id="counter"></span>
    </div>
    <div class="flashcard" id="card">
      <div class="inner"><div class="face front" id="front"></div><div class="face back" id="back"></div></div>
    </div>
    <div class="nav">
      <button class="btn btn-sec" id="prevBtn">← Předchozí</button>
      <button class="btn" id="flipBtn">🔄 Otočit</button>
      <button class="btn btn-sec" id="nextBtn">Další →</button>
    </div>
  </div>

  <div class="pane editor" id="edit">
    <div class="help">Jedna kartička na řádek ve formátu <b>otázka = odpověď</b></div>
    <textarea id="deckText"></textarea>
    <button class="btn" id="saveBtn" style="margin-top:12px">💾 Uložit sadu</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let cards=JSON.parse(localStorage.getItem('flashcards')||'null')||[['Hlavní město Francie','Paříž'],['2 + 2','4'],['Chemická značka zlata','Au'],['Autor Maryčky Magdonové','Petr Bezruč']];
let idx=0;
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');$(t.dataset.pane).classList.add('active');
  if(t.dataset.pane==='edit')$('deckText').value=cards.map(c=>c[0]+' = '+c[1]).join('\n');
});
function show(){
  if(!cards.length){$('front').innerHTML='<div class="deck-empty">Prázdná sada – přidej kartičky v záložce „Sada".</div>';$('back').textContent='';$('counter').textContent='';return;}
  if(idx>=cards.length)idx=0;if(idx<0)idx=cards.length-1;
  $('card').classList.remove('flipped');
  setTimeout(()=>{$('front').innerHTML=cards[idx][0]+'<span class="hint">klikni pro odpověď</span>';$('back').textContent=cards[idx][1];},$('card').classList.contains('flipped')?250:0);
  $('front').innerHTML=cards[idx][0]+'<span class="hint">klikni pro odpověď</span>';$('back').textContent=cards[idx][1];
  $('counter').textContent=(idx+1)+' / '+cards.length;
}
$('card').onclick=()=>$('card').classList.toggle('flipped');
$('flipBtn').onclick=()=>$('card').classList.toggle('flipped');
$('nextBtn').onclick=()=>{idx++;show();};
$('prevBtn').onclick=()=>{idx--;show();};
$('shuffleBtn').onclick=()=>{cards.sort(()=>Math.random()-0.5);idx=0;show();};
$('saveBtn').onclick=()=>{
  cards=$('deckText').value.split('\n').map(l=>{const i=l.indexOf('=');return i<0?null:[l.slice(0,i).trim(),l.slice(i+1).trim()];}).filter(c=>c&&c[0]);
  localStorage.setItem('flashcards',JSON.stringify(cards));idx=0;
  $('saveBtn').textContent='✅ Uloženo';setTimeout(()=>$('saveBtn').textContent='💾 Uložit sadu',1200);
  document.querySelector('.tab[data-pane="study"]').click();show();
};
document.addEventListener('keydown',e=>{if($('edit').classList.contains('active'))return;if(e.key==='ArrowRight'){idx++;show();}if(e.key==='ArrowLeft'){idx--;show();}if(e.key===' '){e.preventDefault();$('card').classList.toggle('flipped');}});
show();
</script>
</body>
</html>
