<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🫁 Dechové cvičení</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
.container{max-width:640px;width:100%;text-align:center}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600}
.modes{display:flex;gap:8px;justify-content:center;margin-bottom:24px;flex-wrap:wrap}
.mode{padding:10px 16px;background:#2a2a2a;border:1px solid #404040;border-radius:20px;cursor:pointer;font-size:.85rem;color:#bbb}
.mode.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
.stage{position:relative;width:280px;height:280px;margin:10px auto 24px;display:flex;align-items:center;justify-content:center}
.circle{position:absolute;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,#6aa6fd,#3a6fd8);transition:transform 1s linear,background 1s;box-shadow:0 0 50px rgba(106,166,253,.4)}
.ring{position:absolute;width:280px;height:280px;border:2px dashed #404040;border-radius:50%}
.phase-text{position:relative;z-index:2;font-size:1.3rem;font-weight:600;text-shadow:0 1px 4px #000}
.count{position:relative;z-index:2;font-size:.9rem;color:#cde;margin-top:4px;text-shadow:0 1px 4px #000}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 32px;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:600}
.btn:hover{background:#5694f0}
.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
.desc{color:#888;font-size:.9rem;margin:18px auto;max-width:460px;line-height:1.6}
.cycles{color:#6aa6fd;font-size:.9rem;margin-top:12px}
</style>
</head>
<body>
<div class="container">
  <h1>🫁 Dechové cvičení</h1>
  <div class="modes" id="modes"></div>
  <div class="stage">
    <div class="ring"></div>
    <div class="circle" id="circle"></div>
    <div>
      <div class="phase-text" id="phaseText">Připraveni?</div>
      <div class="count" id="count"></div>
    </div>
  </div>
  <button class="btn" id="startBtn">▶️ Začít</button>
  <button class="btn btn-sec" id="stopBtn" style="display:none">⏹️ Zastavit</button>
  <div class="cycles" id="cycles"></div>
  <p class="desc" id="desc"></p>
</div>
<script>
const $=id=>document.getElementById(id);
const TECHNIQUES={
  '478':{name:'4-7-8 (uklidnění)',phases:[['Nádech',4,1.9],['Zádrž',7,1.9],['Výdech',8,1]],desc:'Technika 4-7-8 dle dr. Weila: nadechni nosem 4 s, zadrž dech 7 s a pomalu vydechni ústy 8 s. Pomáhá usnout a zklidnit nervovou soustavu.'},
  'box':{name:'Box breathing (4-4-4-4)',phases:[['Nádech',4,1.9],['Zádrž',4,1.9],['Výdech',4,1],['Zádrž',4,1]],desc:'Boxové dýchání používané i ve výcviku Navy SEALs: nádech, zádrž, výdech a zádrž – vše po 4 sekundách. Zlepšuje soustředění a snižuje stres.'},
  'coherent':{name:'Koherentní (5-5)',phases:[['Nádech',5,1.9],['Výdech',5,1]],desc:'Pomalé rovnoměrné dýchání 5 s nádech a 5 s výdech (6 dechů/min) pro rovnováhu autonomního nervového systému.'}
};
let cur='478',running=false,timer=null,cycleCount=0;
function buildModes(){
  $('modes').innerHTML=Object.entries(TECHNIQUES).map(([k,t])=>`<div class="mode ${k===cur?'active':''}" data-k="${k}">${t.name}</div>`).join('');
  document.querySelectorAll('.mode').forEach(m=>m.onclick=()=>{if(running)return;cur=m.dataset.k;buildModes();$('desc').textContent=TECHNIQUES[cur].desc;});
}
function run(){
  const phases=TECHNIQUES[cur].phases;let pi=0;
  function next(){
    if(!running)return;
    const [label,dur,scale]=phases[pi];
    $('phaseText').textContent=label;
    $('circle').style.transitionDuration=dur+'s';
    $('circle').style.transform='scale('+scale+')';
    $('circle').style.background=label==='Výdech'?'radial-gradient(circle,#27ae60,#1a8049)':label==='Nádech'?'radial-gradient(circle,#6aa6fd,#3a6fd8)':'radial-gradient(circle,#f39c12,#c87f0a)';
    let left=dur;$('count').textContent=left+' s';
    const ci=setInterval(()=>{left--;if(left>=0)$('count').textContent=left+' s';},1000);
    timer=setTimeout(()=>{clearInterval(ci);pi=(pi+1)%phases.length;if(pi===0){cycleCount++;$('cycles').textContent='Dokončené cykly: '+cycleCount;}next();},dur*1000);
  }
  next();
}
$('startBtn').onclick=()=>{running=true;cycleCount=0;$('cycles').textContent='';$('startBtn').style.display='none';$('stopBtn').style.display='inline-block';run();};
$('stopBtn').onclick=()=>{running=false;clearTimeout(timer);$('startBtn').style.display='inline-block';$('stopBtn').style.display='none';$('phaseText').textContent='Pauza';$('count').textContent='';$('circle').style.transform='scale(1)';};
buildModes();$('desc').textContent=TECHNIQUES[cur].desc;
</script>
</body>
</html>
