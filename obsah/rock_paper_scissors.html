<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✊ Kámen, nůžky, papír</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6rem;margin-bottom:16px;font-weight:600}
.score{display:flex;gap:30px;margin-bottom:20px;text-align:center}
.score .v{font-size:2.4rem;font-weight:700}.score .l{font-size:.78rem;color:#888}
.you{color:#27ae60}.cpu{color:#e74c3c}
.arena{display:flex;align-items:center;gap:20px;margin-bottom:20px;min-height:160px}
.hand{width:130px;height:130px;background:#2a2a2a;border:2px solid #404040;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:4rem}
.hand.shake{animation:shake .15s ease-in-out 3}
@keyframes shake{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
.vs{font-size:1.5rem;color:#888}
.result{font-size:1.6rem;font-weight:700;min-height:40px;margin-bottom:16px}
.choices{display:flex;gap:14px}
.choice{width:90px;height:90px;background:#2a2a2a;border:2px solid #404040;border-radius:16px;font-size:2.6rem;cursor:pointer;transition:all .15s}
.choice:hover{border-color:#6aa6fd;transform:translateY(-4px)}
.hint{color:#888;font-size:.85rem;margin-top:16px;text-align:center}
.btn{background:#404040;color:#e0e0e0;border:1px solid #555;padding:8px 16px;border-radius:6px;cursor:pointer;margin-top:14px}
</style>
</head>
<body>
<h1>✊ Kámen, nůžky, papír</h1>
<div class="score">
  <div><div class="v you" id="youScore">0</div><div class="l">Ty</div></div>
  <div><div class="v" id="tieScore" style="color:#888">0</div><div class="l">Remízy</div></div>
  <div><div class="v cpu" id="cpuScore">0</div><div class="l">Počítač</div></div>
</div>
<div class="arena">
  <div class="hand" id="youHand">✊</div>
  <div class="vs">VS</div>
  <div class="hand" id="cpuHand">✊</div>
</div>
<div class="result" id="result">Vyber svůj tah!</div>
<div class="choices">
  <div class="choice" data-c="rock">✊</div>
  <div class="choice" data-c="paper">✋</div>
  <div class="choice" data-c="scissors">✌️</div>
</div>
<button class="btn" id="resetBtn">🔄 Reset skóre</button>
<p class="hint">Kámen ✊ poráží nůžky ✌️ · Nůžky ✌️ porážejí papír ✋ · Papír ✋ poráží kámen ✊<br>Hraje se na neomezený počet kol.</p>
<script>
const $=id=>document.getElementById(id);
const EMOJI={rock:'✊',paper:'✋',scissors:'✌️'};
const BEATS={rock:'scissors',paper:'rock',scissors:'paper'};
const NAME={rock:'Kámen',paper:'Papír',scissors:'Nůžky'};
let you=0,cpu=0,tie=0,busy=false;
function play(choice){
  if(busy)return;busy=true;
  $('youHand').classList.add('shake');$('cpuHand').classList.add('shake');
  $('result').textContent='...';$('result').style.color='#888';
  $('youHand').textContent='✊';$('cpuHand').textContent='✊';
  setTimeout(()=>{
    $('youHand').classList.remove('shake');$('cpuHand').classList.remove('shake');
    const cpuChoice=['rock','paper','scissors'][Math.floor(Math.random()*3)];
    $('youHand').textContent=EMOJI[choice];$('cpuHand').textContent=EMOJI[cpuChoice];
    let msg,col;
    if(choice===cpuChoice){tie++;msg='🤝 Remíza!';col='#888';}
    else if(BEATS[choice]===cpuChoice){you++;msg='🎉 Vyhráváš! '+NAME[choice]+' poráží '+NAME[cpuChoice].toLowerCase();col='#27ae60';}
    else{cpu++;msg='😢 Prohráváš! '+NAME[cpuChoice]+' poráží '+NAME[choice].toLowerCase();col='#e74c3c';}
    $('result').textContent=msg;$('result').style.color=col;
    $('youScore').textContent=you;$('cpuScore').textContent=cpu;$('tieScore').textContent=tie;
    busy=false;
  },550);
}
document.querySelectorAll('.choice').forEach(c=>c.onclick=()=>play(c.dataset.c));
$('resetBtn').onclick=()=>{you=cpu=tie=0;$('youScore').textContent=0;$('cpuScore').textContent=0;$('tieScore').textContent=0;$('result').textContent='Vyber svůj tah!';$('result').style.color='#e0e0e0';};
</script>
</body>
</html>
