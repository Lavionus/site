<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎵 Simon</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600}
.sub{color:#888;font-size:.85rem;margin-bottom:18px}
.simon{position:relative;width:320px;height:320px;border-radius:50%;background:#2a2a2a;display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:8px;box-shadow:0 0 30px rgba(0,0,0,.5)}
.pad{cursor:pointer;transition:.1s;opacity:.55}
.pad:hover{opacity:.75}
.pad.lit{opacity:1;box-shadow:0 0 30px currentColor}
.pad.green{background:#27ae60;color:#27ae60;border-radius:100% 0 0 0}
.pad.red{background:#e74c3c;color:#e74c3c;border-radius:0 100% 0 0}
.pad.yellow{background:#f1c40f;color:#f1c40f;border-radius:0 0 0 100%}
.pad.blue{background:#3498db;color:#3498db;border-radius:0 0 100% 0}
.center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:120px;height:120px;background:#1a1a1a;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:6px solid #2a2a2a}
.center .level{font-size:2rem;font-weight:700;color:#6aa6fd}
.center .lbl{font-size:.66rem;color:#888}
.btn{background:#6aa6fd;color:#fff;border:none;padding:11px 26px;border-radius:8px;cursor:pointer;font-weight:600;margin-top:20px}
.btn:hover{background:#5694f0}
.status{margin-top:14px;font-size:1.1rem;font-weight:600;min-height:28px}
.modeToggle{margin-top:10px;color:#888;font-size:.85rem}
</style>
</head>
<body>
<h1>🎵 Simon</h1>
<p class="sub">Zapamatuj si a zopakuj rostoucí sekvenci barev</p>
<div class="simon" id="simon">
  <div class="pad green" data-i="0"></div>
  <div class="pad red" data-i="1"></div>
  <div class="pad yellow" data-i="2"></div>
  <div class="pad blue" data-i="3"></div>
  <div class="center"><div class="level" id="level">0</div><div class="lbl">úroveň</div></div>
</div>
<button class="btn" id="startBtn">▶️ Start</button>
<div class="status" id="status"></div>
<label class="modeToggle"><input type="checkbox" id="strict"> Striktní režim (chyba = konec)</label>
<script>
const $=id=>document.getElementById(id);
const FREQ=[329.63,261.63,392,523.25];
let seq,playerIdx,playing,best=+(localStorage.getItem('simon_best')||0);
let audioCtx;
function tone(i,dur=350){
  audioCtx=audioCtx||new(window.AudioContext||window.webkitAudioContext)();
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.frequency.value=FREQ[i];o.type='sine';
  o.connect(g);g.connect(audioCtx.destination);g.gain.setValueAtTime(.3,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+dur/1000);
  o.start();o.stop(audioCtx.currentTime+dur/1000);
}
function light(i,dur=350){const pad=document.querySelector(`.pad[data-i="${i}"]`);pad.classList.add('lit');tone(i,dur);setTimeout(()=>pad.classList.remove('lit'),dur);}
function start(){seq=[];$('status').textContent='';next();}
function next(){
  playerIdx=0;seq.push(Math.floor(Math.random()*4));
  $('level').textContent=seq.length;
  playing=true;$('status').textContent='Sleduj…';
  let i=0;const iv=setInterval(()=>{light(seq[i]);i++;if(i>=seq.length){clearInterval(iv);playing=false;$('status').textContent='Tvůj tah!';}},650);
}
document.querySelectorAll('.pad').forEach(p=>p.onclick=()=>{
  if(playing||!seq||!seq.length)return;
  const i=+p.dataset.i;light(i,200);
  if(i===seq[playerIdx]){
    playerIdx++;
    if(playerIdx===seq.length){
      if(seq.length>best){best=seq.length;localStorage.setItem('simon_best',best);}
      $('status').textContent='✅ Správně!';setTimeout(next,800);
    }
  }else{
    $('status').textContent=`❌ Chyba! Dosáhl jsi úrovně ${seq.length-1}. Rekord: ${best}`;
    if($('strict').checked){seq=null;$('level').textContent=0;}
    else{playing=true;setTimeout(()=>{playerIdx=0;let i=0;const iv=setInterval(()=>{light(seq[i]);i++;if(i>=seq.length){clearInterval(iv);playing=false;$('status').textContent='Zkus to znovu!';}},650);},1000);}
  }
});
$('startBtn').onclick=start;
</script>
</body>
</html>
