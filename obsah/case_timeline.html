<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕵️ Časová osa případu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:960px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:6px;font-weight:600;text-align:center}
.sub{text-align:center;color:#888;font-size:.85rem;margin-bottom:18px}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:9px 12px;font-size:.9rem;font-family:inherit}
textarea{resize:vertical;min-height:60px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>div{flex:1;min-width:160px}
.btn{margin-top:16px;padding:10px 18px;background:#6aa6fd;border:none;border-radius:6px;color:#fff;font-weight:600;cursor:pointer;font-size:.9rem}
.btn:hover{background:#5a92e6}
.btn.sec{background:#404040;color:#bbb}
.btn.sec:hover{background:#4a4a4a}
.btn.danger{background:#7a3030;color:#fdd}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.timeline{position:relative;padding-left:26px}
.timeline::before{content:'';position:absolute;left:7px;top:6px;bottom:6px;width:2px;background:#404040}
.item{position:relative;margin-bottom:18px;background:#242424;border:1px solid #3a3a3a;border-radius:8px;padding:14px 16px}
.item::before{content:'';position:absolute;left:-23px;top:18px;width:12px;height:12px;border-radius:50%;background:#6aa6fd;border:2px solid #1a1a1a}
.item.dukaz::before{background:#e0a63f}
.item.svedek::before{background:#4caf7d}
.item.udalost::before{background:#6aa6fd}
.item-head{display:flex;justify-content:space-between;align-items:baseline;gap:10px;flex-wrap:wrap}
.item-time{font-family:monospace;color:#6aa6fd;font-size:.85rem;font-weight:600}
.item-tag{font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:10px;background:#333}
.item.dukaz .item-tag{background:#4a3b1a;color:#e0a63f}
.item.svedek .item-tag{background:#1e3a2a;color:#4caf7d}
.item.udalost .item-tag{background:#1e2f4a;color:#6aa6fd}
.item-desc{margin-top:6px;font-size:.9rem;white-space:pre-wrap}
.item-actions{margin-top:8px;display:flex;gap:8px}
.item-actions button{background:none;border:1px solid #444;color:#888;border-radius:5px;padding:3px 9px;font-size:.75rem;cursor:pointer}
.item-actions button:hover{border-color:#6aa6fd;color:#6aa6fd}
.empty{text-align:center;color:#666;padding:30px;font-size:.9rem}
.note{font-size:.78rem;color:#666;margin-top:8px}
@media print{
  body{background:#fff;color:#000;padding:0}
  .card.form,.toolbar{display:none}
  .container{max-width:100%}
  .item{background:#fff;border:1px solid #999;break-inside:avoid}
  .item-tag{background:#eee!important;color:#000!important}
  a[href]::after{content:''}
}
</style>
</head>
<body>
<div class="container">
  <h1>🕵️ Časová osa případu</h1>
  <p class="sub">Chronologické řazení událostí, důkazů a výpovědí — vše se ukládá pouze lokálně v tomto prohlížeči.</p>

  <div class="card form">
    <h2>Přidat záznam</h2>
    <label>Název případu (pro záhlaví při tisku)</label>
    <input id="caseName" placeholder="např. ČVS: KRPA-1234/TČ-2026">
    <div class="row">
      <div>
        <label>Datum a čas</label>
        <input id="fTime" type="datetime-local">
      </div>
      <div>
        <label>Typ záznamu</label>
        <select id="fType">
          <option value="udalost">Událost</option>
          <option value="dukaz">Důkaz</option>
          <option value="svedek">Výpověď / svědek</option>
        </select>
      </div>
    </div>
    <label>Popis</label>
    <textarea id="fDesc" placeholder="Stručný popis události, důkazu nebo výpovědi…"></textarea>
    <button class="btn" id="btnAdd">➕ Přidat na osu</button>
  </div>

  <div class="toolbar">
    <button class="btn sec" id="btnPrint">🖨️ Tisk / export PDF</button>
    <button class="btn sec" id="btnExport">💾 Export JSON</button>
    <button class="btn sec" id="btnImport">📂 Import JSON</button>
    <input type="file" id="fileImport" accept=".json" hidden>
    <button class="btn danger" id="btnClear">🗑️ Smazat vše</button>
  </div>

  <div id="timeline" class="timeline"></div>
  <div id="empty" class="empty">Zatím žádné záznamy. Přidej první výše.</div>
  <p class="note">Data se ukládají jen v localStorage tohoto prohlížeče/zařízení — pro sdílení nebo zálohu použij export JSON.</p>
</div>

<script>
const $=id=>document.getElementById(id);
const KEY='vysetrovani_timeline';
const KEY_CASE='vysetrovani_timeline_case';
let items=JSON.parse(localStorage.getItem(KEY)||'[]');
$('caseName').value=localStorage.getItem(KEY_CASE)||'';
$('caseName').addEventListener('input',()=>localStorage.setItem(KEY_CASE,$('caseName').value));

const typeLabel={udalost:'Událost',dukaz:'Důkaz',svedek:'Výpověď / svědek'};

function save(){localStorage.setItem(KEY,JSON.stringify(items));render();}

function render(){
  const wrap=$('timeline');
  wrap.innerHTML='';
  const sorted=[...items].sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  $('empty').style.display=sorted.length?'none':'block';
  sorted.forEach(it=>{
    const div=document.createElement('div');
    div.className='item '+it.type;
    const dt=it.time?new Date(it.time).toLocaleString('cs-CZ'):'(bez času)';
    div.innerHTML=`<div class="item-head"><span class="item-time">${dt}</span><span class="item-tag">${typeLabel[it.type]||it.type}</span></div>
      <div class="item-desc"></div>
      <div class="item-actions"><button data-a="del" data-id="${it.id}">🗑️ Smazat</button></div>`;
    div.querySelector('.item-desc').textContent=it.desc;
    wrap.appendChild(div);
  });
  wrap.querySelectorAll('[data-a="del"]').forEach(b=>b.onclick=()=>{
    items=items.filter(i=>i.id!==b.dataset.id);
    save();
  });
}

$('btnAdd').onclick=()=>{
  const desc=$('fDesc').value.trim();
  if(!desc){$('fDesc').focus();return;}
  items.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),time:$('fTime').value,type:$('fType').value,desc});
  $('fDesc').value='';
  save();
};

$('btnPrint').onclick=()=>window.print();

$('btnExport').onclick=()=>{
  const blob=new Blob([JSON.stringify({case:$('caseName').value,items},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(($('caseName').value||'casova_osa').replace(/[^\w\-]+/g,'_'))+'.json';
  a.click();
};

$('btnImport').onclick=()=>$('fileImport').click();
$('fileImport').onchange=()=>{
  const f=$('fileImport').files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      if(data.case)$('caseName').value=data.case, localStorage.setItem(KEY_CASE,data.case);
      if(Array.isArray(data.items)){items=data.items;save();}
    }catch(e){alert('Neplatný soubor JSON.');}
  };
  r.readAsText(f);
};

$('btnClear').onclick=()=>{
  if(confirm('Opravdu smazat všechny záznamy časové osy?')){items=[];save();}
};

render();
</script>
</body>
</html>
