<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💊 Rozvrh léků</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:820px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:14px}
.form{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
label{display:block;font-size:.76rem;color:#888;margin-bottom:4px}
input,select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.slot{margin-bottom:16px}
.slot-head{font-size:1rem;color:#f39c12;border-bottom:1px solid #404040;padding-bottom:6px;margin-bottom:8px}
.med{display:flex;align-items:center;gap:12px;padding:10px;background:#1e1e1e;border-radius:8px;margin-bottom:6px}
.med.taken{opacity:.5}
.med .check{width:24px;height:24px;border-radius:6px;border:2px solid #6aa6fd;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.med.taken .check{background:#27ae60;border-color:#27ae60}
.med .info{flex:1}.med .name{font-weight:600}.med .dose{font-size:.82rem;color:#888}
.med .time{font-family:monospace;color:#6aa6fd;font-weight:700}
.med.taken .name{text-decoration:line-through}
.del{background:none;border:none;color:#888;cursor:pointer}.del:hover{color:#e74c3c}
.empty{color:#666;text-align:center;padding:20px}
.progress{text-align:center;color:#27ae60;font-weight:600;margin-bottom:14px}
</style>
</head>
<body>
<div class="container">
  <h1>💊 Rozvrh léků</h1>
  <div class="card">
    <h2>Přidat lék</h2>
    <div class="form">
      <div><label>Název léku</label><input id="name" placeholder="Např. Vitamin D"></div>
      <div><label>Dávka</label><input id="dose" placeholder="1 tableta" style="width:120px"></div>
      <div><label>Čas</label><input type="time" id="time" value="08:00"></div>
      <button class="btn" id="addBtn">➕ Přidat</button>
    </div>
  </div>
  <div class="card">
    <div class="progress" id="progress"></div>
    <div id="schedule"></div>
    <button class="btn" id="resetBtn" style="background:#404040;margin-top:10px;padding:6px 14px;font-size:.82rem">🔄 Začít nový den (odškrtnout vše)</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let meds=JSON.parse(localStorage.getItem('meds')||'null')||[{id:1,name:'Vitamin D',dose:'1 kapka',time:'08:00',taken:false},{id:2,name:'Hořčík',dose:'1 tableta',time:'20:00',taken:false}];
let lastDay=localStorage.getItem('meds_day');
const today=new Date().toDateString();
if(lastDay!==today){meds.forEach(m=>m.taken=false);localStorage.setItem('meds_day',today);}
const save=()=>{localStorage.setItem('meds',JSON.stringify(meds));localStorage.setItem('meds_day',new Date().toDateString());};
$('addBtn').onclick=()=>{const n=$('name').value.trim();if(!n)return;meds.push({id:Date.now(),name:n,dose:$('dose').value||'',time:$('time').value,taken:false});save();$('name').value='';$('dose').value='';render();};
function slotName(t){const h=+t.slice(0,2);return h<11?'🌅 Ráno':h<15?'☀️ Poledne':h<19?'🌆 Odpoledne':'🌙 Večer';}
function render(){
  if(!meds.length){$('schedule').innerHTML='<div class="empty">Zatím žádné léky. Přidej první výše.</div>';$('progress').textContent='';return;}
  meds.sort((a,b)=>a.time.localeCompare(b.time));
  const taken=meds.filter(m=>m.taken).length;
  $('progress').textContent=`Dnes užito: ${taken} / ${meds.length}`+(taken===meds.length?' ✅ Vše hotovo!':'');
  const slots={};meds.forEach(m=>{(slots[slotName(m.time)]=slots[slotName(m.time)]||[]).push(m);});
  $('schedule').innerHTML=Object.entries(slots).map(([slot,list])=>`<div class="slot"><div class="slot-head">${slot}</div>
    ${list.map(m=>`<div class="med ${m.taken?'taken':''}"><div class="check" data-id="${m.id}">${m.taken?'✓':''}</div>
      <div class="info"><div class="name">${m.name.replace(/</g,'&lt;')}</div><div class="dose">${m.dose}</div></div>
      <div class="time">${m.time}</div><button class="del" data-del="${m.id}">🗑️</button></div>`).join('')}</div>`).join('');
  document.querySelectorAll('.check').forEach(c=>c.onclick=()=>{const m=meds.find(x=>x.id==c.dataset.id);m.taken=!m.taken;save();render();});
  document.querySelectorAll('.del').forEach(b=>b.onclick=()=>{meds=meds.filter(x=>x.id!=b.dataset.del);save();render();});
}
$('resetBtn').onclick=()=>{meds.forEach(m=>m.taken=false);save();render();};
render();
</script>
</body>
</html>
