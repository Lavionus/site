<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🕰️ Unix timestamp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:14px}
.now{text-align:center;margin-bottom:6px}
.now .v{font-size:2.2rem;font-weight:700;color:#6aa6fd;font-variant-numeric:tabular-nums}
.now .l{font-size:.78rem;color:#888}
.row{display:flex;gap:10px;align-items:center;margin-bottom:12px}
.row input,.row select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px}
.row .grow{flex:1}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}
.res-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #333;font-size:.92rem}
.res-row:last-child{border:none}.res-row b{color:#4caf50;font-family:monospace}
label{font-size:.78rem;color:#888;display:block;margin-bottom:4px}
</style>
</head>
<body>
<div class="container">
  <h1>🕰️ Unix timestamp převodník</h1>
  <div class="card">
    <div class="now"><div class="v" id="nowTs">–</div><div class="l">aktuální Unix timestamp (s) · <span id="nowMs"></span> ms</div></div>
    <button class="btn btn-sec" id="copyNow" style="width:100%;margin-top:10px">📋 Kopírovat aktuální</button>
  </div>
  <div class="card">
    <h2>Timestamp → datum</h2>
    <div class="row">
      <input class="grow" type="number" id="tsInput" placeholder="1700000000">
      <select id="tsUnit"><option value="s">sekundy</option><option value="ms">milisekundy</option></select>
      <button class="btn" id="tsBtn">→</button>
    </div>
    <div id="tsResult"></div>
  </div>
  <div class="card">
    <h2>Datum → timestamp</h2>
    <div class="row"><div class="grow"><label>Datum a čas (místní)</label><input type="datetime-local" id="dtInput" step="1" style="width:100%"></div></div>
    <div id="dtResult"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function tick(){const now=Date.now();$('nowTs').textContent=Math.floor(now/1000);$('nowMs').textContent=now;}
setInterval(tick,1000);tick();
$('copyNow').onclick=()=>{navigator.clipboard.writeText($('nowTs').textContent);$('copyNow').textContent='✅ Zkopírováno';setTimeout(()=>$('copyNow').textContent='📋 Kopírovat aktuální',1200);};
function showDate(ms){
  const d=new Date(ms);
  if(isNaN(d)){$('tsResult').innerHTML='<p style="color:#e74c3c">Neplatný timestamp</p>';return;}
  const rows=[
    ['Místní čas',d.toLocaleString('cs',{dateStyle:'full',timeStyle:'medium'})],
    ['ISO 8601 (UTC)',d.toISOString()],
    ['UTC',d.toUTCString()],
    ['Jen datum',d.toLocaleDateString('cs')],
    ['Relativně',relative(ms)]
  ];
  $('tsResult').innerHTML=rows.map(([l,v])=>`<div class="res-row"><span>${l}</span><b>${v}</b></div>`).join('');
}
function relative(ms){const diff=ms-Date.now();const abs=Math.abs(diff);const fut=diff>0;
  const units=[['rok',31536000000],['měsíc',2592000000],['den',86400000],['hodinu',3600000],['minutu',60000],['sekundu',1000]];
  for(const[name,size]of units){const n=Math.floor(abs/size);if(n>=1)return fut?`za ${n} ${name}(ů)`:`před ${n} ${name}(ami)`;}
  return 'právě teď';
}
function tsConvert(){const v=parseFloat($('tsInput').value);if(isNaN(v)){$('tsResult').innerHTML='';return;}showDate($('tsUnit').value==='s'?v*1000:v);}
$('tsBtn').onclick=tsConvert;$('tsInput').oninput=tsConvert;$('tsUnit').onchange=tsConvert;
function dtConvert(){const d=new Date($('dtInput').value);if(isNaN(d)){$('dtResult').innerHTML='';return;}
  $('dtResult').innerHTML=[['Unix (s)',Math.floor(d.getTime()/1000)],['Unix (ms)',d.getTime()],['ISO (UTC)',d.toISOString()]].map(([l,v])=>`<div class="res-row"><span>${l}</span><b>${v}</b></div>`).join('');}
$('dtInput').oninput=dtConvert;
const n=new Date();n.setMinutes(n.getMinutes()-n.getTimezoneOffset());$('dtInput').value=n.toISOString().slice(0,19);
$('tsInput').value=Math.floor(Date.now()/1000);tsConvert();dtConvert();
</script>
</body>
</html>
