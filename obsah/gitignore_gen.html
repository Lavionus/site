<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚫 .gitignore generátor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:980px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.layout{display:grid;grid-template-columns:300px 1fr;gap:20px}
@media(max-width:680px){.layout{grid-template-columns:1fr}}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:8px 14px;background:#1e1e1e;border:1px solid #404040;border-radius:20px;cursor:pointer;font-size:.85rem;transition:.15s}
.chip:hover{border-color:#6aa6fd}
.chip.active{background:#6aa6fd;border-color:#6aa6fd;color:#fff}
textarea{width:100%;min-height:480px;background:#1e1e1e;border:1px solid #555;border-radius:8px;color:#e0e0e0;padding:14px;font-family:'SF Mono',Consolas,monospace;font-size:.84rem;resize:vertical;line-height:1.5}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem}
.btn-sec{background:#404040}
.actions{display:flex;gap:8px;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
  <h1>🚫 .gitignore generátor</h1>
  <div class="layout">
    <div class="card">
      <h2>Vyber technologie</h2>
      <div class="chips" id="chips"></div>
    </div>
    <div>
      <div class="actions">
        <button class="btn" id="copyBtn">📋 Kopírovat</button>
        <button class="btn btn-sec" id="dlBtn">💾 Stáhnout .gitignore</button>
      </div>
      <textarea id="output" spellcheck="false"></textarea>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const TEMPLATES={
  'Node.js':['node_modules/','npm-debug.log*','yarn-debug.log*','yarn-error.log*','.pnpm-debug.log*','.npm','dist/','build/'],
  'Python':['__pycache__/','*.py[cod]','*.egg-info/','.venv/','venv/','env/','.pytest_cache/','*.egg','build/','dist/'],
  'Java':['*.class','target/','*.jar','*.war','.gradle/','build/','.mvn/'],
  'macOS':['.DS_Store','.AppleDouble','.LSOverride','._*','.Spotlight-V100','.Trashes'],
  'Windows':['Thumbs.db','ehthumbs.db','Desktop.ini','$RECYCLE.BIN/','*.lnk'],
  'Linux':['*~','.directory','.Trash-*'],
  'VS Code':['.vscode/*','!.vscode/settings.json','!.vscode/extensions.json','*.code-workspace'],
  'JetBrains':['.idea/','*.iml','*.ipr','*.iws','out/'],
  'Logy & dočasné':['*.log','*.tmp','*.temp','*.bak','*.swp','*.cache'],
  'Env & tajné':['.env','.env.local','.env.*.local','*.pem','secrets.json','config.local.*'],
  'React/Vite':['node_modules/','dist/','dist-ssr/','*.local','.vite/'],
  'PHP/Composer':['/vendor/','composer.phar','.phpunit.result.cache'],
  'C/C++':['*.o','*.obj','*.exe','*.out','*.so','*.a','build/','cmake-build-*/'],
  'Rust':['/target/','Cargo.lock','**/*.rs.bk']
};
let selected=new Set();
$('chips').innerHTML=Object.keys(TEMPLATES).map(t=>`<div class="chip" data-t="${t}">${t}</div>`).join('');
document.querySelectorAll('.chip').forEach(c=>c.onclick=()=>{const t=c.dataset.t;if(selected.has(t)){selected.delete(t);c.classList.remove('active');}else{selected.add(t);c.classList.add('active');}build();});
function build(){
  if(!selected.size){$('output').value='# Vyber technologie vlevo pro vygenerování .gitignore\n';return;}
  let out='# Vygenerováno generátorem .gitignore\n';
  selected.forEach(t=>{out+=`\n### ${t} ###\n`+TEMPLATES[t].join('\n')+'\n';});
  $('output').value=out;
}
$('copyBtn').onclick=()=>{navigator.clipboard.writeText($('output').value);$('copyBtn').textContent='✅ Zkopírováno';setTimeout(()=>$('copyBtn').textContent='📋 Kopírovat',1200);};
$('dlBtn').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('output').value],{type:'text/plain'}));a.download='.gitignore';a.click();};
// preselect a couple
['Node.js','macOS','VS Code'].forEach(t=>{selected.add(t);document.querySelector(`.chip[data-t="${t}"]`).classList.add('active');});
build();
</script>
</body>
</html>
