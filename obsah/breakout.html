<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧱 Breakout</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6rem;margin-bottom:10px;font-weight:600}
.hud{display:flex;gap:24px;margin-bottom:12px;font-size:1rem}
.hud b{color:#6aa6fd}
canvas{background:#0d0d0d;border-radius:8px;border:1px solid #404040;touch-action:none;max-width:100%}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer;font-weight:600;margin-top:14px}
.btn:hover{background:#5694f0}
.hint{color:#888;font-size:.84rem;margin-top:12px;text-align:center}
.overlay-msg{margin-top:12px;font-size:1.3rem;font-weight:700;min-height:30px}
</style>
</head>
<body>
<h1>🧱 Breakout</h1>
<div class="hud"><div>Skóre: <b id="score">0</b></div><div>Životy: <b id="lives">3</b></div><div>Úroveň: <b id="level">1</b></div></div>
<canvas id="canvas" width="480" height="520"></canvas>
<button class="btn" id="startBtn">▶️ Start</button>
<div class="overlay-msg" id="msg"></div>
<p class="hint">Ovládání: pohyb myší / prstem nebo šipky ←→. Odrážej míček a rozbij všechny cihly.</p>
<script>
const $=id=>document.getElementById(id);
const canvas=$('canvas'),ctx=canvas.getContext('2d');
const W=canvas.width,H=canvas.height;
let paddle,ball,bricks,score,lives,level,running,keys={};
const COLORS=['#e74c3c','#e67e22','#f1c40f','#27ae60','#3498db','#9b59b6'];
function initLevel(){
  const rows=4+level,cols=8;const bw=W/cols,bh=22;
  bricks=[];
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)if(Math.random()<0.85||r<3)bricks.push({x:c*bw,y:40+r*(bh+4),w:bw-4,h:bh,color:COLORS[r%COLORS.length],hits:1});
  resetBall();
}
function resetBall(){
  paddle={x:W/2-45,y:H-30,w:90,h:12};
  ball={x:W/2,y:H-44,r:8,dx:(Math.random()<.5?-1:1)*(2.6+level*0.3),dy:-(3+level*0.3)};
}
function start(){score=0;lives=3;level=1;running=true;$('msg').textContent='';initLevel();updateHud();loop();}
function updateHud(){$('score').textContent=score;$('lives').textContent=lives;$('level').textContent=level;}
function loop(){
  if(!running)return;
  ctx.clearRect(0,0,W,H);
  // paddle move by keys
  if(keys.left)paddle.x-=6;if(keys.right)paddle.x+=6;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));
  // ball
  ball.x+=ball.dx;ball.y+=ball.dy;
  if(ball.x<ball.r||ball.x>W-ball.r)ball.dx*=-1;
  if(ball.y<ball.r)ball.dy*=-1;
  // paddle collision
  if(ball.y+ball.r>paddle.y&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w&&ball.dy>0){
    ball.dy=-Math.abs(ball.dy);const hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);ball.dx=hit*4.5;
  }
  // bottom
  if(ball.y>H){lives--;updateHud();if(lives<=0){running=false;$('msg').textContent='💀 Konec hry! Skóre: '+score;draw();return;}resetBall();}
  // bricks
  for(let i=bricks.length-1;i>=0;i--){const b=bricks[i];
    if(ball.x>b.x&&ball.x<b.x+b.w&&ball.y-ball.r<b.y+b.h&&ball.y+ball.r>b.y){
      ball.dy*=-1;bricks.splice(i,1);score+=10;updateHud();break;
    }
  }
  if(!bricks.length){level++;updateHud();$('msg').textContent='🎉 Úroveň '+(level-1)+' splněna!';initLevel();}
  draw();
  requestAnimationFrame(loop);
}
function draw(){
  ctx.clearRect(0,0,W,H);
  bricks.forEach(b=>{ctx.fillStyle=b.color;ctx.fillRect(b.x,b.y,b.w,b.h);});
  ctx.fillStyle='#6aa6fd';ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fillStyle='#fff';ctx.fill();
}
canvas.onmousemove=e=>{const rect=canvas.getBoundingClientRect();paddle&&(paddle.x=(e.clientX-rect.left)*(W/rect.width)-paddle.w/2);};
canvas.ontouchmove=e=>{e.preventDefault();const rect=canvas.getBoundingClientRect();paddle&&(paddle.x=(e.touches[0].clientX-rect.left)*(W/rect.width)-paddle.w/2);};
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')keys.left=1;if(e.key==='ArrowRight')keys.right=1;});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')keys.left=0;if(e.key==='ArrowRight')keys.right=0;});
$('startBtn').onclick=start;
// initial draw
paddle={x:W/2-45,y:H-30,w:90,h:12};ball={x:W/2,y:H-44,r:8,dx:0,dy:0};bricks=[];draw();
</script>
</body>
</html>
