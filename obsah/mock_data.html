<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧪 Generátor testovacích dat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600;text-align:center}
.pod{color:#888;text-align:center;font-size:.85rem;margin-bottom:18px}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px;overflow-x:auto}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:14px}
.pole{display:flex;gap:14px;flex-wrap:wrap;align-items:end;margin-bottom:14px}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input[type=number]{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px;width:90px}
.chk{display:flex;align-items:center;gap:6px;background:#242424;border:1px solid #404040;border-radius:6px;padding:8px 12px;cursor:pointer;font-size:.85rem}
.chk input{margin:0}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.88rem;margin-right:8px}
.btn-sec{background:#404040}
table{width:100%;border-collapse:collapse;font-size:.82rem;white-space:nowrap}
td,th{padding:6px 8px;border-bottom:1px solid #333;text-align:left}
th{color:#6aa6fd;font-size:.75rem;text-transform:uppercase}
</style>
</head>
<body>
<div class="container">
  <h1>🧪 Generátor testovacích dat</h1>
  <p class="pod">Fiktivní česká jména, adresy, e-maily, telefony i IČO s platným kontrolním součtem. Vše smyšlené – shoda se skutečností je náhodná.</p>
  <div class="card">
    <div class="pole">
      <div><label>Počet záznamů</label><input type="number" id="pocet" value="10" min="1" max="500"></div>
      <label class="chk"><input type="checkbox" data-p="jmeno" checked>Jméno</label>
      <label class="chk"><input type="checkbox" data-p="email" checked>E-mail</label>
      <label class="chk"><input type="checkbox" data-p="telefon" checked>Telefon</label>
      <label class="chk"><input type="checkbox" data-p="adresa" checked>Adresa</label>
      <label class="chk"><input type="checkbox" data-p="mesto" checked>Město + PSČ</label>
      <label class="chk"><input type="checkbox" data-p="datum">Datum narození</label>
      <label class="chk"><input type="checkbox" data-p="ico">IČO</label>
      <label class="chk"><input type="checkbox" data-p="firma">Firma</label>
    </div>
    <button class="btn" id="gen">🎲 Generovat</button>
    <button class="btn btn-sec" id="csv">💾 CSV</button>
    <button class="btn btn-sec" id="json">💾 JSON</button>
  </div>
  <div class="card"><table id="tab"></table></div>
</div>
<script>
const $=id=>document.getElementById(id);
const MUZI=['Jan','Petr','Pavel','Martin','Tomáš','Jiří','Josef','Michal','Lukáš','David','Jakub','Ondřej','Filip','Adam','Marek'];
const ZENY=['Marie','Jana','Eva','Hana','Anna','Lenka','Kateřina','Lucie','Petra','Veronika','Tereza','Michaela','Eliška','Barbora','Klára'];
const PRIJMENI=['Novák','Svoboda','Novotný','Dvořák','Černý','Procházka','Kučera','Veselý','Horák','Němec','Pokorný','Hájek','Král','Beneš','Fiala','Sedláček','Doležal','Zeman','Kolář','Urban'];
const ULICE=['Hlavní','Nádražní','Školní','Zahradní','Polní','Krátká','Dlouhá','Luční','Květná','Lipová','Nová','Sportovní','Jiráskova','Palackého','Tyršova'];
const MESTA=[['Praha','110 00'],['Brno','602 00'],['Ostrava','702 00'],['Plzeň','301 00'],['Liberec','460 01'],['Olomouc','779 00'],['České Budějovice','370 01'],['Hradec Králové','500 02'],['Pardubice','530 02'],['Zlín','760 01'],['Jihlava','586 01'],['Tábor','390 01'],['Žatec','438 01'],['Kolín','280 02'],['Trutnov','541 01']];
const FIRMY_A=['AGRO','TECH','STAV','EKO','PRO','MULTI','INTER','BOHEMIA','MORAVIA','CZECH'];
const FIRMY_B=['servis','systems','trade','group','plus','market','invest','partners','solution','logistik'];
const FIRMY_C=['s.r.o.','a.s.','s.r.o.','s.r.o.','spol. s r.o.'];
const nah=a=>a[Math.floor(Math.random()*a.length)];
const cislo=(od,do_)=>od+Math.floor(Math.random()*(do_-od+1));
function bezDiakritiky(s){return s.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase();}
function prechyl(p){return p.endsWith('ý')?p.slice(0,-1)+'á':(p.endsWith('a')||p.endsWith('e'))?p:p+'ová';}
// IČO: 7 náhodných číslic + kontrolní dle mod 11
function ico(){
  const d=Array.from({length:7},()=>Math.floor(Math.random()*10));
  const vazene=d.reduce((s,x,i)=>s+x*(8-i),0);
  const zb=vazene%11;
  const k=(11-zb)%10;
  return d.join('')+k;
}
function zaznam(){
  const zena=Math.random()<0.5;
  const jmeno=zena?nah(ZENY):nah(MUZI);
  const prij=zena?prechyl(nah(PRIJMENI)):nah(PRIJMENI);
  const [mesto,psc]=nah(MESTA);
  const rok=cislo(1955,2005);
  return{
    jmeno:jmeno+' '+prij,
    email:bezDiakritiky(jmeno)+'.'+bezDiakritiky(prij)+cislo(1,99)+'@'+nah(['example.com','test.cz','mail.example','demo.cz']),
    telefon:'+420 '+cislo(601,779)+' '+String(cislo(100,999))+' '+String(cislo(100,999)),
    adresa:nah(ULICE)+' '+cislo(1,250),
    mesto:mesto+', '+psc,
    datum:String(cislo(1,28)).padStart(2,'0')+'.'+String(cislo(1,12)).padStart(2,'0')+'.'+rok,
    ico:ico(),
    firma:nah(FIRMY_A)+' '+nah(FIRMY_B)+' '+nah(FIRMY_C),
  };
}
const NAZVY={jmeno:'Jméno',email:'E-mail',telefon:'Telefon',adresa:'Adresa',mesto:'Město',datum:'Nar.',ico:'IČO',firma:'Firma'};
let data=[];
function pole(){return [...document.querySelectorAll('[data-p]:checked')].map(c=>c.dataset.p);}
function generuj(){
  const n=Math.min(500,Math.max(1,+$('pocet').value||10));
  data=Array.from({length:n},zaznam);
  const p=pole();
  $('tab').innerHTML='<thead><tr>'+p.map(k=>`<th>${NAZVY[k]}</th>`).join('')+'</tr></thead><tbody>'+
    data.map(z=>'<tr>'+p.map(k=>`<td>${z[k]}</td>`).join('')+'</tr>').join('')+'</tbody>';
}
$('gen').onclick=generuj;
document.querySelectorAll('[data-p]').forEach(c=>c.addEventListener('change',generuj));
function stahni(text,nazev,typ){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([text],{type:typ}));
  a.download=nazev;a.click();
}
$('csv').onclick=()=>{
  const p=pole();
  const csv=[p.map(k=>NAZVY[k]).join(';'),...data.map(z=>p.map(k=>'"'+z[k]+'"').join(';'))].join('\n');
  stahni('﻿'+csv,'testovaci_data.csv','text/csv;charset=utf-8');
};
$('json').onclick=()=>{
  const p=pole();
  stahni(JSON.stringify(data.map(z=>Object.fromEntries(p.map(k=>[k,z[k]]))),null,2),'testovaci_data.json','application/json');
};
generuj();
</script>
</body>
</html>
