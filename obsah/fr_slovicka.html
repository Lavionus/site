<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>🇫🇷 Francouzština – slovíčka</title>
  <link rel="stylesheet" href="../common.css">
  <script>
    if (localStorage.getItem('webapp_theme') === 'light') document.documentElement.dataset.theme = 'light';
  </script>
  <style>
    body { background-color: var(--bg-deep); padding: 24px clamp(14px, 3vw, 40px); min-height: 100vh; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .podtitul { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 14px; }
    .rezimy { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .rezimy button { background: var(--bg-control); border: 1px solid var(--border-strong); color: var(--text-muted); border-radius: 6px; padding: 7px 13px; font-size: 0.84rem; cursor: pointer; }
    .rezimy button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    .hledej { margin-bottom: 10px; display:flex; gap:8px; flex-wrap:wrap; }
    .hledej input { background: var(--bg-input); border: 1px solid var(--border-strong); border-radius: 6px; color: var(--text); padding: 8px 12px; font-size: 0.9rem; width: min(300px, 100%); }
    .kat-chip { background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-muted); border-radius: 14px; padding: 5px 12px; font-size: .78rem; cursor: pointer; }
    .kat-chip.active { background: var(--accent-soft); color: var(--accent); border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; max-width: 720px; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--text-faint); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; }
    td.fr { font-weight: 600; }
    .art-le{color:#6aa6fd}.art-la{color:#e05d5d}.art-les{color:#4caf7d}
    td.cz { color: var(--text-muted); }

    .karta { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px; max-width: 520px; text-align: center; }
    .emoji { font-size: clamp(4rem, 18vw, 6rem); line-height: 1; margin-bottom: 10px; user-select: none; }
    .fr-word { font-size: 2rem; font-weight: 700; }
    .cz-word { font-size: 1.3rem; color: var(--accent); margin-top: 6px; min-height: 1.6rem; }
    .cz-word.skryto { visibility: hidden; }
    .tlacitka { display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap; }
    .tlacitka button { border: none; border-radius: 8px; padding: 11px 20px; font-size: 0.95rem; font-weight: 600; cursor: pointer; }
    .b-hlavni { background: var(--accent); color: #fff; }
    .b-vedle { background: var(--bg-control); color: var(--text); border: 1px solid var(--border-strong) !important; }
    .pocet { color: var(--text-faint); font-size: 0.85rem; margin-top: 12px; font-variant-numeric: tabular-nums; }

    .moznosti { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
    .moznosti button { background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px; font-size: 1.05rem; cursor: pointer; }
    .moznosti button:hover { border-color: var(--accent); }
    .moznosti button.ok { background: rgba(76, 175, 125, 0.2); border-color: var(--ok); }
    .moznosti button.spatne { background: rgba(224, 93, 93, 0.18); border-color: var(--danger); }
    .moznosti button:disabled { cursor: default; }
    .serie { color: var(--warn); font-size: 0.9rem; margin-top: 10px; min-height: 1.2rem; }
  </style>
</head>
<body>
  <h1>🇫🇷 Francouzština – slovíčka</h1>
  <p class="podtitul">Základní slovní zásoba se členy (le/la/les). Klepnutím na kartičku zobrazíš překlad, nebo si vyzkoušej kvíz.</p>

  <div class="rezimy" id="rezimy">
    <button data-rezim="prehled" class="active">📖 Přehled</button>
    <button data-rezim="karticky">🎴 Kartičky</button>
    <button data-rezim="kviz">❓ Kvíz</button>
  </div>

  <div id="prehled">
    <div class="hledej">
      <input id="hledej" placeholder="🔍 Hledej slovíčko (česky i francouzsky)…" autocomplete="off">
      <span class="kat-chip active" data-kat="">Vše</span>
      <span class="kat-chip" data-kat="domov">🏠 Domov</span>
      <span class="kat-chip" data-kat="jidlo">🍎 Jídlo</span>
      <span class="kat-chip" data-kat="zvirata">🐶 Zvířata</span>
      <span class="kat-chip" data-kat="lide">👪 Lidé</span>
      <span class="kat-chip" data-kat="priroda">🌳 Příroda</span>
      <span class="kat-chip" data-kat="ostatni">✏️ Ostatní</span>
    </div>
    <table><thead><tr><th>Člen</th><th>Francouzsky</th><th>Česky</th></tr></thead><tbody id="telo"></tbody></table>
  </div>

  <div class="karta" id="karticky" style="display:none">
    <div class="emoji" id="emoji"></div>
    <div class="fr-word" id="frWord"></div>
    <div class="cz-word skryto" id="czWord"></div>
    <div class="tlacitka">
      <button class="b-vedle" id="btnPrev">← Zpět</button>
      <button class="b-hlavni" id="btnOtoc">Ukázat překlad</button>
      <button class="b-vedle" id="btnNext">Další →</button>
    </div>
    <div class="pocet" id="pocet"></div>
  </div>

  <div class="karta" id="kvizKarta" style="display:none">
    <div class="emoji" id="kvizEmoji"></div>
    <div style="color:var(--text-muted);font-size:.9rem">Co to znamená česky?</div>
    <div class="moznosti" id="moznosti"></div>
    <div class="serie" id="serie"></div>
    <div class="pocet" id="kvizPocet"></div>
  </div>

<script>
const $ = id => document.getElementById(id);
// [člen, slovo, emoji, český význam, kategorie]
const SLOVA = [
  ['la','maison','🏠','dům','domov'], ['appartement','','🏢','byt','domov'], ['la','chambre','🚪','pokoj','domov'],
  ['la','cuisine','🍳','kuchyně','domov'], ['le','lit','🛏️','postel','domov'], ['la','table','🪑','stůl','domov'],
  ['la','chaise','💺','židle','domov'], ['la','fenêtre','🪟','okno','domov'], ['la','porte','🚪','dveře','domov'],
  ['la','pomme','🍎','jablko','jidlo'], ['le','pain','🍞','chléb','jidlo'], ['le','lait','🥛','mléko','jidlo'],
  ['le','fromage','🧀','sýr','jidlo'], ['l’','eau','💧','voda','jidlo'], ['la','soupe','🍲','polévka','jidlo'],
  ['le','café','☕','káva','jidlo'], ['la','banane','🍌','banán','jidlo'], ['l’','œuf','🥚','vejce','jidlo'],
  ['le','chien','🐶','pes','zvirata'], ['le','chat','🐱','kočka','zvirata'], ['l’','oiseau','🐦','pták','zvirata'],
  ['le','cheval','🐴','kůň','zvirata'], ['la','vache','🐄','kráva','zvirata'], ['le','poisson','🐟','ryba','zvirata'],
  ['la','souris','🐭','myš','zvirata'],
  ['la','mère','👩','matka','lide'], ['le','père','👨','otec','lide'], ['le','frère','👦','bratr','lide'],
  ['la','sœur','👧','sestra','lide'], ['l’','enfant','🧒','dítě','lide'], ['l’','ami','🧑‍🤝‍🧑','přítel','lide'],
  ['le','professeur','👨‍🏫','učitel','lide'],
  ['l’','arbre','🌳','strom','priroda'], ['la','fleur','🌸','květina','priroda'], ['la','forêt','🌲','les','priroda'],
  ['le','soleil','☀️','slunce','priroda'], ['la','lune','🌙','měsíc','priroda'], ['la','pluie','🌧️','déšť','priroda'],
  ['la','neige','❄️','sníh','priroda'], ['la','montagne','⛰️','hora','priroda'], ['la','rivière','🏞️','řeka','priroda'],
  ['le','temps','⏰','čas','ostatni'], ['le','jour','📅','den','ostatni'], ['la','nuit','🌃','noc','ostatni'],
  ['l’','école','🏫','škola','ostatni'], ['le','travail','💼','práce','ostatni'], ['le','livre','📖','kniha','ostatni'],
  ['la','couleur','🎨','barva','ostatni'], ['la','rue','🛣️','ulice','ostatni'], ['la','voiture','🚗','auto','ostatni'],
];

let aktivniKat = '';
function art(s){return s[0]==='l’'?'l’':s[0];}
function artClass(s){return s[0]==='la'?'art-la':s[0]==='le'?'art-le':'art-les';}

/* přehled + hledání */
function vykresli(filtr = '') {
  const f = filtr.trim().toLowerCase();
  $('telo').innerHTML = SLOVA
    .filter(s => (!aktivniKat || s[4] === aktivniKat) && (!f || s.some(x => String(x).toLowerCase().includes(f))))
    .map(s => `<tr><td class="${artClass(s)}">${art(s)}</td><td class="fr">${s[1]}</td><td class="cz">${s[3]}</td></tr>`).join('')
    || '<tr><td colspan="3" style="color:var(--text-faint);padding:20px">Nic nenalezeno.</td></tr>';
}
$('hledej').addEventListener('input', e => vykresli(e.target.value));
document.querySelectorAll('.kat-chip').forEach(c => c.onclick = () => {
  document.querySelectorAll('.kat-chip').forEach(x => x.classList.remove('active'));
  c.classList.add('active');
  aktivniKat = c.dataset.kat;
  vykresli($('hledej').value);
});
vykresli();

/* kartičky */
let poradi = SLOVA.map((_, i) => i);
let index = 0;
function zamichej(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function ukazKartu() {
  const s = SLOVA[poradi[index]];
  $('emoji').textContent = s[2];
  $('frWord').innerHTML = `<span class="${artClass(s)}">${art(s)}</span>${s[0]==='l’'?'':' '}${s[1]}`;
  $('czWord').textContent = s[3];
  $('czWord').classList.add('skryto');
  $('btnOtoc').textContent = 'Ukázat překlad';
  $('pocet').textContent = (index+1) + ' / ' + poradi.length;
}
$('btnOtoc').onclick = () => {
  const skryto = $('czWord').classList.toggle('skryto');
  $('btnOtoc').textContent = skryto ? 'Ukázat překlad' : 'Skrýt překlad';
};
$('btnNext').onclick = () => { index = (index+1) % poradi.length; ukazKartu(); };
$('btnPrev').onclick = () => { index = (index-1+poradi.length) % poradi.length; ukazKartu(); };

/* kvíz */
let spravne = 0, celkem = 0, serie = 0, ulohaKviz = null;
function novaUlohaKviz() {
  const i = Math.floor(Math.random()*SLOVA.length);
  ulohaKviz = SLOVA[i];
  $('kvizEmoji').textContent = ulohaKviz[2];
  const spravnaOdp = ulohaKviz[3];
  const spatne = zamichej(SLOVA.filter(s=>s!==ulohaKviz)).slice(0,3).map(s=>s[3]);
  const moznosti = zamichej([spravnaOdp, ...spatne]);
  $('moznosti').innerHTML = moznosti.map(m=>`<button data-odp="${m}">${m}</button>`).join('');
  $('moznosti').querySelectorAll('button').forEach(b=>b.onclick=()=>vyhodnotKviz(b, spravnaOdp));
}
function vyhodnotKviz(tlacitko, spravnaOdp) {
  $('moznosti').querySelectorAll('button').forEach(b=>{
    b.disabled = true;
    if (b.dataset.odp === spravnaOdp) b.classList.add('ok');
  });
  celkem++;
  if (tlacitko.dataset.odp === spravnaOdp) { spravne++; serie++; }
  else { tlacitko.classList.add('spatne'); serie = 0; }
  $('serie').textContent = serie >= 3 ? '🔥 série ' + serie : '';
  $('kvizPocet').textContent = spravne + ' / ' + celkem;
  setTimeout(novaUlohaKviz, 1100);
}

document.querySelectorAll('#rezimy button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#rezimy button').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  const rezim = b.dataset.rezim;
  $('prehled').style.display = rezim === 'prehled' ? '' : 'none';
  $('karticky').style.display = rezim === 'karticky' ? '' : 'none';
  $('kvizKarta').style.display = rezim === 'kviz' ? '' : 'none';
  if (rezim === 'karticky') { poradi = zamichej(SLOVA.map((_,i)=>i)); index = 0; ukazKartu(); }
  if (rezim === 'kviz') { spravne = 0; celkem = 0; serie = 0; novaUlohaKviz(); }
});
</script>
</body>
</html>
