<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Kombinatorika a pravděpodobnost</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:620px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:16px}
.formulas{font-size:.82rem;color:#999;line-height:1.7;margin-bottom:16px}
.formulas b{color:#ccc}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 28px;border-radius:6px;cursor:pointer;font-weight:600;display:block;margin:0 auto}
.btn:hover{background:#5694f0}
.scorebar{display:flex;justify-content:space-around;margin-bottom:18px}
.scorebar .v{font-size:1.5rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.game,.results{display:none;text-align:center}
.question{font-size:1.15rem;margin:16px 0;line-height:1.5}
.answer{font-size:1.6rem;width:180px;text-align:center;background:#1e1e1e;border:2px solid #555;border-radius:10px;color:#fff;padding:10px}
.answer.correct{border-color:#27ae60}.answer.wrong{border-color:#e74c3c}
.feedback{font-size:1.1rem;margin:14px 0;min-height:32px;font-weight:600}
.results .big{font-size:2.4rem;font-weight:700;color:#6aa6fd}
</style>
</head>
<body>
<div class="container">
  <h1>🎲 Kombinatorika a pravděpodobnost</h1>
  <div class="card" id="setupCard">
    <div class="formulas">
      <b>Variace</b> V(k,n) = n!/(n−k)! &nbsp; <b>Kombinace</b> C(k,n) = n!/(k!(n−k)!)<br>
      <b>Permutace</b> P(n) = n! &nbsp; <b>Pravděpodobnost</b> P = počet příznivých / počet možných
    </div>
    <button class="btn" id="startBtn">▶️ Start</button>
  </div>

  <div class="card game" id="gameCard">
    <div class="scorebar">
      <div><div class="v" id="score">0</div><div class="l">Správně</div></div>
      <div><div class="v" id="idx">0/10</div><div class="l">Příklad</div></div>
    </div>
    <div class="question" id="question"></div>
    <input class="answer" id="answer" type="number" step="any">
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="card results" id="resultsCard">
    <div class="big" id="finalScore"></div>
    <p style="color:#888" id="finalDetail"></p>
    <button class="btn" id="againBtn" style="margin-top:14px">🔄 Znovu</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function fact(n){let r=1;for(let i=2;i<=n;i++)r*=i;return r;}
function comb(n,k){return fact(n)/(fact(k)*fact(n-k));}
function perm(n,k){return fact(n)/fact(n-k);}
let score,idx,total=10,answer,tolerance;
const GEN=[
()=>{ // permutace
  const n=3+Math.floor(Math.random()*4);
  answer=fact(n);tolerance=0;
  return `Kolika způsoby lze seřadit ${n} různých knih na poličku vedle sebe?`;
},
()=>{ // kombinace
  const n=5+Math.floor(Math.random()*6),k=2+Math.floor(Math.random()*Math.min(3,n-2));
  answer=comb(n,k);tolerance=0;
  return `Ve třídě je ${n} žáků. Kolika způsoby lze vybrat skupinu ${k} žáků na výlet (na pořadí nezáleží)?`;
},
()=>{ // variace
  const n=4+Math.floor(Math.random()*5),k=2+Math.floor(Math.random()*2);
  answer=perm(n,k);tolerance=0;
  return `Máme ${n} různých vlaječek. Kolika způsoby lze vybrat a seřadit ${k} z nich na stožáry (na pořadí záleží)?`;
},
()=>{ // pravděpodobnost - kostka
  const target=1+Math.floor(Math.random()*6);
  answer=Math.round((1/6)*1000)/1000;tolerance=0.01;
  return `Jaká je pravděpodobnost, že na hrací kostce padne přesně číslo ${target}? (výsledek jako desetinné číslo, např. 0.17)`;
},
()=>{ // pravděpodobnost - karty barva
  answer=0.5;tolerance=0.02;
  return `V balíčku 52 karet je 26 červených a 26 černých. Jaká je pravděpodobnost tažení červené karty? (desetinné číslo)`;
},
()=>{ // pravděpodobnost - kostka sudé
  answer=0.5;tolerance=0.02;
  return `Jaká je pravděpodobnost, že na hrací kostce padne sudé číslo? (desetinné číslo)`;
}
];
function gen(){
  const f=GEN[Math.floor(Math.random()*GEN.length)];
  $('question').textContent=f();
  $('answer').value='';$('answer').className='answer';$('answer').focus();
}
function check(){
  const v=parseFloat(($('answer').value||'').replace(',','.'));
  const ok=tolerance>0?Math.abs(v-answer)<=tolerance:v===answer;
  if(ok){$('answer').className='answer correct';score++;$('feedback').textContent='✅';$('feedback').style.color='#27ae60';}
  else{$('answer').className='answer wrong';$('feedback').textContent='❌ Správně: '+answer;$('feedback').style.color='#e74c3c';}
  $('score').textContent=score;
  setTimeout(()=>{$('feedback').textContent='';next();},1100);
}
function next(){
  idx++;
  if(idx>=total){finish();return;}
  $('idx').textContent=`${idx+1}/${total}`;
  gen();
}
$('answer').addEventListener('keydown',e=>{if(e.key==='Enter'&&$('answer').value!=='')check();});
function start(){
  score=0;idx=0;
  $('setupCard').style.display='none';$('resultsCard').style.display='none';$('gameCard').style.display='block';
  $('score').textContent=0;$('idx').textContent=`1/${total}`;
  gen();
}
function finish(){
  $('gameCard').style.display='none';$('resultsCard').style.display='block';
  $('finalScore').textContent=`${score} / ${total}`;
  const pct=Math.round(score/total*100);
  $('finalDetail').textContent=`Úspěšnost ${pct}%`;
}
$('startBtn').onclick=start;
$('againBtn').onclick=()=>{$('setupCard').style.display='block';$('resultsCard').style.display='none';};
</script>
</body>
</html>
