<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Base64 / URL encoder</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.tabs{display:flex;margin-bottom:18px;border-bottom:1px solid #404040;flex-wrap:wrap}
.tab{padding:11px 18px;background:#2a2a2a;border:1px solid #404040;border-bottom:none;cursor:pointer;color:#bbb;border-radius:8px 8px 0 0}
.tab.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px}
.panel{display:flex;flex-direction:column;gap:8px}
label{font-size:.82rem;color:#888}
textarea{width:100%;min-height:130px;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:12px;font-family:monospace;font-size:.92rem;resize:vertical;word-break:break-all}
.arrows{display:flex;gap:8px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 18px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.86rem}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
.status{text-align:center;font-size:.86rem;margin-top:10px;min-height:20px}.status.err{color:#e74c3c}.status.ok{color:#27ae60}
.pane{display:none}.pane.active{display:block}
</style>
</head>
<body>
<div class="container">
  <h1>🔐 Base64 / URL encoder &amp; decoder</h1>
  <div class="tabs">
    <div class="tab active" data-pane="b64">Base64</div>
    <div class="tab" data-pane="url">URL</div>
    <div class="tab" data-pane="html">HTML entity</div>
  </div>

  <div class="card">
    <div class="pane active" id="b64">
      <div class="panel"><label>Text (čitelný)</label><textarea id="b64plain">Příliš žluťoučký kůň 🐎</textarea></div>
      <div class="arrows"><button class="btn" id="b64enc">⬇️ Zakódovat do Base64</button><button class="btn btn-sec" id="b64dec">⬆️ Dekódovat z Base64</button></div>
      <div class="panel"><label>Base64</label><textarea id="b64code"></textarea></div>
      <div class="status" id="b64status"></div>
    </div>
    <div class="pane" id="url">
      <div class="panel"><label>Text (čitelný)</label><textarea id="urlplain">https://example.cz/hledat?q=žluťoučký kůň&amp;typ=bio</textarea></div>
      <div class="arrows">
        <button class="btn" id="urlenc">⬇️ encodeURIComponent</button>
        <button class="btn btn-sec" id="urlencFull">encodeURI</button>
        <button class="btn btn-sec" id="urldec">⬆️ Dekódovat</button>
      </div>
      <div class="panel"><label>URL zakódováno</label><textarea id="urlcode"></textarea></div>
      <div class="status" id="urlstatus"></div>
    </div>
    <div class="pane" id="html">
      <div class="panel"><label>Text / HTML</label><textarea id="htmlplain">&lt;div class="box"&gt;Ahoj &amp; světe&lt;/div&gt;</textarea></div>
      <div class="arrows"><button class="btn" id="htmlenc">⬇️ Escapovat entity</button><button class="btn btn-sec" id="htmldec">⬆️ Unescapovat</button></div>
      <div class="panel"><label>Výsledek</label><textarea id="htmlcode"></textarea></div>
      <div class="status" id="htmlstatus"></div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');$(t.dataset.pane).classList.add('active');
});
function setStatus(id,msg,ok){const s=$(id);s.className='status '+(ok?'ok':'err');s.textContent=msg;}
// Base64 (UTF-8 safe)
$('b64enc').onclick=()=>{try{$('b64code').value=btoa(unescape(encodeURIComponent($('b64plain').value)));setStatus('b64status','✅ Zakódováno',1);}catch(e){setStatus('b64status','❌ '+e.message);}};
$('b64dec').onclick=()=>{try{$('b64plain').value=decodeURIComponent(escape(atob($('b64code').value.trim())));setStatus('b64status','✅ Dekódováno',1);}catch(e){setStatus('b64status','❌ Neplatný Base64');}};
// URL
$('urlenc').onclick=()=>{$('urlcode').value=encodeURIComponent($('urlplain').value);setStatus('urlstatus','✅ encodeURIComponent',1);};
$('urlencFull').onclick=()=>{$('urlcode').value=encodeURI($('urlplain').value);setStatus('urlstatus','✅ encodeURI',1);};
$('urldec').onclick=()=>{try{$('urlplain').value=decodeURIComponent($('urlcode').value.trim());setStatus('urlstatus','✅ Dekódováno',1);}catch(e){setStatus('urlstatus','❌ Neplatná sekvence');}};
// HTML entities
$('htmlenc').onclick=()=>{const d=document.createElement('div');d.textContent=$('htmlplain').value;$('htmlcode').value=d.innerHTML;setStatus('htmlstatus','✅ Escapováno',1);};
$('htmldec').onclick=()=>{const d=document.createElement('div');d.innerHTML=$('htmlcode').value;$('htmlplain').value=d.textContent;setStatus('htmlstatus','✅ Unescapováno',1);};
$('b64enc').click();$('urlenc').click();$('htmlenc').click();
</script>
</body>
</html>
