<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Kostky (Yahtzee)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:640px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px;margin-bottom:16px}
.kostky{display:flex;gap:10px;justify-content:center;margin-bottom:14px}
.kostka{width:58px;height:58px;background:#f5f5f5;color:#1a1a1a;border-radius:10px;font-size:2.2rem;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;border:3px solid transparent;transition:transform .1s}
.kostka.drzena{border-color:#e67e22;background:#ffe0b2}
.kostka:active{transform:scale(.92)}
.stred{text-align:center}
.btn{background:#6aa6fd;color:#fff;border:none;padding:11px 22px;border-radius:8px;cursor:pointer;font-weight:600;font-size:1rem}
.btn:disabled{background:#404040;color:#777;cursor:default}
.info{color:#888;font-size:.85rem;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:.9rem}
td{padding:7px 10px;border-bottom:1px solid #333}
tr.polozka{cursor:pointer}
tr.polozka:hover td{background:#333}
tr.polozka.pouzita{color:#777;cursor:default}
tr.polozka.pouzita:hover td{background:none}
td.body{text-align:right;font-weight:700;color:#4caf50;width:70px}
td.moznost{text-align:right;color:#6aa6fd;width:70px}
tr.soucet td{font-weight:700;color:#ffd54f;border-top:2px solid #555}
.konec{text-align:center;font-size:1.3rem;color:#ffd54f;font-weight:700;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h1>🎲 Kostky (Yahtzee)</h1>
  <div class="card stred">
    <div class="kostky" id="kostky"></div>
    <button class="btn" id="hod">🎲 Házet (3 zbývají)</button>
    <div class="info">Klikni na kostku = podržet. Po hodu vyber řádek v tabulce pro zápis.</div>
  </div>
  <div class="card">
    <table id="tabulka"></table>
    <div class="konec" id="konec"></div>
    <div class="stred" style="margin-top:10px"><button class="btn" id="nova" style="display:none">↺ Nová hra</button></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const TVARE=['⚀','⚁','⚂','⚃','⚄','⚅'];
const KATEGORIE=[
  {k:'1',n:'Jedničky',f:d=>suma(d,1)},
  {k:'2',n:'Dvojky',f:d=>suma(d,2)},
  {k:'3',n:'Trojky',f:d=>suma(d,3)},
  {k:'4',n:'Čtyřky',f:d=>suma(d,4)},
  {k:'5',n:'Pětky',f:d=>suma(d,5)},
  {k:'6',n:'Šestky',f:d=>suma(d,6)},
  {k:'3k',n:'Trojice (součet všech)',f:d=>nStejnych(d,3)?d.reduce(sc):0},
  {k:'4k',n:'Čtveřice (součet všech)',f:d=>nStejnych(d,4)?d.reduce(sc):0},
  {k:'full',n:'Full house (25)',f:d=>{const c=cetnosti(d);return c.includes(3)&&c.includes(2)?25:0;}},
  {k:'mala',n:'Malá postupka (30)',f:d=>postupka(d,4)?30:0},
  {k:'velka',n:'Velká postupka (40)',f:d=>postupka(d,5)?40:0},
  {k:'yahtzee',n:'YAHTZEE! (50)',f:d=>nStejnych(d,5)?50:0},
  {k:'sance',n:'Šance (součet všech)',f:d=>d.reduce(sc)},
];
const sc=(a,b)=>a+b;
const suma=(d,x)=>d.filter(k=>k===x).reduce(sc,0);
const cetnosti=d=>{const c=[0,0,0,0,0,0,0];d.forEach(k=>c[k]++);return c;};
const nStejnych=(d,n)=>Math.max(...cetnosti(d))>=n;
function postupka(d,delka){
  const s=[...new Set(d)].sort();
  let run=1,max=1;
  for(let i=1;i<s.length;i++){run=s[i]===s[i-1]+1?run+1:1;max=Math.max(max,run);}
  return max>=delka;
}
let kostky,drzene,hodyZbyva,zapsano,poHodu;
function novaHra(){
  kostky=[1,1,1,1,1];drzene=[false,false,false,false,false];
  hodyZbyva=3;zapsano={};poHodu=false;
  $('konec').textContent='';$('nova').style.display='none';
  render();
}
function hod(){
  if(hodyZbyva<=0)return;
  kostky=kostky.map((k,i)=>drzene[i]?k:1+Math.floor(Math.random()*6));
  hodyZbyva--;poHodu=true;
  render();
}
function render(){
  $('kostky').innerHTML=kostky.map((k,i)=>
    `<div class="kostka ${drzene[i]?'drzena':''}" data-i="${i}">${TVARE[k-1]}</div>`).join('');
  $('hod').textContent=`🎲 Házet (${hodyZbyva} ${hodyZbyva===1?'zbývá':'zbývají'})`;
  $('hod').disabled=hodyZbyva<=0;
  // tabulka
  const horni=KATEGORIE.slice(0,6).reduce((s,c)=>s+(zapsano[c.k]??0),0);
  const bonus=horni>=63?35:0;
  const celkem=KATEGORIE.reduce((s,c)=>s+(zapsano[c.k]??0),0)+bonus;
  let h='';
  KATEGORIE.forEach((c,i)=>{
    const pouzita=zapsano[c.k]!==undefined;
    const moznost=poHodu&&!pouzita?c.f(kostky):null;
    h+=`<tr class="polozka ${pouzita?'pouzita':''}" data-k="${c.k}">
      <td>${c.n}</td>
      <td class="moznost">${moznost!==null?'→ '+moznost:''}</td>
      <td class="body">${pouzita?zapsano[c.k]:''}</td></tr>`;
    if(i===5)h+=`<tr><td>Bonus (horní část ≥ 63)</td><td class="moznost">${horni}/63</td><td class="body">${bonus||''}</td></tr>`;
  });
  h+=`<tr class="soucet"><td>CELKEM</td><td></td><td class="body">${celkem}</td></tr>`;
  $('tabulka').innerHTML=h;
}
$('kostky').addEventListener('click',e=>{
  const i=e.target.closest('.kostka')?.dataset.i;
  if(i===undefined||!poHodu)return;
  drzene[+i]=!drzene[+i];render();
});
$('hod').onclick=hod;
$('tabulka').addEventListener('click',e=>{
  const tr=e.target.closest('.polozka');
  if(!tr||!poHodu)return;
  const k=tr.dataset.k;
  if(zapsano[k]!==undefined)return;
  const kat=KATEGORIE.find(c=>c.k===k);
  zapsano[k]=kat.f(kostky);
  hodyZbyva=3;poHodu=false;drzene=[false,false,false,false,false];
  if(Object.keys(zapsano).length===KATEGORIE.length){
    const horni=KATEGORIE.slice(0,6).reduce((s,c)=>s+zapsano[c.k],0);
    const celkem=KATEGORIE.reduce((s,c)=>s+zapsano[c.k],0)+(horni>=63?35:0);
    $('konec').textContent='🏁 Konec hry! Skóre: '+celkem;
    $('nova').style.display='inline-block';
    $('hod').disabled=true;
  }
  render();
});
$('nova').onclick=novaHra;
novaHra();
</script>
</body>
</html>
