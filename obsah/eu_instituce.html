<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🇪🇺 Instituce EU</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:640px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.tab{background:#333;border:1px solid #555;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:.85rem}
.tab.active{background:#6aa6fd;border-color:#6aa6fd;color:#fff}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;margin-bottom:16px}
.inst{padding:14px;border-bottom:1px solid #383838}
.inst:last-child{border-bottom:none}
.iname{font-weight:700;color:#6aa6fd;margin-bottom:4px}
.iseat{font-size:.75rem;color:#888;margin-bottom:6px}
.idesc{font-size:.88rem;line-height:1.5;color:#ccc}
.quiz{display:none;text-align:center}
.scorebar{display:flex;justify-content:space-around;margin-bottom:16px}
.scorebar .v{font-size:1.4rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.qtext{font-size:1.05rem;margin-bottom:14px}
.opt{display:block;width:100%;max-width:400px;margin:6px auto;background:#333;border:1px solid #555;border-radius:6px;padding:10px;color:#e0e0e0;cursor:pointer;text-align:left}
.opt.correct{border-color:#27ae60;background:#1f3a2a}
.opt.wrong{border-color:#e74c3c;background:#3a1f1f}
</style>
</head>
<body>
<div class="container">
  <h1>🇪🇺 Instituce Evropské unie</h1>
  <div class="tabs">
    <div class="tab active" data-m="prehled">📋 Přehled</div>
    <div class="tab" data-m="quiz">❓ Kvíz</div>
  </div>
  <div class="card" id="prehledCard"></div>
  <div class="card quiz" id="quizCard">
    <div class="scorebar"><div><div class="v" id="score">0</div><div class="l">Správně</div></div><div><div class="v" id="idx">0/10</div><div class="l">Otázka</div></div></div>
    <div class="qtext" id="qtext"></div>
    <div id="opts"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const INSTITUCE=[
{n:'Evropská komise',seat:'Brusel',d:'„Vláda" EU — navrhuje zákony, dohlíží na dodržování smluv, řídí každodenní chod unie.'},
{n:'Evropský parlament',seat:'Štrasburk / Brusel',d:'Volený zákonodárný orgán občanů EU, schvaluje zákony a rozpočet spolu s Radou.'},
{n:'Rada Evropské unie',seat:'Brusel',d:'Zastupuje vlády členských států, spolu s Parlamentem schvaluje legislativu.'},
{n:'Evropská rada',seat:'Brusel',d:'Setkání hlav států a vlád, určuje politický směr a priority EU.'},
{n:'Soudní dvůr EU',seat:'Lucemburk',d:'Zajišťuje jednotný výklad a dodržování unijního práva ve všech členských zemích.'},
{n:'Evropská centrální banka',seat:'Frankfurt nad Mohanem',d:'Řídí měnovou politiku eurozóny a stará se o cenovou stabilitu.'},
{n:'Evropský účetní dvůr',seat:'Lucemburk',d:'Kontroluje, zda jsou finance EU vybírány a využívány správně.'}
];
$('prehledCard').innerHTML=INSTITUCE.map(i=>`<div class="inst"><div class="iname">${i.n}</div><div class="iseat">📍 ${i.seat}</div><div class="idesc">${i.d}</div></div>`).join('');

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  const m=t.dataset.m;
  $('prehledCard').style.display=m==='prehled'?'block':'none';
  $('quizCard').style.display=m==='quiz'?'block':'none';
  if(m==='quiz')startQuiz();
});

let score,idx,total=10;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){score=0;idx=0;$('score').textContent=0;next();}
function next(){
  if(idx>=total){$('qtext').textContent=`Výsledek: ${score} / ${total}`;$('opts').innerHTML='';return;}
  $('idx').textContent=`${idx+1}/${total}`;
  const inst=shuffle([...INSTITUCE])[0];
  const askSeat=Math.random()<0.5;
  $('qtext').textContent=askSeat?`Kde sídlí instituce: ${inst.n}?`:`Co dělá: ${inst.n}?`;
  const correct=askSeat?inst.seat:inst.d;
  const wrongPool=INSTITUCE.filter(i=>i.n!==inst.n).map(i=>askSeat?i.seat:i.d);
  const opts=shuffle([correct,...shuffle(wrongPool).slice(0,3)]);
  const box=$('opts');box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=()=>{
      [...box.children].forEach(x=>x.disabled=true);
      if(o===correct){b.classList.add('correct');score++;}
      else{b.classList.add('wrong');[...box.children].find(x=>x.textContent===correct).classList.add('correct');}
      $('score').textContent=score;
      setTimeout(()=>{idx++;next();},900);
    };
    box.appendChild(b);
  });
}
</script>
</body>
</html>
