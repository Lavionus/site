<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Paleta z obrázku</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto;display:grid;grid-template-columns:300px 1fr;gap:20px}
@media(max-width:800px){.container{grid-template-columns:1fr}}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center;grid-column:1/-1}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;align-self:start}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px;margin-bottom:12px}
input[type=file]{background:none;border:none;padding:0;color:#b0b0b0}
input[type=range]{padding:0}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem;width:100%}
.btn:hover{background:#5591e8}
.zprava{color:#888;padding:40px 10px;text-align:center}
canvas{max-width:100%;border-radius:6px;background:#111;display:block;margin:0 auto}
.palette{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:18px}
.swatch{border-radius:8px;overflow:hidden;border:1px solid #404040}
.swatch .color{height:70px;cursor:pointer}
.swatch .info{padding:6px 8px;background:#2a2a2a;font-size:.78rem;font-family:monospace;text-align:center}
.swatch .info:hover{color:#6aa6fd}
.copied{color:#4caf50!important}
</style>
</head>
<body>
<div class="container">
  <h1>🎨 Paleta z obrázku</h1>
  <div class="card">
    <label>Obrázek</label><input type="file" id="soubor" accept="image/*">
    <label>Počet barev: <span id="countT">8</span></label>
    <input type="range" id="count" min="4" max="16" value="8">
    <button class="btn" id="btnExtract">🎨 Extrahovat paletu</button>
  </div>
  <div class="card">
    <div class="zprava" id="zprava">Vyberte obrázek…</div>
    <canvas id="c" style="display:none;max-height:400px"></canvas>
    <div class="palette" id="palette"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const c=$('c'),ctx=c.getContext('2d');
let img=null;

$('count').oninput=()=>{$('countT').textContent=$('count').value;};

$('soubor').addEventListener('change',e=>{
  const f=e.target.files[0];
  if(!f)return;
  const i=new Image();
  i.onload=()=>{
    img=i;
    $('zprava').style.display='none';
    c.style.display='block';
    const maxW=600;
    const scale=Math.min(1,maxW/i.width);
    c.width=i.width*scale;c.height=i.height*scale;
    ctx.drawImage(i,0,0,c.width,c.height);
    extract();
  };
  i.src=URL.createObjectURL(f);
});

function rgbToHex(r,g,b){return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');}

function extract(){
  if(!img)return;
  const n=Number($('count').value);
  const data=ctx.getImageData(0,0,c.width,c.height).data;
  const buckets={};
  for(let i=0;i<data.length;i+=4){
    const a=data[i+3];
    if(a<128)continue;
    const r=Math.round(data[i]/24)*24;
    const g=Math.round(data[i+1]/24)*24;
    const b=Math.round(data[i+2]/24)*24;
    const key=r+','+g+','+b;
    buckets[key]=(buckets[key]||0)+1;
  }
  let sorted=Object.entries(buckets).sort((a,b)=>b[1]-a[1]).map(([k,cnt])=>{
    const [r,g,bl]=k.split(',').map(Number);
    return {r,g,b:bl,count:cnt};
  });
  // Vybírej barvy s minimálním rozestupem, aby paleta nebyla plná odstínů jedné barvy
  const chosen=[];
  const minDist=40;
  for(const col of sorted){
    if(chosen.length>=n)break;
    const tooClose=chosen.some(c2=>Math.hypot(col.r-c2.r,col.g-c2.g,col.b-c2.b)<minDist);
    if(!tooClose)chosen.push(col);
  }
  // Pokud nemáme dost barev s rozestupem, doplň nejčetnějšími zbylými
  for(const col of sorted){
    if(chosen.length>=n)break;
    if(!chosen.includes(col))chosen.push(col);
  }
  renderPalette(chosen.slice(0,n));
}

function renderPalette(colors){
  $('palette').innerHTML=colors.map(c=>{
    const hex=rgbToHex(c.r,c.g,c.b);
    return `<div class="swatch"><div class="color" style="background:${hex}"></div><div class="info" data-hex="${hex}">${hex}</div></div>`;
  }).join('');
  $('palette').querySelectorAll('.info').forEach(el=>{
    el.onclick=()=>{
      navigator.clipboard.writeText(el.dataset.hex);
      const orig=el.textContent;
      el.textContent='Zkopírováno!';
      el.classList.add('copied');
      setTimeout(()=>{el.textContent=orig;el.classList.remove('copied');},1000);
    };
  });
}

$('btnExtract').onclick=extract;
</script>
</body>
</html>
