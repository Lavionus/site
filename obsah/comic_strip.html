<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Generátor komiksových stripů</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:300px 1fr;gap:20px}
@media(max-width:820px){.container{grid-template-columns:1fr}}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600;text-align:center;grid-column:1/-1}
.sub{grid-column:1/-1;text-align:center;color:#888;font-size:.85rem;margin-bottom:6px;margin-top:-14px}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px;align-self:start}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px;margin-top:10px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:8px;font-family:inherit}
input[type=file]{background:none;border:none;padding:0;color:#b0b0b0}
textarea{resize:vertical;min-height:50px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;width:100%;margin-top:8px}
.btn:hover{background:#5591e8}
.btn-sec{background:#404040}
.btn-danger{background:#c0392b}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.canvaswrap{text-align:center}
canvas{max-width:100%;border-radius:6px;background:#111;cursor:default;touch-action:none}
.hint{font-size:.78rem;color:#666;margin-top:8px;line-height:1.5}
.layouts{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
.layouts button{background:#404040;border:1px solid #555;color:#ccc;padding:8px;border-radius:6px;cursor:pointer;font-size:.75rem}
.layouts button.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
</style>
</head>
<body>
<div class="container">
  <h1>💬 Generátor komiksových stripů</h1>
  <p class="sub">Nahraj vlastní fotky do panelů, přidej bubliny s textem a stáhni hotový strip.</p>

  <div class="card">
    <label>Rozvržení panelů</label>
    <div class="layouts" id="layouts">
      <button data-l="1x1">1</button>
      <button data-l="2h">2 vedle</button>
      <button data-l="2v">2 nad</button>
      <button data-l="3h" class="active">3 vedle</button>
      <button data-l="2x2">2×2</button>
      <button data-l="3x2">3×2</button>
    </div>

    <label>Zvolený panel: <span id="panelLabel">1</span></label>
    <input type="file" id="panelFile" accept="image/*">

    <label>Text bubliny</label>
    <textarea id="bubbleText" placeholder="Napiš text…"></textarea>
    <div class="row2">
      <button class="btn" id="btnAddBubble">+ Bublina</button>
      <button class="btn btn-danger" id="btnDelBubble">✕ Smazat bublinu</button>
    </div>
    <div class="row2">
      <button class="btn btn-sec" id="btnAddThought">+ Myšlenka</button>
      <button class="btn btn-sec" id="btnAddCaption">+ Popisek</button>
    </div>

    <button class="btn" id="btnExport" style="margin-top:16px">💾 Stáhnout strip (PNG)</button>
    <p class="hint">Klikni na panel pro jeho výběr a nahrání obrázku. Bubliny přetahuj myší/prstem, klikni na bublinu pro editaci textu vlevo. Táhni za pravý dolní roh bubliny pro změnu velikosti.</p>
  </div>

  <div class="card canvaswrap">
    <canvas id="c" width="1000" height="360"></canvas>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const canvas=$('c'), ctx=canvas.getContext('2d');
const CANVAS_W=1000, GUTTER=8;

const LAYOUTS={
  '1x1':{rows:1,cols:1,h:500},
  '2h':{rows:1,cols:2,h:380},
  '2v':{rows:2,cols:1,h:640},
  '3h':{rows:1,cols:3,h:340},
  '2x2':{rows:2,cols:2,h:560},
  '3x2':{rows:2,cols:3,h:460},
};
let layoutKey='3h';
let panels=[]; // {x,y,w,h,img,bubbles:[]}
let selectedPanel=0;
let selectedBubble=null;

function buildPanels(){
  const L=LAYOUTS[layoutKey];
  canvas.width=CANVAS_W;
  canvas.height=L.h;
  const pw=(CANVAS_W-GUTTER*(L.cols+1))/L.cols;
  const ph=(L.h-GUTTER*(L.rows+1))/L.rows;
  const oldPanels=panels;
  panels=[];
  let idx=0;
  for(let r=0;r<L.rows;r++){
    for(let c=0;c<L.cols;c++){
      const x=GUTTER+c*(pw+GUTTER), y=GUTTER+r*(ph+GUTTER);
      const old=oldPanels[idx];
      panels.push({x,y,w:pw,h:ph,img:old?old.img:null,bubbles:old?old.bubbles:[]});
      idx++;
    }
  }
  selectedPanel=0;
  selectedBubble=null;
  $('panelLabel').textContent=selectedPanel+1;
  render();
}

document.querySelectorAll('#layouts button').forEach(btn=>{
  btn.onclick=()=>{
    document.querySelectorAll('#layouts button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    layoutKey=btn.dataset.l;
    buildPanels();
  };
});

function drawBubbleShape(ctx,x,y,w,h,type){
  ctx.beginPath();
  const r=Math.min(18,w/6,h/3);
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
  if(type==='caption'){
    ctx.fillStyle='#fff';
    ctx.fill();
    ctx.strokeStyle='#000';
    ctx.lineWidth=2;
    ctx.stroke();
    return;
  }
  ctx.fillStyle='#fff';
  ctx.fill();
  ctx.strokeStyle='#000';
  ctx.lineWidth=2.5;
  ctx.stroke();
  // ocásek
  const tx=x+w*0.25, ty=y+h;
  ctx.beginPath();
  if(type==='thought'){
    for(let i=0;i<3;i++){
      ctx.moveTo(tx-i*10,ty+10+i*10);
      ctx.arc(tx-i*10,ty+10+i*10,6-i,0,Math.PI*2);
    }
    ctx.fill();
    ctx.stroke();
  }else{
    ctx.moveTo(tx,y+h-2);
    ctx.lineTo(tx-14,y+h+22);
    ctx.lineTo(tx+22,y+h-2);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
}

function wrapText(ctx,text,maxWidth){
  const words=text.split(/\s+/);
  const lines=[];
  let cur='';
  words.forEach(w=>{
    const test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width>maxWidth&&cur){
      lines.push(cur);cur=w;
    }else cur=test;
  });
  if(cur)lines.push(cur);
  return lines;
}

function render(){
  ctx.fillStyle='#111';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  panels.forEach((p,i)=>{
    ctx.save();
    ctx.beginPath();
    ctx.rect(p.x,p.y,p.w,p.h);
    ctx.clip();
    ctx.fillStyle='#333';
    ctx.fillRect(p.x,p.y,p.w,p.h);
    if(p.img){
      const scale=Math.max(p.w/p.img.width,p.h/p.img.height);
      const iw=p.img.width*scale, ih=p.img.height*scale;
      ctx.drawImage(p.img,p.x+(p.w-iw)/2,p.y+(p.h-ih)/2,iw,ih);
    }else{
      ctx.fillStyle='#666';
      ctx.font='14px sans-serif';
      ctx.textAlign='center';
      ctx.fillText('Klikni a nahraj obrázek',p.x+p.w/2,p.y+p.h/2);
    }
    ctx.restore();
    ctx.strokeStyle=i===selectedPanel?'#6aa6fd':'#000';
    ctx.lineWidth=i===selectedPanel?4:3;
    ctx.strokeRect(p.x,p.y,p.w,p.h);

    p.bubbles.forEach(b=>{
      drawBubbleShape(ctx,p.x+b.x,p.y+b.y,b.w,b.h,b.type);
      ctx.fillStyle='#000';
      ctx.font=(b.type==='caption'?'bold ':'')+'15px sans-serif';
      ctx.textAlign='center';
      const lines=wrapText(ctx,b.text,b.w-16);
      const lh=18;
      const startY=p.y+b.y+b.h/2-((lines.length-1)*lh)/2+5;
      lines.forEach((line,li)=>ctx.fillText(line,p.x+b.x+b.w/2,startY+li*lh));
      if(b===selectedBubble){
        ctx.strokeStyle='#6aa6fd';
        ctx.lineWidth=1.5;
        ctx.setLineDash([4,3]);
        ctx.strokeRect(p.x+b.x,p.y+b.y,b.w,b.h);
        ctx.setLineDash([]);
        ctx.fillStyle='#6aa6fd';
        ctx.fillRect(p.x+b.x+b.w-10,p.y+b.y+b.h-10,10,10);
      }
    });
  });
}

function panelAt(x,y){
  return panels.findIndex(p=>x>=p.x&&x<=p.x+p.w&&y>=p.y&&y<=p.y+p.h);
}
function bubbleAt(panel,lx,ly){
  for(let i=panel.bubbles.length-1;i>=0;i--){
    const b=panel.bubbles[i];
    if(lx>=b.x&&lx<=b.x+b.w&&ly>=b.y&&ly<=b.y+b.h)return b;
  }
  return null;
}

function canvasPos(e){
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width, scaleY=canvas.height/rect.height;
  const cx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;
  const cy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;
  return {x:cx*scaleX,y:cy*scaleY};
}

let drag=null;
canvas.addEventListener('mousedown',startDrag);
canvas.addEventListener('touchstart',e=>{startDrag(e);e.preventDefault();},{passive:false});

function startDrag(e){
  const {x,y}=canvasPos(e);
  const pi=panelAt(x,y);
  if(pi<0)return;
  selectedPanel=pi;
  $('panelLabel').textContent=pi+1;
  const p=panels[pi];
  const lx=x-p.x, ly=y-p.y;
  const b=bubbleAt(p,lx,ly);
  selectedBubble=b;
  $('bubbleText').value=b?b.text:'';
  if(b){
    const resizeZone=lx>=b.x+b.w-14&&ly>=b.y+b.h-14;
    drag={panel:p,bubble:b,mode:resizeZone?'resize':'move',startX:lx,startY:ly,origX:b.x,origY:b.y,origW:b.w,origH:b.h};
  }
  render();
}
window.addEventListener('mousemove',moveDrag);
window.addEventListener('touchmove',e=>{if(drag){moveDrag(e);e.preventDefault();}},{passive:false});
function moveDrag(e){
  if(!drag)return;
  const {x,y}=canvasPos(e);
  const lx=x-drag.panel.x, ly=y-drag.panel.y;
  const dx=lx-drag.startX, dy=ly-drag.startY;
  if(drag.mode==='move'){
    drag.bubble.x=Math.max(0,Math.min(drag.panel.w-drag.bubble.w,drag.origX+dx));
    drag.bubble.y=Math.max(0,Math.min(drag.panel.h-drag.bubble.h,drag.origY+dy));
  }else{
    drag.bubble.w=Math.max(50,drag.origW+dx);
    drag.bubble.h=Math.max(30,drag.origH+dy);
  }
  render();
}
window.addEventListener('mouseup',()=>drag=null);
window.addEventListener('touchend',()=>drag=null);

$('panelFile').addEventListener('change',e=>{
  const f=e.target.files[0];
  if(!f)return;
  const img=new Image();
  img.onload=()=>{panels[selectedPanel].img=img;render();};
  img.src=URL.createObjectURL(f);
});

function addBubble(type){
  const p=panels[selectedPanel];
  const b={x:p.w*0.1,y:p.h*0.1,w:Math.min(180,p.w*0.6),h:70,text:$('bubbleText').value||'Text…',type};
  p.bubbles.push(b);
  selectedBubble=b;
  render();
}
$('btnAddBubble').onclick=()=>addBubble('speech');
$('btnAddThought').onclick=()=>addBubble('thought');
$('btnAddCaption').onclick=()=>addBubble('caption');
$('btnDelBubble').onclick=()=>{
  if(!selectedBubble)return;
  const p=panels[selectedPanel];
  p.bubbles=p.bubbles.filter(b=>b!==selectedBubble);
  selectedBubble=null;
  $('bubbleText').value='';
  render();
};
$('bubbleText').addEventListener('input',()=>{
  if(selectedBubble){selectedBubble.text=$('bubbleText').value;render();}
});

$('btnExport').onclick=()=>{
  selectedBubble=null;
  const prevSel=selectedPanel;
  selectedPanel=-1;
  render();
  canvas.toBlob(b=>{
    const a=document.createElement('a');
    a.href=URL.createObjectURL(b);
    a.download='komiks.png';
    a.click();
    selectedPanel=prevSel;
    render();
  });
};

buildPanels();
</script>
</body>
</html>
