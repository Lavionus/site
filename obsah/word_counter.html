<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔡 Počítadlo slov a znaků</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:980px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:18px}
.stat{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:16px;text-align:center}
.stat .v{font-size:1.8rem;font-weight:700;color:#6aa6fd}.stat .l{font-size:.76rem;color:#888;margin-top:2px}
.layout{display:grid;grid-template-columns:2fr 1fr;gap:18px}
@media(max-width:760px){.layout{grid-template-columns:1fr}}
textarea{width:100%;min-height:380px;background:#1e1e1e;border:1px solid #555;border-radius:8px;color:#e0e0e0;padding:14px;font-size:1rem;resize:vertical;line-height:1.6}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px}
h2{font-size:.95rem;color:#6aa6fd;margin-bottom:12px}
.freq{max-height:340px;overflow-y:auto}
.freq-item{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #333;font-size:.9rem}
.freq-item .bar{height:6px;background:#6aa6fd;border-radius:3px;margin-top:3px}
.toolbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.btn{background:#404040;color:#e0e0e0;border:1px solid #555;padding:7px 12px;border-radius:6px;cursor:pointer;font-size:.8rem}
.btn:hover{background:#4a4a4a}
</style>
</head>
<body>
<div class="container">
  <h1>🔡 Počítadlo slov a znaků</h1>
  <div class="stats">
    <div class="stat"><div class="v" id="words">0</div><div class="l">Slov</div></div>
    <div class="stat"><div class="v" id="chars">0</div><div class="l">Znaků</div></div>
    <div class="stat"><div class="v" id="charsNoSpace">0</div><div class="l">Znaků bez mezer</div></div>
    <div class="stat"><div class="v" id="sentences">0</div><div class="l">Vět</div></div>
    <div class="stat"><div class="v" id="paragraphs">0</div><div class="l">Odstavců</div></div>
    <div class="stat"><div class="v" id="readTime">0:00</div><div class="l">Čas čtení</div></div>
  </div>
  <div class="layout">
    <div>
      <div class="toolbar">
        <button class="btn" id="upperBtn">VELKÁ</button>
        <button class="btn" id="lowerBtn">malá</button>
        <button class="btn" id="titleBtn">Každé Slovo</button>
        <button class="btn" id="trimBtn">Odstranit dvojmezery</button>
        <button class="btn" id="copyBtn">📋 Kopírovat</button>
        <button class="btn" id="clearBtn">🗑️ Vyčistit</button>
      </div>
      <textarea id="text" placeholder="Sem napiš nebo vlož text…"></textarea>
    </div>
    <div class="card">
      <h2>📊 Četnost slov (top 30)</h2>
      <div class="freq" id="freq"></div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function analyze(){
  const t=$('text').value;
  const words=(t.match(/\S+/g)||[]);
  $('words').textContent=words.length.toLocaleString('cs');
  $('chars').textContent=t.length.toLocaleString('cs');
  $('charsNoSpace').textContent=t.replace(/\s/g,'').length.toLocaleString('cs');
  $('sentences').textContent=(t.match(/[.!?…]+(\s|$)/g)||[]).length.toLocaleString('cs');
  $('paragraphs').textContent=(t.split(/\n\s*\n/).filter(p=>p.trim()).length).toLocaleString('cs');
  const sec=Math.round(words.length/200*60);
  $('readTime').textContent=Math.floor(sec/60)+':'+String(sec%60).padStart(2,'0');
  // frequency
  const freq={};
  (t.toLowerCase().match(/[\p{L}\p{N}]+/gu)||[]).forEach(w=>{if(w.length>2)freq[w]=(freq[w]||0)+1;});
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,30);
  const max=top.length?top[0][1]:1;
  $('freq').innerHTML=top.map(([w,c])=>`<div><div class="freq-item"><span>${w}</span><b>${c}×</b></div><div class="bar" style="width:${c/max*100}%"></div></div>`).join('')||'<p style="color:#666;font-size:.85rem">Zatím žádná slova</p>';
}
$('text').oninput=analyze;
$('upperBtn').onclick=()=>{$('text').value=$('text').value.toUpperCase();analyze();};
$('lowerBtn').onclick=()=>{$('text').value=$('text').value.toLowerCase();analyze();};
$('titleBtn').onclick=()=>{$('text').value=$('text').value.replace(/\p{L}[\p{L}]*/gu,w=>w[0].toUpperCase()+w.slice(1).toLowerCase());analyze();};
$('trimBtn').onclick=()=>{$('text').value=$('text').value.replace(/[ \t]{2,}/g,' ').replace(/\n{3,}/g,'\n\n');analyze();};
$('copyBtn').onclick=()=>{navigator.clipboard.writeText($('text').value);$('copyBtn').textContent='✅';setTimeout(()=>$('copyBtn').textContent='📋 Kopírovat',1000);};
$('clearBtn').onclick=()=>{$('text').value='';analyze();};
analyze();
</script>
</body>
</html>
