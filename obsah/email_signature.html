<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✉️ Generátor e-mailového podpisu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.layout{display:grid;grid-template-columns:320px 1fr;gap:20px}
@media(max-width:720px){.layout{grid-template-columns:1fr}}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
label{display:block;font-size:.76rem;color:#888;margin:8px 0 3px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:8px}
input[type=color]{height:38px;padding:3px}
.preview-wrap{background:#fff;border-radius:8px;padding:24px;min-height:200px;color:#222}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;width:100%;margin-top:14px}
.btn-sec{background:#404040}
.code{background:#1e1e1e;border:1px solid #404040;border-radius:8px;padding:12px;margin-top:14px;font-family:monospace;font-size:.74rem;white-space:pre-wrap;word-break:break-all;max-height:160px;overflow:auto;color:#bbb}
</style>
</head>
<body>
<div class="container">
  <h1>✉️ Generátor e-mailového podpisu</h1>
  <div class="layout">
    <div class="card">
      <h2>Údaje</h2>
      <label>Jméno a příjmení</label><input id="name" value="Jan Novák">
      <label>Pozice</label><input id="role" value="Obchodní manažer">
      <label>Firma</label><input id="company" value="Ukázková firma s.r.o.">
      <label>Telefon</label><input id="phone" value="+420 123 456 789">
      <label>E-mail</label><input id="email" value="jan.novak@example.cz">
      <label>Web</label><input id="web" value="www.example.cz">
      <label>URL loga (volitelné)</label><input id="logo" placeholder="https://…/logo.png">
      <label>Hlavní barva</label><input type="color" id="color" value="#6aa6fd">
      <button class="btn" id="copyHtml">📋 Kopírovat HTML</button>
      <button class="btn btn-sec" id="copyRich">📋 Kopírovat (vložit do mailu)</button>
    </div>
    <div>
      <div class="card"><h2>Náhled</h2><div class="preview-wrap" id="preview"></div></div>
      <div class="code" id="code"></div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function build(){
  const c=$('color').value;
  const logo=$('logo').value.trim();
  const html=`<table cellpadding="0" cellspacing="0" style="font-family:Arial,sans-serif;color:#333;font-size:13px;line-height:1.5">
<tr>${logo?`<td style="padding-right:16px;vertical-align:top"><img src="${logo}" alt="logo" style="max-width:80px;height:auto"></td>`:''}
<td style="border-left:3px solid ${c};padding-left:16px">
<div style="font-size:16px;font-weight:bold;color:${c}">${$('name').value}</div>
<div style="color:#666">${$('role').value}${$('company').value?' · '+$('company').value:''}</div>
<div style="margin-top:8px">
${$('phone').value?`📞 <a href="tel:${$('phone').value.replace(/\s/g,'')}" style="color:#333;text-decoration:none">${$('phone').value}</a><br>`:''}
${$('email').value?`✉️ <a href="mailto:${$('email').value}" style="color:${c};text-decoration:none">${$('email').value}</a><br>`:''}
${$('web').value?`🌐 <a href="https://${$('web').value.replace(/^https?:\/\//,'')}" style="color:${c};text-decoration:none">${$('web').value}</a>`:''}
</div></td></tr></table>`;
  $('preview').innerHTML=html;$('code').textContent=html;
}
['name','role','company','phone','email','web','logo','color'].forEach(id=>$(id).oninput=build);
$('copyHtml').onclick=()=>{navigator.clipboard.writeText($('code').textContent);$('copyHtml').textContent='✅ Zkopírováno';setTimeout(()=>$('copyHtml').textContent='📋 Kopírovat HTML',1200);};
$('copyRich').onclick=async()=>{
  try{const blob=new Blob([$('code').textContent],{type:'text/html'});
    await navigator.clipboard.write([new ClipboardItem({'text/html':blob,'text/plain':new Blob([$('preview').innerText],{type:'text/plain'})})]);
    $('copyRich').textContent='✅ Zkopírováno (vlož do mailu)';setTimeout(()=>$('copyRich').textContent='📋 Kopírovat (vložit do mailu)',1500);
  }catch(e){navigator.clipboard.writeText($('code').textContent);$('copyRich').textContent='✅ Zkopírováno jako HTML';setTimeout(()=>$('copyRich').textContent='📋 Kopírovat (vložit do mailu)',1500);}
};
build();
</script>
</body>
</html>
