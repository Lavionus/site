<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗼 Hanojské věže</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600}
.sub{color:#888;font-size:.85rem;margin-bottom:18px;text-align:center;max-width:480px}
.top{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.info{color:#888}.info b{color:#6aa6fd}
.towers{display:flex;gap:14px;width:min(640px,96vw);height:300px}
.tower{flex:1;position:relative;cursor:pointer;display:flex;flex-direction:column-reverse;align-items:center;padding-bottom:16px}
.tower::before{content:'';position:absolute;bottom:16px;width:8px;height:240px;background:#555;border-radius:4px;z-index:0}
.tower::after{content:'';position:absolute;bottom:8px;width:100%;height:8px;background:#555;border-radius:4px}
.tower.sel::before{background:#6aa6fd}
.disk{height:26px;border-radius:13px;margin-bottom:3px;z-index:1;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;color:#fff;box-shadow:0 2px 4px rgba(0,0,0,.4)}
.msg{margin-top:16px;font-size:1.3rem;font-weight:700;color:#27ae60;min-height:32px}
</style>
</head>
<body>
<h1>🗼 Hanojské věže</h1>
<p class="sub">Přesuň všechny disky na pravou tyč. Větší disk nesmí ležet na menším. Klik na věž = vyber/polož.</p>
<div class="top">
  <select id="count"><option>3</option><option selected>4</option><option>5</option><option>6</option><option>7</option></select>
  <button class="btn" id="newBtn">🔄 Nová hra</button>
  <button class="btn btn-sec" id="solveBtn">🤖 Vyřešit</button>
  <span class="info">Tahy: <b id="moves">0</b> / min <b id="minMoves">0</b></span>
</div>
<div class="towers" id="towers"></div>
<div class="msg" id="msg"></div>
<script>
const $=id=>document.getElementById(id);
const COLORS=['#e74c3c','#e67e22','#f1c40f','#27ae60','#1abc9c','#3498db','#9b59b6'];
let towers,n,selected,moves,solving;
function init(){
  n=+$('count').value;towers=[[],[],[]];for(let i=n;i>=1;i--)towers[0].push(i);
  selected=null;moves=0;solving=false;$('msg').textContent='';
  $('minMoves').textContent=Math.pow(2,n)-1;render();
}
function render(){
  const cont=$('towers');cont.innerHTML='';
  towers.forEach((t,ti)=>{
    const div=document.createElement('div');div.className='tower'+(selected===ti?' sel':'');
    t.forEach(size=>{const d=document.createElement('div');d.className='disk';d.style.width=(28+size/n*72)+'%';d.style.background=COLORS[(size-1)%COLORS.length];d.textContent=size;div.appendChild(d);});
    div.onclick=()=>click(ti);cont.appendChild(div);
  });
  $('moves').textContent=moves;
}
function click(ti){
  if(solving)return;
  if(selected===null){if(towers[ti].length)selected=ti;}
  else{
    if(selected===ti){selected=null;}
    else{const from=towers[selected],to=towers[ti];
      if(!to.length||to[to.length-1]>from[from.length-1]){to.push(from.pop());moves++;selected=null;checkWin();}
      else{selected=ti;}
    }
  }
  render();
}
function checkWin(){if(towers[2].length===n)$('msg').textContent=`🎉 Hotovo na ${moves} tahů!`+(moves===Math.pow(2,n)-1?' (optimální! 🏆)':'');}
$('solveBtn').onclick=async()=>{
  init();solving=true;const seq=[];
  (function solve(k,from,to,via){if(k===0)return;solve(k-1,from,via,to);seq.push([from,to]);solve(k-1,via,to,from);})(n,0,2,1);
  for(const[f,t]of seq){await new Promise(r=>setTimeout(r,Math.max(80,500/n)));towers[t].push(towers[f].pop());moves++;render();}
  solving=false;checkWin();
};
$('newBtn').onclick=init;$('count').onchange=init;
init();
</script>
</body>
</html>
