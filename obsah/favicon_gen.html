<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⭐ Favicon generátor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.layout{display:grid;grid-template-columns:300px 1fr;gap:20px}
@media(max-width:680px){.layout{grid-template-columns:1fr}}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tabs button{flex:1;padding:8px;background:#404040;border:1px solid #555;border-radius:6px;color:#bbb;cursor:pointer;font-size:.82rem}
.tabs button.active{background:#6aa6fd;color:#fff}
label{display:block;font-size:.78rem;color:#888;margin:10px 0 4px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
input[type=color]{height:40px;padding:3px}
input[type=range]{padding:0}
.previews{display:flex;gap:20px;flex-wrap:wrap;align-items:end;justify-content:center;margin-bottom:18px}
.pv{text-align:center}
.pv canvas{border:1px solid #404040;border-radius:6px;image-rendering:pixelated;background:#fff}
.pv .l{font-size:.74rem;color:#888;margin-top:6px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600;width:100%;margin-top:10px}
.btn:hover{background:#5694f0}
.drop{border:2px dashed #555;border-radius:8px;padding:18px;text-align:center;cursor:pointer;font-size:.85rem}
.drop:hover{border-color:#6aa6fd}
.browser{display:inline-flex;align-items:center;gap:8px;background:#333;border-radius:8px 8px 0 0;padding:6px 12px;font-size:.82rem;color:#ccc}
</style>
</head>
<body>
<div class="container">
  <h1>⭐ Favicon generátor</h1>
  <div class="layout">
    <div class="card">
      <h2>Zdroj</h2>
      <div class="tabs"><button class="active" data-src="emoji">Emoji</button><button data-src="text">Text</button><button data-src="image">Obrázek</button></div>
      <div id="srcEmoji"><label>Emoji</label><input id="emoji" value="🌾" maxlength="4"></div>
      <div id="srcText" style="display:none"><label>Text (1–3 znaky)</label><input id="text" value="AB" maxlength="3"><label>Barva textu</label><input type="color" id="textColor" value="#ffffff"></div>
      <div id="srcImage" style="display:none"><div class="drop" id="drop">📁 Nahraj obrázek<input type="file" id="file" accept="image/*" hidden></div></div>
      <label>Barva pozadí</label><input type="color" id="bg" value="#6aa6fd">
      <label>Tvar pozadí</label><select id="shape"><option value="square">Čtverec</option><option value="rounded">Zaoblené rohy</option><option value="circle">Kruh</option></select>
      <label>Velikost prvku <span id="scaleVal">70</span>%</label><input type="range" id="scale" min="40" max="100" value="70">
      <button class="btn" id="dlBtn">💾 Stáhnout (PNG sada)</button>
    </div>
    <div class="card">
      <h2>Náhled</h2>
      <div class="browser">🔖 <span>Můj web</span></div>
      <div style="border-top:none;background:#222;border-radius:0 0 8px 8px;padding:16px;margin-bottom:18px;display:flex;justify-content:center"><canvas id="pvTab" width="32" height="32" style="width:32px;height:32px"></canvas></div>
      <div class="previews">
        <div class="pv"><canvas id="pv16" width="16" height="16" style="width:32px;height:32px"></canvas><div class="l">16×16</div></div>
        <div class="pv"><canvas id="pv32" width="32" height="32" style="width:48px;height:48px"></canvas><div class="l">32×32</div></div>
        <div class="pv"><canvas id="pv64" width="64" height="64" style="width:64px;height:64px"></canvas><div class="l">64×64</div></div>
        <div class="pv"><canvas id="pv180" width="180" height="180" style="width:96px;height:96px"></canvas><div class="l">180×180 (Apple)</div></div>
      </div>
      <p style="font-size:.78rem;color:#666">Stáhne se PNG ve velikostech 16, 32, 64, 180 a 512 px. Do HTML vlož:<br><code style="color:#6aa6fd">&lt;link rel="icon" href="favicon-32.png"&gt;</code></p>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let src='emoji',img=null;
function drawTo(canvas){
  const s=canvas.width,ctx=canvas.getContext('2d');ctx.clearRect(0,0,s,s);
  const shape=$('shape').value;
  ctx.fillStyle=$('bg').value;
  ctx.beginPath();
  if(shape==='circle')ctx.arc(s/2,s/2,s/2,0,2*Math.PI);
  else if(shape==='rounded'){const r=s*0.22;ctx.roundRect(0,0,s,s,r);}
  else ctx.rect(0,0,s,s);
  ctx.fill();
  const scale=$('scale').value/100;
  if(src==='image'&&img){const sz=s*scale;ctx.drawImage(img,(s-sz)/2,(s-sz)/2,sz,sz);}
  else{
    const txt=src==='emoji'?$('emoji').value:$('text').value;
    ctx.fillStyle=src==='emoji'?'#000':$('textColor').value;
    ctx.font=`bold ${s*scale*(src==='emoji'?1:0.8)/Math.max(1,txt.length*0.55)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(txt,s/2,s/2+s*0.02);
  }
}
function renderAll(){['pvTab','pv16','pv32','pv64','pv180'].forEach(id=>drawTo($(id)));$('scaleVal').textContent=$('scale').value;}
document.querySelectorAll('.tabs button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tabs button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  src=b.dataset.src;$('srcEmoji').style.display=src==='emoji'?'block':'none';$('srcText').style.display=src==='text'?'block':'none';$('srcImage').style.display=src==='image'?'block':'none';renderAll();
});
['emoji','text','textColor','bg','shape','scale'].forEach(id=>$(id).oninput=renderAll);
$('shape').onchange=renderAll;
$('drop').onclick=()=>$('file').click();
$('file').onchange=()=>{const f=$('file').files[0];if(!f)return;img=new Image();img.onload=renderAll;img.src=URL.createObjectURL(f);};
$('dlBtn').onclick=()=>{[16,32,64,180,512].forEach(sz=>{const c=document.createElement('canvas');c.width=c.height=sz;drawTo(c);
  const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=`favicon-${sz}.png`;a.click();});};
renderAll();
</script>
</body>
</html>
