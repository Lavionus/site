<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔑 Generátor hesel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:640px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:20px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
.output{display:flex;gap:8px;margin-bottom:8px}
.output input{flex:1;background:#1a1a1a;border:1px solid #555;border-radius:6px;color:#6aa6fd;padding:14px;font-size:1.2rem;font-family:monospace;letter-spacing:1px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 18px;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600}
.btn:hover{background:#5694f0}
.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
.row{display:flex;align-items:center;justify-content:space-between;margin:14px 0}
.row label{font-size:.95rem}
input[type=range]{width:55%}
input[type=checkbox]{width:18px;height:18px;accent-color:#6aa6fd}
.len{color:#6aa6fd;font-weight:700;min-width:30px;text-align:right}
.strength{height:8px;border-radius:4px;background:#404040;overflow:hidden;margin:16px 0 6px}
.strength>div{height:100%;width:0;transition:all .3s}
.strength-label{font-size:.85rem;color:#888;text-align:right}
.gen-btn{width:100%;padding:14px;font-size:1rem;margin-top:8px}
.hint{font-size:.8rem;color:#666;margin-top:4px}
</style>
</head>
<body>
<div class="container">
  <h1>🔑 Generátor hesel</h1>
  <div class="card">
    <div class="output">
      <input type="text" id="pw" readonly>
      <button class="btn btn-sec" id="copyBtn" title="Kopírovat">📋</button>
    </div>
    <div class="strength"><div id="strBar"></div></div>
    <div class="strength-label" id="strLabel"></div>
    <div class="row"><label>Délka hesla</label><input type="range" id="len" min="4" max="64" value="16"><span class="len" id="lenVal">16</span></div>
    <div class="row"><label>Velká písmena (A-Z)</label><input type="checkbox" id="upper" checked></div>
    <div class="row"><label>Malá písmena (a-z)</label><input type="checkbox" id="lower" checked></div>
    <div class="row"><label>Číslice (0-9)</label><input type="checkbox" id="num" checked></div>
    <div class="row"><label>Symboly (!@#$...)</label><input type="checkbox" id="sym" checked></div>
    <div class="row"><label>Vyloučit podobné (l, 1, O, 0)</label><input type="checkbox" id="exc"></div>
    <button class="btn gen-btn" id="genBtn">🎲 Vygenerovat heslo</button>
    <p class="hint">Hesla se generují lokálně v prohlížeči pomocí crypto.getRandomValues – nikam se neodesílají.</p>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const SETS={upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',lower:'abcdefghijklmnopqrstuvwxyz',num:'0123456789',sym:'!@#$%^&*()-_=+[]{};:,.<>?'};
const SIMILAR='l1IO0o';
function generate(){
  let pool='';['upper','lower','num','sym'].forEach(k=>{if($(k).checked)pool+=SETS[k];});
  if($('exc').checked)pool=[...pool].filter(c=>!SIMILAR.includes(c)).join('');
  if(!pool){$('pw').value='';$('pw').placeholder='Vyberte alespoň jednu skupinu znaků';update('');return;}
  const len=+$('len').value,arr=new Uint32Array(len);crypto.getRandomValues(arr);
  let pw='';for(let i=0;i<len;i++)pw+=pool[arr[i]%pool.length];
  $('pw').value=pw;update(pw);
}
function update(pw){
  let score=0;
  if(pw.length>=8)score++;if(pw.length>=12)score++;if(pw.length>=16)score++;
  if(/[a-z]/.test(pw)&&/[A-Z]/.test(pw))score++;if(/\d/.test(pw))score++;if(/[^a-zA-Z0-9]/.test(pw))score++;
  const pct=Math.min(100,score/6*100);
  const bar=$('strBar');bar.style.width=pct+'%';
  let color,label;
  if(score<=2){color='#c0392b';label='Slabé';}else if(score<=4){color='#f39c12';label='Střední';}else{color='#27ae60';label='Silné';}
  bar.style.background=color;$('strLabel').textContent=pw?label:'';
}
$('len').oninput=()=>{$('lenVal').textContent=$('len').value;generate();};
['upper','lower','num','sym','exc'].forEach(id=>$(id).onchange=generate);
$('genBtn').onclick=generate;
$('copyBtn').onclick=()=>{if(!$('pw').value)return;navigator.clipboard.writeText($('pw').value).then(()=>{$('copyBtn').textContent='✅';setTimeout(()=>$('copyBtn').textContent='📋',1200);});};
generate();
</script>
</body>
</html>
