<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 Lorem ipsum &amp; testovací data</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:860px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.tabs{display:flex;margin-bottom:18px;border-bottom:1px solid #404040;flex-wrap:wrap}
.tab{padding:11px 18px;background:#2a2a2a;border:1px solid #404040;border-bottom:none;cursor:pointer;color:#bbb;border-radius:8px 8px 0 0}
.tab.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
.pane{display:none}.pane.active{display:block}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;margin-bottom:18px}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:14px}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
input,select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.chk{display:flex;align-items:center;gap:6px;color:#bbb;font-size:.85rem}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}
textarea{width:100%;min-height:280px;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:14px;font-size:.95rem;resize:vertical;line-height:1.6}
.out-mono{font-family:monospace;font-size:.85rem}
</style>
</head>
<body>
<div class="container">
  <h1>📝 Lorem ipsum &amp; testovací data</h1>
  <div class="tabs">
    <div class="tab active" data-pane="lorem">Lorem ipsum</div>
    <div class="tab" data-pane="people">Osoby</div>
  </div>

  <div class="pane active" id="lorem">
    <div class="card">
      <div class="controls">
        <div><label>Počet</label><input type="number" id="count" value="3" min="1" max="100" style="width:90px"></div>
        <div><label>Jednotka</label><select id="unit"><option value="para">odstavců</option><option value="sentence">vět</option><option value="word">slov</option></select></div>
        <label class="chk"><input type="checkbox" id="startLorem" checked> Začít „Lorem ipsum…"</label>
        <label class="chk"><input type="checkbox" id="html"> HTML značky (&lt;p&gt;)</label>
        <button class="btn" id="genLorem">🎲 Generovat</button>
        <button class="btn btn-sec" id="copyLorem">📋 Kopírovat</button>
      </div>
      <textarea id="loremOut"></textarea>
    </div>
  </div>

  <div class="pane" id="people">
    <div class="card">
      <div class="controls">
        <div><label>Počet osob</label><input type="number" id="pcount" value="5" min="1" max="200" style="width:90px"></div>
        <div><label>Formát</label><select id="pformat"><option value="json">JSON</option><option value="csv">CSV</option></select></div>
        <button class="btn" id="genPeople">🎲 Generovat</button>
        <button class="btn btn-sec" id="copyPeople">📋 Kopírovat</button>
      </div>
      <textarea id="peopleOut" class="out-mono"></textarea>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');$(t.dataset.pane).classList.add('active');
});
const WORDS='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua enim ad minim veniam quis nostrud exercitation ullamco laboris nisi aliquip ex ea commodo consequat duis aute irure in reprehenderit voluptate velit esse cillum eu fugiat nulla pariatur excepteur sint occaecat cupidatat non proident sunt culpa qui officia deserunt mollit anim id est laborum'.split(' ');
const rnd=n=>Math.floor(Math.random()*n);
function word(){return WORDS[rnd(WORDS.length)];}
function sentence(){const n=6+rnd(10);let s=[];for(let i=0;i<n;i++)s.push(word());s[0]=s[0][0].toUpperCase()+s[0].slice(1);return s.join(' ')+'.';}
function paragraph(){const n=3+rnd(5);let s=[];for(let i=0;i<n;i++)s.push(sentence());return s.join(' ');}
function genLorem(){
  const n=+$('count').value,unit=$('unit').value;let parts=[];
  for(let i=0;i<n;i++)parts.push(unit==='para'?paragraph():unit==='sentence'?sentence():word());
  let out;
  if(unit==='word')out=parts.join(' ');
  else out=parts.join(unit==='para'?'\n\n':' ');
  if($('startLorem').checked)out=out.replace(/^[A-ZČ]\w*/,'Lorem').replace(/^Lorem\b/,'Lorem ipsum dolor sit amet');
  if($('html').checked&&unit==='para')out=parts.map(p=>'<p>'+(p)+'</p>').join('\n');
  $('loremOut').value=out;
}
['genLorem'].forEach(()=>{});
$('genLorem').onclick=genLorem;
$('copyLorem').onclick=()=>{navigator.clipboard.writeText($('loremOut').value);$('copyLorem').textContent='✅';setTimeout(()=>$('copyLorem').textContent='📋 Kopírovat',1000);};
// People
const FIRST=['Jan','Petr','Pavel','Martin','Tomáš','Jana','Eva','Anna','Lucie','Hana','Karel','Josef','Marie','Lenka','Veronika'];
const LAST=['Novák','Svoboda','Novotný','Dvořák','Černý','Procházka','Kučera','Veselý','Horák','Němec','Pokorný','Marek'];
const CITY=['Praha','Brno','Ostrava','Plzeň','Olomouc','Liberec','Hradec Králové','Pardubice','Zlín','Kladno'];
function genPeople(){
  const n=+$('pcount').value;const fmt=$('pformat').value;
  const people=Array.from({length:n},(_,i)=>{
    const f=FIRST[rnd(FIRST.length)],l=LAST[rnd(LAST.length)];
    return {id:i+1,jmeno:f+' '+l,email:`${f.toLowerCase()}.${l.toLowerCase().replace(/[áčďéěíňóřšťúůýž]/g,c=>'acdeeinorstuuyz'['áčďéěíňóřšťúůýž'.indexOf(c)])}@example.cz`,vek:18+rnd(50),mesto:CITY[rnd(CITY.length)],telefon:'+420 '+(600+rnd(200))+' '+(100+rnd(900))+' '+(100+rnd(900))};
  });
  if(fmt==='json')$('peopleOut').value=JSON.stringify(people,null,2);
  else{const h=Object.keys(people[0]);$('peopleOut').value=[h.join(','),...people.map(p=>h.map(k=>p[k]).join(','))].join('\n');}
}
$('genPeople').onclick=genPeople;
$('copyPeople').onclick=()=>{navigator.clipboard.writeText($('peopleOut').value);$('copyPeople').textContent='✅';setTimeout(()=>$('copyPeople').textContent='📋 Kopírovat',1000);};
genLorem();genPeople();
</script>
</body>
</html>
