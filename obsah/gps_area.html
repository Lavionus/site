<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📐 Plocha pozemku</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1100px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px;background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:12px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 15px;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:8px}
.layout{display:grid;grid-template-columns:1fr 280px;gap:16px}
@media(max-width:760px){.layout{grid-template-columns:1fr}}
#map{height:520px;border-radius:8px;border:1px solid #404040}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px;height:fit-content}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
.big{font-size:2rem;font-weight:700;color:#6aa6fd;text-align:center;margin:4px 0}
.res-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #333}
.res-row:last-child{border:none}.res-row b{color:#4caf50}
.hint{font-size:.8rem;color:#888;margin-top:12px;line-height:1.5}
details{margin-top:12px}
summary{cursor:pointer;color:#888;font-size:.84rem}
textarea{width:100%;min-height:120px;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:10px;font-family:monospace;font-size:.82rem;margin-top:8px;resize:vertical}
.marker-num{background:#6aa6fd;color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.5)}
</style>
</head>
<body>
<div class="container">
  <h1>📐 Plocha pozemku z mapy</h1>
  <div class="bar">
    <span style="color:#888;font-size:.88rem">Klikej do mapy = přidávej body pozemku</span>
    <button class="btn btn-sec" id="undoBtn">↩️ Zpět</button>
    <button class="btn btn-sec" id="clearBtn">🗑️ Vymazat</button>
    <button class="btn btn-sec" id="locBtn">📍 Moje poloha</button>
    <span style="margin-left:auto"></span>
    <label style="color:#888;font-size:.84rem">Podklad:</label>
    <select id="basemap">
      <option value="osm">Mapa</option>
      <option value="sat">Satelit</option>
      <option value="topo">Topo</option>
    </select>
  </div>
  <div class="layout">
    <div id="map"></div>
    <div class="card">
      <h2>📋 Výměra</h2>
      <div class="big" id="haBig">0 ha</div>
      <p style="text-align:center;color:#888;margin-bottom:12px">plocha pozemku</p>
      <div class="res-row"><span>Plocha (m²)</span><b id="m2">0</b></div>
      <div class="res-row"><span>Plocha (ha)</span><b id="ha">0</b></div>
      <div class="res-row"><span>Plocha (ar)</span><b id="ar">0</b></div>
      <div class="res-row"><span>Obvod</span><b id="perim">0</b></div>
      <div class="res-row"><span>Počet bodů</span><b id="count">0</b></div>
      <details>
        <summary>✏️ Body ručně (lat, lon)</summary>
        <textarea id="manual" placeholder="50.0801, 14.4200&#10;…"></textarea>
        <button class="btn btn-sec" id="loadManual" style="margin-top:8px;width:100%">Načíst body do mapy</button>
      </details>
      <p class="hint">Body taháním upravíš, klikem na bod ho smažeš. Plocha se počítá geodeticky (WGS84). Vhodné pro pole, louky, pozemky.</p>
    </div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script>
const $=id=>document.getElementById(id);
const R=6378137;
const map=L.map('map').setView([49.8175,15.4730],8);
const bases={
  osm:L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}),
  sat:L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{attribution:'© Esri',maxZoom:19}),
  topo:L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',{attribution:'© OpenTopoMap',maxZoom:17})
};
let curBase=bases.osm.addTo(map);
$('basemap').onchange=()=>{map.removeLayer(curBase);curBase=bases[$('basemap').value].addTo(map);};
L.control.scale({imperial:false}).addTo(map);

let points=[]; // {marker, latlng}
let poly=null;
function numIcon(i){return L.divIcon({className:'',html:`<div class="marker-num">${i+1}</div>`,iconSize:[22,22],iconAnchor:[11,11]});}
function addPoint(latlng){
  const marker=L.marker(latlng,{draggable:true,icon:numIcon(points.length)}).addTo(map);
  const p={marker,latlng};
  marker.on('drag',e=>{p.latlng=e.target.getLatLng();redraw();});
  marker.on('click',e=>{L.DomEvent.stopPropagation(e);removePoint(p);});
  points.push(p);redraw();
}
function removePoint(p){map.removeLayer(p.marker);points=points.filter(x=>x!==p);reindex();redraw();}
function reindex(){points.forEach((p,i)=>p.marker.setIcon(numIcon(i)));}
function redraw(){
  const latlngs=points.map(p=>p.latlng);
  if(poly)map.removeLayer(poly);
  if(latlngs.length>=2)poly=L.polygon(latlngs,{color:'#6aa6fd',weight:2,fillColor:'#6aa6fd',fillOpacity:.2}).addTo(map);
  else poly=null;
  compute();
}
function geoArea(latlngs){let a=0;const n=latlngs.length;
  for(let i=0;i<n;i++){const p1=latlngs[i],p2=latlngs[(i+1)%n];
    a+=(p2.lng-p1.lng)*Math.PI/180*(2+Math.sin(p1.lat*Math.PI/180)+Math.sin(p2.lat*Math.PI/180));}
  return Math.abs(a*R*R/2);}
function geoPerim(latlngs){let d=0;const n=latlngs.length;
  for(let i=0;i<n;i++)d+=latlngs[i].distanceTo(latlngs[(i+1)%n]);return d;}
function compute(){
  const latlngs=points.map(p=>p.latlng);
  $('count').textContent=latlngs.length;
  if(latlngs.length<3){$('haBig').textContent='0 ha';['m2','ha','ar','perim'].forEach(id=>$(id).textContent='0');syncManual();return;}
  const A=geoArea(latlngs),P=geoPerim(latlngs);
  $('haBig').textContent=(A/10000).toFixed(3)+' ha';
  $('m2').textContent=A.toLocaleString('cs',{maximumFractionDigits:1})+' m²';
  $('ha').textContent=(A/10000).toFixed(4)+' ha';
  $('ar').textContent=(A/100).toFixed(2)+' a';
  $('perim').textContent=P<1000?P.toFixed(1)+' m':(P/1000).toFixed(3)+' km';
  syncManual();
}
function syncManual(){$('manual').value=points.map(p=>p.latlng.lat.toFixed(6)+', '+p.latlng.lng.toFixed(6)).join('\n');}
map.on('click',e=>addPoint(e.latlng));
$('undoBtn').onclick=()=>{if(points.length)removePoint(points[points.length-1]);};
$('clearBtn').onclick=()=>{points.forEach(p=>map.removeLayer(p.marker));points=[];redraw();};
$('locBtn').onclick=()=>navigator.geolocation.getCurrentPosition(p=>map.setView([p.coords.latitude,p.coords.longitude],17),()=>alert('Polohu nelze získat.'));
$('loadManual').onclick=()=>{
  const coords=$('manual').value.split('\n').map(l=>l.split(',').map(s=>parseFloat(s.trim()))).filter(a=>a.length>=2&&!isNaN(a[0])&&!isNaN(a[1]));
  if(!coords.length)return;
  points.forEach(p=>map.removeLayer(p.marker));points=[];
  coords.forEach(c=>addPoint(L.latLng(c[0],c[1])));
  if(points.length)map.fitBounds(L.latLngBounds(points.map(p=>p.latlng)).pad(0.3));
};
// ukázkový pozemek
[[50.0801,14.4200],[50.0810,14.4225],[50.0795,14.4240],[50.0788,14.4210]].forEach(c=>addPoint(L.latLng(c[0],c[1])));
map.fitBounds(L.latLngBounds(points.map(p=>p.latlng)).pad(0.5));
</script>
</body>
</html>
