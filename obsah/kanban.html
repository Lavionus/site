<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Kanban tabule</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:16px;font-weight:600;text-align:center}
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:760px){.board{grid-template-columns:1fr}}
.col{background:#2a2a2a;border:1px solid #404040;border-radius:10px;padding:14px;min-height:300px}
.col.dragover{border-color:#6aa6fd;background:#1e2530}
.col h2{font-size:.95rem;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.col .count{background:#404040;border-radius:10px;padding:1px 9px;font-size:.78rem;color:#bbb}
.c-todo h2{color:#e74c3c}.c-doing h2{color:#f39c12}.c-done h2{color:#27ae60}
.add{display:flex;gap:6px;margin-bottom:12px}
.add input{flex:1;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:9px;font-size:.88rem}
.add button{background:#6aa6fd;border:none;border-radius:6px;color:#fff;padding:9px 12px;cursor:pointer;font-weight:600}
.cards{display:flex;flex-direction:column;gap:8px;min-height:40px}
.card{background:#333;border-radius:8px;padding:12px;cursor:grab;border-left:3px solid #6aa6fd;font-size:.92rem;position:relative}
.card.dragging{opacity:.4}
.card .del{position:absolute;top:6px;right:8px;background:none;border:none;color:#888;cursor:pointer;opacity:0;transition:.2s}
.card:hover .del{opacity:1}
.card .del:hover{color:#e74c3c}
.card .txt{padding-right:16px;word-break:break-word}
.c-todo .card{border-left-color:#e74c3c}.c-doing .card{border-left-color:#f39c12}.c-done .card{border-left-color:#27ae60}
.toolbar{text-align:center;margin-bottom:14px}
.btn-sec{background:#404040;color:#e0e0e0;border:1px solid #555;padding:8px 16px;border-radius:6px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <h1>📋 Kanban tabule</h1>
  <div class="toolbar"><button class="btn-sec" id="clearBtn">🗑️ Vymazat hotové</button></div>
  <div class="board" id="board">
    <div class="col c-todo" data-col="todo"><h2>📌 Úkoly <span class="count">0</span></h2><div class="add"><input placeholder="Nový úkol…"><button>+</button></div><div class="cards"></div></div>
    <div class="col c-doing" data-col="doing"><h2>⚙️ Probíhá <span class="count">0</span></h2><div class="add"><input placeholder="Nová položka…"><button>+</button></div><div class="cards"></div></div>
    <div class="col c-done" data-col="done"><h2>✅ Hotovo <span class="count">0</span></h2><div class="add"><input placeholder="Hotová položka…"><button>+</button></div><div class="cards"></div></div>
  </div>
</div>
<script>
const $=s=>document.querySelector(s);
let data=JSON.parse(localStorage.getItem('kanban')||'null')||{todo:[{id:1,t:'Naplánovat týden'},{id:2,t:'Odpovědět na e-maily'}],doing:[{id:3,t:'Připravit prezentaci'}],done:[{id:4,t:'Nakoupit'}]};
const save=()=>localStorage.setItem('kanban',JSON.stringify(data));
let dragId=null;
function render(){
  document.querySelectorAll('.col').forEach(col=>{
    const key=col.dataset.col;const cards=col.querySelector('.cards');
    col.querySelector('.count').textContent=data[key].length;
    cards.innerHTML=data[key].map(c=>`<div class="card" draggable="true" data-id="${c.id}"><span class="txt">${c.t.replace(/</g,'&lt;')}</span><button class="del" data-id="${c.id}">✕</button></div>`).join('');
  });
  bind();
}
function bind(){
  document.querySelectorAll('.card').forEach(card=>{
    card.ondragstart=()=>{dragId=+card.dataset.id;card.classList.add('dragging');};
    card.ondragend=()=>card.classList.remove('dragging');
  });
  document.querySelectorAll('.del').forEach(b=>b.onclick=e=>{e.stopPropagation();const id=+b.dataset.id;for(const k in data)data[k]=data[k].filter(c=>c.id!==id);save();render();});
}
document.querySelectorAll('.col').forEach(col=>{
  col.ondragover=e=>{e.preventDefault();col.classList.add('dragover');};
  col.ondragleave=()=>col.classList.remove('dragover');
  col.ondrop=e=>{e.preventDefault();col.classList.remove('dragover');
    if(dragId==null)return;let card;for(const k in data){const i=data[k].findIndex(c=>c.id===dragId);if(i>=0){card=data[k].splice(i,1)[0];break;}}
    if(card){data[col.dataset.col].push(card);save();render();}dragId=null;};
});
document.querySelectorAll('.col').forEach(col=>{
  const inp=col.querySelector('input'),btn=col.querySelector('.add button');
  const add=()=>{const v=inp.value.trim();if(!v)return;data[col.dataset.col].push({id:Date.now(),t:v});inp.value='';save();render();};
  btn.onclick=add;inp.onkeydown=e=>{if(e.key==='Enter')add();};
});
$('#clearBtn').onclick=()=>{if(confirm('Vymazat všechny hotové úkoly?')){data.done=[];save();render();}};
render();
</script>
</body>
</html>
