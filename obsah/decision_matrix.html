<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚖️ Rozhodovací matice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600;text-align:center}
.pod{color:#888;text-align:center;font-size:.85rem;margin-bottom:18px}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px;overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:560px}
th,td{padding:7px;border:1px solid #404040;text-align:center}
th{color:#6aa6fd;font-size:.8rem;background:#242424}
input{background:#333;border:1px solid #444;border-radius:4px;color:#e0e0e0;padding:7px;width:100%;text-align:center}
input.nazev{text-align:left}
input.vaha{width:56px}
select.skore{background:#333;border:1px solid #444;border-radius:4px;color:#e0e0e0;padding:6px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;margin:4px 8px 4px 0}
.btn-sec{background:#404040}
.btn-red{background:#c0392b}
.del{background:none;border:none;color:#c0392b;cursor:pointer;font-size:1rem}
.total{font-weight:700;color:#4caf50;font-size:1.05rem}
.vitez{outline:2px solid #4caf50}
.viteztext{text-align:center;font-size:1.15rem;margin-top:14px;color:#4caf50;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <h1>⚖️ Rozhodovací matice</h1>
  <p class="pod">Ohodnoťte varianty podle kritérií (1–10), každé kritérium má váhu. Vyhrává nejvyšší vážený součet.</p>
  <div class="card">
    <table id="matice"></table>
    <div style="margin-top:12px">
      <button class="btn" id="pridatKrit">➕ Kritérium</button>
      <button class="btn" id="pridatVar">➕ Varianta</button>
      <button class="btn btn-red" id="reset">🗑️ Začít znovu</button>
    </div>
    <div class="viteztext" id="vitez"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const STORE='decisionMatrix.v1';
let st;
try{st=JSON.parse(localStorage.getItem(STORE));}catch(e){}
if(!st)st={
  kriteria:[{n:'Cena',v:5},{n:'Kvalita',v:4},{n:'Dostupnost',v:2}],
  varianty:['Varianta A','Varianta B'],
  skore:{}, // "krit-var" -> 1..10
};
const save=()=>localStorage.setItem(STORE,JSON.stringify(st));

function render(){
  const t=$('matice');
  let h='<tr><th style="text-align:left">Kritérium</th><th>Váha</th>';
  st.varianty.forEach((v,vi)=>h+=`<th><input class="nazev" data-var="${vi}" value="${esc(v)}" style="text-align:center"><button class="del" data-delvar="${vi}" title="Smazat variantu">✕</button></th>`);
  h+='</tr>';
  st.kriteria.forEach((k,ki)=>{
    h+=`<tr><td><input class="nazev" data-krit="${ki}" value="${esc(k.n)}"></td>
      <td><input class="vaha" type="number" min="1" max="10" data-vaha="${ki}" value="${k.v}"></td>`;
    st.varianty.forEach((v,vi)=>{
      const val=st.skore[ki+'-'+vi]||'';
      h+=`<td><select class="skore" data-sk="${ki}-${vi}"><option value="">–</option>${
        Array.from({length:10},(_,i)=>`<option ${val==i+1?'selected':''}>${i+1}</option>`).join('')}</select></td>`;
    });
    h+=`<td style="border:none"><button class="del" data-delkrit="${ki}" title="Smazat kritérium">✕</button></td></tr>`;
  });
  // součty
  const soucty=st.varianty.map((_,vi)=>st.kriteria.reduce((s,k,ki)=>s+k.v*(+st.skore[ki+'-'+vi]||0),0));
  const max=Math.max(...soucty,0);
  h+='<tr><td style="text-align:left"><b>Vážený součet</b></td><td></td>';
  soucty.forEach(s=>h+=`<td class="total ${s===max&&max>0?'vitez':''}">${s}</td>`);
  h+='</tr>';
  t.innerHTML=h;
  const nejlepsi=soucty.indexOf(max);
  $('vitez').textContent=max>0?`🏆 Nejlépe vychází: ${st.varianty[nejlepsi]} (${max} bodů)`:'';
}
const esc=s=>String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');
$('matice').addEventListener('input',e=>{
  const d=e.target.dataset;
  if(d.var!==undefined)st.varianty[+d.var]=e.target.value;
  else if(d.krit!==undefined)st.kriteria[+d.krit].n=e.target.value;
  else if(d.vaha!==undefined)st.kriteria[+d.vaha].v=Math.max(1,Math.min(10,+e.target.value||1));
  else if(d.sk!==undefined)st.skore[d.sk]=e.target.value;
  save();
  if(d.vaha!==undefined||d.sk!==undefined)render();
});
$('matice').addEventListener('click',e=>{
  const d=e.target.dataset;
  if(d.delvar!==undefined){
    st.varianty.splice(+d.delvar,1);
    remapSkore((ki,vi)=>vi===+d.delvar?null:[ki,vi>+d.delvar?vi-1:vi]);
    save();render();
  }
  if(d.delkrit!==undefined){
    st.kriteria.splice(+d.delkrit,1);
    remapSkore((ki,vi)=>ki===+d.delkrit?null:[ki>+d.delkrit?ki-1:ki,vi]);
    save();render();
  }
});
function remapSkore(fn){
  const nove={};
  Object.entries(st.skore).forEach(([k,v])=>{
    const [ki,vi]=k.split('-').map(Number);
    const r=fn(ki,vi);
    if(r)nove[r[0]+'-'+r[1]]=v;
  });
  st.skore=nove;
}
$('pridatKrit').onclick=()=>{st.kriteria.push({n:'Nové kritérium',v:3});save();render();};
$('pridatVar').onclick=()=>{st.varianty.push('Varianta '+String.fromCharCode(65+st.varianty.length));save();render();};
$('reset').onclick=()=>{
  if(!confirm('Smazat celou matici a začít znovu?'))return;
  localStorage.removeItem(STORE);location.reload();
};
render();
</script>
</body>
</html>
