<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>√ Mocniny a odmocniny</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:560px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
.setup{display:flex;gap:12px;flex-wrap:wrap;align-items:end;justify-content:center}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 28px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.game,.results{display:none;text-align:center}
.scorebar{display:flex;justify-content:space-around;margin-bottom:18px}
.scorebar .v{font-size:1.5rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.question{font-size:2.6rem;font-weight:700;margin:18px 0}
.answer{font-size:1.8rem;width:200px;text-align:center;background:#1e1e1e;border:2px solid #555;border-radius:10px;color:#fff;padding:12px}
.answer.correct{border-color:#27ae60}.answer.wrong{border-color:#e74c3c}
.feedback{font-size:1.2rem;margin:14px 0;min-height:32px;font-weight:600}
.results .big{font-size:2.6rem;font-weight:700;color:#6aa6fd}
sup{font-size:.6em}
</style>
</head>
<body>
<div class="container">
  <h1>√ Mocniny a odmocniny</h1>
  <div class="card" id="setupCard">
    <div class="setup">
      <div><label>Cvičení</label><select id="mode">
        <option value="pow2">Druhé mocniny (do 20²)</option>
        <option value="pow3">Třetí mocniny (do 10³)</option>
        <option value="sqrt">Druhé odmocniny (celočíselné)</option>
        <option value="mix" selected>Mix</option>
      </select></div>
      <button class="btn" id="startBtn">▶️ Start</button>
    </div>
  </div>

  <div class="card game" id="gameCard">
    <div class="scorebar">
      <div><div class="v" id="score">0</div><div class="l">Správně</div></div>
      <div><div class="v" id="idx">0/12</div><div class="l">Příklad</div></div>
    </div>
    <div class="question" id="question"></div>
    <input class="answer" id="answer" type="number">
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="card results" id="resultsCard">
    <div style="font-size:2rem" id="emoji"></div>
    <div class="big" id="finalScore"></div>
    <p style="color:#888" id="finalDetail"></p>
    <button class="btn" id="againBtn" style="margin-top:14px">🔄 Znovu</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let mode,score,idx,total=12,answer;
function gen(){
  let type=mode;
  if(mode==='mix')type=['pow2','pow3','sqrt'][Math.floor(Math.random()*3)];
  if(type==='pow2'){
    const n=2+Math.floor(Math.random()*19);
    answer=n*n;$('question').innerHTML=`${n}<sup>2</sup> = ?`;
  } else if(type==='pow3'){
    const n=2+Math.floor(Math.random()*9);
    answer=n*n*n;$('question').innerHTML=`${n}<sup>3</sup> = ?`;
  } else {
    const n=2+Math.floor(Math.random()*19);
    answer=n;$('question').innerHTML=`√${n*n} = ?`;
  }
  $('answer').value='';$('answer').className='answer';$('answer').focus();
}
function check(){
  const v=parseInt($('answer').value,10);
  if(v===answer){$('answer').className='answer correct';score++;$('feedback').textContent='✅';$('feedback').style.color='#27ae60';}
  else{$('answer').className='answer wrong';$('feedback').textContent='❌ Správně: '+answer;$('feedback').style.color='#e74c3c';}
  $('score').textContent=score;
  setTimeout(()=>{$('feedback').textContent='';next();},800);
}
function next(){
  idx++;
  if(idx>=total){finish();return;}
  $('idx').textContent=`${idx+1}/${total}`;
  gen();
}
$('answer').addEventListener('keydown',e=>{if(e.key==='Enter'&&$('answer').value!=='')check();});
function start(){
  mode=$('mode').value;score=0;idx=0;
  $('setupCard').style.display='none';$('resultsCard').style.display='none';$('gameCard').style.display='block';
  $('score').textContent=0;$('idx').textContent=`1/${total}`;
  gen();
}
function finish(){
  $('gameCard').style.display='none';$('resultsCard').style.display='block';
  $('finalScore').textContent=`${score} / ${total}`;
  const pct=Math.round(score/total*100);
  $('emoji').textContent=pct>=80?'🏆':pct>=50?'👍':'💪';
  $('finalDetail').textContent=`Úspěšnost ${pct}%`;
}
$('startBtn').onclick=start;
$('againBtn').onclick=()=>{$('setupCard').style.display='block';$('resultsCard').style.display='none';};
</script>
</body>
</html>
