<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <title>Mapa dědičnosti</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: #2d2d2d;
      border-bottom: 1px solid #404040;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.05rem; font-weight: 700; color: #d4a8ff; }
    .btn {
      padding: 5px 13px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.82rem;
      transition: background 0.2s;
    }
    .btn-purple { background: #4a2a6a; color: #d4a8ff; border: 1px solid #6a3a9a; }
    .btn-purple:hover { background: #5a3a7a; }
    .btn-blue { background: #2a3a5a; color: #8ab4f8; border: 1px solid #3a5a8a; }
    .btn-blue:hover { background: #3a4a6a; }
    .btn-red { background: #5a2a2a; color: #ca8a8a; border: 1px solid #6a3a3a; font-size: 0.72rem; padding: 3px 8px; }
    .btn-red:hover { background: #6a3a3a; }
    .btn-green { background: #2a5a2a; color: #8aca8a; border: 1px solid #3a6a3a; }
    .btn-green:hover { background: #3a6a3a; }
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    /* Levý panel */
    .left-panel {
      width: 300px;
      flex-shrink: 0;
      background: #242424;
      border-right: 1px solid #404040;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-title {
      font-size: 0.72rem;
      color: #d4a8ff;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 8px 12px 6px;
      border-bottom: 1px solid #333;
      font-weight: 700;
    }
    .person-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #404040 #242424;
    }
    .person-item {
      padding: 7px 12px;
      border-bottom: 1px solid #2a2a2a;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.15s;
    }
    .person-item:hover { background: #333; }
    .person-item.selected { background: #2a1a3a; border-left: 3px solid #d4a8ff; }
    .person-name { font-size: 0.85rem; color: #e0e0e0; }
    .person-dates { font-size: 0.72rem; color: #777; }
    .person-sex { font-size: 0.8rem; margin-right: 4px; }
    /* Formulář */
    .add-form {
      padding: 10px 12px;
      border-top: 1px solid #333;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .add-form input, .add-form select {
      background: #2a2a2a;
      border: 1px solid #444;
      color: #e0e0e0;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 0.8rem;
      width: 100%;
      outline: none;
    }
    .add-form input:focus, .add-form select:focus { border-color: #d4a8ff; }
    .add-form label { font-size: 0.68rem; color: #777; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    /* Pravý panel: SVG strom */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #1e1e1e;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
    }
    .toolbar label { font-size: 0.78rem; color: #888; }
    .toolbar select {
      background: #333;
      border: 1px solid #555;
      color: #e0e0e0;
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 0.8rem;
      outline: none;
    }
    #canvas-area {
      flex: 1;
      overflow: auto;
      background: #111;
      scrollbar-width: thin;
      scrollbar-color: #404040 #111;
    }
    svg { display: block; }
    /* Info panel */
    .info-panel {
      background: #1e1e1e;
      border-top: 1px solid #333;
      padding: 10px 14px;
      min-height: 90px;
      max-height: 160px;
      overflow-y: auto;
    }
    .info-panel h3 { font-size: 0.82rem; color: #d4a8ff; margin-bottom: 6px; }
    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .info-card {
      background: #2a1a3a;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 0.78rem;
    }
    .info-card .ic-label { color: #a07ac0; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .info-card .ic-val { color: #e0e0e0; font-weight: 600; margin-top: 2px; }
    /* Vztahový výpočet */
    .relation-area {
      padding: 10px 14px;
      background: #1e1e1e;
      border-top: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .relation-area label { font-size: 0.78rem; color: #888; }
    .relation-area select {
      background: #333;
      border: 1px solid #555;
      color: #e0e0e0;
      border-radius: 5px;
      padding: 4px 8px;
      font-size: 0.8rem;
      outline: none;
    }
    #relResult {
      font-size: 0.82rem;
      color: #d4a8ff;
      font-weight: 600;
      padding: 4px 10px;
      background: #2a1a3a;
      border-radius: 5px;
      min-width: 180px;
    }
    /* SVG node styles */
    .node-male rect { fill: #1e3050; stroke: #4a7abf; stroke-width: 2; rx: 6; }
    .node-female rect { fill: #3a1a30; stroke: #bf4a7a; stroke-width: 2; rx: 6; }
    .node rect { rx: 6; cursor: pointer; }
    .node text { font-family: -apple-system, sans-serif; }
    .node.highlight rect { stroke-width: 3; stroke: #d4a8ff; filter: brightness(1.3); }
  </style>
</head>
<body>

<header>
  <h1>🧬 Mapa dědičnosti</h1>
  <button class="btn btn-blue" onclick="document.getElementById('importFile').click()">📥 Import JSON</button>
  <input type="file" id="importFile" accept=".json" style="display:none" onchange="importJSON(this)" />
  <button class="btn btn-green" onclick="exportJSON()">📤 Export JSON</button>
  <button class="btn btn-purple" onclick="render()">🔄 Překreslit</button>
  <span style="font-size:0.78rem;color:#666;margin-left:auto">Kliknutím na osobu zobrazíte detail a vypočítáte příbuzenství</span>
</header>

<div class="main">
  <!-- Levý panel: seznam osob + formulář -->
  <div class="left-panel">
    <div class="panel-title">👥 Osoby ({{ n }})</div>
    <div class="person-list" id="personList"></div>
    <div class="add-form">
      <div class="panel-title" style="padding:0 0 6px">➕ Přidat osobu</div>
      <div>
        <label>Jméno a příjmení</label>
        <input type="text" id="f-name" placeholder="Jan Novák" />
      </div>
      <div class="form-row">
        <div>
          <label>Pohlaví</label>
          <select id="f-sex">
            <option value="m">♂ Muž</option>
            <option value="f">♀ Žena</option>
          </select>
        </div>
        <div>
          <label>Rok nar.</label>
          <input type="number" id="f-born" placeholder="1950" min="1000" max="2100" />
        </div>
      </div>
      <div>
        <label>Rok úmrtí (nepovinné)</label>
        <input type="number" id="f-died" placeholder="2020" min="1000" max="2100" />
      </div>
      <div>
        <label>Otec</label>
        <select id="f-father"><option value="">— žádný —</option></select>
      </div>
      <div>
        <label>Matka</label>
        <select id="f-mother"><option value="">— žádný —</option></select>
      </div>
      <div>
        <label>Poznámka</label>
        <input type="text" id="f-note" placeholder="Volitelná poznámka..." />
      </div>
      <button class="btn btn-purple" onclick="addPerson()" style="width:100%;padding:7px;font-size:0.85rem;">Přidat osobu</button>
    </div>
  </div>

  <!-- Pravý panel: strom + info -->
  <div class="right-panel">
    <div class="toolbar">
      <label>Kořen stromu:</label>
      <select id="rootSel" onchange="render()"><option value="">— vše —</option></select>
      <label>Hloubka:</label>
      <select id="depthSel" onchange="render()">
        <option value="3">3 generace</option>
        <option value="4">4 generace</option>
        <option value="5" selected>5 generací</option>
        <option value="99">Všechny</option>
      </select>
      <label>Orientace:</label>
      <select id="orientSel" onchange="render()">
        <option value="tb">Shora dolů</option>
        <option value="lr">Zleva doprava</option>
      </select>
    </div>

    <div id="canvas-area">
      <svg id="treeSvg" width="800" height="600"></svg>
    </div>

    <div class="relation-area">
      <label>Příbuzenství:</label>
      <select id="rel1"><option value="">— osoba 1 —</option></select>
      <span style="color:#555">↔</span>
      <select id="rel2"><option value="">— osoba 2 —</option></select>
      <button class="btn btn-purple" onclick="calcRelation()">Vypočítat</button>
      <div id="relResult">—</div>
    </div>

    <div class="info-panel">
      <h3 id="infoTitle">Klikněte na osobu v stromě nebo v seznamu</h3>
      <div class="info-grid" id="infoGrid"></div>
    </div>
  </div>
</div>

<script>
let people = JSON.parse(localStorage.getItem('genemap_people') || '[]');
let selectedId = null;

function save() { localStorage.setItem('genemap_people', JSON.stringify(people)); }
function genId() { return Date.now().toString() + Math.random().toString(36).slice(2,6); }

function init() {
  renderPersonList();
  updateSelects();
  render();
}

function addPerson() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Zadejte jméno'); return; }
  const p = {
    id: genId(),
    name,
    sex: document.getElementById('f-sex').value,
    born: parseInt(document.getElementById('f-born').value) || null,
    died: parseInt(document.getElementById('f-died').value) || null,
    father: document.getElementById('f-father').value || null,
    mother: document.getElementById('f-mother').value || null,
    note: document.getElementById('f-note').value.trim()
  };
  people.push(p);
  save();
  document.getElementById('f-name').value = '';
  document.getElementById('f-born').value = '';
  document.getElementById('f-died').value = '';
  document.getElementById('f-father').value = '';
  document.getElementById('f-mother').value = '';
  document.getElementById('f-note').value = '';
  renderPersonList();
  updateSelects();
  render();
}

function deletePerson(id) {
  if (!confirm('Smazat tuto osobu? Vazby budou odstraněny.')) return;
  people = people.filter(p => p.id !== id);
  people.forEach(p => {
    if (p.father === id) p.father = null;
    if (p.mother === id) p.mother = null;
  });
  save();
  if (selectedId === id) selectedId = null;
  renderPersonList();
  updateSelects();
  render();
}

function selectPerson(id) {
  selectedId = id;
  renderPersonList();
  showInfo(id);
  render();
}

function renderPersonList() {
  const el = document.getElementById('personList');
  if (people.length === 0) {
    el.innerHTML = '<div style="color:#555;padding:16px;font-size:0.82rem;text-align:center">Přidejte první osobu</div>';
    return;
  }
  const sorted = [...people].sort((a, b) => (a.born||9999) - (b.born||9999));
  el.innerHTML = sorted.map(p => `
    <div class="person-item ${p.id === selectedId ? 'selected' : ''}" onclick="selectPerson('${p.id}')">
      <div>
        <div class="person-name"><span class="person-sex">${p.sex==='m'?'♂':'♀'}</span>${p.name}</div>
        <div class="person-dates">${p.born||'?'} ${p.died ? '– '+p.died : ''}</div>
      </div>
      <button class="btn btn-red" onclick="event.stopPropagation();deletePerson('${p.id}')">✕</button>
    </div>`).join('');
  document.querySelector('.panel-title').textContent = `👥 Osoby (${people.length})`;
}

function updateSelects() {
  const opts = '<option value="">— žádný —</option>' + [...people].sort((a,b)=>(a.born||9999)-(b.born||9999))
    .map(p => `<option value="${p.id}">${p.name}${p.born?' ('+p.born+')':''}</option>`).join('');
  document.getElementById('f-father').innerHTML = opts;
  document.getElementById('f-mother').innerHTML = opts;

  const rootOpts = '<option value="">— vše —</option>' + people.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('rootSel').innerHTML = rootOpts;

  const relOpts = '<option value="">— osoba —</option>' + people.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
  document.getElementById('rel1').innerHTML = relOpts;
  document.getElementById('rel2').innerHTML = relOpts;
}

function showInfo(id) {
  const p = people.find(x => x.id === id);
  if (!p) return;
  const father = people.find(x => x.id === p.father);
  const mother = people.find(x => x.id === p.mother);
  const children = people.filter(x => x.father === id || x.mother === id);
  const siblings = people.filter(x => x.id !== id && ((p.father && x.father === p.father) || (p.mother && x.mother === p.mother)));
  const age = p.born ? ((p.died || new Date().getFullYear()) - p.born) : null;

  document.getElementById('infoTitle').textContent = `${p.sex==='m'?'♂':'♀'} ${p.name}${p.born ? ' (*'+p.born+')' : ''}`;
  document.getElementById('infoGrid').innerHTML = `
    <div class="info-card"><div class="ic-label">Otec</div><div class="ic-val">${father ? father.name : '—'}</div></div>
    <div class="info-card"><div class="ic-label">Matka</div><div class="ic-val">${mother ? mother.name : '—'}</div></div>
    <div class="info-card"><div class="ic-label">Věk</div><div class="ic-val">${age !== null ? age + ' let' : '—'}</div></div>
    <div class="info-card"><div class="ic-label">Děti (${children.length})</div><div class="ic-val" style="font-size:0.72rem">${children.map(c=>c.name).join(', ')||'—'}</div></div>
    <div class="info-card"><div class="ic-label">Sourozenci (${siblings.length})</div><div class="ic-val" style="font-size:0.72rem">${siblings.map(c=>c.name).join(', ')||'—'}</div></div>
    <div class="info-card"><div class="ic-label">Poznámka</div><div class="ic-val" style="font-size:0.72rem">${p.note||'—'}</div></div>`;
}

// ---- STROM (SVG) ----
const NODE_W = 150, NODE_H = 60, H_GAP = 30, V_GAP = 50;

function render() {
  const orient = document.getElementById('orientSel').value;
  const maxDepth = parseInt(document.getElementById('depthSel').value);
  const rootId = document.getElementById('rootSel').value;

  // Postavit strom: každá osoba bez rodiče je kořen
  const roots = rootId ? [rootId] : people.filter(p => {
    const hasFather = people.some(x => x.id === p.father);
    const hasMother = people.some(x => x.id === p.mother);
    return !hasFather && !hasMother;
  }).map(p => p.id);

  if (roots.length === 0 && people.length > 0) {
    // fallback: vzít nejstaršího
    roots.push([...people].sort((a,b)=>(a.born||9999)-(b.born||9999))[0].id);
  }

  const positions = {};
  let colCounter = 0;

  function layout(id, depth, col) {
    if (!id || depth > maxDepth || positions[id]) return col;
    const p = people.find(x => x.id === id);
    if (!p) return col;
    const children = people.filter(x => x.father === id || x.mother === id);
    if (children.length === 0) {
      positions[id] = { col, depth };
      return col + 1;
    }
    let minCol = col, maxCol = col;
    children.forEach(c => {
      maxCol = layout(c.id, depth + 1, maxCol);
    });
    const centerCol = (minCol + maxCol - 1) / 2;
    positions[id] = { col: centerCol, depth };
    return maxCol;
  }

  let startCol = 0;
  roots.forEach(id => {
    startCol = layout(id, 0, startCol) + 1;
  });

  // Přidat osoby bez pozice (izolované)
  people.forEach(p => {
    if (!positions[p.id]) {
      positions[p.id] = { col: startCol++, depth: 0 };
    }
  });

  const allCols = Object.values(positions).map(p => p.col);
  const allDepths = Object.values(positions).map(p => p.depth);
  const maxCol = Math.max(...allCols, 0);
  const maxD = Math.max(...allDepths, 0);

  const isLR = orient === 'lr';
  const svgW = isLR ? (maxD + 1) * (NODE_W + V_GAP) + 40 : (maxCol + 1) * (NODE_W + H_GAP) + 40;
  const svgH = isLR ? (maxCol + 1) * (NODE_H + H_GAP) + 40 : (maxD + 1) * (NODE_H + V_GAP) + 40;

  const svg = document.getElementById('treeSvg');
  svg.setAttribute('width', Math.max(svgW, 400));
  svg.setAttribute('height', Math.max(svgH, 300));

  function nodeX(id) {
    const pos = positions[id];
    return isLR ? pos.depth * (NODE_W + V_GAP) + 20 : pos.col * (NODE_W + H_GAP) + 20;
  }
  function nodeY(id) {
    const pos = positions[id];
    return isLR ? pos.col * (NODE_H + H_GAP) + 20 : pos.depth * (NODE_H + V_GAP) + 20;
  }

  let svgContent = '';

  // Linky
  people.forEach(p => {
    if (!positions[p.id]) return;
    const px = nodeX(p.id) + NODE_W/2;
    const py = nodeY(p.id) + (isLR ? NODE_H/2 : NODE_H);
    [p.father, p.mother].forEach(parentId => {
      if (!parentId || !positions[parentId]) return;
      const fax = nodeX(parentId) + NODE_W/2;
      const fay = nodeY(parentId) + (isLR ? NODE_H/2 : NODE_H);
      const mid = isLR ? (px + fax) / 2 : (py + fay) / 2;
      const path = isLR
        ? `M ${fax} ${fay} C ${mid} ${fay} ${mid} ${py} ${px} ${py}`
        : `M ${px} ${py} C ${px} ${mid} ${fax} ${mid} ${fax} ${fay}`;
      svgContent += `<path d="${path}" fill="none" stroke="#555" stroke-width="1.5" />`;
    });
  });

  // Nody
  people.forEach(p => {
    if (!positions[p.id]) return;
    const x = nodeX(p.id), y = nodeY(p.id);
    const isMale = p.sex === 'm';
    const fill = isMale ? '#1e3050' : '#3a1a30';
    const stroke = p.id === selectedId ? '#d4a8ff' : (isMale ? '#4a7abf' : '#bf4a7a');
    const sw = p.id === selectedId ? 3 : 1.5;
    const label = p.name.length > 18 ? p.name.slice(0, 17) + '…' : p.name;
    const dates = [p.born, p.died].filter(Boolean).join(' – ');
    svgContent += `
      <g onclick="selectPerson('${p.id}')" style="cursor:pointer">
        <rect x="${x}" y="${y}" width="${NODE_W}" height="${NODE_H}" rx="7"
          fill="${fill}" stroke="${stroke}" stroke-width="${sw}" />
        <text x="${x+NODE_W/2}" y="${y+22}" text-anchor="middle"
          font-size="13" font-weight="600" fill="${p.id===selectedId?'#d4a8ff':'#e0e0e0'}">${isMale?'♂':'♀'} ${label}</text>
        <text x="${x+NODE_W/2}" y="${y+40}" text-anchor="middle"
          font-size="11" fill="#888">${dates}</text>
      </g>`;
  });

  svg.innerHTML = svgContent;
}

// ---- PŘÍBUZENSTVÍ ----
function getAncestors(id, depth = 0) {
  const result = {};
  function walk(pid, d) {
    if (!pid || d > 30) return;
    if (!result[pid] || result[pid] > d) result[pid] = d;
    const p = people.find(x => x.id === pid);
    if (!p) return;
    if (p.father) walk(p.father, d + 1);
    if (p.mother) walk(p.mother, d + 1);
  }
  walk(id, 0);
  return result;
}

const RELATION_NAMES = {
  '0-0': 'Stejná osoba',
  '1-0': 'Rodič', '0-1': 'Dítě',
  '2-0': 'Prarodič', '0-2': 'Vnouče',
  '3-0': 'Praprarodič', '0-3': 'Pravnouče',
  '4-0': 'Prapraprarodič', '0-4': 'Prapravnouče',
  '1-1': 'Sourozenec',
  '2-1': 'Strýc/Teta', '1-2': 'Neteř/Synovec',
  '2-2': 'Bratranec/Sestřenice (1. stupeň)',
  '3-2': 'Bratranec/Sestřenice (1. st.) jednou odstraněný', '2-3': 'Bratranec/Sestřenice (1. st.) jednou odstraněný',
  '3-3': 'Bratranec/Sestřenice (2. stupeň)',
  '4-4': 'Bratranec/Sestřenice (3. stupeň)',
};

function calcRelation() {
  const id1 = document.getElementById('rel1').value;
  const id2 = document.getElementById('rel2').value;
  if (!id1 || !id2) { document.getElementById('relResult').textContent = 'Vyberte obě osoby'; return; }
  if (id1 === id2) { document.getElementById('relResult').textContent = 'Stejná osoba'; return; }

  const anc1 = getAncestors(id1);
  const anc2 = getAncestors(id2);

  // Najít společné předky
  let best = null, bestTotal = 999;
  Object.entries(anc1).forEach(([aid, d1]) => {
    if (anc2[aid] !== undefined) {
      const d2 = anc2[aid];
      const total = d1 + d2;
      if (total < bestTotal) { bestTotal = total; best = { aid, d1, d2 }; }
    }
  });

  const p1 = people.find(x => x.id === id1);
  const p2 = people.find(x => x.id === id2);
  const el = document.getElementById('relResult');

  if (!best) {
    el.textContent = 'Žádné příbuzenské spojení';
    return;
  }

  const { d1, d2 } = best;
  const coeff = Math.pow(0.5, d1 + d2) * 100;
  const key = `${d1}-${d2}`;
  const key2 = `${d2}-${d1}`;
  const relName = RELATION_NAMES[key] || RELATION_NAMES[key2] || `${d1+d2}. stupeň příbuznosti`;
  const ancestor = people.find(x => x.id === best.aid);

  el.textContent = `${relName} | sdílí ${coeff.toFixed(1)}% DNA${ancestor ? ' (přes: '+ancestor.name+')' : ''}`;
}

function exportJSON() {
  const blob = new Blob([JSON.stringify(people, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'genemap_export.json';
  a.click();
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (Array.isArray(data)) {
        people = data;
      } else if (data.people) {
        people = data.people;
      } else {
        // Try Heritage format
        const entries = Object.entries(data);
        if (entries.length && entries[0][1].name) {
          people = entries.map(([id, p]) => ({
            id,
            name: p.name,
            sex: p.gender === 'female' ? 'f' : 'm',
            born: p.birthYear || null,
            died: p.deathYear || null,
            father: p.fatherId || null,
            mother: p.motherId || null,
            note: p.note || ''
          }));
        } else {
          alert('Nerozpoznaný formát'); return;
        }
      }
      save();
      init();
      alert(`Importováno ${people.length} osob`);
    } catch { alert('Chyba při načítání JSON'); }
  };
  reader.readAsText(file);
  input.value = '';
}

init();
</script>
