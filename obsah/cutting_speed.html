<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚙️ Řezné podmínky</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:780px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px;margin-bottom:12px}
.big{font-size:2.4rem;font-weight:700;color:#6aa6fd;text-align:center;margin:8px 0}
.res-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #333}
.res-row:last-child{border:none}.res-row b{color:#4caf50}
.note{font-size:.78rem;color:#666;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <h1>⚙️ Řezné podmínky (otáčky &amp; posuv)</h1>
  <div class="card">
    <h2>Vstup</h2>
    <div class="grid">
      <div><label>Materiál (řezná rychlost vc)</label>
        <select id="material"><option value="">— vlastní vc —</option><option value="30">Konstrukční ocel (30 m/min)</option><option value="20">Nerez (20)</option><option value="80">Hliník (80)</option><option value="60">Mosaz (60)</option><option value="25">Litina (25)</option><option value="40">Plast (40)</option></select>
      </div>
      <div><label>Řezná rychlost vc (m/min)</label><input type="number" id="vc" value="30" step="any"></div>
      <div><label>Průměr nástroje/obrobku D (mm)</label><input type="number" id="dia" value="10" step="any"></div>
      <div><label>Počet zubů (fréza, 0 = soustružení)</label><input type="number" id="teeth" value="2" min="0"></div>
      <div><label>Posuv na zub fz (mm) / na otáčku</label><input type="number" id="fz" value="0.05" step="any"></div>
    </div>
  </div>
  <div class="card">
    <h2>📋 Výsledek</h2>
    <div class="big" id="rpm">–</div>
    <p style="text-align:center;color:#888;margin-bottom:14px">otáčky vřetena</p>
    <div class="res-row"><span>Posuv (vf)</span><b id="feed">–</b></div>
    <div class="res-row"><span>Řezná rychlost (zadáno)</span><b id="vcOut">–</b></div>
    <div class="res-row"><span>Obvodová rychlost</span><b id="periph">–</b></div>
    <p class="note">n = (vc × 1000) / (π × D). Posuv vf = n × fz × z (fréza) nebo n × f (soustružení, z=0). Hodnoty orientační – řiďte se doporučením výrobce nástroje.</p>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
$('material').onchange=()=>{if($('material').value){$('vc').value=$('material').value;calc();}};
function calc(){
  const vc=+$('vc').value,D=+$('dia').value,z=+$('teeth').value,fz=+$('fz').value;
  if(!D){return;}
  const n=vc*1000/(Math.PI*D);
  $('rpm').textContent=Math.round(n)+' ot/min';
  const vf=z>0?n*fz*z:n*fz;
  $('feed').textContent=Math.round(vf)+' mm/min'+(z>0?` (${z} zubů)`:' (na otáčku)');
  $('vcOut').textContent=vc+' m/min';
  $('periph').textContent=(Math.PI*D*n/1000).toFixed(1)+' m/min';
}
['vc','dia','teeth','fz'].forEach(id=>$(id).oninput=calc);
calc();
</script>
</body>
</html>
