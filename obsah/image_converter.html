<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖼️ Převodník formátů obrázků</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:820px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
.drop{border:2px dashed #555;border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:all .2s}
.drop:hover,.drop.over{border-color:#6aa6fd;background:#1e2530}
.drop .icon{font-size:3rem}
.opts{display:flex;gap:16px;flex-wrap:wrap;align-items:end;margin-top:18px}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
select,input{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
input[type=range]{padding:0}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}.btn:disabled{background:#404040;opacity:.5;cursor:not-allowed}
.preview{display:flex;gap:20px;margin-top:18px;flex-wrap:wrap}
.preview img{max-width:240px;max-height:200px;border-radius:8px;border:1px solid #404040}
.info{font-size:.85rem;color:#888;line-height:1.7}
.info b{color:#4caf50}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
  <h1>🖼️ Převodník formátů obrázků</h1>
  <div class="card">
    <div class="drop" id="drop">
      <div class="icon">📁</div>
      <p style="margin-top:10px">Přetáhni obrázek sem nebo klikni pro výběr</p>
      <p style="color:#888;font-size:.82rem;margin-top:4px">JPG, PNG, WebP, GIF, BMP — vše se zpracuje lokálně</p>
      <input type="file" id="file" accept="image/*" hidden>
    </div>
    <div class="opts">
      <div><label>Výstupní formát</label>
        <select id="format"><option value="image/webp">WebP</option><option value="image/png">PNG</option><option value="image/jpeg">JPG</option></select>
      </div>
      <div id="qualityWrap"><label>Kvalita: <span id="qVal">90</span>%</label><input type="range" id="quality" min="10" max="100" value="90"></div>
      <div><label>Šířka (px, 0 = původní)</label><input type="number" id="width" value="0" min="0" style="width:120px"></div>
      <button class="btn" id="convertBtn" disabled>🔄 Převést &amp; stáhnout</button>
    </div>
  </div>
  <div class="card" id="resultCard" style="display:none">
    <h2>Náhled</h2>
    <div class="preview">
      <div><p style="font-size:.8rem;color:#888;margin-bottom:6px">Originál</p><img id="origImg"><div class="info" id="origInfo"></div></div>
      <div><p style="font-size:.8rem;color:#888;margin-bottom:6px">Výsledek</p><img id="outImg"><div class="info" id="outInfo"></div></div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let imgEl=null,origName='obrazek';
const drop=$('drop'),fileInput=$('file');
drop.onclick=()=>fileInput.click();
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over');};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
fileInput.onchange=()=>{if(fileInput.files[0])load(fileInput.files[0]);};
function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(1)+' KB':(b/1048576).toFixed(2)+' MB';}
function load(file){
  origName=file.name.replace(/\.[^.]+$/,'');
  const url=URL.createObjectURL(file);
  imgEl=new Image();
  imgEl.onload=()=>{
    $('origImg').src=url;$('resultCard').style.display='block';$('convertBtn').disabled=false;
    $('origInfo').innerHTML=`Rozměr: <b>${imgEl.width}×${imgEl.height}</b><br>Velikost: <b>${fmtSize(file.size)}</b><br>Typ: ${file.type}`;
    $('outImg').src='';$('outInfo').innerHTML='';
  };
  imgEl.src=url;
}
$('quality').oninput=()=>$('qVal').textContent=$('quality').value;
$('format').onchange=()=>{$('qualityWrap').style.display=$('format').value==='image/png'?'none':'block';};
$('convertBtn').onclick=()=>{
  if(!imgEl)return;
  const fmt=$('format').value,q=$('quality').value/100;
  let w=+$('width').value||imgEl.width;let h=Math.round(imgEl.height*(w/imgEl.width));
  const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');
  if(fmt==='image/jpeg'){ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);}
  ctx.drawImage(imgEl,0,0,w,h);
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    $('outImg').src=url;
    const ext={'image/webp':'webp','image/png':'png','image/jpeg':'jpg'}[fmt];
    $('outInfo').innerHTML=`Rozměr: <b>${w}×${h}</b><br>Velikost: <b>${fmtSize(blob.size)}</b><br>Formát: ${ext.toUpperCase()}`;
    const a=document.createElement('a');a.href=url;a.download=origName+'.'+ext;a.click();
  },fmt,q);
};
</script>
</body>
</html>
