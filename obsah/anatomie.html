<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🫀 Biologie člověka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.layout{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px}
.bodybox{flex:0 0 260px}
.infobox{flex:1;min-width:260px}
.organ{cursor:pointer;transition:opacity .15s}
.organ:hover{opacity:.75}
.organ.active{stroke:#f5c542;stroke-width:3}
.oname{font-size:1.2rem;font-weight:700;color:#6aa6fd;margin-bottom:8px}
.osys{font-size:.78rem;color:#888;margin-bottom:10px}
.odesc{font-size:.92rem;line-height:1.6}
.tabs{display:flex;gap:8px;margin-bottom:14px;justify-content:center}
.tab{background:#333;border:1px solid #555;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:.85rem}
.tab.active{background:#6aa6fd;border-color:#6aa6fd;color:#fff}
.quiz{display:none;text-align:center}
.scorebar{display:flex;justify-content:space-around;margin-bottom:14px}
.scorebar .v{font-size:1.4rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.qtext{font-size:1rem;margin-bottom:12px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem}
</style>
</head>
<body>
<div class="container">
  <h1>🫀 Biologie člověka – orgánové soustavy</h1>
  <div class="tabs">
    <div class="tab active" data-mode="explore">🔍 Prozkoumat</div>
    <div class="tab" data-mode="quiz">❓ Kvíz</div>
  </div>

  <div id="explore" class="layout">
    <div class="card bodybox">
      <svg width="220" height="440" viewBox="0 0 220 440">
        <ellipse cx="110" cy="40" rx="34" ry="38" fill="#555" stroke="#777"/>
        <rect x="70" y="75" width="80" height="150" rx="20" fill="#3a3a3a" stroke="#555"/>
        <rect x="30" y="80" width="35" height="130" rx="16" fill="#3a3a3a" stroke="#555"/>
        <rect x="155" y="80" width="35" height="130" rx="16" fill="#3a3a3a" stroke="#555"/>
        <rect x="78" y="225" width="30" height="150" rx="14" fill="#3a3a3a" stroke="#555"/>
        <rect x="112" y="225" width="30" height="150" rx="14" fill="#3a3a3a" stroke="#555"/>
        <ellipse class="organ" data-o="mozek" cx="110" cy="35" rx="22" ry="20" fill="#e07a5f" stroke="#222"/>
        <ellipse class="organ" data-o="srdce" cx="100" cy="120" rx="18" ry="20" fill="#e63946" stroke="#222"/>
        <ellipse class="organ" data-o="plice1" cx="80" cy="110" rx="16" ry="30" fill="#a8dadc" stroke="#222" opacity=".85"/>
        <ellipse class="organ" data-o="plice2" cx="132" cy="110" rx="16" ry="30" fill="#a8dadc" stroke="#222" opacity=".85"/>
        <ellipse class="organ" data-o="zaludek" cx="90" cy="170" rx="16" ry="14" fill="#f4a261" stroke="#222"/>
        <ellipse class="organ" data-o="jatra" cx="122" cy="165" rx="20" ry="14" fill="#8d5524" stroke="#222"/>
        <path class="organ" data-o="strevo" d="M75,195 q35,10 -5,20 q40,10 -5,20 q40,10 0,15 h30 q40,-5 0,-15 q45,-10 -5,-20 q40,-10 -5,-20 z" fill="#e9c46a" stroke="#222"/>
        <ellipse class="organ" data-o="ledviny" cx="145" cy="185" rx="9" ry="14" fill="#6d597a" stroke="#222"/>
      </svg>
    </div>
    <div class="card infobox" id="infobox">
      <div class="oname">Klikni na orgán</div>
      <div class="odesc">Vyber si část těla vlevo a zjisti, k jaké orgánové soustavě patří a jakou má funkci.</div>
    </div>
  </div>

  <div id="quiz" class="quiz card">
    <div class="scorebar">
      <div><div class="v" id="score">0</div><div class="l">Správně</div></div>
      <div><div class="v" id="idx">0/10</div><div class="l">Otázka</div></div>
    </div>
    <div class="qtext" id="qtext"></div>
    <div id="qopts"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const ORGANY={
mozek:{n:'🧠 Mozek',s:'Nervová soustava',d:'Řídicí centrum těla — zpracovává vjemy ze smyslů, řídí pohyb, myšlení, paměť a emoce.'},
srdce:{n:'❤️ Srdce',s:'Oběhová soustava',d:'Svalový orgán, který čerpá krev do celého těla. Dospělé srdce tepe asi 60–90krát za minutu.'},
plice1:{n:'🫁 Plíce',s:'Dýchací soustava',d:'Umožňují výměnu kyslíku a oxidu uhličitého mezi vzduchem a krví.'},
plice2:{n:'🫁 Plíce',s:'Dýchací soustava',d:'Umožňují výměnu kyslíku a oxidu uhličitého mezi vzduchem a krví.'},
zaludek:{n:'🍽️ Žaludek',s:'Trávicí soustava',d:'Svalový vak, kde se potrava mísí s trávicími šťávami a žaludeční kyselinou.'},
jatra:{n:'🟤 Játra',s:'Trávicí soustava',d:'Největší žláza v těle — zpracovává živiny, odbourává jedovaté látky, tvoří žluč.'},
strevo:{n:'🌀 Střeva',s:'Trávicí soustava',d:'Tenké střevo vstřebává živiny, tlusté střevo vodu a formuje zbytky potravy.'},
ledviny:{n:'🫘 Ledviny',s:'Vylučovací soustava',d:'Filtrují krev a tvoří moč, čímž z těla odstraňují odpadní látky a přebytečnou vodu.'}
};
document.querySelectorAll('.organ').forEach(el=>el.onclick=()=>{
  document.querySelectorAll('.organ').forEach(o=>o.classList.remove('active'));
  el.classList.add('active');
  const o=ORGANY[el.dataset.o];
  $('infobox').innerHTML=`<div class="oname">${o.n}</div><div class="osys">${o.s}</div><div class="odesc">${o.d}</div>`;
});

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  const m=t.dataset.mode;
  $('explore').style.display=m==='explore'?'flex':'none';
  $('quiz').style.display=m==='quiz'?'block':'none';
  if(m==='quiz')startQuiz();
});

const KEYS=Object.keys(ORGANY).filter(k=>k!=='plice2');
let score,idx,total=10,answer;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){
  score=0;idx=0;$('score').textContent=0;
  next();
}
function next(){
  if(idx>=total){
    $('qtext').textContent=`Výsledek: ${score} / ${total}`;$('qopts').innerHTML='';return;
  }
  $('idx').textContent=`${idx+1}/${total}`;
  const key=shuffle([...KEYS])[0];
  answer=key;
  $('qtext').textContent=`Ke které soustavě patří: ${ORGANY[key].n.replace(/^\S+\s/,'')}?`;
  const correct=ORGANY[key].s;
  const allSys=[...new Set(Object.values(ORGANY).map(o=>o.s))];
  const opts=shuffle([correct,...shuffle(allSys.filter(s=>s!==correct)).slice(0,3)]);
  const box=$('qopts');box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='btn';b.style.display='block';b.style.margin='6px auto';b.style.background='#333';b.style.border='1px solid #555';b.textContent=o;
    b.onclick=()=>{
      [...box.children].forEach(x=>x.disabled=true);
      if(o===correct){b.style.borderColor='#27ae60';score++;}
      else{b.style.borderColor='#e74c3c';[...box.children].find(x=>x.textContent===correct).style.borderColor='#27ae60';}
      $('score').textContent=score;
      setTimeout(()=>{idx++;next();},800);
    };
    box.appendChild(b);
  });
}
</script>
</body>
</html>
