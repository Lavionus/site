<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🫀 Biologie člověka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.layout{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:12px;padding:20px}
.bodybox{flex:0 0 420px;max-width:100%}
.bodywrap{position:relative;width:100%;background:#f2efe9;border-radius:8px;overflow:hidden}
.bodywrap img{display:block;width:100%}
.bodywrap svg{position:absolute;top:0;left:0;width:100%;height:100%}
.infobox{flex:1;min-width:260px}
.organ{cursor:pointer;fill:transparent;stroke:transparent;transition:fill .15s,stroke .15s}
.organ:hover{fill:rgba(106,166,253,.22);stroke:#6aa6fd;stroke-width:3}
.organ.active{fill:rgba(245,197,66,.28);stroke:#f5c542;stroke-width:3}
.oname{font-size:1.25rem;font-weight:700;color:#6aa6fd;margin-bottom:8px}
.osys{font-size:.78rem;color:#888;margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.odesc{font-size:.94rem;line-height:1.6}
.tabs{display:flex;gap:8px;margin-bottom:14px;justify-content:center}
.tab{background:#333;border:1px solid #555;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:.85rem}
.tab.active{background:#6aa6fd;border-color:#6aa6fd;color:#fff}
.quiz{display:none;text-align:center}
.scorebar{display:flex;justify-content:space-around;margin-bottom:14px}
.scorebar .v{font-size:1.4rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.qtext{font-size:1rem;margin-bottom:12px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem}
.hint{font-size:.76rem;color:#666;text-align:center;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h1>🫀 Biologie člověka – orgánové soustavy</h1>
  <div class="tabs">
    <div class="tab active" data-mode="explore">🔍 Prozkoumat</div>
    <div class="tab" data-mode="quiz">❓ Kvíz</div>
  </div>

  <div id="explore" class="layout">
    <div class="card bodybox">
      <div class="bodywrap">
        <img src="Anatomy/Organs.png" alt="Schéma lidského těla s vnitřními orgány">
        <svg viewBox="0 0 1664 928" xmlns="http://www.w3.org/2000/svg">
          <ellipse class="organ" data-o="mozek" cx="830" cy="78" rx="98" ry="62"/>
          <ellipse class="organ" data-o="pruduska" cx="820" cy="295" rx="24" ry="38"/>
          <ellipse class="organ" data-o="plice" cx="742" cy="425" rx="55" ry="98"/>
          <ellipse class="organ" data-o="plice" cx="902" cy="425" rx="55" ry="98"/>
          <ellipse class="organ" data-o="srdce" cx="850" cy="435" rx="50" ry="70"/>
          <ellipse class="organ" data-o="jatra" cx="760" cy="565" rx="68" ry="48"/>
          <circle class="organ" data-o="zlucnik" cx="787" cy="615" r="9"/>
          <ellipse class="organ" data-o="zaludek" cx="895" cy="580" rx="55" ry="52"/>
          <ellipse class="organ" data-o="tenke_strevo" cx="822" cy="720" rx="98" ry="78"/>
          <path class="organ" data-o="tluste_strevo" d="M700,618 Q830,600 955,618 L955,635 Q830,618 700,635 Z"/>
          <path class="organ" data-o="tluste_strevo" d="M700,618 C695,650 695,750 705,800 L730,800 C722,750 722,650 726,622 Z"/>
          <path class="organ" data-o="tluste_strevo" d="M735,808 Q820,825 900,800 L905,860 Q820,880 735,858 Z"/>
        </svg>
      </div>
    </div>
    <div class="card infobox" id="infobox">
      <div class="oname">Klikni na orgán</div>
      <div class="odesc">Vyber si část těla vlevo a zjisti, k jaké orgánové soustavě patří a jakou má funkci.</div>
    </div>
  </div>

  <div id="quiz" class="quiz card">
    <div class="scorebar">
      <div><div class="v" id="score">0</div><div class="l">Správně</div></div>
      <div><div class="v" id="idx">0/10</div><div class="l">Otázka</div></div>
    </div>
    <div class="qtext" id="qtext"></div>
    <div id="qopts"></div>
  </div>
  <p class="hint">Schéma je zjednodušené pro výuku, neodpovídá přesným anatomickým proporcím ani umístění orgánů.</p>
</div>
<script>
const $=id=>document.getElementById(id);
const ORGANY={
mozek:{n:'🧠 Mozek',s:'Nervová soustava',d:'Řídicí centrum těla — zpracovává vjemy ze smyslů, řídí pohyb, myšlení, paměť a emoce.'},
pruduska:{n:'💨 Průdušnice',s:'Dýchací soustava',d:'Trubice vyztužená chrupavčitými prstenci, která vede vzduch z hrtanu do plic.'},
plice:{n:'🫁 Plíce',s:'Dýchací soustava',d:'Umožňují výměnu kyslíku a oxidu uhličitého mezi vzduchem a krví.'},
srdce:{n:'❤️ Srdce',s:'Oběhová soustava',d:'Svalový orgán, který čerpá krev do celého těla. Dospělé srdce tepe asi 60–90krát za minutu.'},
jatra:{n:'🟤 Játra',s:'Trávicí soustava',d:'Největší žláza v těle — zpracovává živiny, odbourává jedovaté látky, tvoří žluč.'},
zlucnik:{n:'🟢 Žlučník',s:'Trávicí soustava',d:'Malý váček, který skladuje žluč z jater a uvolňuje ji do střeva, když trávíme tučné jídlo.'},
zaludek:{n:'🍽️ Žaludek',s:'Trávicí soustava',d:'Svalový vak, kde se potrava mísí s trávicími šťávami a žaludeční kyselinou.'},
tenke_strevo:{n:'🌀 Tenké střevo',s:'Trávicí soustava',d:'Nejdelší část trávicí trubice — vstřebává většinu živin z natrávené potravy do krve.'},
tluste_strevo:{n:'🟫 Tlusté střevo',s:'Trávicí soustava',d:'Vstřebává vodu ze zbytků potravy a formuje je před vyloučením z těla.'}
};
document.querySelectorAll('.organ').forEach(el=>el.onclick=()=>{
  document.querySelectorAll('.organ').forEach(o=>o.classList.remove('active'));
  document.querySelectorAll(`.organ[data-o="${el.dataset.o}"]`).forEach(o=>o.classList.add('active'));
  const o=ORGANY[el.dataset.o];
  $('infobox').innerHTML=`<div class="oname">${o.n}</div><div class="osys">${o.s}</div><div class="odesc">${o.d}</div>`;
});

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  const m=t.dataset.mode;
  $('explore').style.display=m==='explore'?'flex':'none';
  $('quiz').style.display=m==='quiz'?'block':'none';
  if(m==='quiz')startQuiz();
});

const KEYS=Object.keys(ORGANY);
let score,idx,total=10,answer;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){
  score=0;idx=0;$('score').textContent=0;
  next();
}
function next(){
  if(idx>=total){
    $('qtext').textContent=`Výsledek: ${score} / ${total}`;$('qopts').innerHTML='';return;
  }
  $('idx').textContent=`${idx+1}/${total}`;
  const key=shuffle([...KEYS])[0];
  answer=key;
  $('qtext').textContent=`Ke které soustavě patří: ${ORGANY[key].n.replace(/^\S+\s/,'')}?`;
  const correct=ORGANY[key].s;
  const allSys=[...new Set(Object.values(ORGANY).map(o=>o.s))];
  const opts=shuffle([correct,...shuffle(allSys.filter(s=>s!==correct)).slice(0,3)]);
  const box=$('qopts');box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='btn';b.style.display='block';b.style.margin='6px auto';b.style.background='#333';b.style.border='1px solid #555';b.textContent=o;
    b.onclick=()=>{
      [...box.children].forEach(x=>x.disabled=true);
      if(o===correct){b.style.borderColor='#27ae60';score++;}
      else{b.style.borderColor='#e74c3c';[...box.children].find(x=>x.textContent===correct).style.borderColor='#27ae60';}
      $('score').textContent=score;
      setTimeout(()=>{idx++;next();},800);
    };
    box.appendChild(b);
  });
}
</script>
</body>
</html>
