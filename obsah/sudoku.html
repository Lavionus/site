<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 Sudoku</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600}
.top{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.board{display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);background:#555;gap:1px;border:3px solid #6aa6fd;border-radius:4px;width:min(450px,92vw);aspect-ratio:1}
.cell{background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:clamp(1rem,5vw,1.5rem);cursor:pointer;font-weight:600;overflow:hidden}
.notes{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);width:100%;height:100%;font-size:clamp(.45rem,1.8vw,.7rem);color:#7a8aa0;font-weight:500;line-height:1}
.notes span{display:flex;align-items:center;justify-content:center}
.btn.active{background:#27ae60}
.cell.given{color:#888;background:#242424}
.cell.sel{background:#3a4a6a}
.cell.same{background:#33384a}
.cell.err{color:#e74c3c}
.cell:nth-child(3n){border-right:2px solid #6aa6fd}
.cell:nth-child(9n){border-right:none}
.board>.cell:nth-child(n+19):nth-child(-n+27),.board>.cell:nth-child(n+46):nth-child(-n+54){border-bottom:2px solid #6aa6fd}
.pad{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:16px;width:min(450px,92vw)}
.key{background:#2a2a2a;border:1px solid #404040;border-radius:6px;padding:14px 0;text-align:center;cursor:pointer;font-size:1.2rem;font-weight:600}
.key:hover{background:#333}
.msg{margin-top:14px;font-size:1.2rem;font-weight:700;min-height:30px;color:#27ae60}
.cell.conflict{background:#5a2a2a;color:#e74c3c}
.snaps{margin-top:18px;width:min(450px,92vw)}
.snaps h2{font-size:1rem;margin-bottom:8px;color:#bbb;font-weight:600}
.snap{display:flex;align-items:center;gap:8px;background:#242424;border:1px solid #383838;border-radius:6px;padding:8px 10px;margin-bottom:6px}
.snap .info{flex:1;font-size:.85rem;color:#ccc}
.snap .info small{display:block;color:#777;font-size:.72rem}
.snap button{background:#404040;color:#e0e0e0;border:none;padding:6px 10px;border-radius:5px;cursor:pointer;font-size:.8rem;font-weight:600}
.snap button:hover{background:#4d4d4d}
.snap .del:hover{background:#7a3030}
.snaps .empty{color:#666;font-size:.85rem}
</style>
</head>
<body>
<h1>🔢 Sudoku</h1>
<div class="top">
  <select id="level"><option value="40">Lehká</option><option value="48" selected>Střední</option><option value="54">Těžká</option></select>
  <button class="btn" id="newBtn">🔄 Nová hra</button>
  <button class="btn btn-sec" id="undoBtn">↩️ Zpět</button>
  <button class="btn btn-sec" id="notesBtn">✏️ Poznámky</button>
  <button class="btn btn-sec" id="checkBtn">✓ Zkontrolovat</button>
  <button class="btn btn-sec" id="snapBtn">📸 Uložit snímek</button>
  <div style="color:#888">⏱️ <span id="time">0:00</span></div>
</div>
<div class="board" id="board"></div>
<div class="pad" id="pad"></div>
<div class="msg" id="msg"></div>
<div class="snaps">
  <h2>📸 Snímky</h2>
  <div id="snapList"></div>
</div>
<script>
const $=id=>document.getElementById(id);
let solution,puzzle,given,notes,selected=-1,timer,seconds,notesMode=false,history=[];
function genSolved(){
  const g=Array.from({length:9},()=>Array(9).fill(0));
  function valid(r,c,n){for(let i=0;i<9;i++)if(g[r][i]===n||g[i][c]===n)return false;
    const br=r-r%3,bc=c-c%3;for(let i=0;i<3;i++)for(let j=0;j<3;j++)if(g[br+i][bc+j]===n)return false;return true;}
  function fill(pos){if(pos===81)return true;const r=Math.floor(pos/9),c=pos%9;
    const nums=[1,2,3,4,5,6,7,8,9].sort(()=>Math.random()-0.5);
    for(const n of nums)if(valid(r,c,n)){g[r][c]=n;if(fill(pos+1))return true;g[r][c]=0;}return false;}
  fill(0);return g;
}
// Spočítá počet řešení mřížky (zastaví se na `limit`). Slouží k zajištění,
// aby vygenerovaná hádanka měla právě jedno řešení.
function countSolutions(grid,limit){
  const g=grid.map(r=>[...r]);let count=0;
  function valid(r,c,n){for(let i=0;i<9;i++)if(g[r][i]===n||g[i][c]===n)return false;
    const br=r-r%3,bc=c-c%3;for(let i=0;i<3;i++)for(let j=0;j<3;j++)if(g[br+i][bc+j]===n)return false;return true;}
  function solve(){
    let r=-1,c=-1;
    outer:for(let i=0;i<9;i++)for(let j=0;j<9;j++)if(g[i][j]===0){r=i;c=j;break outer;}
    if(r===-1){count++;return;}
    for(let n=1;n<=9;n++){if(valid(r,c,n)){g[r][c]=n;solve();g[r][c]=0;if(count>=limit)return;}}
  }
  solve();return count;
}
function newGame(clearSnaps){
  solution=genSolved();
  puzzle=solution.map(r=>[...r]);
  // Cílový počet odebraných buněk podle obtížnosti. Buňku odebereme jen tehdy,
  // pokud hádanka i poté zůstane s jediným řešením – jinak ji vrátíme zpět.
  const target=+$('level').value;const cells=[...Array(81).keys()].sort(()=>Math.random()-0.5);
  let removed=0;
  for(const idx of cells){
    if(removed>=target)break;
    const r=Math.floor(idx/9),c=idx%9,backup=puzzle[r][c];
    puzzle[r][c]=0;
    if(countSolutions(puzzle,2)===1)removed++;else puzzle[r][c]=backup;
  }
  given=puzzle.map(r=>r.map(v=>v!==0));
  notes=Array.from({length:81},()=>new Set());
  history=[];
  selected=-1;seconds=0;startTimer();
  if(clearSnaps){snapshots=[];persistSnaps();renderSnaps();}
  $('msg').textContent='';render();
}
function startTimer(){clearInterval(timer);$('time').textContent=Math.floor(seconds/60)+':'+String(seconds%60).padStart(2,'0');
  timer=setInterval(()=>{seconds++;$('time').textContent=Math.floor(seconds/60)+':'+String(seconds%60).padStart(2,'0');},1000);}
function render(){
  const b=$('board');b.innerHTML='';
  for(let i=0;i<81;i++){const r=Math.floor(i/9),c=i%9;const v=puzzle[r][c];
    const d=document.createElement('div');d.className='cell'+(given[r][c]?' given':'');d.dataset.i=i;
    if(v)d.textContent=v;
    else if(notes[i].size){d.innerHTML='<div class="notes">'+[1,2,3,4,5,6,7,8,9].map(n=>'<span>'+(notes[i].has(n)?n:'')+'</span>').join('')+'</div>';}
    if(i===selected)d.classList.add('sel');
    if(selected>=0){const sv=puzzle[Math.floor(selected/9)][selected%9];if(sv&&v===sv&&i!==selected)d.classList.add('same');}
    d.onclick=()=>{selected=i;render();};
    b.appendChild(d);
  }
}
// Uloží aktuální stav (hodnoty + poznámky) do historie pro funkci „Zpět".
function pushHistory(){
  history.push({puzzle:puzzle.map(r=>[...r]),notes:notes.map(s=>[...s])});
  if(history.length>300)history.shift();
}
function undo(){
  const s=history.pop();if(!s)return;
  puzzle=s.puzzle.map(r=>[...r]);
  notes=s.notes.map(a=>new Set(a));
  render();
}
function place(n){
  if(selected<0)return;const r=Math.floor(selected/9),c=selected%9;
  if(given[r][c])return;
  if(n===0){pushHistory();puzzle[r][c]=0;notes[selected].clear();render();return;}
  if(notesMode){
    if(puzzle[r][c])return;
    pushHistory();
    notes[selected].has(n)?notes[selected].delete(n):notes[selected].add(n);
    render();return;
  }
  pushHistory();
  puzzle[r][c]=n;notes[selected].clear();
  for(let k=0;k<81;k++){const kr=Math.floor(k/9),kc=k%9;
    if(kr===r||kc===c||(Math.floor(kr/3)===Math.floor(r/3)&&Math.floor(kc/3)===Math.floor(c/3)))notes[k].delete(n);}
  render();
  if(puzzle.flat().every(v=>v!==0))checkWin();
}
// Vrátí množinu indexů buněk, které jsou v rozporu s pravidly (duplicita v řádku/sloupci/bloku).
// Validuje podle pravidel sudoku, ne proti jednomu vygenerovanému řešení – proto se uzná
// i jiné platné řešení, pokud má hádanka řešení více.
function findConflicts(){
  const bad=new Set();const units=[];
  for(let r=0;r<9;r++)units.push([...Array(9)].map((_,c)=>r*9+c));
  for(let c=0;c<9;c++)units.push([...Array(9)].map((_,r)=>r*9+c));
  for(let br=0;br<3;br++)for(let bc=0;bc<3;bc++){const u=[];
    for(let i=0;i<3;i++)for(let j=0;j<3;j++)u.push((br*3+i)*9+(bc*3+j));units.push(u);}
  for(const u of units){const map={};
    for(const idx of u){const v=puzzle[Math.floor(idx/9)][idx%9];if(v)(map[v]=map[v]||[]).push(idx);}
    for(const v in map)if(map[v].length>1)map[v].forEach(i=>bad.add(i));}
  return bad;
}
function checkWin(){
  if(findConflicts().size)return; // plné, ale s rozporem – ještě není vyřešeno
  clearInterval(timer);$('msg').textContent='🎉 Vyřešeno za '+Math.floor(seconds/60)+':'+String(seconds%60).padStart(2,'0')+'!';
}
$('checkBtn').onclick=()=>{
  const bad=findConflicts();
  bad.forEach(i=>document.querySelector('.cell[data-i="'+i+'"]').classList.add('conflict'));
  const full=puzzle.flat().every(v=>v!==0);
  $('msg').textContent=bad.size?'❌ Některá čísla jsou v rozporu':(full?'🎉 Správně vyřešeno!':'✅ Zatím bez chyb!');
  setTimeout(()=>document.querySelectorAll('.conflict').forEach(d=>d.classList.remove('conflict')),1500);
};
$('pad').innerHTML=[1,2,3,4,5,6,7,8,9].map(n=>`<div class="key" data-n="${n}">${n}</div>`).join('')+'<div class="key" data-n="0">⌫</div>';
$('pad').querySelectorAll('.key').forEach(k=>k.onclick=()=>place(+k.dataset.n));
function toggleNotes(){notesMode=!notesMode;$('notesBtn').classList.toggle('active',notesMode);}
$('notesBtn').onclick=toggleNotes;
$('undoBtn').onclick=undo;
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&(e.key==='z'||e.key==='Z')){e.preventDefault();undo();return;}
  if(e.key>='1'&&e.key<='9')place(+e.key);else if(e.key==='Backspace'||e.key==='Delete'||e.key==='0')place(0);
  else if(e.key==='n'||e.key==='N')toggleNotes();
  else if(e.key.startsWith('Arrow')&&selected>=0){let r=Math.floor(selected/9),c=selected%9;
    if(e.key==='ArrowUp')r=(r+8)%9;if(e.key==='ArrowDown')r=(r+1)%9;if(e.key==='ArrowLeft')c=(c+8)%9;if(e.key==='ArrowRight')c=(c+1)%9;selected=r*9+c;render();}});
// ---- Snímky (snapshots) ----
let snapshots=[];
try{snapshots=JSON.parse(localStorage.getItem('sudokuSnaps')||'[]');}catch(e){snapshots=[];}
function persistSnaps(){try{localStorage.setItem('sudokuSnaps',JSON.stringify(snapshots));}catch(e){}}
function saveSnapshot(){
  const d=new Date();
  const filled=puzzle.flat().filter(v=>v!==0).length;
  snapshots.unshift({
    name:d.toLocaleDateString('cs-CZ')+' '+d.toLocaleTimeString('cs-CZ'),
    seconds,filled,
    puzzle:puzzle.map(r=>[...r]),
    given:given.map(r=>[...r]),
    solution:solution.map(r=>[...r]),
    notes:notes.map(s=>[...s])
  });
  persistSnaps();renderSnaps();
  $('msg').textContent='📸 Snímek uložen';setTimeout(()=>{if($('msg').textContent==='📸 Snímek uložen')$('msg').textContent='';},1500);
}
function restoreSnapshot(idx){
  const s=snapshots[idx];if(!s)return;
  puzzle=s.puzzle.map(r=>[...r]);
  given=s.given.map(r=>[...r]);
  solution=s.solution.map(r=>[...r]);
  notes=s.notes.map(a=>new Set(a));
  seconds=s.seconds;selected=-1;history=[];startTimer();
  $('msg').textContent='';render();
}
function deleteSnapshot(idx){snapshots.splice(idx,1);persistSnaps();renderSnaps();}
function renderSnaps(){
  const list=$('snapList');
  if(!snapshots.length){list.innerHTML='<div class="empty">Žádné uložené snímky.</div>';return;}
  list.innerHTML='';
  snapshots.forEach((s,idx)=>{
    const row=document.createElement('div');row.className='snap';
    const t=Math.floor(s.seconds/60)+':'+String(s.seconds%60).padStart(2,'0');
    row.innerHTML='<div class="info">'+s.name+'<small>vyplněno '+s.filled+'/81 · ⏱️ '+t+'</small></div>'+
      '<button class="load">Načíst</button><button class="del">Smazat</button>';
    row.querySelector('.load').onclick=()=>restoreSnapshot(idx);
    row.querySelector('.del').onclick=()=>deleteSnapshot(idx);
    list.appendChild(row);
  });
}
$('snapBtn').onclick=saveSnapshot;
renderSnaps();

// Nová hra spuštěná uživatelem smaže uložené snímky; prvotní načtení stránky je zachová.
$('newBtn').onclick=()=>newGame(true);$('level').onchange=()=>newGame(true);
newGame(false);
</script>
</body>
</html>
