<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Literární směry a autoři</title>
  <link rel="stylesheet" href="../common.css">
  <script>
    if (localStorage.getItem('webapp_theme') === 'light') document.documentElement.dataset.theme = 'light';
  </script>
  <style>
    body { background-color: var(--bg-deep); padding: 24px clamp(14px, 3vw, 40px); min-height: 100vh; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .podtitul { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 16px; }
    .rezimy { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .rezimy button {
      background: var(--bg-control); border: 1px solid var(--border-strong); color: var(--text-muted);
      border-radius: 6px; padding: 7px 13px; font-size: 0.84rem; cursor: pointer;
    }
    .rezimy button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .smer { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; margin-bottom: 12px; max-width: 860px; }
    .smer h2 { font-size: 1.05rem; display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .smer h2 .obdobi { font-size: 0.78rem; color: var(--accent); font-weight: 600; }
    .smer .znaky { color: var(--text-muted); font-size: 0.88rem; margin: 6px 0 10px; }
    .smer table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .smer td { padding: 4px 8px 4px 0; border-bottom: 1px solid var(--border); vertical-align: top; }
    .smer td:first-child { font-weight: 600; white-space: nowrap; }
    .smer td:last-child { color: var(--text-muted); }
    .karta { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; max-width: 640px; }
    .zadani { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-faint); margin-bottom: 8px; }
    .dotaz { font-size: 1.4rem; font-weight: 700; margin-bottom: 18px; min-height: 2.2rem; }
    .moznosti { display: grid; gap: 8px; }
    .moznosti button {
      background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 12px 14px; font-size: 1rem; cursor: pointer; text-align: left;
    }
    .moznosti button:hover { border-color: var(--accent); }
    .moznosti button.ok { background: rgba(76, 175, 125, 0.2); border-color: var(--ok); }
    .moznosti button.spatne { background: rgba(224, 93, 93, 0.18); border-color: var(--danger); }
    .moznosti button:disabled { cursor: default; }
    .stavovy { display: flex; align-items: center; gap: 16px; margin-top: 16px; font-size: 0.9rem; }
    .serie { color: var(--warn); }
    .pomer { color: var(--text-muted); margin-left: auto; font-variant-numeric: tabular-nums; }
    .dalsi {
      background: var(--accent); border: 1px solid var(--accent); color: #fff; border-radius: 6px;
      padding: 8px 16px; font-size: 0.88rem; cursor: pointer; visibility: hidden;
    }
    .dalsi:hover { background: var(--accent-hover); }
  </style>
</head>
<body>
  <h1>📚 Literární směry a autoři</h1>
  <p class="podtitul">Přehled hlavních směrů, autorů a děl + kvíz (SŠ, maturitní minimum).</p>

  <div class="rezimy" id="rezimy">
    <button data-rezim="prehled" class="active">Přehled</button>
    <button data-rezim="autor">Kvíz: autor → směr</button>
    <button data-rezim="dilo">Kvíz: dílo → autor</button>
  </div>

  <div id="prehled"></div>

  <div class="karta" id="kviz" style="display:none">
    <div class="zadani" id="zadani"></div>
    <div class="dotaz" id="dotaz"></div>
    <div class="moznosti" id="moznosti"></div>
    <div class="stavovy">
      <button class="dalsi" id="btnDalsi">Další →</button>
      <span class="serie" id="serie"></span>
      <span class="pomer" id="pomer"></span>
    </div>
  </div>

<script>
const SMERY = [
  { nazev: 'Antika', obdobi: '8. st. př. n. l. – 5. st. n. l.',
    znaky: 'Základ evropské literatury; epika, lyrika i drama, důraz na harmonii a míru.',
    autori: [['Homér', 'Ilias, Odyssea'], ['Sofoklés', 'Král Oidipús, Antigona'], ['Ovidius', 'Proměny'], ['Vergilius', 'Aeneis']] },
  { nazev: 'Středověk', obdobi: '5.–15. století',
    znaky: 'Náboženská i světská tvorba, legendy, kroniky, rytířská epika; anonymita autorů.',
    autori: [['(anonym)', 'Legenda o sv. Václavu'], ['Kosmas', 'Kronika česká'], ['(anonym)', 'Dalimilova kronika'], ['Jan Hus', 'O církvi, listy z Kostnice']] },
  { nazev: 'Renesance a humanismus', obdobi: '14.–16. století',
    znaky: 'Návrat k antice, zájem o člověka a pozemský život, rozvoj národních jazyků.',
    autori: [['Dante Alighieri', 'Božská komedie'], ['Giovanni Boccaccio', 'Dekameron'], ['William Shakespeare', 'Hamlet, Romeo a Julie'], ['Miguel de Cervantes', 'Důmyslný rytíř Don Quijote']] },
  { nazev: 'Baroko', obdobi: '17.–18. století',
    znaky: 'Zbožnost, kontrasty, pomíjivost světa; v Čechách exulantská a lidová tvorba.',
    autori: [['Jan Amos Komenský', 'Labyrint světa a ráj srdce'], ['Bedřich Bridel', 'Co Bůh? Člověk?'], ['Hans Ch. von Grimmelshausen', 'Simplicius Simplicissimus']] },
  { nazev: 'Klasicismus a osvícenství', obdobi: '17.–18. století',
    znaky: 'Řád, rozum, pevná pravidla; vysoké a nízké žánry; víra v pokrok a vzdělání.',
    autori: [['Molière', 'Lakomec, Tartuffe'], ['Voltaire', 'Candide'], ['Daniel Defoe', 'Robinson Crusoe']] },
  { nazev: 'Národní obrození', obdobi: 'konec 18. – pol. 19. století',
    znaky: 'Obnova českého jazyka a kultury, sběr lidové slovesnosti, vlastenectví.',
    autori: [['Josef Dobrovský', 'Zevrubná mluvnice jazyka českého'], ['Josef Jungmann', 'Slovník česko-německý'], ['František Palacký', 'Dějiny národu českého'], ['Karel Jaromír Erben', 'Kytice'], ['Božena Němcová', 'Babička']] },
  { nazev: 'Romantismus', obdobi: '1. pol. 19. století',
    znaky: 'Cit, individualita, rozpor snu a skutečnosti, výjimečný hrdina, příroda.',
    autori: [['Karel Hynek Mácha', 'Máj'], ['Victor Hugo', 'Chrám Matky Boží v Paříži, Bídníci'], ['Alexandr S. Puškin', 'Evžen Oněgin'], ['E. A. Poe', 'Havran']] },
  { nazev: 'Realismus a naturalismus', obdobi: '2. pol. 19. století',
    znaky: 'Pravdivé zobrazení skutečnosti, typizace, kritika společnosti.',
    autori: [['Jan Neruda', 'Povídky malostranské'], ['Alois Jirásek', 'Staré pověsti české, F. L. Věk'], ['Honoré de Balzac', 'Otec Goriot'], ['Lev N. Tolstoj', 'Vojna a mír'], ['Fjodor M. Dostojevskij', 'Zločin a trest'], ['Émile Zola', 'Zabiják']] },
  { nazev: 'Moderna přelomu století', obdobi: 'konec 19. – zač. 20. století',
    znaky: 'Symbolismus, impresionismus, dekadence; důraz na dojem, symbol, hudebnost verše.',
    autori: [['Charles Baudelaire', 'Květy zla'], ['Paul Verlaine', 'Saturnské básně'], ['Antonín Sova', 'Květy intimních nálad'], ['Otokar Březina', 'Tajemné dálky'], ['Petr Bezruč', 'Slezské písně']] },
  { nazev: 'Avantgarda', obdobi: '1. pol. 20. století',
    znaky: 'Experiment, poetismus a surrealismus; hravost, asociace, obraznost.',
    autori: [['Vítězslav Nezval', 'Edison, Sbohem a šáteček'], ['Jaroslav Seifert', 'Na vlnách TSF; nositel Nobelovy ceny'], ['Guillaume Apollinaire', 'Pásmo (Alkoholy)'], ['André Breton', 'Manifest surrealismu']] },
  { nazev: 'Meziválečná próza', obdobi: '20.–30. léta 20. století',
    znaky: 'Demokratický proud, legionářská a společenská próza, expresionismus, pražská německá literatura.',
    autori: [['Karel Čapek', 'R.U.R., Válka s mloky, Bílá nemoc'], ['Jaroslav Hašek', 'Osudy dobrého vojáka Švejka'], ['Franz Kafka', 'Proměna, Proces'], ['Ivan Olbracht', 'Nikola Šuhaj loupežník'], ['E. M. Remarque', 'Na západní frontě klid'], ['Ernest Hemingway', 'Stařec a moře, Sbohem armádo']] },
  { nazev: 'Literatura 2. pol. 20. století', obdobi: 'po roce 1945',
    znaky: 'Reakce na válku a totalitu; oficiální, exilová a samizdatová větev; absurdní drama.',
    autori: [['Bohumil Hrabal', 'Ostře sledované vlaky, Obsluhoval jsem anglického krále'], ['Milan Kundera', 'Žert, Nesnesitelná lehkost bytí'], ['Josef Škvorecký', 'Zbabělci'], ['Václav Havel', 'Zahradní slavnost, Audience'], ['Arnošt Lustig', 'Modlitba pro Kateřinu Horovitzovou'], ['George Orwell', '1984, Farma zvířat'], ['J. D. Salinger', 'Kdo chytá v žitě']] },
];

const $ = id => document.getElementById(id);

/* ---------- přehled ---------- */
$('prehled').innerHTML = SMERY.map(s => `
  <div class="smer">
    <h2>${s.nazev} <span class="obdobi">${s.obdobi}</span></h2>
    <div class="znaky">${s.znaky}</div>
    <table>${s.autori.map(([a, d]) => `<tr><td>${a}</td><td>${d}</td></tr>`).join('')}</table>
  </div>`).join('');

/* ---------- kvíz ---------- */
let rezim = 'prehled', uloha = null, spravne = 0, celkem = 0, serie = 0;

// dvojice pro kvízy
const AUTOR_SMER = SMERY.flatMap(s => s.autori.filter(([a]) => a !== '(anonym)').map(([a]) => [a, s.nazev]));
const DILO_AUTOR = SMERY.flatMap(s => s.autori.filter(([a]) => a !== '(anonym)').flatMap(([a, d]) =>
  d.split(/[,;]/).slice(0, 2).map(x => x.trim()).filter(x => x && !x.startsWith('nositel')).map(x => [x, a])));

function zamichej(p) { p = [...p]; for (let i = p.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [p[i], p[j]] = [p[j], p[i]]; } return p; }

function dalsi() {
  const zdroj = rezim === 'autor' ? AUTOR_SMER : DILO_AUTOR;
  uloha = zdroj[Math.floor(Math.random() * zdroj.length)];
  $('zadani').textContent = rezim === 'autor' ? 'Do kterého směru / období patří autor?' : 'Kdo je autorem díla?';
  $('dotaz').textContent = uloha[0];
  const spatneMoznosti = zamichej([...new Set(zdroj.map(z => z[1]).filter(x => x !== uloha[1]))]).slice(0, 3);
  const moznosti = zamichej([uloha[1], ...spatneMoznosti]);
  $('moznosti').innerHTML = '';
  moznosti.forEach(m => {
    const b = document.createElement('button');
    b.textContent = m;
    b.onclick = () => {
      celkem++;
      if (m === uloha[1]) { spravne++; serie++; b.classList.add('ok'); }
      else { serie = 0; b.classList.add('spatne'); [...$('moznosti').children].find(x => x.textContent === uloha[1]).classList.add('ok'); }
      [...$('moznosti').children].forEach(x => x.disabled = true);
      $('serie').textContent = serie >= 3 ? '🔥 série ' + serie : '';
      $('pomer').textContent = spravne + ' / ' + celkem;
      $('btnDalsi').style.visibility = 'visible';
    };
    $('moznosti').appendChild(b);
  });
  $('btnDalsi').style.visibility = 'hidden';
}
$('btnDalsi').onclick = dalsi;

document.querySelectorAll('#rezimy button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#rezimy button').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); rezim = b.dataset.rezim;
  $('prehled').style.display = rezim === 'prehled' ? '' : 'none';
  $('kviz').style.display = rezim === 'prehled' ? 'none' : '';
  if (rezim !== 'prehled') dalsi();
});
</script>
</body>
</html>
