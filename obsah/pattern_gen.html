<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔳 Generátor vzorů</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:980px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.layout{display:grid;grid-template-columns:1fr 300px;gap:20px}
@media(max-width:680px){.layout{grid-template-columns:1fr}}
.preview{border-radius:12px;min-height:420px;border:1px solid #404040}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
label{display:block;font-size:.78rem;color:#888;margin:10px 0 4px}
select,input[type=range]{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:8px}
input[type=color]{width:100%;height:38px;border:none;border-radius:6px;background:none;cursor:pointer;margin-bottom:6px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.82rem;width:100%;margin-top:8px}
.btn-sec{background:#404040}
.code{background:#1e1e1e;border:1px solid #404040;border-radius:8px;padding:12px;margin-top:14px;font-family:monospace;font-size:.72rem;white-space:pre-wrap;word-break:break-all;max-height:120px;overflow:auto;color:#bbb}
</style>
</head>
<body>
<div class="container">
  <h1>🔳 Generátor opakujících se vzorů</h1>
  <div class="layout">
    <div>
      <div class="preview" id="preview"></div>
      <div class="code" id="code"></div>
    </div>
    <div class="card">
      <h2>Nastavení</h2>
      <label>Vzor</label>
      <select id="type"><option value="dots">Puntíky</option><option value="grid">Mřížka</option><option value="diag">Šikmé pruhy</option><option value="checker">Šachovnice</option><option value="triangles">Trojúhelníky</option><option value="cross">Křížky</option></select>
      <label>Barva pozadí</label><input type="color" id="bg" value="#1e2530">
      <label>Barva vzoru</label><input type="color" id="fg" value="#6aa6fd">
      <label>Velikost <span id="sizeVal">40</span>px</label><input type="range" id="size" min="8" max="120" value="40">
      <button class="btn" id="randomBtn">🎲 Náhodný</button>
      <button class="btn btn-sec" id="copyBtn">📋 Kopírovat CSS</button>
      <button class="btn btn-sec" id="dlBtn">💾 Stáhnout SVG</button>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function svgPattern(){
  const s=+$('size').value,bg=$('bg').value,fg=$('fg').value,t=$('type').value;
  let shapes='';
  if(t==='dots')shapes=`<circle cx="${s/2}" cy="${s/2}" r="${s/6}" fill="${fg}"/>`;
  else if(t==='grid')shapes=`<path d="M ${s} 0 L 0 0 0 ${s}" fill="none" stroke="${fg}" stroke-width="${Math.max(1,s/30)}"/>`;
  else if(t==='diag')shapes=`<path d="M0,${s} l${s},-${s} M-${s*0.25},${s*0.25} l${s*0.5},-${s*0.5} M${s*0.75},${s*1.25} l${s*0.5},-${s*0.5}" stroke="${fg}" stroke-width="${s/6}"/>`;
  else if(t==='checker')shapes=`<rect width="${s/2}" height="${s/2}" fill="${fg}"/><rect x="${s/2}" y="${s/2}" width="${s/2}" height="${s/2}" fill="${fg}"/>`;
  else if(t==='triangles')shapes=`<polygon points="${s/2},${s*0.15} ${s*0.85},${s*0.8} ${s*0.15},${s*0.8}" fill="${fg}"/>`;
  else if(t==='cross')shapes=`<path d="M${s/2},${s*0.25} V${s*0.75} M${s*0.25},${s/2} H${s*0.75}" stroke="${fg}" stroke-width="${s/8}"/>`;
  return {tile:`<rect width="${s}" height="${s}" fill="${bg}"/>${shapes}`,size:s,bg};
}
function fullSvg(){
  const{tile,size,bg}=svgPattern();
  return `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%"><defs><pattern id="p" width="${size}" height="${size}" patternUnits="userSpaceOnUse">${tile}</pattern></defs><rect width="100%" height="100%" fill="url(#p)"/></svg>`;
}
function update(){
  $('sizeVal').textContent=$('size').value;
  const svg=fullSvg();
  $('preview').style.background=`url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
  const{tile,size}=svgPattern();
  const tileSvg=`<svg xmlns='http://www.w3.org/2000/svg' width='${size}' height='${size}'>${tile}</svg>`;
  $('code').textContent=`background: url("data:image/svg+xml,${encodeURIComponent(tileSvg)}");`;
  $('preview').dataset.svg=fullSvg();
}
['type','bg','fg','size'].forEach(id=>$(id).oninput=update);
$('type').onchange=update;
$('randomBtn').onclick=()=>{const types=['dots','grid','diag','checker','triangles','cross'];$('type').value=types[Math.floor(Math.random()*types.length)];
  $('bg').value='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');$('fg').value='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');$('size').value=20+Math.floor(Math.random()*80);update();};
$('copyBtn').onclick=()=>{navigator.clipboard.writeText($('code').textContent);$('copyBtn').textContent='✅ Zkopírováno';setTimeout(()=>$('copyBtn').textContent='📋 Kopírovat CSS',1200);};
$('dlBtn').onclick=()=>{const{tile,size}=svgPattern();const tileSvg=`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">${tile}</svg>`;const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([tileSvg],{type:'image/svg+xml'}));a.download='vzor.svg';a.click();};
update();
</script>
</body>
</html>
