<style>
:root {
  --primary: #6aa6fd; --accent: #a78bfa;
  --bg-dark: #05070d; --panel: rgba(20,24,34,0.9); --border: rgba(255,255,255,0.1);
  --text: #e6ebf5; --muted: #8a93a6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: var(--bg-dark); color: var(--text); }
#globeViz { position: fixed; inset: 0; }

.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 10;
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 14px 20px; gap: 12px; flex-wrap: wrap;
  background: linear-gradient(180deg, rgba(5,7,13,0.85), rgba(5,7,13,0)); pointer-events: none;
}
.topbar .title { pointer-events: auto; }
.topbar h1 {
  font-size: 1.25rem; font-weight: 700;
  background: linear-gradient(45deg, #6aa6fd, #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.topbar .subtitle { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
.toolbar { display: flex; gap: 8px; pointer-events: auto; flex-wrap: wrap; justify-content: flex-end; }
.toolbar button, .toolbar a {
  background: var(--panel); color: var(--text); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; font-size: 0.82rem; backdrop-filter: blur(6px);
  white-space: nowrap; cursor: pointer; text-decoration: none; display: inline-block;
  transition: border-color .15s;
}
.toolbar button:hover, .toolbar a:hover { border-color: var(--primary); }
.toolbar button.on { border-color: var(--primary); color: var(--primary); }

/* Výběr tělesa */
.bodies {
  position: fixed; left: 0; right: 0; bottom: 46px; z-index: 10;
  display: flex; justify-content: center; gap: 6px; padding: 0 12px; flex-wrap: wrap;
  pointer-events: none;
}
.bodies button {
  pointer-events: auto; background: var(--panel); color: var(--text);
  border: 1px solid var(--border); border-radius: 20px; padding: 7px 13px;
  font-size: 0.82rem; cursor: pointer; backdrop-filter: blur(6px);
  transition: border-color .15s, color .15s;
}
.bodies button:hover { border-color: var(--primary); }
.bodies button.aktivni { border-color: var(--primary); color: var(--primary); background: rgba(106,166,253,0.12); }

/* Naučná karta */
.info {
  position: fixed; top: 92px; right: 20px; z-index: 10; width: 320px;
  max-height: calc(100vh - 200px); overflow-y: auto;
  background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
  padding: 16px 18px; backdrop-filter: blur(10px); box-shadow: 0 12px 40px rgba(0,0,0,0.5); display: none;
}
.info.zobraz { display: block; }
.info::-webkit-scrollbar { width: 6px; }
.info::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.info .zavrit { position: absolute; top: 10px; right: 12px; cursor: pointer; color: var(--muted); font-size: 1.1rem; line-height: 1; border: none; background: none; }
.info .zavrit:hover { color: var(--text); }
.info h2 { font-size: 1.2rem; margin-bottom: 2px; padding-right: 20px; }
.info .lat { font-size: 0.75rem; color: var(--muted); font-style: italic; }
.info .typ { display: inline-block; font-size: 0.68rem; background: rgba(255,255,255,0.07); color: #9ab; border-radius: 10px; padding: 2px 9px; margin: 6px 0 10px; }
.info .radek { display: flex; justify-content: space-between; gap: 10px; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.07); font-size: 0.8rem; }
.info .radek span { color: var(--muted); }
.info .radek b { color: var(--primary); text-align: right; }
.info p { font-size: 0.8rem; color: #bbb; line-height: 1.55; margin-top: 10px; }
.info ul { margin: 8px 0 0 0; list-style: none; }
.info li { font-size: 0.78rem; color: #aaa; line-height: 1.5; padding: 4px 0 4px 22px; position: relative; }
.info li::before { content: '💡'; position: absolute; left: 0; font-size: 0.72rem; }

.credit {
  position: fixed; bottom: 12px; left: 0; right: 0; z-index: 10; text-align: center;
  font-size: 0.68rem; color: var(--muted); pointer-events: none;
}
.credit a { color: var(--muted); pointer-events: auto; }

/* Srovnání velikostí */
#srovnani { position: fixed; inset: 0; display: none; cursor: grab; }
#srovnani.tahani { cursor: grabbing; }
#srovnani canvas { display: block; }
.sr-popisek {
  position: absolute; transform: translate(-50%, 0); text-align: center;
  font-size: 0.7rem; color: #cdd6ea; pointer-events: none; white-space: nowrap;
  text-shadow: 0 1px 3px rgba(0,0,0,.9);
}
.sr-popisek small { color: var(--muted); font-size: 0.62rem; display: block; }
.sr-hint {
  position: fixed; bottom: 34px; left: 0; right: 0; z-index: 11; text-align: center;
  font-size: 0.74rem; color: var(--muted); pointer-events: none;
}

/* Načítání: celoplošný loader při startu, malá pilulka při přepnutí tělesa */
.loader {
  position: fixed; inset: 0; z-index: 20; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 14px; background: var(--bg-dark); transition: opacity .5s;
}
.loader.skryt { opacity: 0; pointer-events: none; }
.spinner { width: 42px; height: 42px; border: 3px solid rgba(255,255,255,0.15); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.loader span { font-size: 0.85rem; color: var(--muted); }
.miniloader {
  position: fixed; top: 72px; left: 50%; transform: translateX(-50%); z-index: 15;
  display: none; align-items: center; gap: 9px;
  background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
  padding: 7px 15px; font-size: 0.78rem; color: var(--muted); backdrop-filter: blur(8px);
}
.miniloader.zobraz { display: flex; }
.miniloader .spinner { width: 15px; height: 15px; border-width: 2px; }

@media (max-width: 640px) {
  .info { width: calc(100% - 40px); top: auto; bottom: 96px; max-height: 45vh; }
  .bodies { bottom: 40px; }
  .topbar .subtitle { display: none; }
}
</style>
</head>

<script>
/* ================= NAUČNÁ DATA (shodná se Sluneční soustavou) ================= */
/* „sklon" = skutečný sklon rotační osy tělesa ve stupních (Venuše 177° = otáčí se pozpátku,
   Uran 98° = leží „na boku"). Planeta i případné prstence se naklánějí společně. */
const TELESA = {
 slunce: {nazev:'Slunce',lat:'Sol',emoji:'☀️',tex:'textures/2k_sun.jpg',sklon:7.3,atm:'#ffb340',atmAlt:0.3,barva:'#ffd54f',typ:'Hvězda — žlutý trpaslík (třída G2V)',
  data:{'Průměr':'1 392 700 km (109× Země)','Hmotnost':'333 000× Země','Povrchová teplota':'≈ 5 500 °C','Teplota jádra':'≈ 15 000 000 °C','Stáří':'≈ 4,6 miliardy let','Složení':'73 % vodík, 25 % helium'},
  popis:'Slunce je obyčejná hvězda, jakých jsou v naší Galaxii stovky miliard — pro nás je ale zdrojem prakticky veškeré energie. V jádře probíhá termojaderná fúze: vodík se slučuje na helium a uvolněná energie putuje k povrchu statisíce let, než se vyzáří do prostoru jako světlo a teplo.',
  fakta:['Obsahuje 99,86 % veškeré hmotnosti sluneční soustavy.','Každou sekundu přemění asi 4 miliony tun hmoty na čistou energii.','Světlo ze Slunce letí k Zemi 8 minut a 19 sekund.','Za dalších zhruba 5 miliard let se nafoukne v červeného obra a pohltí Merkur i Venuši.']},
 merkur: {nazev:'Merkur',lat:'Mercurius',emoji:'🪨',tex:'textures/2k_mercury.jpg',sklon:0,atm:null,barva:'#9c9c9c',typ:'Kamenná planeta',
  data:{'Průměr':'4 879 km','Vzdálenost od Slunce':'57,9 mil. km (0,39 AU)','Oběh kolem Slunce':'88 dní','Délka dne':'59 pozemských dní','Gravitace':'0,38× Země','Prům. teplota':'+167 °C (den +430, noc −180)','Atmosféra':'prakticky žádná','Měsíce':'0'},
  popis:'Nejmenší a Slunci nejbližší planeta. Povrch posetý krátery připomíná Měsíc — bez atmosféry ho nic nechrání před dopady ani nevyrovnává teplotu. Přestože je Slunci nejblíž, není nejteplejší planetou: bez atmosféry teplo v noci okamžitě uniká.',
  fakta:['Rozdíl teplot mezi dnem a nocí (přes 600 °C) je největší v celé soustavě.','Rok na Merkuru (88 dní) je kratší než jeho den — od východu do východu Slunce tam uplyne 176 pozemských dní.','V trvale zastíněných kráterech u pólů se skrývá vodní led.']},
 venuse: {nazev:'Venuše',lat:'Venus',emoji:'🌕',tex:'textures/2k_venus_atmosphere.jpg',sklon:177,atm:'#e6c87a',atmAlt:0.18,barva:'#e6c87a',typ:'Kamenná planeta',
  data:{'Průměr':'12 104 km','Vzdálenost od Slunce':'108,2 mil. km (0,72 AU)','Oběh kolem Slunce':'225 dní','Délka dne':'243 pozemských dní','Gravitace':'0,90× Země','Prům. teplota':'+465 °C','Atmosféra':'96 % CO₂, hustá, mraky z kyseliny sírové','Měsíce':'0'},
  popis:'Velikostí je Venuše téměř dvojče Země, podmínkami je to ale peklo: extrémní skleníkový efekt husté atmosféry z oxidu uhličitého ji rozpálil na teplotu, při které taje olovo, a tlak na povrchu odpovídá kilometrovému ponoru do oceánu. Na glóbusu vidíš vrchní vrstvu mraků — povrch není okem vidět nikdy.',
  fakta:['Nejžhavější planeta soustavy — teplejší než Merkur, přestože je od Slunce dál.','Otáčí se opačným směrem než ostatní planety: Slunce tam vychází na západě.','Den (243 dní) je delší než rok (225 dní).','Po Měsíci je nejjasnějším objektem noční oblohy — proto se jí říká Večernice či Jitřenka.']},
 zeme: {nazev:'Země',lat:'Terra',emoji:'🌍',tex:'textures/8k_earth_daymap.jpg',sklon:23.4,atm:'#6aa6fd',atmAlt:0.18,barva:'#4a90d9',typ:'Kamenná planeta',
  data:{'Průměr':'12 756 km','Vzdálenost od Slunce':'149,6 mil. km (1 AU)','Oběh kolem Slunce':'365,25 dne','Délka dne':'24 hodin','Gravitace':'1 g (9,81 m/s²)','Prům. teplota':'+15 °C','Atmosféra':'78 % dusík, 21 % kyslík','Měsíce':'1 (Měsíc)'},
  popis:'Náš domov — jediné známé místo ve vesmíru, kde existuje život. Za obyvatelnost vděčí kombinaci šťastných okolností: správné vzdálenosti od Slunce (kapalná voda), atmosféře s kyslíkem, magnetickému poli, které odklání sluneční vítr, a velkému Měsíci, jenž stabilizuje sklon zemské osy.',
  fakta:['71 % povrchu pokrývá voda — z vesmíru je Země „modrá planeta".','Vzdálenost Země–Slunce (149,6 mil. km) slouží jako základní jednotka: 1 astronomická jednotka (AU).','Zemská osa je skloněná o 23,5° — proto se střídají roční období.','Je to nejhustší planeta sluneční soustavy.']},
 mesic: {nazev:'Měsíc',lat:'Luna',emoji:'🌗',tex:'textures/8k_moon.jpg',sklon:6.7,atm:null,barva:'#c9c5b8',typ:'Přirozená družice Země',
  data:{'Průměr':'3 474 km (0,27× Země)','Vzdálenost od Země':'384 400 km','Oběh kolem Země':'27,3 dne','Den (od úplňku k úplňku)':'29,5 dne','Gravitace':'0,17× Země','Teplota':'den +120 °C, noc −170 °C','Atmosféra':'prakticky žádná','Stáří':'≈ 4,5 miliardy let'},
  popis:'Jediné mimozemské těleso, na kterém stanul člověk. Vznikl nejspíš ze srážky mladé Země s tělesem velikosti Marsu — vyvržený materiál se spojil v Měsíc. Tmavé skvrny („moře") jsou ztuhlé lávové pláně, světlé oblasti jsou starší pohoří pokrytá krátery.',
  fakta:['K Zemi je natočen stále stejnou stranou — odvrácenou stranu poprvé vyfotila sonda Luna 3 (1959).','Způsobuje příliv a odliv a stabilizuje sklon zemské osy.','Každý rok se od Země vzdálí asi o 3,8 cm.','V letech 1969–1972 po něm chodilo 12 astronautů programu Apollo.']},
 mars: {nazev:'Mars',lat:'Mars',emoji:'🔴',tex:'textures/8k_mars.jpg',sklon:25.2,atm:'#d1603d',atmAlt:0.08,barva:'#d1603d',typ:'Kamenná planeta',
  data:{'Průměr':'6 792 km','Vzdálenost od Slunce':'227,9 mil. km (1,52 AU)','Oběh kolem Slunce':'687 dní','Délka dne':'24,6 hodiny','Gravitace':'0,38× Země','Prům. teplota':'−63 °C','Atmosféra':'95 % CO₂, velmi řídká','Měsíce':'2 (Phobos, Deimos)'},
  popis:'Rudá planeta je nejprozkoumanějším tělesem po Zemi — brázdí ji vozítka a krouží kolem ní flotila sond. Kdysi po jejím povrchu tekla voda: dodnes jsou vidět vyschlá říční koryta a jezerní pánve. Dnes je Mars studená poušť, ale led se skrývá pod povrchem i v polárních čepičkách.',
  fakta:['Rudou barvu způsobuje oxid železitý — planeta je doslova rezavá.','Olympus Mons je nejvyšší sopka soustavy: 22 km, dvaapůlkrát vyšší než Everest.','Kaňon Valles Marineris by se táhl přes celé USA.','Marsovský den (24,6 h) je téměř stejně dlouhý jako pozemský.']},
 jupiter: {nazev:'Jupiter',lat:'Iuppiter',emoji:'🟠',tex:'textures/2k_jupiter.jpg',sklon:3.1,atm:'#d8b48a',atmAlt:0.15,barva:'#d8b48a',typ:'Plynný obr',
  data:{'Průměr':'142 984 km','Vzdálenost od Slunce':'778,5 mil. km (5,2 AU)','Oběh kolem Slunce':'11,9 let','Délka dne':'9,9 hodiny','Gravitace':'2,53× Země','Prům. teplota':'−110 °C','Atmosféra':'90 % vodík, 10 % helium','Měsíce':'95'},
  popis:'Král planet — je hmotnější než všechny ostatní planety dohromady. Nemá pevný povrch: pásy mraků přecházejí do stále hustšího vodíku, který je v hloubce stlačen do exotického kovového stavu. Jupiterova obrovská gravitace funguje jako „vysavač" soustavy a chrání vnitřní planety před částí komet a asteroidů.',
  fakta:['Vešlo by se do něj přes 1 300 Zemí.','Velká rudá skvrna je bouře větší než celá Země, která zuří už nejméně 350 let.','Měsíc Europa skrývá pod ledovou kůrou oceán tekuté vody — horký kandidát na mimozemský život.','Otočí se kolem osy za pouhých 10 hodin — nejrychleji ze všech planet.']},
 io: {nazev:'Io',lat:'Io',emoji:'🌋',tex:'textures/2k_io.jpg',sklon:0,atm:null,barva:'#d8c96a',typ:'Měsíc Jupiteru (Galileův)',
  data:{'Průměr':'3 643 km (1,05× Měsíc)','Vzdálenost od Jupiteru':'421 700 km','Oběh kolem Jupiteru':'1,77 dne','Gravitace':'0,18× Země','Prům. teplota':'−130 °C (láva až +1 600 °C)','Atmosféra':'stopová (oxid siřičitý)','Objev':'Galileo Galilei, 1610'},
  popis:'Vulkanicky nejaktivnější těleso sluneční soustavy — přes 400 činných sopek. Jupiterova gravitace spolu s tahem sousedních měsíců Io neustále hněte a slapové tření rozžhavuje jeho nitro. Žluté, oranžové a bílé odstíny povrchu jsou různé podoby síry a jejích sloučenin.',
  fakta:['Sopečné chocholy stoupají až 500 km nad povrch — do vesmíru.','Povrch se přetváří tak rychle, že na něm nejsou skoro žádné impaktní krátery.','Je to jeden ze čtyř měsíců, které Galileo spatřil roku 1610 prvním dalekohledem.','Slapové síly zvedají jeho pevný povrch až o 100 metrů — na Zemi zvedají oceán o metr.']},
 europa: {nazev:'Europa',lat:'Europa',emoji:'🧊',tex:'textures/1k_europa.jpg',sklon:0.1,atm:null,barva:'#cbbfae',typ:'Měsíc Jupiteru (Galileův)',
  data:{'Průměr':'3 122 km (0,9× Měsíc)','Vzdálenost od Jupiteru':'671 000 km','Oběh kolem Jupiteru':'3,55 dne','Gravitace':'0,13× Země','Prům. teplota':'−160 °C','Atmosféra':'stopová (kyslík)','Objev':'Galileo Galilei, 1610'},
  popis:'Ledový svět s tajemstvím: pod kůrou z vodního ledu se skrývá oceán slané kapalné vody hluboký 60–150 km — je v něm víc vody než ve všech pozemských oceánech dohromady. Slapové zahřívání ho drží tekutý, a proto je Europa jedním z nejnadějnějších míst pro hledání mimozemského života.',
  fakta:['Nejhladší povrch v celé soustavě — žádné hory, jen praskliny v ledu.','Tmavé čáry jsou pukliny, kterými občas prosakuje voda z oceánu.','Sonda Europa Clipper (start 2024) ji začne zkoumat detailně v roce 2030.','Oceán se dotýká kamenného dna — chemie potřebná pro život tam může probíhat.']},
 ganymed: {nazev:'Ganymed',lat:'Ganymedes',emoji:'🌑',tex:'textures/2k_ganymed.jpg',sklon:0.2,atm:null,barva:'#a8a094',typ:'Měsíc Jupiteru (Galileův)',
  data:{'Průměr':'5 268 km — největší měsíc soustavy','Vzdálenost od Jupiteru':'1 070 400 km','Oběh kolem Jupiteru':'7,15 dne','Gravitace':'0,15× Země','Prům. teplota':'−160 °C','Atmosféra':'stopová (kyslík)','Objev':'Galileo Galilei, 1610'},
  popis:'Největší měsíc sluneční soustavy — je dokonce větší než planeta Merkur (ale poloviční hmotnosti). Tmavé oblasti jsou prastaré a poseté krátery, světlé pruhy jsou mladší led rozlámaný dávnou tektonikou. I Ganymed nejspíš ukrývá pod povrchem slaný oceán.',
  fakta:['Jediný měsíc v soustavě s vlastním magnetickým polem.','Kdyby obíhal Slunce místo Jupiteru, počítal by se mezi planety.','Evropská sonda JUICE (start 2023) k němu doletí v roce 2031 a stane se jeho družicí.','Pod povrchem má zřejmě vrstvený „sendvič" ledu a oceánů.']},

/* ================= GLÓBUS ================= */
const world = Globe()
  (document.getElementById('globeViz'))
  .backgroundColor('#02030a')
  .showGraticules(false);

world.pointOfView({ lat: 15, lng: 0, altitude: 2.4 });

/* Rotace: neotáčíme kamerou (ta by kroužila kolem svislé osy), ale samotnou planetou
   kolem její skutečné, nakloněné osy. Hvězdné pozadí tak správně stojí.
   Kořenový objekt glóbu se v některých prohlížečích objeví ve scéně až later,
   proto ho hledáme opakovaně (v animační smyčce) a dvěma způsoby:
   1) podle metody getGlobeRadius (instance three-globe),
   2) podle interní značky __globeObjType === 'globe' (odtud nahoru ke kořeni).
   Dokud není nalezen, otáčí kamera; jakmile se najde, převezme rotaci planeta. */
const naklonGroup = new THREE.Group(); // nese prstence, naklání se spolu s planetou
naklonGroup.rotation.order = 'ZXY';    // nejdřív vlastní otáčení (Y), pak náklon osy (X, Z)
world.scene().add(naklonGroup);

let globeObj = null, aktSklon = 0, toceni = true;
let srovnani = null, srovnaniAktivni = false; // režim Srovnání velikostí (inicializace níže)
world.controls().autoRotate = true;    // provizorium, než se najde objekt glóbu
world.controls().autoRotateSpeed = 0.6;

function najdiGlobeObj() {
  if (globeObj) return globeObj;
  const sc = world.scene();
  globeObj = sc.children.find(o => typeof o.getGlobeRadius === 'function') || null;
  if (!globeObj) {
    let vnitrni = null;
    sc.traverse(o => { if (!vnitrni && o.__globeObjType === 'globe') vnitrni = o; });
    if (vnitrni) {
      let n = vnitrni;
      while (n.parent && n.parent !== sc) n = n.parent;
      globeObj = n;
    }
  }
  if (globeObj) {
    globeObj.rotation.order = 'ZXY';
    world.controls().autoRotate = false; // rotaci přebírá samotná planeta
    aplikujSklon();
  }
  return globeObj;
}

(function tocPlanetou() {
  if (najdiGlobeObj() && toceni) globeObj.rotation.y += 0.001;
  requestAnimationFrame(tocPlanetou);
})();

// náklon osy tělesa: v rovině obrazovky (Z, klasický „glóbusový" náklon)
// + částečně k divákovi (X) — u Saturnu tak jsou prstence vidět rozevřené
function aplikujSklon() {
  const a = THREE.MathUtils.degToRad(aktSklon || 0);
  [globeObj, naklonGroup].forEach(o => {
    if (o) { o.rotation.z = -a * 0.7; o.rotation.x = a * 0.55; }
  });
}
function nastavSklon(deg) { aktSklon = deg; aplikujSklon(); }

// Max. anizotropní filtrování = ostřejší textury při zoomu a pod úhlem.
// Hlídač změny textury zároveň schovává loadery: teprve když si globe.gl
// novou mapu opravdu vymění, je těleso vykreslené.
const maxAniso = world.renderer().capabilities.getMaxAnisotropy();
let lastMap = null;
setInterval(() => {
  const m = world.globeMaterial();
  if (m && m.map && m.map !== lastMap) {
    lastMap = m.map;
    m.map.anisotropy = maxAniso; m.map.needsUpdate = true;
    document.getElementById('loader').classList.add('skryt');
    document.getElementById('miniloader').classList.remove('zobraz');
  }
}, 200);

/* ================= Hvězdné pozadí =================
   Procedurální hvězdy (THREE.Points, velikost v pixelech) — ostré při libovolném zoomu.
   Tři vrstvy s různým jasem + jemné hvězdné odstíny. */
(function starfield() {
  world.camera().far = 20000; world.camera().updateProjectionMatrix();
  [ { n: 3000, size: 1.1, op: 0.55 },
    { n: 1200, size: 1.8, op: 0.8 },
    { n: 250,  size: 2.7, op: 1 } ].forEach(l => {
    const pos = new Float32Array(l.n * 3), col = new Float32Array(l.n * 3);
    for (let i = 0; i < l.n; i++) {
      const u = Math.random() * 2 - 1, ph = Math.random() * 2 * Math.PI;
      const r = 3000 + Math.random() * 3000, s = Math.sqrt(1 - u * u);
      pos.set([r * s * Math.cos(ph), r * u, r * s * Math.sin(ph)], i * 3);
      const t = Math.random();
      col.set(t < .6 ? [1, 1, 1] : t < .78 ? [.72, .82, 1] : t < .93 ? [1, .93, .78] : [1, .8, .65], i * 3);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    g.setAttribute('color', new THREE.BufferAttribute(col, 3));
    world.scene().add(new THREE.Points(g, new THREE.PointsMaterial({
      size: l.size, sizeAttenuation: false, vertexColors: true,
      transparent: true, opacity: l.op, depthWrite: false
    })));
  });
})();

/* ================= Saturnovy prstence =================
   RingGeometry má planární UV — přemapujeme je tak, aby osa X textury (pruh) běžela
   od vnitřního k vnějšímu okraji. MeshBasicMaterial: prstence nemá stínovat osvětlení. */
function prstencovaGeometrie(vnitrni, vnejsi) {
  const geo = new THREE.RingGeometry(vnitrni, vnejsi, 160);
  const pos = geo.attributes.position, uv = geo.attributes.uv, v = new THREE.Vector3();
  for (let i = 0; i < pos.count; i++) {
    v.fromBufferAttribute(pos, i);
    uv.setXY(i, (v.length() - vnitrni) / (vnejsi - vnitrni), 0.5);
  }
  return geo;
}

let ringsMesh = null;
new THREE.TextureLoader().load('textures/2k_saturn_ring_alpha.png', tex => {
  tex.anisotropy = maxAniso;
  const R = world.getGlobeRadius();
  // 1,24–2,27 × poloměr Saturnu = skutečný rozsah prstenců
  ringsMesh = new THREE.Mesh(prstencovaGeometrie(R * 1.24, R * 2.27), new THREE.MeshBasicMaterial({
    map: tex, side: THREE.DoubleSide, transparent: true, depthWrite: false
  }));
  // prstence leží přesně v rovině rovníku; náklon celé soustavy obstarává naklonGroup,
  // takže planeta i prstence jsou skloněné stejně (26,7°), jak je tomu doopravdy
  ringsMesh.rotation.x = Math.PI / 2;
  ringsMesh.visible = (aktualni === 'saturn');
  naklonGroup.add(ringsMesh);
});

/* ================= Přepínání těles ================= */
const infoEl = document.getElementById('info');
const weatherLink = document.getElementById('weatherLink');
let aktualni = null;
let infoZapnuto = true;

/* Posun glóbusu doleva, když je otevřená naučná karta (320 px + 20 px okraj vpravo):
   setViewOffset se shodnou plnou i výřezovou velikostí funguje jako čisté posunutí
   středu pohledu (o polovinu šířky karty), bez deformace a bez zásahu do aspectu —
   hvězdné pozadí tak zůstává přes celou obrazovku. */
function posunGlobus(vis) {
  const cam = world.camera(), w = window.innerWidth, h = window.innerHeight;
  if (vis && w > 640) cam.setViewOffset(w, h, 170, 0, w, h);
  else cam.clearViewOffset();
  cam.updateProjectionMatrix();
}

// viditelnost karty + posun glóbusu vždy společně
function nastavInfo(vis) {
  infoEl.classList.toggle('zobraz', vis);
  posunGlobus(vis);
}

function ukazInfo(t) {
  document.getElementById('infoObsah').innerHTML =
    `<h2 style="color:${t.barva}">${t.emoji} ${t.nazev}</h2><div class="lat">${t.lat}</div>` +
    `<div class="typ">${t.typ}</div>` +
    Object.entries(t.data).map(([k, v]) => `<div class="radek"><span>${k}</span><b>${v}</b></div>`).join('') +
    `<p>${t.popis}</p><ul>${t.fakta.map(f => `<li>${f}</li>`).join('')}</ul>`;
  nastavInfo(infoZapnuto);
}

let nacitaniToken = 0;
function zobraz(id) {
  const t = TELESA[id];
  if (!t || id === aktualni) return;
  aktualni = id;
  if (t.atm) world.showAtmosphere(true).atmosphereColor(t.atm).atmosphereAltitude(t.atmAlt);
  else world.showAtmosphere(false);
  if (ringsMesh) ringsMesh.visible = !!t.prstence;
  nastavSklon(t.sklon);
  // výchozí odstup kamery — Saturn potřebuje víc místa kvůli prstencům (2,27× poloměr)
  const pov = world.pointOfView();
  world.pointOfView({ lat: pov.lat, lng: pov.lng, altitude: t.alt || 2.4 }, 700);
  weatherLink.style.display = (id === 'zeme') ? '' : 'none';
  document.querySelectorAll('#bodies button').forEach(b => b.classList.toggle('aktivni', b.dataset.id === id));
  ukazInfo(t);
  document.title = `${t.emoji} Glóbus — ${t.nazev}`;
  // URL parametr, ať jde těleso sdílet odkazem / prolinkovat ze Sluneční soustavy
  history.replaceState(null, '', '?telo=' + id);

  // Texturu nejdřív předstáhneme (8K = jednotky MB), ať běží loading indikátor;
  // globe.gl ji pak vezme z cache prohlížeče. Loader zhasne hlídač změny mapy.
  const token = ++nacitaniToken;
  document.getElementById('miniloader').classList.add('zobraz');
  const img = new Image();
  img.onload = () => { if (token === nacitaniToken) world.globeImageUrl(t.tex); };
  img.onerror = () => {
    if (token !== nacitaniToken) return;
    document.getElementById('miniloader').classList.remove('zobraz');
    document.getElementById('loader').classList.add('skryt');
  };
  img.src = t.tex;
}

// Tlačítka výběru
const bodiesEl = document.getElementById('bodies');
Object.entries(TELESA).forEach(([id, t]) => {
  const b = document.createElement('button');
  b.dataset.id = id; b.textContent = `${t.emoji} ${t.nazev}`;
  b.onclick = () => zobraz(id);
  bodiesEl.appendChild(b);
});

/* ================= Ovládání ================= */
document.getElementById('rotateBtn').onclick = function () {
  toceni = !toceni;
  this.classList.toggle('on', toceni);
  if (!globeObj) world.controls().autoRotate = toceni; // záložní režim: točí kamera
};
document.getElementById('infoBtn').onclick = function () {
  infoZapnuto = !infoZapnuto;
  this.classList.toggle('on', infoZapnuto);
  nastavInfo(infoZapnuto);
};
document.getElementById('zavrit').onclick = () => {
  infoZapnuto = false;
  nastavInfo(false);
  document.getElementById('infoBtn').classList.remove('on');
};

function resize() {
  world.width(window.innerWidth).height(window.innerHeight);
  posunGlobus(infoEl.classList.contains('zobraz')); // world.width() přepíše aspect kamery
  if (srovnani) srovnani.resize();
}
window.addEventListener('resize', resize); resize();

/* ================= Srovnání velikostí =================
   Všechna tělesa vedle sebe ve skutečném poměru velikostí — vlastní THREE scéna.
   Slunce je tak obrovské, že je u levého okraje vidět jen jeho výřez. */
const SROVNANI = [
  { id: 'slunce', km: 696340 }, { id: 'merkur', km: 2440 }, { id: 'venuse', km: 6052 },
  { id: 'zeme', km: 6371 }, { id: 'mesic', km: 1737 }, { id: 'mars', km: 3390 },
  { id: 'jupiter', km: 69911 }, { id: 'io', km: 1822 }, { id: 'europa', km: 1561 },
  { id: 'ganymed', km: 2634 }, { id: 'saturn', km: 58232, prstence: true }, { id: 'titan', km: 2575 },
  { id: 'uran', km: 25362 }, { id: 'neptun', km: 24622 }, { id: 'pluto', km: 1188 }
];

function initSrovnani() {
  const cont = document.getElementById('srovnani');
  const ren = new THREE.WebGLRenderer({ antialias: true });
  ren.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
  cont.appendChild(ren.domElement);
  const scena = new THREE.Scene();
  scena.background = new THREE.Color('#02030a');
  const kam = new THREE.PerspectiveCamera(40, 1, 0.1, 30000);
  scena.add(new THREE.AmbientLight(0xffffff, 1.2));
  const smer = new THREE.DirectionalLight(0xffffff, 1.7);
  smer.position.set(-0.4, 0.6, 1); scena.add(smer);

  // hvězdné pozadí (stejný recept jako u glóbu)
  [ { n: 2500, size: 1.1, op: 0.55 }, { n: 900, size: 1.9, op: 0.85 } ].forEach(l => {
    const pos = new Float32Array(l.n * 3);
    for (let i = 0; i < l.n; i++) {
      const u = Math.random() * 2 - 1, ph = Math.random() * 2 * Math.PI;
      const r = 6000 + Math.random() * 6000, s = Math.sqrt(1 - u * u);
      pos.set([r * s * Math.cos(ph), r * u, r * s * Math.sin(ph)], i * 3);
    }
    const g = new THREE.BufferGeometry();
    g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    scena.add(new THREE.Points(g, new THREE.PointsMaterial({
      color: 0xffffff, size: l.size, sizeAttenuation: false, transparent: true, opacity: l.op, depthWrite: false
    })));
  });

  const loader = new THREE.TextureLoader();
  const K = 26 / 69911;           // měřítko: Jupiter = 26 jednotek
  const telesa = [];
  let x = 0;
  SROVNANI.forEach(s => {
    const t = TELESA[s.id], r = s.km * K;
    const eff = s.prstence ? r * 2.35 : r;   // prstence potřebují místo navíc
    let cx;
    if (s.id === 'slunce') { cx = -r + 30; x = 46; }  // vidět jen pravý okraj kotouče
    else { cx = x + eff; x = cx + eff + 7; }
    const mat = (s.id === 'slunce') ? new THREE.MeshBasicMaterial() : new THREE.MeshPhongMaterial();
    loader.load(t.tex, tx => { tx.anisotropy = maxAniso; mat.map = tx; mat.needsUpdate = true; });
    const kula = new THREE.Mesh(new THREE.SphereGeometry(r, 64, 64), mat);
    const grp = new THREE.Group();
    grp.add(kula); grp.position.set(cx, 0, 0);
    grp.rotation.z = -THREE.MathUtils.degToRad(t.sklon || 0) * 0.7;
    grp.rotation.x = THREE.MathUtils.degToRad(t.sklon || 0) * 0.3;
    if (s.prstence) loader.load('textures/2k_saturn_ring_alpha.png', tx => {
      tx.anisotropy = maxAniso;
      const m = new THREE.Mesh(prstencovaGeometrie(r * 1.24, r * 2.27), new THREE.MeshBasicMaterial({
        map: tx, side: THREE.DoubleSide, transparent: true, depthWrite: false
      }));
      m.rotation.x = Math.PI / 2; grp.add(m);
    });
    scena.add(grp);
    // HTML popisek (jméno + skutečný průměr), střídavě nad/pod tělesem
    const el = document.createElement('div'); el.className = 'sr-popisek';
    el.innerHTML = s.id === 'slunce'
      ? `${t.emoji} Slunce <small>jen výřez! Ø 1 392 700 km</small>`
      : `${t.emoji} ${t.nazev}<small>Ø ${(s.km * 2).toLocaleString('cs-CZ')} km</small>`;
    cont.appendChild(el);
    telesa.push({ kula, el, cx, eff, r, nad: telesa.length % 2 === 0, slunce: s.id === 'slunce' });
  });
  const sirkaRady = x;

  const stred = sirkaRady / 2 - 10;
  function fitZ() {
    const fovH = 2 * Math.atan(Math.tan(THREE.MathUtils.degToRad(20)) * kam.aspect);
    return (sirkaRady / 2 + 40) / Math.tan(fovH / 2);
  }
  function resize() {
    ren.setSize(window.innerWidth, window.innerHeight);
    kam.aspect = window.innerWidth / window.innerHeight;
    kam.updateProjectionMatrix();
  }
  resize();
  kam.position.set(stred, 0, Math.min(25000, fitZ()));

  // posun tažením + zoom kolečkem
  let tazeni = null;
  cont.addEventListener('pointerdown', e => { tazeni = { x: e.clientX, y: e.clientY }; cont.classList.add('tahani'); cont.setPointerCapture(e.pointerId); });
  cont.addEventListener('pointermove', e => {
    if (!tazeni) return;
    const naJed = 2 * kam.position.z * Math.tan(THREE.MathUtils.degToRad(20)) * kam.aspect / window.innerWidth;
    kam.position.x = Math.max(-80, Math.min(sirkaRady + 80, kam.position.x - (e.clientX - tazeni.x) * naJed));
    kam.position.y = Math.max(-90, Math.min(90, kam.position.y + (e.clientY - tazeni.y) * naJed));
    tazeni = { x: e.clientX, y: e.clientY };
  });
  cont.addEventListener('pointerup', () => { tazeni = null; cont.classList.remove('tahani'); });
  cont.addEventListener('wheel', e => {
    e.preventDefault();
    kam.position.z = Math.max(12, Math.min(fitZ() * 1.3, kam.position.z * (e.deltaY > 0 ? 1.13 : 0.885)));
  }, { passive: false });

  const v = new THREE.Vector3();
  function aktualizujPopisky() {
    telesa.forEach(o => {
      // kotevní bod: nad/pod tělesem; u Slunce u jeho viditelného okraje
      if (o.slunce) v.set(44, -66, 0); else v.set(o.cx, o.nad ? (o.eff + 4) : -(o.eff + 4), 0);
      v.project(kam);
      const mimo = v.z > 1 || v.x < -1.05 || v.x > 1.05;
      o.el.style.display = mimo ? 'none' : '';
      if (mimo) return;
      o.el.style.left = (v.x * 0.5 + 0.5) * 100 + '%';
      o.el.style.top = (-v.y * 0.5 + 0.5) * 100 + '%';
      o.el.style.transform = (o.nad || o.slunce) ? 'translate(-50%,-100%)' : 'translate(-50%,0)';
    });
  }

  (function smyckaSrovnani() {
    requestAnimationFrame(smyckaSrovnani);
    if (!srovnaniAktivni) return;
    telesa.forEach(o => { o.kula.rotation.y += 0.0012; });
    ren.render(scena, kam);
    aktualizujPopisky();
  })();

  return { resize };
}

const srovnaniBtn = document.getElementById('srovnaniBtn');
function zapniSrovnani(on) {
  srovnaniAktivni = on;
  document.getElementById('srovnani').style.display = on ? 'block' : 'none';
  document.getElementById('globeViz').style.display = on ? 'none' : '';
  document.getElementById('bodies').style.display = on ? 'none' : '';
  document.getElementById('infoBtn').style.display = on ? 'none' : '';
  document.getElementById('rotateBtn').style.display = on ? 'none' : '';
  srovnaniBtn.classList.toggle('on', on);
  if (on) {
    nastavInfo(false);
    if (!srovnani) srovnani = initSrovnani(); else srovnani.resize();
    document.title = '📏 Srovnání velikostí těles';
    history.replaceState(null, '', '?rezim=srovnani');
  } else {
    nastavInfo(infoZapnuto);
    const t = TELESA[aktualni];
    if (t) { document.title = `${t.emoji} Glóbus — ${t.nazev}`; history.replaceState(null, '', '?telo=' + aktualni); }
  }
}
srovnaniBtn.onclick = () => zapniSrovnani(!srovnaniAktivni);

/* ================= Start (?telo=mars, ?rezim=srovnani) ================= */
// parametry přečíst PŘED zobraz() — to totiž URL přepisuje přes replaceState
const q0 = new URLSearchParams(location.search);
const param = q0.get('telo'), rezimStart = q0.get('rezim');
zobraz(TELESA[param] ? param : 'zeme');
if (rezimStart === 'srovnani') zapniSrovnani(true);
</script>
