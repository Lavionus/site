<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 Generátor CSS gradientů</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:980px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.layout{display:grid;grid-template-columns:1fr 320px;gap:20px}
@media(max-width:720px){.layout{grid-template-columns:1fr}}
.preview{border-radius:12px;min-height:380px;border:1px solid #404040}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
label{display:block;font-size:.78rem;color:#888;margin:10px 0 4px}
select,input[type=range]{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:8px}
.stops{margin:12px 0}
.stop{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.stop input[type=color]{width:42px;height:36px;border:none;border-radius:6px;background:none;cursor:pointer}
.stop input[type=range]{flex:1}
.stop .del{background:none;border:none;color:#c0392b;cursor:pointer}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.82rem;width:100%;margin-top:8px}
.btn-sec{background:#404040}
.code{background:#1e1e1e;border:1px solid #404040;border-radius:8px;padding:14px;margin-top:16px;font-family:monospace;font-size:.85rem;white-space:pre-wrap;word-break:break-all;position:relative}
.angle-val{color:#6aa6fd;float:right}
</style>
</head>
<body>
<div class="container">
  <h1>🌈 Generátor CSS gradientů</h1>
  <div class="layout">
    <div>
      <div class="preview" id="preview"></div>
      <div class="code" id="code"></div>
      <button class="btn" id="copyBtn" style="max-width:200px">📋 Kopírovat CSS</button>
      <button class="btn btn-sec" id="randomBtn" style="max-width:200px;display:inline-block;width:auto">🎲 Náhodný</button>
    </div>
    <div class="card">
      <h2>Nastavení</h2>
      <label>Typ</label>
      <select id="type"><option value="linear">Lineární</option><option value="radial">Radiální</option><option value="conic">Kuželový (conic)</option></select>
      <label id="angleLabel">Úhel <span class="angle-val" id="angleVal">90°</span></label>
      <input type="range" id="angle" min="0" max="360" value="90">
      <h2 style="margin-top:16px">Barevné zarážky</h2>
      <div class="stops" id="stops"></div>
      <button class="btn btn-sec" id="addStop">➕ Přidat zarážku</button>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let stops=[{c:'#6aa6fd',p:0},{c:'#9b59b6',p:100}];
function renderStops(){
  $('stops').innerHTML=stops.map((s,i)=>`<div class="stop">
    <input type="color" data-i="${i}" data-f="c" value="${s.c}">
    <input type="range" data-i="${i}" data-f="p" min="0" max="100" value="${s.p}">
    <span style="font-size:.75rem;color:#888;width:34px">${s.p}%</span>
    ${stops.length>2?`<button class="del" data-del="${i}">✕</button>`:''}</div>`).join('');
  $('stops').querySelectorAll('input').forEach(inp=>inp.oninput=()=>{stops[+inp.dataset.i][inp.dataset.f]=inp.dataset.f==='p'?+inp.value:inp.value;update();});
  $('stops').querySelectorAll('.del').forEach(b=>b.onclick=()=>{stops.splice(+b.dataset.del,1);renderStops();update();});
}
function gradientCSS(){
  const sorted=[...stops].sort((a,b)=>a.p-b.p);
  const cols=sorted.map(s=>`${s.c} ${s.p}%`).join(', ');
  const t=$('type').value,a=$('angle').value;
  if(t==='linear')return `linear-gradient(${a}deg, ${cols})`;
  if(t==='radial')return `radial-gradient(circle, ${cols})`;
  return `conic-gradient(from ${a}deg, ${cols})`;
}
function update(){
  const g=gradientCSS();
  $('preview').style.background=g;
  $('code').textContent='background: '+g+';';
  $('angleVal').textContent=$('angle').value+'°';
  $('angleLabel').style.opacity=$('type').value==='radial'?'.4':'1';
}
$('type').onchange=update;$('angle').oninput=update;
$('addStop').onclick=()=>{stops.push({c:'#27ae60',p:50});renderStops();update();};
$('copyBtn').onclick=()=>{navigator.clipboard.writeText($('code').textContent);$('copyBtn').textContent='✅ Zkopírováno';setTimeout(()=>$('copyBtn').textContent='📋 Kopírovat CSS',1200);};
$('randomBtn').onclick=()=>{const rc=()=>'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
  const n=2+Math.floor(Math.random()*3);stops=Array.from({length:n},(_,i)=>({c:rc(),p:Math.round(i/(n-1)*100)}));
  $('angle').value=Math.floor(Math.random()*360);renderStops();update();};
renderStops();update();
</script>
</body>
</html>
