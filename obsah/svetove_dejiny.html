<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📜 Časová osa světových dějin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:700px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.tabs{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
.tab{background:#333;border:1px solid #555;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:.85rem}
.tab.active{background:#6aa6fd;border-color:#6aa6fd;color:#fff}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;margin-bottom:16px}
.timeline{position:relative;padding-left:24px;border-left:3px solid #404040}
.event{position:relative;margin-bottom:22px}
.event::before{content:'';position:absolute;left:-31px;top:4px;width:12px;height:12px;border-radius:50%;background:#6aa6fd}
.year{color:#6aa6fd;font-weight:700;font-size:.95rem}
.title{font-weight:600;margin:2px 0}
.desc{color:#aaa;font-size:.85rem;line-height:1.5}
.quiz{display:none;text-align:center}
.scorebar{display:flex;justify-content:space-around;margin-bottom:16px}
.scorebar .v{font-size:1.4rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.qtext{font-size:1.05rem;margin-bottom:14px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{background:#333;border:1px solid #555;border-radius:6px;padding:12px;color:#e0e0e0;cursor:pointer}
.opt.correct{border-color:#27ae60;background:#1f3a2a}
.opt.wrong{border-color:#e74c3c;background:#3a1f1f}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <h1>📜 Časová osa světových dějin</h1>
  <div class="tabs">
    <div class="tab active" data-m="osa">🗓️ Osa</div>
    <div class="tab" data-m="quiz">❓ Kvíz</div>
  </div>

  <div class="card" id="osaCard">
    <div class="timeline" id="timeline"></div>
  </div>

  <div class="card quiz" id="quizCard">
    <div class="scorebar"><div><div class="v" id="score">0</div><div class="l">Správně</div></div><div><div class="v" id="idx">0/10</div><div class="l">Otázka</div></div></div>
    <div class="qtext" id="qtext"></div>
    <div class="opts" id="opts"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const UDALOSTI=[
{y:-3100,t:'Sjednocení Egypta',d:'Vznik jednotného egyptského státu pod vládou faraonů.'},
{y:-776,t:'První olympijské hry',d:'Konaly se ve starověkém Řecku v Olympii.'},
{y:-509,t:'Vznik Římské republiky',d:'Řím se stal republikou po svržení posledního krále.'},
{y:-336,t:'Alexandr Veliký na trůně',d:'Začátek výbojů, které vytvořily obrovskou říši.'},
{y:27,t:'Vznik Římského impéria',d:'Octavianus Augustus se stal prvním římským císařem.'},
{y:476,t:'Zánik Západořímské říše',d:'Konec starověku a začátek raného středověku v Evropě.'},
{y:800,t:'Korunovace Karla Velikého',d:'Karel Veliký se stal císařem, vznik Franské říše.'},
{y:1096,t:'První křížová výprava',d:'Začátek série tažení do Svaté země.'},
{y:1215,t:'Magna Carta',d:'Anglická listina omezující moc krále, základ ústavního práva.'},
{y:1347,t:'Černá smrt v Evropě',d:'Epidemie moru zabila třetinu evropské populace.'},
{y:1492,t:'Kolumbus objevuje Ameriku',d:'Začátek evropské kolonizace amerického kontinentu.'},
{y:1517,t:'Lutherova reformace',d:'Martin Luther zahájil protestantskou reformaci církve.'},
{y:1642,t:'Anglická občanská válka',d:'Konflikt mezi royalisty a parlamentem.'},
{y:1789,t:'Francouzská revoluce',d:'Pád monarchie, vznik moderních myšlenek svobody a rovnosti.'},
{y:1861,t:'Americká občanská válka',d:'Konflikt mezi Severem a Jihem, skončil zrušením otroctví.'},
{y:1914,t:'První světová válka',d:'Globální konflikt trvající do roku 1918.'},
{y:1929,t:'Velká hospodářská krize',d:'Krach na burze v New Yorku vyvolal celosvětovou krizi.'},
{y:1939,t:'Druhá světová válka',d:'Nejrozsáhlejší válečný konflikt v dějinách, trvala do roku 1945.'},
{y:1969,t:'Přistání na Měsíci',d:'Apollo 11 přistálo s posádkou na Měsíci.'},
{y:1989,t:'Pád Berlínské zdi',d:'Symbolický konec studené války a rozdělení Evropy.'},
{y:1991,t:'Rozpad Sovětského svazu',d:'Konec studené války, vznik nových samostatných států.'},
{y:2004,t:'Rozšíření Evropské unie',d:'EU se rozšířila o deset zemí včetně ČR.'}
];
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active');
  const m=t.dataset.m;
  $('osaCard').style.display=m==='osa'?'block':'none';
  $('quizCard').style.display=m==='quiz'?'block':'none';
  if(m==='quiz')startQuiz();
});
function fmtYear(y){return y<0?`${-y} př. n. l.`:`${y}`;}
$('timeline').innerHTML=UDALOSTI.map(e=>`<div class="event"><div class="year">${fmtYear(e.y)}</div><div class="title">${e.t}</div><div class="desc">${e.d}</div></div>`).join('');

let score,idx,total=10;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function startQuiz(){score=0;idx=0;$('score').textContent=0;next();}
function next(){
  if(idx>=total){$('qtext').textContent=`Výsledek: ${score} / ${total}`;$('opts').innerHTML='';return;}
  $('idx').textContent=`${idx+1}/${total}`;
  const ev=shuffle([...UDALOSTI])[0];
  $('qtext').textContent=`Kdy se stalo: „${ev.t}"?`;
  const correct=fmtYear(ev.y);
  const wrongYears=shuffle(UDALOSTI.filter(e=>e.t!==ev.t)).slice(0,3).map(e=>fmtYear(e.y));
  const opts=shuffle([correct,...wrongYears]);
  const box=$('opts');box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=()=>{
      [...box.children].forEach(x=>x.disabled=true);
      if(o===correct){b.classList.add('correct');score++;}
      else{b.classList.add('wrong');[...box.children].find(x=>x.textContent===correct).classList.add('correct');}
      $('score').textContent=score;
      setTimeout(()=>{idx++;next();},900);
    };
    box.appendChild(b);
  });
}
</script>
</body>
</html>
