<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌑 Generátor stínů</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:980px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.layout{display:grid;grid-template-columns:1fr 340px;gap:20px}
@media(max-width:720px){.layout{grid-template-columns:1fr}}
.stage{background:#e8e8e8;border-radius:12px;min-height:380px;display:flex;align-items:center;justify-content:center}
.box{width:160px;height:160px;background:#6aa6fd;border-radius:16px}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:18px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:10px}
label{display:block;font-size:.78rem;color:#888;margin:10px 0 4px;display:flex;justify-content:space-between}
label b{color:#6aa6fd}
input[type=range]{width:100%}
input[type=color]{width:42px;height:34px;border:none;border-radius:6px;background:none;cursor:pointer;vertical-align:middle}
.layer{background:#1e1e1e;border:1px solid #404040;border-radius:8px;padding:10px;margin-bottom:10px}
.layer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.8rem}
.btn-sec{background:#404040}
.del{background:none;border:none;color:#c0392b;cursor:pointer}
.code{background:#1e1e1e;border:1px solid #404040;border-radius:8px;padding:14px;margin-top:16px;font-family:monospace;font-size:.84rem;white-space:pre-wrap;word-break:break-all}
.toggle{display:flex;gap:8px;margin-bottom:10px}
.toggle button{flex:1;padding:7px;background:#404040;border:1px solid #555;border-radius:6px;color:#bbb;cursor:pointer;font-size:.8rem}
.toggle button.active{background:#6aa6fd;color:#fff}
</style>
</head>
<body>
<div class="container">
  <h1>🌑 Generátor stínů (box-shadow)</h1>
  <div class="layout">
    <div>
      <div class="stage" id="stage"><div class="box" id="box"></div></div>
      <div class="code" id="code"></div>
      <button class="btn" id="copyBtn" style="margin-top:10px">📋 Kopírovat CSS</button>
    </div>
    <div class="card">
      <div class="toggle"><button class="active" id="bgLight">Světlé pozadí</button><button id="bgDark">Tmavé</button></div>
      <h2>Vrstvy stínů <button class="btn btn-sec" id="addLayer" style="float:right">➕</button></h2>
      <div id="layers"></div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let layers=[{x:0,y:8,blur:24,spread:0,color:'#000000',alpha:30,inset:false}];
function hexA(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r}, ${g}, ${b}, ${(a/100).toFixed(2)})`;}
function renderLayers(){
  $('layers').innerHTML=layers.map((l,i)=>`<div class="layer">
    <div class="layer-head"><b style="color:#bbb;font-size:.85rem">Stín ${i+1}</b>
      <span><label style="display:inline;font-size:.72rem"><input type="checkbox" data-i="${i}" data-f="inset" ${l.inset?'checked':''}> inset</label>
      <input type="color" data-i="${i}" data-f="color" value="${l.color}">
      ${layers.length>1?`<button class="del" data-del="${i}">✕</button>`:''}</span></div>
    <label>Posun X<b>${l.x}px</b></label><input type="range" data-i="${i}" data-f="x" min="-50" max="50" value="${l.x}">
    <label>Posun Y<b>${l.y}px</b></label><input type="range" data-i="${i}" data-f="y" min="-50" max="50" value="${l.y}">
    <label>Rozostření<b>${l.blur}px</b></label><input type="range" data-i="${i}" data-f="blur" min="0" max="100" value="${l.blur}">
    <label>Rozšíření<b>${l.spread}px</b></label><input type="range" data-i="${i}" data-f="spread" min="-40" max="40" value="${l.spread}">
    <label>Průhlednost<b>${l.alpha}%</b></label><input type="range" data-i="${i}" data-f="alpha" min="0" max="100" value="${l.alpha}">
  </div>`).join('');
  $('layers').querySelectorAll('input').forEach(inp=>inp.oninput=()=>{
    const l=layers[+inp.dataset.i],f=inp.dataset.f;
    l[f]=f==='inset'?inp.checked:f==='color'?inp.value:+inp.value;render();
  });
  $('layers').querySelectorAll('.del').forEach(b=>b.onclick=()=>{layers.splice(+b.dataset.del,1);renderLayers();render();});
}
function shadowCSS(){return layers.map(l=>`${l.inset?'inset ':''}${l.x}px ${l.y}px ${l.blur}px ${l.spread}px ${hexA(l.color,l.alpha)}`).join(', ');}
function render(){const s=shadowCSS();$('box').style.boxShadow=s;$('code').textContent='box-shadow: '+s+';';renderLayers.last;}
let renderTimeout;
function render2(){render();}
$('addLayer').onclick=()=>{layers.push({x:0,y:4,blur:12,spread:0,color:'#000000',alpha:20,inset:false});renderLayers();render();};
$('copyBtn').onclick=()=>{navigator.clipboard.writeText($('code').textContent);$('copyBtn').textContent='✅ Zkopírováno';setTimeout(()=>$('copyBtn').textContent='📋 Kopírovat CSS',1200);};
$('bgLight').onclick=()=>{$('stage').style.background='#e8e8e8';$('bgLight').classList.add('active');$('bgDark').classList.remove('active');};
$('bgDark').onclick=()=>{$('stage').style.background='#222';$('bgDark').classList.add('active');$('bgLight').classList.remove('active');};
renderLayers();render();
</script>
</body>
</html>
