<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Světová hlavní města</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:560px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:16px}
.setup{display:flex;gap:12px;flex-wrap:wrap;align-items:end;justify-content:center}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 28px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.scorebar{display:flex;justify-content:space-around;margin-bottom:18px}
.scorebar .v{font-size:1.5rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.game,.results{display:none;text-align:center}
.continent{color:#888;font-size:.8rem;margin-bottom:6px}
.word{font-size:1.8rem;font-weight:700;margin:10px 0 18px}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{background:#333;border:1px solid #555;border-radius:6px;padding:14px;color:#e0e0e0;cursor:pointer;font-size:1rem}
.opt:hover{border-color:#6aa6fd}
.opt.correct{border-color:#27ae60;background:#1f3a2a}
.opt.wrong{border-color:#e74c3c;background:#3a1f1f}
.results .big{font-size:2.4rem;font-weight:700;color:#6aa6fd}
</style>
</head>
<body>
<div class="container">
  <h1>🌍 Kvíz světových hlavních měst</h1>
  <div class="card" id="setupCard">
    <div class="setup">
      <div><label>Kontinent</label><select id="cont">
        <option value="all" selected>Celý svět</option>
        <option value="Asie">Asie</option>
        <option value="Afrika">Afrika</option>
        <option value="Amerika">Amerika</option>
        <option value="Oceánie">Oceánie</option>
      </select></div>
      <button class="btn" id="startBtn">▶️ Start</button>
    </div>
  </div>

  <div class="card game" id="gameCard">
    <div class="scorebar">
      <div><div class="v" id="score">0</div><div class="l">Správně</div></div>
      <div><div class="v" id="idx">0/15</div><div class="l">Otázka</div></div>
    </div>
    <div class="continent" id="continent"></div>
    <div class="word" id="word"></div>
    <div class="opts" id="opts"></div>
  </div>

  <div class="card results" id="resultsCard">
    <div class="big" id="finalScore"></div>
    <p style="color:#888" id="finalDetail"></p>
    <button class="btn" id="againBtn" style="margin-top:16px">🔄 Znovu</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const STATY=[
['Japonsko','Tokio','Asie'],['Čína','Peking','Asie'],['Indie','Dillí','Asie'],['Jižní Korea','Soul','Asie'],
['Thajsko','Bangkok','Asie'],['Vietnam','Hanoj','Asie'],['Indonésie','Jakarta','Asie'],['Saúdská Arábie','Rijád','Asie'],
['Izrael','Jeruzalém','Asie'],['Turecko','Ankara','Asie'],['Pákistán','Islámábád','Asie'],['Mongolsko','Ulánbátar','Asie'],
['Egypt','Káhira','Afrika'],['Jihoafrická republika','Pretoria','Afrika'],['Keňa','Nairobi','Afrika'],['Nigérie','Abuja','Afrika'],
['Maroko','Rabat','Afrika'],['Etiopie','Addis Abeba','Afrika'],['Ghana','Akkra','Afrika'],['Tunisko','Tunis','Afrika'],
['USA','Washington, D.C.','Amerika'],['Kanada','Ottawa','Amerika'],['Mexiko','Mexico City','Amerika'],['Brazílie','Brasília','Amerika'],
['Argentina','Buenos Aires','Amerika'],['Peru','Lima','Amerika'],['Chile','Santiago','Amerika'],['Kolumbie','Bogotá','Amerika'],
['Kuba','Havana','Amerika'],['Venezuela','Caracas','Amerika'],
['Austrálie','Canberra','Oceánie'],['Nový Zéland','Wellington','Oceánie'],['Fidži','Suva','Oceánie'],['Papua Nová Guinea','Port Moresby','Oceánie']
];
let deck,idx,score,total;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function start(){
  const cont=$('cont').value;
  const pool=cont==='all'?STATY:STATY.filter(s=>s[2]===cont);
  deck=shuffle([...pool]).slice(0,15);total=deck.length;idx=0;score=0;
  $('setupCard').style.display='none';$('resultsCard').style.display='none';$('gameCard').style.display='block';
  $('score').textContent=0;
  next();
}
function next(){
  if(idx>=deck.length){finish();return;}
  const [country,capital,cont]=deck[idx];
  $('idx').textContent=`${idx+1}/${total}`;
  $('continent').textContent=cont;
  $('word').textContent=country;
  const wrongPool=STATY.filter(s=>s[1]!==capital).map(s=>s[1]);
  const opts=shuffle([capital,...shuffle(wrongPool).slice(0,3)]);
  const box=$('opts');box.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');b.className='opt';b.textContent=o;
    b.onclick=()=>{
      [...box.children].forEach(x=>x.disabled=true);
      if(o===capital){b.classList.add('correct');score++;$('score').textContent=score;}
      else{b.classList.add('wrong');[...box.children].find(x=>x.textContent===capital).classList.add('correct');}
      setTimeout(()=>{idx++;next();},700);
    };
    box.appendChild(b);
  });
}
function finish(){
  $('gameCard').style.display='none';$('resultsCard').style.display='block';
  $('finalScore').textContent=`${score} / ${total}`;
  const pct=Math.round(score/total*100);
  $('finalDetail').textContent=pct>=80?'🏆 Skvělý přehled!':pct>=50?'👍 Dobré, zkus to znovu.':'💪 Zopakuj si mapu světa.';
}
$('startBtn').onclick=start;
$('againBtn').onclick=()=>{$('setupCard').style.display='block';$('resultsCard').style.display='none';};
</script>
</body>
</html>
