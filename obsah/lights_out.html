<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💡 Lights Out</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600}
.sub{color:#888;font-size:.85rem;margin-bottom:18px;text-align:center;max-width:440px}
.top{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.info{color:#888}
.board{display:grid;gap:6px;background:#2a2a2a;padding:10px;border-radius:12px}
.cell{width:58px;height:58px;border-radius:8px;background:#1e1e1e;cursor:pointer;transition:.15s;border:1px solid #333}
@media(max-width:480px){.cell{width:48px;height:48px}}
.cell.on{background:radial-gradient(circle at 40% 40%,#ffe98a,#f1c40f);box-shadow:0 0 16px rgba(241,196,15,.6);border-color:#f1c40f}
.msg{margin-top:16px;font-size:1.3rem;font-weight:700;color:#27ae60;min-height:32px}
</style>
</head>
<body>
<h1>💡 Lights Out</h1>
<p class="sub">Cíl: zhasnout všechna světla. Klik přepne políčko i jeho 4 sousedy.</p>
<div class="top">
  <select id="size"><option value="3">3×3</option><option value="5" selected>5×5</option></select>
  <button class="btn" id="newBtn">🔄 Nová hra</button>
  <span class="info">Tahy: <b id="moves">0</b></span>
</div>
<div class="board" id="board"></div>
<div class="msg" id="msg"></div>
<script>
const $=id=>document.getElementById(id);
let N,grid,moves;
function init(){
  N=+$('size').value;grid=Array.from({length:N},()=>Array(N).fill(false));moves=0;$('msg').textContent='';
  // random solvable: apply random clicks
  for(let i=0;i<N*N*2;i++)toggle(Math.floor(Math.random()*N),Math.floor(Math.random()*N),false);
  moves=0;render();
}
function toggle(r,c,count=true){
  [[0,0],[0,1],[0,-1],[1,0],[-1,0]].forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<N&&nc>=0&&nc<N)grid[nr][nc]=!grid[nr][nc];});
  if(count)moves++;
}
function render(){
  const b=$('board');b.style.gridTemplateColumns=`repeat(${N},1fr)`;b.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const d=document.createElement('div');d.className='cell'+(grid[r][c]?' on':'');
    d.onclick=()=>{toggle(r,c);render();$('moves').textContent=moves;checkWin();};
    b.appendChild(d);
  }
  $('moves').textContent=moves;
}
function checkWin(){if(grid.every(row=>row.every(x=>!x)))$('msg').textContent='🎉 Vyřešeno na '+moves+' tahů!';}
$('newBtn').onclick=init;$('size').onchange=init;
init();
</script>
</body>
</html>
