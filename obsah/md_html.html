<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 Markdown ↔ HTML</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/turndown/7.1.2/turndown.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1300px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:16px;font-weight:600;text-align:center}
.toolbar{display:flex;gap:10px;justify-content:center;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600}
.btn:hover{background:#5694f0}
.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
.dir{color:#888;font-size:.9rem}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:860px){.grid{grid-template-columns:1fr}}
.panel{background:#2a2a2a;border:1px solid #404040;border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.panel h2{font-size:.85rem;color:#6aa6fd;padding:10px 14px;background:#333;border-bottom:1px solid #404040;text-transform:uppercase;letter-spacing:1px}
textarea{flex:1;min-height:440px;background:#1e1e1e;border:none;color:#e0e0e0;padding:14px;font-family:'SF Mono',Consolas,monospace;font-size:.9rem;resize:none;line-height:1.5}
textarea:focus{outline:none}
.preview{flex:1;min-height:440px;padding:16px;overflow-y:auto;background:#1e1e1e}
.preview h1,.preview h2,.preview h3{border-bottom:1px solid #404040;padding-bottom:4px;margin:12px 0 8px}
.preview code{background:#333;padding:2px 6px;border-radius:4px;font-family:monospace}
.preview pre{background:#111;padding:12px;border-radius:6px;overflow-x:auto;margin:10px 0}
.preview pre code{background:none;padding:0}
.preview blockquote{border-left:4px solid #6aa6fd;padding-left:12px;color:#aaa;margin:10px 0}
.preview table{border-collapse:collapse;margin:10px 0}.preview td,.preview th{border:1px solid #444;padding:6px 10px}
.preview a{color:#6aa6fd}.preview ul,.preview ol{margin-left:22px}
.preview img{max-width:100%}
</style>
</head>
<body>
<div class="container">
  <h1>📝 Markdown ↔ HTML převodník</h1>
  <div class="toolbar">
    <button class="btn" id="modeBtn">🔄 Režim: Markdown → HTML</button>
    <button class="btn btn-sec" id="copyBtn">📋 Kopírovat výstup</button>
    <button class="btn btn-sec" id="dlBtn">💾 Stáhnout</button>
    <button class="btn btn-sec" id="clearBtn">🗑️ Vyčistit</button>
    <span class="dir" id="liveNote">Náhled se aktualizuje živě</span>
  </div>
  <div class="grid">
    <div class="panel">
      <h2 id="inLabel">Markdown vstup</h2>
      <textarea id="input" placeholder="# Nadpis&#10;&#10;Napiš **markdown**…"></textarea>
    </div>
    <div class="panel">
      <h2 id="outLabel">HTML náhled</h2>
      <div class="preview" id="preview"></div>
      <textarea id="output" style="display:none" readonly></textarea>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const td=new TurndownService({headingStyle:'atx',codeBlockStyle:'fenced'});
let mode='md2html';
const sample={md2html:'# Vítejte\n\nToto je **Markdown** převodník.\n\n- položka 1\n- položka 2\n\n```js\nconsole.log("ahoj");\n```\n\n> Citace\n\n[Odkaz](https://example.cz)',
  html2md:'<h1>Vítejte</h1>\n<p>Toto je <strong>HTML</strong> vstup.</p>\n<ul><li>položka 1</li><li>položka 2</li></ul>'};
function convert(){
  const v=$('input').value;
  if(mode==='md2html'){
    const html=marked.parse(v);
    $('preview').style.display='block';$('output').style.display='none';
    $('preview').innerHTML=html;$('output').value=html;
  }else{
    const md=td.turndown(v);
    $('preview').style.display='none';$('output').style.display='block';
    $('output').value=md;
  }
}
$('input').oninput=convert;
$('modeBtn').onclick=()=>{
  mode=mode==='md2html'?'html2md':'md2html';
  const md=mode==='md2html';
  $('modeBtn').textContent='🔄 Režim: '+(md?'Markdown → HTML':'HTML → Markdown');
  $('inLabel').textContent=md?'Markdown vstup':'HTML vstup';
  $('outLabel').textContent=md?'HTML náhled':'Markdown výstup';
  $('input').value=sample[md?'md2html':'html2md'];
  convert();
};
$('copyBtn').onclick=()=>{const t=mode==='md2html'?$('output').value:$('output').value;navigator.clipboard.writeText(t);$('copyBtn').textContent='✅ Zkopírováno';setTimeout(()=>$('copyBtn').textContent='📋 Kopírovat výstup',1200);};
$('dlBtn').onclick=()=>{const t=$('output').value,ext=mode==='md2html'?'html':'md';
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}));a.download='vystup.'+ext;a.click();};
$('clearBtn').onclick=()=>{$('input').value='';convert();};
$('input').value=sample.md2html;convert();
</script>
</body>
</html>
