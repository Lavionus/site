<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Nonogramy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:820px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.horni{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:14px;flex-wrap:wrap}
select,button{background:#383838;border:1px solid #4a4a4a;color:#e0e0e0;border-radius:6px;padding:9px 14px;font-size:.88rem;cursor:pointer}
button.primary{background:#6aa6fd;border-color:#6aa6fd;color:#fff;font-weight:600}
button.aktivni{background:#6aa6fd;border-color:#6aa6fd;color:#fff}
.info{text-align:center;color:#888;font-size:.85rem;margin-bottom:12px}
.info b{color:#6aa6fd}
.deska-wrap{overflow-x:auto;display:flex;justify-content:center;padding-bottom:8px}
table{border-collapse:collapse;user-select:none}
td{border:1px solid #3a3a3a;text-align:center;vertical-align:middle}
td.bunka{width:30px;height:30px;background:#242424;cursor:pointer}
td.bunka:hover{background:#333}
td.bunka.plna{background:#6aa6fd}
td.bunka.krizek{color:#666;font-size:.85rem}
td.bunka.krizek::after{content:'✕'}
td.hr{border-right:2px solid #777}
td.hb{border-bottom:2px solid #777}
td.vodH,td.vodV{background:#1a1a1a;border-color:#2a2a2a;font-size:.72rem;color:#bbb;padding:3px 6px;font-weight:600}
td.vodH{text-align:right;white-space:nowrap}
td.vodV{vertical-align:bottom}
td.vodV div{line-height:1.25}
td.hotova{color:#4caf50!important}
td.rohova{background:#1a1a1a;border-color:#2a2a2a}
.vyhra{text-align:center;font-size:1.2rem;color:#4caf50;font-weight:700;margin-top:14px;min-height:28px}
.napoveda{text-align:center;font-size:.75rem;color:#666;margin-top:10px}
@media(max-width:560px){td.bunka{width:24px;height:24px}}
</style>
</head>
<body>
<div class="container">
  <h1>🎨 Nonogramy</h1>
  <div class="horni">
    <select id="puzzle"></select>
    <button class="primary" id="nova">🔄 Nová hra</button>
    <button id="rezim" title="Přepnout mezi vybarvováním a křížky">✏️ Vybarvit</button>
    <button id="smazat">🗑️ Smazat</button>
  </div>
  <div class="info">Čísla udávají délky souvislých bloků v řádku/sloupci (v tomto pořadí, s mezerou aspoň 1 pole). ⏱️ <b id="cas">0:00</b></div>
  <div class="deska-wrap" id="deska"></div>
  <div class="vyhra" id="vyhra"></div>
  <div class="napoveda">Levé tlačítko = vybarvit · pravé tlačítko (nebo režim ✕) = křížek</div>
</div>
<script>
const $=id=>document.getElementById(id);

// předdefinované obrázky ('.'=prázdné, '#'=plné)
const PUZZLES=[
 {nazev:'❤️ Srdíčko (5×5)',g:['.#.#.','#####','#####','.###.','..#..']},
 {nazev:'⬆️ Šipka (5×5)',g:['..#..','.###.','#####','..#..','..#..']},
 {nazev:'✚ Kříž (5×5)',g:['..#..','..#..','#####','..#..','..#..']},
 {nazev:'🏠 Domek (5×5)',g:['..#..','.###.','#####','.#.#.','.###.']},
 {nazev:'💗 Srdce (10×10)',g:['..##..##..','.########.','##########','##########','##########','.########.','..######..','...####...','....##....','..........']},
 {nazev:'🌲 Strom (10×10)',g:['....##....','...####...','..######..','.########.','..######..','.########.','##########','....##....','....##....','...####...']},
 {nazev:'⭐ Hvězda (10×10)',g:['....##....','....##....','...####...','##########','.########.','..######..','..######..','.###..###.','.##....##.','#........#']},
 {nazev:'🎲 Náhodný 5×5',random:5},
 {nazev:'🎲 Náhodný 10×10',random:10},
 {nazev:'🎲 Náhodný 15×15',random:15}
];

let cile={radky:[],sloupce:[]},N=5,M=5; // M řádků × N sloupců
let mrizka=[],rezimKrizek=false,vyhrano=false;
let start=Date.now(),timer=null;

function voditka(grid){
  const radky=grid.map(r=>{
    const runs=r.join('').split(/0+/).filter(Boolean).map(x=>x.length);
    return runs.length?runs:[0];
  });
  const sloupce=[];
  for(let c=0;c<grid[0].length;c++){
    let run=0;const runs=[];
    for(let r=0;r<grid.length;r++){
      if(grid[r][c]){run++;}else if(run){runs.push(run);run=0;}
    }
    if(run)runs.push(run);
    sloupce.push(runs.length?runs:[0]);
  }
  return {radky,sloupce};
}

function novaHra(){
  const p=PUZZLES[+$('puzzle').value];
  let cil;
  if(p.random){
    M=N=p.random;
    do{
      cil=Array.from({length:M},()=>Array.from({length:N},()=>Math.random()<.55?1:0));
    }while(!cil.flat().some(x=>x));
  }else{
    cil=p.g.map(r=>[...r].map(ch=>ch==='#'?1:0));
    M=cil.length;N=cil[0].length;
  }
  cile=voditka(cil);
  mrizka=Array.from({length:M},()=>Array(N).fill(0)); // 0 prázdné, 1 plné, 2 křížek
  vyhrano=false;$('vyhra').textContent='';
  start=Date.now();
  if(timer)clearInterval(timer);
  timer=setInterval(()=>{
    if(vyhrano)return;
    const s=Math.floor((Date.now()-start)/1000);
    $('cas').textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  },500);
  $('cas').textContent='0:00';
  vykresli();
}

function radekHotov(i){
  const runs=mrizka[i].join('').split(/[02]+/).filter(Boolean).map(x=>x.length);
  const cil=cile.radky[i].filter(x=>x>0);
  return JSON.stringify(runs)===JSON.stringify(cil);
}
function sloupecHotov(c){
  let run=0;const runs=[];
  for(let r=0;r<M;r++){if(mrizka[r][c]===1)run++;else if(run){runs.push(run);run=0;}}
  if(run)runs.push(run);
  const cil=cile.sloupce[c].filter(x=>x>0);
  return JSON.stringify(runs)===JSON.stringify(cil);
}

function vykresli(){
  let html='<table><tr><td class="rohova"></td>';
  for(let c=0;c<N;c++){
    html+=`<td class="vodV ${sloupecHotov(c)?'hotova':''} ${(c+1)%5===0&&c<N-1?'hr':''}" id="vs${c}">`+
      cile.sloupce[c].map(x=>`<div>${x}</div>`).join('')+'</td>';
  }
  html+='</tr>';
  for(let r=0;r<M;r++){
    html+=`<tr><td class="vodH ${radekHotov(r)?'hotova':''} ${(r+1)%5===0&&r<M-1?'hb':''}" id="vr${r}">${cile.radky[r].join(' ')}</td>`;
    for(let c=0;c<N;c++){
      const st=mrizka[r][c];
      html+=`<td class="bunka ${st===1?'plna':st===2?'krizek':''} ${(c+1)%5===0&&c<N-1?'hr':''} ${(r+1)%5===0&&r<M-1?'hb':''}" data-r="${r}" data-c="${c}"></td>`;
    }
    html+='</tr>';
  }
  html+='</table>';
  $('deska').innerHTML=html;
  $('deska').querySelectorAll('.bunka').forEach(td=>{
    td.onclick=()=>klik(+td.dataset.r,+td.dataset.c,rezimKrizek?2:1);
    td.oncontextmenu=e=>{e.preventDefault();klik(+td.dataset.r,+td.dataset.c,2);};
  });
}

function klik(r,c,typ){
  if(vyhrano)return;
  mrizka[r][c]=mrizka[r][c]===typ?0:typ;
  vykresli();
  zkontroluj();
}

function zkontroluj(){
  for(let r=0;r<M;r++)if(!radekHotov(r))return;
  for(let c=0;c<N;c++)if(!sloupecHotov(c))return;
  vyhrano=true;
  const s=Math.floor((Date.now()-start)/1000);
  $('vyhra').textContent=`🎉 Vyřešeno za ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}!`;
  // křížky pryč pro čistý obrázek
  mrizka=mrizka.map(row=>row.map(x=>x===2?0:x));
  vykresli();
}

$('puzzle').innerHTML=PUZZLES.map((p,i)=>`<option value="${i}">${p.nazev}</option>`).join('');
$('nova').onclick=novaHra;
$('puzzle').onchange=novaHra;
$('rezim').onclick=()=>{
  rezimKrizek=!rezimKrizek;
  $('rezim').textContent=rezimKrizek?'✕ Křížky':'✏️ Vybarvit';
  $('rezim').classList.toggle('aktivni',rezimKrizek);
};
$('smazat').onclick=()=>{
  if(vyhrano||confirm('Smazat rozdělanou hru?')){
    mrizka=Array.from({length:M},()=>Array(N).fill(0));
    vyhrano=false;$('vyhra').textContent='';start=Date.now();
    vykresli();
  }
};
novaHra();
</script>
</body>
</html>
