<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧮 Řešič rovnic</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:720px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.tabs{display:flex;margin-bottom:18px;border-bottom:1px solid #404040;flex-wrap:wrap}
.tab{padding:11px 16px;background:#2a2a2a;border:1px solid #404040;border-bottom:none;cursor:pointer;color:#bbb;border-radius:8px 8px 0 0;font-size:.88rem}
.tab.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
.pane{display:none}.pane.active{display:block}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:16px}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px;margin-bottom:12px;text-align:center;font-size:1.05rem}
.rovnice{display:flex;gap:8px;align-items:center;justify-content:center;flex-wrap:wrap;font-size:1.2rem}
.rovnice input{width:86px;margin:0}
.vysledek{background:#1e1e1e;border:1px solid #404040;border-radius:6px;padding:16px;margin-top:16px;font-size:1.05rem;line-height:1.7}
.vysledek .koren{color:#4caf50;font-weight:700;font-size:1.2rem}
.postup{color:#999;font-size:.88rem;border-top:1px dashed #404040;margin-top:10px;padding-top:10px;line-height:1.7}
</style>
</head>
<body>
<div class="container">
  <h1>🧮 Řešič rovnic</h1>
  <div class="tabs">
    <div class="tab active" data-pane="lin">📏 Lineární</div>
    <div class="tab" data-pane="kvad">📐 Kvadratická</div>
    <div class="tab" data-pane="soustava">🔗 Soustava 2×2</div>
  </div>

  <div class="pane active" id="lin">
    <div class="card">
      <h2>a·x + b = c</h2>
      <div class="rovnice"><input id="la" value="2">· x +<input id="lb" value="3">=<input id="lc" value="11"></div>
      <div class="vysledek" id="linV"></div>
    </div>
  </div>

  <div class="pane" id="kvad">
    <div class="card">
      <h2>a·x² + b·x + c = 0</h2>
      <div class="rovnice"><input id="ka" value="1">· x² +<input id="kb" value="-5">· x +<input id="kc" value="6">= 0</div>
      <div class="vysledek" id="kvadV"></div>
    </div>
  </div>

  <div class="pane" id="soustava">
    <div class="card">
      <h2>Soustava dvou rovnic</h2>
      <div class="rovnice"><input id="s1a" value="2">· x +<input id="s1b" value="1">· y =<input id="s1c" value="8"></div>
      <div class="rovnice" style="margin-top:10px"><input id="s2a" value="1">· x −<input id="s2b" value="1" title="koeficient se znaménkem se zadává zde">· y =<input id="s2c" value="1"></div>
      <p style="color:#888;font-size:.8rem;margin-top:8px;text-align:center">Pozn.: druhá rovnice je a·x + b·y = c – znaménko zadejte u koeficientu (např. −1).</p>
      <div class="vysledek" id="sousV"></div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');$(t.dataset.pane).classList.add('active');
});
const f=x=>+x.toFixed(6);
function lin(){
  const a=+$('la').value,b=+$('lb').value,c=+$('lc').value;
  let html;
  if(a===0)html=b===c?'Nekonečně mnoho řešení (0 = 0).':'Rovnice nemá řešení (a = 0 a b ≠ c).';
  else{
    const x=(c-b)/a;
    html=`<span class="koren">x = ${f(x)}</span>
      <div class="postup">Postup:<br>${a}x + ${b} = ${c}<br>${a}x = ${c} − ${b} = ${f(c-b)}<br>x = ${f(c-b)} / ${a} = ${f(x)}</div>`;
  }
  $('linV').innerHTML=html;
}
function kvad(){
  const a=+$('ka').value,b=+$('kb').value,c=+$('kc').value;
  let html;
  if(a===0){html='a = 0 → není kvadratická (viz záložka Lineární).';}
  else{
    const D=b*b-4*a*c;
    const postup=`Diskriminant: D = b² − 4ac = ${b}² − 4·${a}·${c} = <b>${f(D)}</b><br>`;
    if(D>0){
      const x1=(-b+Math.sqrt(D))/(2*a),x2=(-b-Math.sqrt(D))/(2*a);
      html=`<span class="koren">x₁ = ${f(x1)}</span> &nbsp; <span class="koren">x₂ = ${f(x2)}</span>
        <div class="postup">${postup}D &gt; 0 → dva reálné kořeny:<br>x₁,₂ = (−b ± √D) / 2a = (${-b} ± ${f(Math.sqrt(D))}) / ${f(2*a)}<br>Rozklad: ${a}(x − ${f(x1)})(x − ${f(x2)})</div>`;
    }else if(D===0){
      const x=-b/(2*a);
      html=`<span class="koren">x = ${f(x)}</span> (dvojnásobný kořen)
        <div class="postup">${postup}D = 0 → jeden dvojnásobný kořen x = −b/2a.</div>`;
    }else{
      const re=f(-b/(2*a)),im=f(Math.sqrt(-D)/(2*a));
      html=`<span class="koren">x₁,₂ = ${re} ± ${im}i</span> (komplexní)
        <div class="postup">${postup}D &lt; 0 → reálné kořeny nejsou, řešení jsou komplexně sdružená.</div>`;
    }
  }
  $('kvadV').innerHTML=html;
}
function soustava(){
  const a1=+$('s1a').value,b1=+$('s1b').value,c1=+$('s1c').value;
  const a2=+$('s2a').value,b2=+$('s2b').value,c2=+$('s2c').value;
  const D=a1*b2-a2*b1;
  let html;
  const postup=`Cramerovo pravidlo: D = a₁b₂ − a₂b₁ = ${f(D)}<br>`;
  if(D===0){
    html=(a1*c2-a2*c1===0&&b1*c2-b2*c1===0)?'Soustava má nekonečně mnoho řešení (rovnice jsou závislé).':'Soustava nemá řešení (rovnice si odporují).';
    html+=`<div class="postup">${postup}D = 0 → soustava je singulární.</div>`;
  }else{
    const x=(c1*b2-c2*b1)/D,y=(a1*c2-a2*c1)/D;
    html=`<span class="koren">x = ${f(x)}</span> &nbsp; <span class="koren">y = ${f(y)}</span>
      <div class="postup">${postup}Dx = c₁b₂ − c₂b₁ = ${f(c1*b2-c2*b1)} → x = Dx/D = ${f(x)}<br>Dy = a₁c₂ − a₂c₁ = ${f(a1*c2-a2*c1)} → y = Dy/D = ${f(y)}</div>`;
  }
  $('sousV').innerHTML=html;
}
['la','lb','lc'].forEach(i=>$(i).addEventListener('input',lin));
['ka','kb','kc'].forEach(i=>$(i).addEventListener('input',kvad));
['s1a','s1b','s1c','s2a','s2b','s2c'].forEach(i=>$(i).addEventListener('input',soustava));
lin();kvad();soustava();
</script>
</body>
</html>
