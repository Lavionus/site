<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔠 Převodník velikosti písmen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;margin-bottom:20px}
textarea{width:100%;min-height:100px;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:12px;font-size:1rem;resize:vertical;margin-bottom:10px}
.case-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;background:#1e1e1e;border-radius:8px;padding:10px 14px}
.case-row .label{width:140px;font-size:.82rem;color:#888;flex-shrink:0}
.case-row .val{flex:1;font-family:monospace;word-break:break-all;color:#6aa6fd}
.case-row .copy{background:#404040;border:1px solid #555;color:#bbb;border-radius:6px;padding:7px 12px;cursor:pointer}
.case-row .copy:hover{background:#4a4a4a}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:10px 18px;border-radius:6px;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <h1>🔠 Převodník velikosti písmen</h1>
  <div class="card">
    <textarea id="input" placeholder="Zadej text…">Příklad textu pro převod</textarea>
    <div id="cases"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
function words(s){return s.trim().replace(/[_\-]+/g,' ').replace(/([a-z])([A-Z])/g,'$1 $2').split(/\s+/).filter(Boolean);}
function deacc(s){const m={'á':'a','č':'c','ď':'d','é':'e','ě':'e','í':'i','ň':'n','ó':'o','ř':'r','š':'s','ť':'t','ú':'u','ů':'u','ý':'y','ž':'z'};return s.replace(/[áčďéěíňóřšťúůýž]/g,c=>m[c]||c);}
const CONVERTERS=[
  ['VELKÁ PÍSMENA',s=>s.toUpperCase()],
  ['malá písmena',s=>s.toLowerCase()],
  ['Věta',s=>s.charAt(0).toUpperCase()+s.slice(1).toLowerCase()],
  ['Každé Slovo',s=>words(s).map(w=>w[0].toUpperCase()+w.slice(1).toLowerCase()).join(' ')],
  ['camelCase',s=>{const w=words(deacc(s));return w.map((x,i)=>i===0?x.toLowerCase():x[0].toUpperCase()+x.slice(1).toLowerCase()).join('');}],
  ['PascalCase',s=>words(deacc(s)).map(x=>x[0].toUpperCase()+x.slice(1).toLowerCase()).join('')],
  ['snake_case',s=>words(deacc(s)).map(x=>x.toLowerCase()).join('_')],
  ['SCREAMING_SNAKE',s=>words(deacc(s)).map(x=>x.toUpperCase()).join('_')],
  ['kebab-case',s=>words(deacc(s)).map(x=>x.toLowerCase()).join('-')],
  ['Train-Case',s=>words(deacc(s)).map(x=>x[0].toUpperCase()+x.slice(1).toLowerCase()).join('-')],
  ['dot.case',s=>words(deacc(s)).map(x=>x.toLowerCase()).join('.')],
  ['StŘÍdavě',s=>[...s].map((c,i)=>i%2?c.toUpperCase():c.toLowerCase()).join('')]
];
function render(){
  const v=$('input').value;
  $('cases').innerHTML=CONVERTERS.map(([name,fn],i)=>{
    let out='';try{out=fn(v);}catch(e){out='';}
    return `<div class="case-row"><span class="label">${name}</span><span class="val" id="val${i}">${(out||'').replace(/</g,'&lt;')||'&nbsp;'}</span><button class="copy" data-i="${i}">📋</button></div>`;
  }).join('');
  $('cases').querySelectorAll('.copy').forEach(b=>b.onclick=()=>{const t=$('val'+b.dataset.i).textContent;navigator.clipboard.writeText(t);const to=$('toast');to.textContent='Zkopírováno';to.classList.add('show');setTimeout(()=>to.classList.remove('show'),1000);});
}
$('input').oninput=render;
render();
</script>
</body>
</html>
