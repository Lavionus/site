<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏅 Studijní deník a odznaky</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:640px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:6px;font-weight:600;text-align:center}
.sub{text-align:center;color:#888;font-size:.85rem;margin-bottom:18px}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:16px}
.streakbar{display:flex;justify-content:space-around;text-align:center;margin-bottom:10px}
.streakbar .v{font-size:1.8rem;font-weight:700;color:#6aa6fd}.streakbar .l{font-size:.72rem;color:#888}
.today{display:flex;gap:10px;justify-content:center;margin-top:10px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 24px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:disabled{background:#404040;cursor:default}
.subjects{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0}
.subj{background:#333;border:1px solid #555;border-radius:20px;padding:8px 14px;font-size:.85rem;cursor:pointer}
.subj.done{background:#1f3a2a;border-color:#27ae60;color:#8adba0}
.badges{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px;margin-top:10px}
.badge{text-align:center;padding:10px 4px;border-radius:8px;background:#1e1e1e;border:1px solid #383838}
.badge.earned{border-color:#f5c542;background:#332d1a}
.badge .ic{font-size:1.6rem}
.badge .n{font-size:.68rem;color:#aaa;margin-top:4px}
.badge.earned .n{color:#f5c542}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.cal .d{aspect-ratio:1;border-radius:4px;background:#1e1e1e;border:1px solid #333}
.cal .d.on{background:#27ae60}
h2.sec{font-size:1rem;margin-bottom:10px;color:#ccc}
</style>
</head>
<body>
<div class="container">
  <h1>🏅 Studijní deník</h1>
  <div class="sub">Zaznamenej si, co jsi dnes procvičoval/a — udrž si sérii dní a získej odznaky.</div>

  <div class="card">
    <div class="streakbar">
      <div><div class="v" id="streak">0</div><div class="l">Dní v řadě 🔥</div></div>
      <div><div class="v" id="totalDays">0</div><div class="l">Celkem dní</div></div>
      <div><div class="v" id="totalSub">0</div><div class="l">Splněné předměty</div></div>
    </div>
    <h2 class="sec">Co jsi dnes procvičoval/a?</h2>
    <div class="subjects" id="subjects"></div>
    <div class="today" style="justify-content:center">
      <button class="btn" id="doneBtn">✅ Zapsat dnešní den</button>
    </div>
  </div>

  <div class="card">
    <h2 class="sec">Posledních 28 dní</h2>
    <div class="cal" id="cal"></div>
  </div>

  <div class="card">
    <h2 class="sec">Odznaky</h2>
    <div class="badges" id="badges"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const PREDMETY=['📖 Čeština','🔢 Matematika','🔬 Přírodní vědy','🌍 Zeměpis/Dějepis','🇬🇧 Jazyky','🎴 Kartičky'];
const KEY='edu_diary_v1';
function load(){return JSON.parse(localStorage.getItem(KEY)||'{"days":{}}');}
function save(d){localStorage.setItem(KEY,JSON.stringify(d));}
let data=load();
let todaySubjects=new Set();
const todayStr=new Date().toISOString().slice(0,10);
if(data.days[todayStr])todaySubjects=new Set(data.days[todayStr]);

function render(){
  $('subjects').innerHTML=PREDMETY.map(p=>`<div class="subj ${todaySubjects.has(p)?'done':''}" data-p="${p}">${p}</div>`).join('');
  document.querySelectorAll('.subj').forEach(el=>el.onclick=()=>{
    const p=el.dataset.p;
    if(todaySubjects.has(p))todaySubjects.delete(p);else todaySubjects.add(p);
    el.classList.toggle('done');
  });
  const days=Object.keys(data.days).sort();
  $('totalDays').textContent=days.length;
  let totalSub=0;Object.values(data.days).forEach(arr=>totalSub+=arr.length);
  $('totalSub').textContent=totalSub;
  $('streak').textContent=computeStreak();
  renderCal();
  renderBadges(days.length,totalSub,computeStreak());
}
function computeStreak(){
  let streak=0;let d=new Date();
  while(true){
    const key=d.toISOString().slice(0,10);
    if(data.days[key]&&data.days[key].length>0){streak++;d.setDate(d.getDate()-1);}
    else break;
  }
  return streak;
}
function renderCal(){
  const box=$('cal');box.innerHTML='';
  for(let i=27;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    const on=data.days[key]&&data.days[key].length>0;
    const cell=document.createElement('div');cell.className='d'+(on?' on':'');
    cell.title=key;
    box.appendChild(cell);
  }
}
const BADGE_DEFS=[
  {n:'První krok',ic:'🌱',cond:(d,s,st)=>d>=1},
  {n:'3denní série',ic:'🔥',cond:(d,s,st)=>st>=3},
  {n:'Týdenní série',ic:'⭐',cond:(d,s,st)=>st>=7},
  {n:'Měsíční série',ic:'🏆',cond:(d,s,st)=>st>=30},
  {n:'10 předmětů',ic:'📚',cond:(d,s,st)=>s>=10},
  {n:'50 předmětů',ic:'🎓',cond:(d,s,st)=>s>=50},
  {n:'Všestrannost',ic:'🌈',cond:(d,s,st)=>{const all=new Set();Object.values(data.days).forEach(arr=>arr.forEach(p=>all.add(p)));return all.size>=PREDMETY.length;}}
];
function renderBadges(d,s,st){
  $('badges').innerHTML=BADGE_DEFS.map(b=>{
    const earned=b.cond(d,s,st);
    return `<div class="badge ${earned?'earned':''}"><div class="ic">${b.ic}</div><div class="n">${b.n}</div></div>`;
  }).join('');
}
$('doneBtn').onclick=()=>{
  if(todaySubjects.size===0){alert('Vyber aspoň jeden předmět, který jsi dnes procvičoval/a.');return;}
  data.days[todayStr]=[...todaySubjects];
  save(data);
  render();
};
render();
</script>
</body>
</html>
