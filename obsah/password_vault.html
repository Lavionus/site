<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔐 Trezor hesel</title>
<link rel="stylesheet" href="../common.css">
<script>
  if (localStorage.getItem('webapp_theme') === 'light') document.documentElement.dataset.theme = 'light';
</script>
<style>
body{background:var(--bg-deep);padding:20px clamp(14px,3vw,40px);min-height:100vh}
.container{max-width:820px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:4px;text-align:center}
.sub{color:var(--text-muted);font-size:.85rem;margin-bottom:18px;text-align:center}
.card{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px}
label{display:block;font-size:.78rem;color:var(--text-faint);margin-bottom:5px;margin-top:10px}
label:first-child{margin-top:0}
input{width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:9px 11px;font-size:.9rem;font-family:inherit}
.btn{background:var(--bg-control);color:var(--text);border:1px solid var(--border-strong);padding:9px 16px;border-radius:6px;cursor:pointer;font-size:.85rem;font-weight:600}
.btn:hover{background:var(--bg-hover)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
.status{text-align:center;font-size:.85rem;margin-top:10px;min-height:18px}
.status.err{color:var(--danger)}
.status.ok{color:var(--ok)}
.note{font-size:.76rem;color:var(--text-faint);margin-top:10px;line-height:1.5;text-align:center}
.hidden{display:none!important}

.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.toolbar input[type=search]{flex:1;min-width:180px;background:var(--bg-input);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 12px;font-size:.85rem}

.list{display:grid;gap:10px}
.entry{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.entry .head{display:flex;justify-content:space-between;align-items:center;gap:10px}
.entry h3{font-size:.95rem}
.entry .url{font-size:.75rem;color:var(--text-faint);word-break:break-all}
.fieldRow{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:.85rem}
.fieldRow .val{flex:1;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-family:ui-monospace,Consolas,monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fieldRow button{background:var(--bg-control);border:1px solid var(--border-strong);color:var(--text-muted);border-radius:6px;padding:5px 9px;font-size:.78rem;cursor:pointer;flex-shrink:0}
.fieldRow button:hover{background:var(--bg-hover)}
.entry .actions{display:flex;gap:8px;margin-top:10px}
.entry .actions button{font-size:.78rem;padding:6px 10px}
.empty{padding:40px;text-align:center;color:var(--text-faint)}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-start;justify-content:center;overflow-y:auto;padding:30px 14px}
.overlay.show{display:flex}
.modal{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);width:100%;max-width:480px;padding:22px;margin-bottom:30px}
.modal h2{font-size:1.05rem;margin-bottom:14px}
.pwRow{display:flex;gap:8px}
.pwRow input{flex:1}
.pwRow button{flex-shrink:0}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
</style>
</head>
<body>
<div class="container">
  <h1>🔐 Trezor hesel</h1>
  <p class="sub">Přihlašovací údaje zašifrované hlavním heslem (AES-GCM), uložené jen v tomto prohlížeči.</p>

  <div class="card" id="lockedView">
    <label>Hlavní heslo</label>
    <input type="password" id="masterPw" placeholder="Zadej hlavní heslo…">
    <div class="row">
      <button class="btn primary" id="unlockBtn" style="flex:1">🔓 Odemknout / vytvořit trezor</button>
    </div>
    <div class="status" id="lockStatus"></div>
    <p class="note">Hlavní heslo se nikam neukládá ani neodesílá. Pokud ho zapomeneš, uložené záznamy nelze obnovit.</p>
  </div>

  <div class="hidden" id="vaultView">
    <div class="toolbar">
      <input type="search" id="search" placeholder="🔍 Hledat podle názvu / URL / uživatele…">
      <button class="btn primary" id="btnNew">+ Nový záznam</button>
      <button class="btn" id="btnExport">⬇️ Záloha</button>
      <button class="btn" id="btnImport">⬆️ Obnovit zálohu</button>
      <button class="btn" id="btnLock">🔒 Zamknout</button>
      <input type="file" id="fileImport" accept="application/json" style="display:none">
    </div>
    <div id="list"></div>
  </div>
</div>

<!-- editační modal -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h2 id="editTitle">Nový záznam</h2>
    <input type="hidden" id="fId">
    <label>Název / služba</label><input id="fSite" placeholder="Gmail">
    <label>URL (nepovinné)</label><input id="fUrl" placeholder="https://mail.google.com">
    <label>Uživatelské jméno / e-mail</label><input id="fUser">
    <label>Heslo</label>
    <div class="pwRow">
      <input id="fPass" type="text" placeholder="heslo">
      <button class="btn" id="btnGenPw" type="button">🎲 Generovat</button>
    </div>
    <label>Poznámka (nepovinné)</label><input id="fNote">
    <div class="modal-actions">
      <button class="btn" id="btnCancelEdit">Zrušit</button>
      <button class="btn primary" id="btnSaveEntry">Uložit</button>
    </div>
  </div>
</div>

<script>
const $=id=>document.getElementById(id);
const enc=new TextEncoder(), dec=new TextDecoder();
const VAULT_KEY='pwvault_data';
const SALT_KEY='pwvault_salt';

let cryptoKey=null;
let entries=[];

function b64(buf){return btoa(String.fromCharCode(...new Uint8Array(buf)));}
function unb64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}

async function deriveKey(password, salt){
  const base=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}

async function unlock(){
  const pw=$('masterPw').value;
  if(!pw){ setLockStatus('Zadej hlavní heslo.', true); return; }
  const stored=localStorage.getItem(VAULT_KEY);
  if(!stored){
    const salt=crypto.getRandomValues(new Uint8Array(16));
    cryptoKey=await deriveKey(pw, salt);
    localStorage.setItem(SALT_KEY, b64(salt));
    entries=[];
    await persist();
    openVault('Nový trezor vytvořen.');
    return;
  }
  try{
    const salt=unb64(localStorage.getItem(SALT_KEY));
    cryptoKey=await deriveKey(pw, salt);
    const {iv,data}=JSON.parse(stored);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:unb64(iv)},cryptoKey,unb64(data));
    entries=JSON.parse(dec.decode(plain));
    openVault();
  }catch(e){
    cryptoKey=null;
    setLockStatus('❌ Nesprávné heslo.', true);
  }
}
function setLockStatus(msg, err){
  $('lockStatus').className='status'+(err?' err':' ok');
  $('lockStatus').textContent=msg;
}
function openVault(msg){
  $('lockedView').classList.add('hidden');
  $('vaultView').classList.remove('hidden');
  $('masterPw').value='';
  $('lockStatus').textContent='';
  renderList();
  if(msg) alert(msg);
}
function lockVault(){
  cryptoKey=null; entries=[];
  $('vaultView').classList.add('hidden');
  $('lockedView').classList.remove('hidden');
}

async function persist(){
  if(!cryptoKey) return;
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const cipher=await crypto.subtle.encrypt({name:'AES-GCM',iv},cryptoKey,enc.encode(JSON.stringify(entries)));
  localStorage.setItem(VAULT_KEY, JSON.stringify({iv:b64(iv),data:b64(cipher)}));
}

/* ---- Seznam ---- */
function renderList(){
  const q=norm($('search').value.trim());
  const filtered=entries.filter(e=>!q || norm(e.site+' '+e.url+' '+e.user).includes(q))
    .sort((a,b)=>a.site.localeCompare(b.site,'cs'));
  if(!filtered.length){
    $('list').innerHTML='<div class="empty">Žádné záznamy. Přidej první tlačítkem „+ Nový záznam“.</div>';
    return;
  }
  $('list').innerHTML='<div class="list">'+filtered.map(e=>`
    <div class="entry" data-id="${e.id}">
      <div class="head">
        <div>
          <h3>${escHtml(e.site)}</h3>
          ${e.url?`<div class="url">${escHtml(e.url)}</div>`:''}
        </div>
      </div>
      <div class="fieldRow"><span class="val">${escHtml(e.user)||'—'}</span><button class="copyUser">📋 Kopírovat</button></div>
      <div class="fieldRow"><span class="val pwmask" data-pw="${escHtml(e.pass)}">••••••••</span><button class="togglePw">👁️</button><button class="copyPass">📋 Kopírovat</button></div>
      ${e.note?`<div class="fieldRow"><span class="val" style="font-family:inherit">${escHtml(e.note)}</span></div>`:''}
      <div class="actions">
        <button class="btn editBtn">✏️ Upravit</button>
        <button class="btn delBtn" style="color:var(--danger)">🗑️ Smazat</button>
      </div>
    </div>`).join('')+'</div>';

  $('list').querySelectorAll('.entry').forEach(card=>{
    const id=card.dataset.id;
    const e=entries.find(x=>x.id===id);
    card.querySelector('.copyUser').onclick=(ev)=>doCopy(e.user, ev.target);
    card.querySelector('.copyPass').onclick=(ev)=>doCopy(e.pass, ev.target);
    card.querySelector('.togglePw').onclick=(ev)=>{
      const span=card.querySelector('.pwmask');
      const shown=span.dataset.shown==='1';
      span.textContent = shown ? '••••••••' : span.dataset.pw;
      span.dataset.shown = shown ? '0' : '1';
      ev.target.textContent = shown ? '👁️' : '🙈';
    };
    card.querySelector('.editBtn').onclick=()=>openEdit(e);
    card.querySelector('.delBtn').onclick=async ()=>{
      if(!confirm('Opravdu smazat tento záznam?'))return;
      entries=entries.filter(x=>x.id!==id);
      await persist();
      renderList();
    };
  });
}
function doCopy(text, btnEl){
  navigator.clipboard.writeText(text||'').then(()=>{
    const orig=btnEl.textContent;
    btnEl.textContent='✅';
    setTimeout(()=>{btnEl.textContent=orig;},1000);
  });
}

/* ---- Editace ---- */
function openEdit(e){
  $('editTitle').textContent=e?'Upravit záznam':'Nový záznam';
  $('fId').value=e?e.id:'';
  $('fSite').value=e?e.site:'';
  $('fUrl').value=e?e.url||'':'';
  $('fUser').value=e?e.user||'':'';
  $('fPass').value=e?e.pass||'':'';
  $('fNote').value=e?e.note||'':'';
  $('editOverlay').classList.add('show');
}
$('btnNew').addEventListener('click',()=>openEdit(null));
$('btnCancelEdit').addEventListener('click',()=>$('editOverlay').classList.remove('show'));
$('btnGenPw').addEventListener('click',()=>{
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz23456789!@#$%^&*';
  let out='';
  const arr=new Uint32Array(18);
  crypto.getRandomValues(arr);
  for(let i=0;i<18;i++) out+=chars[arr[i]%chars.length];
  $('fPass').value=out;
});
$('btnSaveEntry').addEventListener('click', async ()=>{
  const site=$('fSite').value.trim();
  if(!site){alert('Vyplň alespoň název služby.');return;}
  const id=$('fId').value || 'pw'+Date.now()+Math.random().toString(36).slice(2,6);
  const data={id, site, url:$('fUrl').value.trim(), user:$('fUser').value.trim(), pass:$('fPass').value, note:$('fNote').value.trim()};
  const idx=entries.findIndex(x=>x.id===id);
  if(idx>=0) entries[idx]=data; else entries.push(data);
  await persist();
  $('editOverlay').classList.remove('show');
  renderList();
});

/* ---- Export / import zálohy (šifrovaná surová data) ---- */
$('btnExport').addEventListener('click',()=>{
  const stored=localStorage.getItem(VAULT_KEY);
  const salt=localStorage.getItem(SALT_KEY);
  if(!stored)return;
  const blob=new Blob([JSON.stringify({salt, vault:JSON.parse(stored)},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='trezor-zaloha.json';a.click();
  URL.revokeObjectURL(url);
});
$('btnImport').addEventListener('click',()=>$('fileImport').click());
$('fileImport').addEventListener('change', e=>{
  const file=e.target.files[0];
  if(!file)return;
  if(!confirm('Obnovením zálohy přepíšeš aktuální trezor v tomto prohlížeči. Pokračovat?')){ e.target.value=''; return; }
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const data=JSON.parse(reader.result);
      if(!data.salt || !data.vault) throw new Error('bad format');
      localStorage.setItem(SALT_KEY, data.salt);
      localStorage.setItem(VAULT_KEY, JSON.stringify(data.vault));
      lockVault();
      alert('Záloha obnovena. Odemkni trezor heslem, které jsi použil/a při jejím vytvoření.');
    }catch{ alert('Soubor se nepodařilo načíst — očekává se záloha z této aplikace.'); }
  };
  reader.readAsText(file);
  e.target.value='';
});

$('unlockBtn').addEventListener('click', unlock);
$('masterPw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });
$('btnLock').addEventListener('click', lockVault);
$('search').addEventListener('input', renderList);
$('editOverlay').addEventListener('click', e=>{ if(e.target===$('editOverlay')) $('editOverlay').classList.remove('show'); });
</script>
</body>
</html>
