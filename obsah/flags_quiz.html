<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏳️ Kvíz vlajky a hlavní města</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
.setup{display:flex;gap:12px;flex-wrap:wrap;align-items:end;justify-content:center}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:11px 22px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.game,.results{display:none;text-align:center}
.scorebar{display:flex;justify-content:space-around;margin-bottom:18px}
.scorebar .v{font-size:1.4rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.flag{font-size:7rem;line-height:1;margin:10px 0}
.qtext{font-size:1.2rem;margin-bottom:18px;color:#bbb}
.options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.opt{padding:14px;background:#1e1e1e;border:2px solid #404040;border-radius:8px;cursor:pointer;font-size:1rem;transition:all .15s}
.opt:hover{border-color:#6aa6fd}
.opt.correct{background:#1e3a26;border-color:#27ae60}
.opt.wrong{background:#3a1e1e;border-color:#e74c3c}
.results .big{font-size:3rem;font-weight:700;color:#6aa6fd;margin:10px 0}
</style>
</head>
<body>
<div class="container">
  <h1>🏳️ Kvíz: vlajky a hlavní města</h1>
  <div class="card" id="setupCard">
    <div class="setup">
      <div><label>Typ otázek</label><select id="mode"><option value="flag2country">Vlajka → země</option><option value="country2capital">Země → hlavní město</option><option value="capital2country">Hl. město → země</option><option value="mix">Smíšené</option></select></div>
      <div><label>Region</label><select id="region"><option value="europe">Evropa</option><option value="world">Celý svět</option></select></div>
      <div><label>Otázek</label><select id="numQ"><option>10</option><option>15</option><option>20</option></select></div>
      <button class="btn" id="startBtn">▶️ Start</button>
    </div>
  </div>
  <div class="card game" id="gameCard">
    <div class="scorebar">
      <div><div class="v" id="qNum">1</div><div class="l">Otázka</div></div>
      <div><div class="v" id="score">0</div><div class="l">Skóre</div></div>
      <div><div class="v" id="streak">0</div><div class="l">Série 🔥</div></div>
    </div>
    <div class="flag" id="flag"></div>
    <div class="qtext" id="qtext"></div>
    <div class="options" id="options"></div>
  </div>
  <div class="card results" id="resultsCard">
    <div style="font-size:2rem" id="emoji"></div>
    <div class="big" id="finalScore"></div>
    <p style="color:#888" id="finalDetail"></p>
    <button class="btn" id="againBtn" style="margin-top:16px">🔄 Hrát znovu</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const EUROPE=[
['🇨🇿','Česko','Praha'],['🇸🇰','Slovensko','Bratislava'],['🇵🇱','Polsko','Varšava'],['🇩🇪','Německo','Berlín'],['🇦🇹','Rakousko','Vídeň'],['🇭🇺','Maďarsko','Budapešť'],['🇫🇷','Francie','Paříž'],['🇪🇸','Španělsko','Madrid'],['🇮🇹','Itálie','Řím'],['🇵🇹','Portugalsko','Lisabon'],['🇬🇧','Velká Británie','Londýn'],['🇮🇪','Irsko','Dublin'],['🇳🇱','Nizozemsko','Amsterdam'],['🇧🇪','Belgie','Brusel'],['🇨🇭','Švýcarsko','Bern'],['🇩🇰','Dánsko','Kodaň'],['🇸🇪','Švédsko','Stockholm'],['🇳🇴','Norsko','Oslo'],['🇫🇮','Finsko','Helsinky'],['🇬🇷','Řecko','Atény'],['🇷🇴','Rumunsko','Bukurešť'],['🇧🇬','Bulharsko','Sofie'],['🇭🇷','Chorvatsko','Záhřeb'],['🇸🇮','Slovinsko','Lublaň'],['🇷🇸','Srbsko','Bělehrad'],['🇺🇦','Ukrajina','Kyjev'],['🇱🇹','Litva','Vilnius'],['🇱🇻','Lotyšsko','Riga'],['🇪🇪','Estonsko','Tallinn'],['🇮🇸','Island','Reykjavík']
];
const WORLD=EUROPE.concat([
['🇺🇸','USA','Washington'],['🇨🇦','Kanada','Ottawa'],['🇲🇽','Mexiko','Ciudad de México'],['🇧🇷','Brazílie','Brasília'],['🇦🇷','Argentina','Buenos Aires'],['🇯🇵','Japonsko','Tokio'],['🇨🇳','Čína','Peking'],['🇮🇳','Indie','Nové Dillí'],['🇦🇺','Austrálie','Canberra'],['🇪🇬','Egypt','Káhira'],['🇿🇦','JAR','Pretoria'],['🇷🇺','Rusko','Moskva'],['🇹🇷','Turecko','Ankara'],['🇰🇷','Jižní Korea','Soul'],['🇹🇭','Thajsko','Bangkok'],['🇮🇩','Indonésie','Jakarta'],['🇸🇦','Saúdská Arábie','Rijád'],['🇳🇿','Nový Zéland','Wellington'],['🇰🇪','Keňa','Nairobi'],['🇳🇬','Nigérie','Abuja']
]);
let pool,questions,idx,score,streak;
function start(){
  pool=$('region').value==='europe'?EUROPE:WORLD;
  const n=Math.min(+$('numQ').value,pool.length);
  const shuffled=[...pool].sort(()=>Math.random()-0.5).slice(0,n);
  questions=shuffled.map(c=>{
    let m=$('mode').value;if(m==='mix')m=['flag2country','country2capital','capital2country'][Math.floor(Math.random()*3)];
    return{country:c,type:m};
  });
  idx=0;score=0;streak=0;
  $('setupCard').style.display='none';$('resultsCard').style.display='none';$('gameCard').style.display='block';
  showQ();
}
function showQ(){
  if(idx>=questions.length){finish();return;}
  const{country,type}=questions[idx];
  $('qNum').textContent=idx+1;$('score').textContent=score;$('streak').textContent=streak;
  let answerIdx,question,flag='';
  if(type==='flag2country'){flag=country[0];question='Které zemi patří tato vlajka?';answerIdx=1;}
  else if(type==='country2capital'){question='Jaké je hlavní město země '+country[1]+'?';answerIdx=2;}
  else{question='Které země je '+country[2]+' hlavním městem?';answerIdx=1;}
  $('flag').textContent=flag;$('flag').style.display=flag?'block':'none';
  $('qtext').textContent=question;
  const correct=country[answerIdx];
  const wrongs=[...pool].filter(c=>c[answerIdx]!==correct).sort(()=>Math.random()-0.5).slice(0,3).map(c=>c[answerIdx]);
  const opts=[correct,...wrongs].sort(()=>Math.random()-0.5);
  $('options').innerHTML=opts.map(o=>`<div class="opt" data-o="${o.replace(/"/g,'&quot;')}">${o}</div>`).join('');
  $('options').querySelectorAll('.opt').forEach(el=>el.onclick=()=>answer(el,correct));
}
function answer(el,correct){
  $('options').querySelectorAll('.opt').forEach(o=>{o.onclick=null;if(o.dataset.o===correct)o.classList.add('correct');});
  if(el.dataset.o===correct){score++;streak++;}else{el.classList.add('wrong');streak=0;}
  $('score').textContent=score;$('streak').textContent=streak;
  setTimeout(()=>{idx++;showQ();},1000);
}
function finish(){
  $('gameCard').style.display='none';$('resultsCard').style.display='block';
  const pct=Math.round(score/questions.length*100);
  $('finalScore').textContent=score+' / '+questions.length+' ('+pct+'%)';
  $('emoji').textContent=pct>=90?'🏆':pct>=70?'🎉':pct>=50?'👍':'📚';
  $('finalDetail').textContent=pct>=90?'Skvělý zeměpisec!':pct>=70?'Dobrá práce!':pct>=50?'Slušné, trénuj dál!':'Příště to půjde lépe!';
}
$('startBtn').onclick=start;$('againBtn').onclick=()=>{$('setupCard').style.display='block';$('resultsCard').style.display='none';};
</script>
</body>
</html>
