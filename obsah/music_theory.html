<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎼 Hudební nauka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:820px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:16px}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px;width:100%;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:520px){.grid{grid-template-columns:1fr}}
.klaviatura{position:relative;display:flex;justify-content:center;height:130px;user-select:none;margin:14px 0}
.bila{position:relative;width:38px;height:100%;background:#f5f5f5;border:1px solid #999;border-radius:0 0 4px 4px;z-index:1}
.bila.aktivni{background:#6aa6fd}
.bila.korenova{background:#e67e22}
.cerna{position:absolute;top:0;width:24px;height:60%;background:#181818;border-radius:0 0 3px 3px;z-index:2}
.cerna.aktivni{background:#6aa6fd}
.cerna.korenova{background:#e67e22}
.noty{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:8px}
.notaTag{background:#2d3a4d;border:1px solid #6aa6fd;color:#cfe0ff;border-radius:14px;padding:4px 12px;font-size:.9rem;font-weight:600}
.notaTag.koren{background:#4d3320;border-color:#e67e22;color:#ffd9b0}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;display:block;margin:10px auto 0}
table{width:100%;border-collapse:collapse;font-size:.88rem}
td,th{padding:7px;border-bottom:1px solid #333;text-align:center}
th{color:#6aa6fd;font-size:.78rem}
td:first-child{font-weight:700}
.hint{color:#777;font-size:.8rem;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <h1>🎼 Hudební nauka</h1>
  <div class="card">
    <h2>Stupnice a akordy</h2>
    <div class="grid">
      <div><label>Základní tón</label><select id="koren"></select></div>
      <div><label>Typ</label>
        <select id="typ">
          <optgroup label="Stupnice">
            <option value="dur">Durová (jónská)</option>
            <option value="moll">Mollová přirozená (aiolská)</option>
            <option value="mollHarm">Mollová harmonická</option>
            <option value="pentaDur">Pentatonika durová</option>
            <option value="pentaMoll">Pentatonika mollová</option>
            <option value="blues">Bluesová</option>
          </optgroup>
          <optgroup label="Akordy">
            <option value="akordDur">Kvintakord durový</option>
            <option value="akordMoll">Kvintakord mollový</option>
            <option value="akord7">Dominantní septakord (7)</option>
            <option value="akordMaj7">Velký septakord (maj7)</option>
            <option value="akordM7">Mollový septakord (m7)</option>
            <option value="akordDim">Zmenšený (dim)</option>
            <option value="akordAug">Zvětšený (aug)</option>
          </optgroup>
        </select>
      </div>
    </div>
    <div class="klaviatura" id="klav"></div>
    <div class="noty" id="noty"></div>
    <button class="btn" id="prehraj">🔊 Přehrát</button>
    <p class="hint">České názvosloví: B (mezinárodně) = <b>H</b>, B♭ = <b>B</b>. Zde značíme H a B (= Hes).</p>
  </div>
  <div class="card">
    <h2>Kvintový kruh – předznamenání</h2>
    <table>
      <thead><tr><th>Křížky</th><th>Dur</th><th>Moll</th><th></th><th>Béčka</th><th>Dur</th><th>Moll</th></tr></thead>
      <tbody>
        <tr><td>0</td><td>C</td><td>a</td><td></td><td>0</td><td>C</td><td>a</td></tr>
        <tr><td>1 ♯</td><td>G</td><td>e</td><td></td><td>1 ♭</td><td>F</td><td>d</td></tr>
        <tr><td>2 ♯</td><td>D</td><td>h</td><td></td><td>2 ♭</td><td>B</td><td>g</td></tr>
        <tr><td>3 ♯</td><td>A</td><td>fis</td><td></td><td>3 ♭</td><td>Es</td><td>c</td></tr>
        <tr><td>4 ♯</td><td>E</td><td>cis</td><td></td><td>4 ♭</td><td>As</td><td>f</td></tr>
        <tr><td>5 ♯</td><td>H</td><td>gis</td><td></td><td>5 ♭</td><td>Des</td><td>b</td></tr>
        <tr><td>6 ♯</td><td>Fis</td><td>dis</td><td></td><td>6 ♭</td><td>Ges</td><td>es</td></tr>
      </tbody>
    </table>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const NOTY=['C','Cis','D','Dis','E','F','Fis','G','Gis','A','B','H']; // česky: B=Hes, H=B mezinárodní
const JE_CERNA=[0,1,0,1,0,0,1,0,1,0,1,0];
const VZORCE={
  dur:[0,2,4,5,7,9,11],moll:[0,2,3,5,7,8,10],mollHarm:[0,2,3,5,7,8,11],
  pentaDur:[0,2,4,7,9],pentaMoll:[0,3,5,7,10],blues:[0,3,5,6,7,10],
  akordDur:[0,4,7],akordMoll:[0,3,7],akord7:[0,4,7,10],akordMaj7:[0,4,7,11],
  akordM7:[0,3,7,10],akordDim:[0,3,6],akordAug:[0,4,8],
};
$('koren').innerHTML=NOTY.map((n,i)=>`<option value="${i}">${n}</option>`).join('');

function vybrane(){
  const k=+$('koren').value;
  return VZORCE[$('typ').value].map(x=>(k+x)%12).map((pc,i)=>({pc,jeKoren:i===0,abs:k+VZORCE[$('typ').value][i]}));
}
function render(){
  const sada=vybrane();
  const mapa={};
  sada.forEach(s=>{if(mapa[s.pc]===undefined)mapa[s.pc]=s.jeKoren?'koren':'clen';});
  // klaviatura 2 oktávy
  const kl=$('klav');kl.innerHTML='';
  const bile=[];
  for(let i=0;i<24;i++){
    if(!JE_CERNA[i%12]){
      const d=document.createElement('div');
      const stav=mapa[i%12];
      d.className='bila'+(stav==='koren'?' korenova':stav?' aktivni':'');
      kl.appendChild(d);bile.push({el:d,i});
    }
  }
  for(let i=0;i<24;i++){
    if(JE_CERNA[i%12]){
      const d=document.createElement('div');
      const stav=mapa[i%12];
      d.className='cerna'+(stav==='koren'?' korenova':stav?' aktivni':'');
      const pred=bile.filter(b=>b.i<i).length-1;
      kl.appendChild(d);
      requestAnimationFrame(()=>{
        const b=bile[pred].el;
        d.style.left=(b.offsetLeft+b.offsetWidth-12)+'px';
      });
    }
  }
  $('noty').innerHTML=sada.map(s=>`<span class="notaTag ${s.jeKoren?'koren':''}">${NOTY[s.pc]}</span>`).join('');
}
let actx;
$('prehraj').onclick=()=>{
  actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const sada=vybrane();
  const jeAkord=$('typ').value.startsWith('akord');
  sada.forEach((s,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='triangle';
    o.frequency.value=261.63*Math.pow(2,s.abs/12);
    o.connect(g);g.connect(actx.destination);
    const t=actx.currentTime+(jeAkord?0:i*0.35);
    const dl=jeAkord?1.4:0.32;
    g.gain.setValueAtTime(0.001,t);
    g.gain.exponentialRampToValueAtTime(0.25,t+0.02);
    g.gain.exponentialRampToValueAtTime(0.001,t+dl);
    o.start(t);o.stop(t+dl+0.05);
  });
};
['koren','typ'].forEach(i=>$(i).addEventListener('change',render));
render();
</script>
</body>
</html>
