<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Reakční test</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:640px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
#plocha{height:300px;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;user-select:-webkit-user-select;user-select:none;font-size:1.4rem;font-weight:700;text-align:center;padding:20px;transition:background .1s}
#plocha.ceka{background:#2d3a4d}
#plocha.pozor{background:#8e2f2f}
#plocha.ted{background:#27ae60}
#plocha small{font-size:.85rem;font-weight:400;color:rgba(255,255,255,.75);margin-top:10px}
.res-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #333}
.res-row:last-child{border:none}.res-row b{color:#4caf50}
.hodnoceni{text-align:center;color:#6aa6fd;font-size:1.05rem;margin-top:10px;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <h1>⚡ Reakční test</h1>
  <div class="card">
    <div id="plocha" class="ceka">Klikni pro start<small>Až plocha zezelená, klikni co nejrychleji. 5 kol.</small></div>
    <div class="res-row"><span>Kolo</span><b id="kolo">–</b></div>
    <div class="res-row"><span>Poslední reakce</span><b id="posledni">–</b></div>
    <div class="res-row"><span>Průměr (5 kol)</span><b id="prumer">–</b></div>
    <div class="res-row"><span>🏆 Osobní rekord (průměr)</span><b id="rekord">–</b></div>
    <div class="hodnoceni" id="hodnoceni"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const plocha=$('plocha');
const KOL=5;
let stav='klid',casy=[],timeout,startCas;
let rekord=+localStorage.getItem('reactionBest')||0;
if(rekord)$('rekord').textContent=rekord+' ms';

function dalsiKolo(){
  stav='pozor';
  plocha.className='pozor';
  plocha.innerHTML='Čekej na zelenou…';
  timeout=setTimeout(()=>{
    stav='ted';
    plocha.className='ted';
    plocha.innerHTML='KLIKNI!';
    startCas=performance.now();
  },1000+Math.random()*3000);
}
function konec(){
  const prumer=Math.round(casy.reduce((a,b)=>a+b,0)/casy.length);
  $('prumer').textContent=prumer+' ms';
  if(!rekord||prumer<rekord){
    rekord=prumer;
    localStorage.setItem('reactionBest',rekord);
    $('rekord').textContent=rekord+' ms 🎉';
  }
  let h;
  if(prumer<220)h='🚀 Bleskové reflexy!';
  else if(prumer<280)h='⚡ Výborné – rychlejší než průměr.';
  else if(prumer<350)h='👍 Průměrná reakční doba člověka (~250–300 ms).';
  else h='🐢 Pomalejší – zkuste to odpočatí a bez rozptylování.';
  $('hodnoceni').textContent=h;
  stav='klid';
  plocha.className='ceka';
  plocha.innerHTML='Hotovo! Klikni pro nový test<small>Průměr: '+prumer+' ms</small>';
}
plocha.addEventListener('pointerdown',()=>{
  if(stav==='klid'){
    casy=[];$('hodnoceni').textContent='';$('kolo').textContent='1 / '+KOL;
    dalsiKolo();
  }else if(stav==='pozor'){
    clearTimeout(timeout);
    plocha.className='ceka';
    plocha.innerHTML='Příliš brzy! 😅<small>Klikni pro pokračování stejného kola.</small>';
    stav='predcasne';
  }else if(stav==='predcasne'){
    dalsiKolo();
  }else if(stav==='ted'){
    const t=Math.round(performance.now()-startCas);
    casy.push(t);
    $('posledni').textContent=t+' ms';
    if(casy.length>=KOL){konec();}
    else{
      $('kolo').textContent=(casy.length+1)+' / '+KOL;
      dalsiKolo();
    }
  }
});
</script>
</body>
</html>
