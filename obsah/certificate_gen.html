<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Generátor diplomů</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:330px 1fr;gap:20px}
@media(max-width:900px){.container{grid-template-columns:1fr}}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center;grid-column:1/-1}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;align-self:start}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input,select,textarea{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px;margin-bottom:12px;font-family:inherit}
input[type=color]{padding:2px;height:38px;cursor:pointer}
input[type=range]{padding:0;height:26px}
.rada{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem;width:100%}
.oddel{border-top:1px solid #404040;margin:6px 0 14px;padding-top:12px;font-size:.85rem;color:#6aa6fd;font-weight:600}
/* diplom */
.nahled{background:#333;padding:14px;border-radius:8px;overflow:auto}
.diplom{width:100%;aspect-ratio:1.414;background:var(--papir,#fdfbf5);color:#222;padding:6% 7%;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;font-family:Georgia,'Times New Roman',serif;overflow:hidden}
.diplom.na-vysku{aspect-ratio:0.707;max-width:560px;margin:0 auto}
.diplom.pismo-bezpatkove{font-family:'Segoe UI',Arial,sans-serif}
.diplom.pismo-psaci .jmeno,.diplom.pismo-psaci h2{font-family:'Brush Script MT','Segoe Script',cursive;letter-spacing:.02em;text-transform:none}
.diplom .okraj{position:absolute;inset:12px;border:3px double var(--akcent,#b8860b);pointer-events:none}
.diplom.styl-moderni .okraj{border:4px solid var(--akcent);border-radius:8px}
.diplom.styl-detsky .okraj{border:5px dashed var(--akcent);border-radius:16px}
.diplom.styl-elegant .okraj{border:1px solid var(--akcent);inset:18px;outline:3px solid var(--akcent);outline-offset:-9px}
.diplom.styl-minimal .okraj{border:none;border-top:6px solid var(--akcent);border-bottom:6px solid var(--akcent);inset:0}
.diplom .vodoznak{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16em;opacity:.06;pointer-events:none;user-select:none}
.diplom .emblem{font-size:3.2em;margin-bottom:.2em}
.diplom h2{font-size:2.4em;letter-spacing:.12em;text-transform:uppercase;color:var(--akcent,#b8860b);margin:.1em 0 .3em;font-weight:700}
.diplom.styl-minimal h2{letter-spacing:.3em;font-weight:400}
.diplom .uvod{font-size:1em;color:#555;font-style:italic}
.diplom .jmeno{font-size:1.9em;margin:.4em 0;font-weight:700;border-bottom:2px solid var(--akcent,#b8860b);padding:0 .6em .1em}
.diplom .text{font-size:1.05em;max-width:80%;line-height:1.5;color:#333;white-space:pre-line}
.diplom .spodek{margin-top:auto;display:flex;justify-content:space-between;align-items:flex-end;width:88%;font-size:.9em;color:#444;gap:12px}
.diplom .podpis{border-top:1px solid #888;padding-top:4px;min-width:130px}
.skryt{display:none!important}
@media print{
  body{background:#fff;padding:0}
  h1,.card{display:none}
  .container{display:block;max-width:none}
  .nahled{padding:0;background:#fff;border-radius:0}
  .diplom{width:100%;height:99vh;aspect-ratio:auto;max-width:none}
}
</style>
</head>
<body>
<div class="container">
  <h1>🏆 Generátor diplomů</h1>
  <div class="card">
    <div class="rada">
      <div><label>Styl</label>
        <select id="styl">
          <option value="klasik">Klasický (zlatý)</option>
          <option value="moderni">Moderní (modrý)</option>
          <option value="detsky">Dětský (veselý)</option>
          <option value="elegant">Elegantní (vínový)</option>
          <option value="priroda">Přírodní (zelený)</option>
          <option value="minimal">Minimalistický</option>
        </select>
      </div>
      <div><label>Orientace</label>
        <select id="orientace">
          <option value="sirka">Na šířku</option>
          <option value="vyska">Na výšku</option>
        </select>
      </div>
    </div>
    <div class="rada">
      <div><label>Písmo</label>
        <select id="pismo">
          <option value="patkove">Patkové (klasické)</option>
          <option value="bezpatkove">Bezpatkové (moderní)</option>
          <option value="psaci">Psací (ozdobné)</option>
        </select>
      </div>
      <div><label>Velikost písma: <span id="velText">16</span></label>
        <input type="range" id="velikost" min="11" max="24" value="16">
      </div>
    </div>
    <div class="rada">
      <div><label>Barva akcentu</label><input type="color" id="akcent" value="#b8860b"></div>
      <div><label>Barva papíru</label><input type="color" id="papir" value="#fdfbf5"></div>
    </div>
    <div class="rada">
      <div><label>Emblém (emoji)</label><input id="emblem" value="🏆"></div>
      <div><label>Vodoznak na pozadí</label>
        <select id="vodoznak">
          <option value="ano">Zobrazit</option>
          <option value="ne" selected>Skrýt</option>
        </select>
      </div>
    </div>
    <div class="oddel">Texty</div>
    <label>Nadpis</label><input id="nadpis" value="Diplom">
    <label>Úvodní věta</label><input id="uvod" value="tímto se uděluje">
    <label>Jméno</label><input id="jmeno" value="Jan Novák">
    <label>Text (za co)</label><textarea id="text" rows="3">za 1. místo v turnaji ve stolním tenise</textarea>
    <label>Místo a datum</label><input id="datum">
    <div class="rada">
      <div><label>Podpis / organizace</label><input id="podpis" value="Sportovní klub"></div>
      <div><label>Druhý podpis (nepovinný)</label><input id="podpis2" placeholder="např. ředitel turnaje"></div>
    </div>
    <button class="btn" onclick="window.print()">🖨️ Tisk / uložit PDF</button>
  </div>
  <div class="nahled">
    <div class="diplom styl-klasik" id="diplom">
      <div class="okraj"></div>
      <div class="vodoznak skryt" id="pVodoznak">🏆</div>
      <div class="emblem" id="pEmblem">🏆</div>
      <h2 id="pNadpis">Diplom</h2>
      <div class="uvod" id="pUvod">tímto se uděluje</div>
      <div class="jmeno" id="pJmeno">Jan Novák</div>
      <div class="text" id="pText">za 1. místo…</div>
      <div class="spodek">
        <div id="pDatum"></div>
        <div class="podpis" id="pPodpis">Sportovní klub</div>
        <div class="podpis skryt" id="pPodpis2"></div>
      </div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
$('datum').value='V Praze dne '+new Date().toLocaleDateString('cs-CZ');

// Výchozí barvy jednotlivých stylů (akcent + papír)
const STYLY={
  klasik:['#b8860b','#fdfbf5'],
  moderni:['#2874c9','#ffffff'],
  detsky:['#e67e22','#fffbe8'],
  elegant:['#7b1e3b','#faf6f0'],
  priroda:['#3e7d3a','#f6faf2'],
  minimal:['#333333','#ffffff']
};
let printStyle=null;

function zmenaStylu(){
  const [akcent,papir]=STYLY[$('styl').value];
  $('akcent').value=akcent;
  $('papir').value=papir;
  obnov();
}

function obnov(){
  const d=$('diplom');
  d.className='diplom styl-'+$('styl').value
    +' pismo-'+$('pismo').value
    +($('orientace').value==='vyska'?' na-vysku':'');
  d.style.setProperty('--akcent',$('akcent').value);
  d.style.setProperty('--papir',$('papir').value);
  d.style.fontSize=$('velikost').value+'px';
  $('velText').textContent=$('velikost').value;

  $('pEmblem').textContent=$('emblem').value;
  $('pNadpis').textContent=$('nadpis').value;
  $('pUvod').textContent=$('uvod').value;
  $('pJmeno').textContent=$('jmeno').value;
  $('pText').textContent=$('text').value;
  $('pDatum').textContent=$('datum').value;
  $('pPodpis').textContent=$('podpis').value;

  const p2=$('podpis2').value.trim();
  $('pPodpis2').classList.toggle('skryt',!p2);
  $('pPodpis2').textContent=p2;

  const vodoznak=$('vodoznak').value==='ano';
  $('pVodoznak').classList.toggle('skryt',!vodoznak);
  $('pVodoznak').textContent=$('emblem').value;

  // Orientace stránky při tisku podle orientace diplomu
  if(!printStyle){
    printStyle=document.createElement('style');
    document.head.appendChild(printStyle);
  }
  printStyle.textContent='@page{size:A4 '+($('orientace').value==='vyska'?'portrait':'landscape')+';margin:0}';
}

$('styl').addEventListener('change',zmenaStylu);
document.querySelectorAll('input,select,textarea').forEach(e=>{
  if(e.id!=='styl')e.addEventListener('input',obnov);
});
obnov();
</script>
</body>
</html>
