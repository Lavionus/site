<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📋 Generátor Markdown tabulek</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:900px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px;overflow-x:auto}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:14px}
table{border-collapse:collapse;min-width:400px}
th,td{padding:4px;border:1px solid #404040}
th{background:#242424}
input{background:#333;border:1px solid #444;border-radius:4px;color:#e0e0e0;padding:7px;min-width:110px;width:100%}
th input{font-weight:700}
select{background:#333;border:1px solid #444;border-radius:4px;color:#6aa6fd;padding:4px;width:100%;font-size:.78rem}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;margin:8px 8px 0 0}
.btn-sec{background:#404040}
textarea{width:100%;background:#151515;border:1px solid #404040;border-radius:6px;color:#a5d6a7;padding:12px;font-family:monospace;font-size:.85rem;min-height:170px;resize:vertical;white-space:pre}
.del{background:none;border:none;color:#c0392b;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <h1>📋 Generátor Markdown tabulek</h1>
  <div class="card">
    <h2>Editor</h2>
    <table id="tab"></table>
    <button class="btn" id="radek">➕ Řádek</button>
    <button class="btn" id="sloupec">➕ Sloupec</button>
    <button class="btn btn-sec" id="vzorek">↺ Ukázková data</button>
  </div>
  <div class="card">
    <h2>Markdown</h2>
    <textarea id="vystup" spellcheck="false"></textarea>
    <button class="btn" id="kopirovat">📋 Kopírovat</button>
    <button class="btn btn-sec" id="nacist">⬆️ Načíst z Markdownu výše</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let hlavicka=['Položka','Počet','Cena'];
let zarovnani=['left','center','right'];
let radky=[['Jablka','12','36 Kč'],['Hrušky','8','40 Kč']];

function render(){
  const t=$('tab');
  let h='<tr>'+hlavicka.map((x,i)=>`<th><input data-h="${i}" value="${esc(x)}"><select data-z="${i}">
    <option value="left" ${zarovnani[i]==='left'?'selected':''}>⬅ vlevo</option>
    <option value="center" ${zarovnani[i]==='center'?'selected':''}>↔ střed</option>
    <option value="right" ${zarovnani[i]==='right'?'selected':''}>➡ vpravo</option></select></th>`).join('')
    +'<th style="border:none;background:none"></th></tr>';
  radky.forEach((r,ri)=>{
    h+='<tr>'+r.map((x,ci)=>`<td><input data-r="${ri}" data-c="${ci}" value="${esc(x)}"></td>`).join('')
      +`<td style="border:none"><button class="del" data-delr="${ri}">✕</button></td></tr>`;
  });
  h+='<tr>'+hlavicka.map((_,i)=>`<td style="border:none;text-align:center"><button class="del" data-delc="${i}">✕</button></td>`).join('')+'<td style="border:none"></td></tr>';
  t.innerHTML=h;
  generuj();
}
const esc=s=>String(s).replace(/"/g,'&quot;').replace(/</g,'&lt;');
$('tab').addEventListener('input',e=>{
  const d=e.target.dataset;
  if(d.h!==undefined)hlavicka[+d.h]=e.target.value;
  else if(d.z!==undefined)zarovnani[+d.z]=e.target.value;
  else if(d.r!==undefined)radky[+d.r][+d.c]=e.target.value;
  generuj();
});
$('tab').addEventListener('click',e=>{
  const d=e.target.dataset;
  if(d.delr!==undefined){radky.splice(+d.delr,1);render();}
  if(d.delc!==undefined&&hlavicka.length>1){
    hlavicka.splice(+d.delc,1);zarovnani.splice(+d.delc,1);
    radky.forEach(r=>r.splice(+d.delc,1));render();
  }
});
$('radek').onclick=()=>{radky.push(hlavicka.map(()=>''));render();};
$('sloupec').onclick=()=>{hlavicka.push('Sloupec');zarovnani.push('left');radky.forEach(r=>r.push(''));render();};
$('vzorek').onclick=()=>{
  hlavicka=['Položka','Počet','Cena'];zarovnani=['left','center','right'];
  radky=[['Jablka','12','36 Kč'],['Hrušky','8','40 Kč']];render();
};
function generuj(){
  const sirky=hlavicka.map((h,i)=>Math.max(3,h.length,...radky.map(r=>(r[i]||'').length)));
  const pad=(s,i)=>{
    s=String(s||'');
    const mezera=sirky[i]-s.length;
    if(zarovnani[i]==='right')return ' '.repeat(mezera)+s;
    if(zarovnani[i]==='center')return ' '.repeat(Math.floor(mezera/2))+s+' '.repeat(Math.ceil(mezera/2));
    return s+' '.repeat(mezera);
  };
  const odd=i=>{
    const w=sirky[i];
    if(zarovnani[i]==='center')return ':'+'-'.repeat(Math.max(1,w-2))+':';
    if(zarovnani[i]==='right')return '-'.repeat(Math.max(1,w-1))+':';
    return '-'.repeat(w);
  };
  let md='| '+hlavicka.map(pad).join(' | ')+' |\n';
  md+='| '+hlavicka.map((_,i)=>odd(i)).join(' | ')+' |\n';
  radky.forEach(r=>md+='| '+r.map((c,i)=>pad(c,i)).join(' | ')+' |\n');
  $('vystup').value=md;
}
$('kopirovat').onclick=()=>{
  navigator.clipboard.writeText($('vystup').value).then(()=>{
    $('kopirovat').textContent='✅ Zkopírováno';setTimeout(()=>$('kopirovat').textContent='📋 Kopírovat',1500);
  });
};
$('nacist').onclick=()=>{
  const radkyMd=$('vystup').value.split('\n').map(r=>r.trim()).filter(r=>r.startsWith('|'));
  if(radkyMd.length<2)return alert('V poli není platná Markdown tabulka.');
  const bunky=r=>r.replace(/^\||\|$/g,'').split('|').map(s=>s.trim());
  hlavicka=bunky(radkyMd[0]);
  zarovnani=bunky(radkyMd[1]).map(s=>{
    const l=s.startsWith(':'),r=s.endsWith(':');
    return l&&r?'center':r?'right':'left';
  });
  while(zarovnani.length<hlavicka.length)zarovnani.push('left');
  radky=radkyMd.slice(2).map(r=>{
    const b=bunky(r);
    while(b.length<hlavicka.length)b.push('');
    return b.slice(0,hlavicka.length);
  });
  render();
};
render();
</script>
</body>
</html>
