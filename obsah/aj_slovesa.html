<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anglická nepravidelná slovesa</title>
  <link rel="stylesheet" href="../common.css">
  <script>
    if (localStorage.getItem('webapp_theme') === 'light') document.documentElement.dataset.theme = 'light';
  </script>
  <style>
    body { background-color: var(--bg-deep); padding: 24px clamp(14px, 3vw, 40px); min-height: 100vh; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .podtitul { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 14px; }
    .rezimy { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .rezimy button { background: var(--bg-control); border: 1px solid var(--border-strong); color: var(--text-muted); border-radius: 6px; padding: 7px 13px; font-size: 0.84rem; cursor: pointer; }
    .rezimy button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    /* tabulka */
    .hledej { margin-bottom: 10px; }
    .hledej input { background: var(--bg-input); border: 1px solid var(--border-strong); border-radius: 6px; color: var(--text); padding: 8px 12px; font-size: 0.9rem; width: min(300px, 100%); }
    table { width: 100%; border-collapse: collapse; font-size: 0.95rem; max-width: 720px; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--text-faint); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; }
    td.en { font-weight: 600; }
    td.cz { color: var(--text-muted); }

    /* trénink */
    .karta { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; max-width: 620px; }
    .zadani { font-size: 1.05rem; color: var(--text-muted); margin-bottom: 4px; }
    .infinitiv { font-size: 1.9rem; font-weight: 700; margin-bottom: 4px; }
    .vyznam { color: var(--accent); margin-bottom: 18px; }
    .tvary { display: grid; gap: 12px; }
    .tvar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .tvar label { width: 130px; color: var(--text-muted); font-size: 0.9rem; }
    .tvar input { flex: 1; min-width: 140px; background: var(--bg-input); border: 2px solid var(--border-strong); border-radius: 7px; color: var(--text); padding: 9px 12px; font-size: 1.05rem; }
    .tvar input:focus { outline: none; border-color: var(--accent); }
    .tvar input.ok { border-color: var(--ok); color: var(--ok); }
    .tvar input.spatne { border-color: var(--danger); }
    .tvar .reseni { font-size: 0.85rem; color: var(--ok); min-width: 90px; }
    .tlacitka { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
    .tlacitka button { border: none; border-radius: 8px; padding: 11px 20px; font-size: 0.92rem; font-weight: 600; cursor: pointer; }
    .b-hlavni { background: var(--accent); color: #fff; }
    .b-vedle { background: var(--bg-control); color: var(--text); border: 1px solid var(--border-strong) !important; }
    .zprava { margin-top: 14px; min-height: 1.4rem; font-size: 0.95rem; }
    .zprava.ok { color: var(--ok); } .zprava.spatne { color: var(--danger); }
    .stav { display: flex; justify-content: space-between; max-width: 620px; margin-top: 12px; color: var(--text-muted); font-size: 0.9rem; }
    .serie { color: var(--warn); }
  </style>
</head>
<body>
  <h1>🇬🇧 Anglická nepravidelná slovesa</h1>
  <p class="podtitul">Infinitiv – minulý čas (past simple) – příčestí minulé (past participle). 2. stupeň ZŠ, SŠ.</p>

  <div class="rezimy" id="rezimy">
    <button data-rezim="prehled" class="active">📖 Přehled</button>
    <button data-rezim="trenink">✍️ Doplň tvary</button>
  </div>

  <div id="prehled">
    <div class="hledej"><input id="hledej" placeholder="🔍 Hledej sloveso (česky i anglicky)…" autocomplete="off"></div>
    <table><thead><tr><th>Infinitiv</th><th>Past simple</th><th>Past participle</th><th>Význam</th></tr></thead><tbody id="telo"></tbody></table>
  </div>

  <div class="karta" id="trenink" style="display:none">
    <div class="zadani">Doplň chybějící tvary slovesa:</div>
    <div class="infinitiv" id="tInfinitiv"></div>
    <div class="vyznam" id="tVyznam"></div>
    <div class="tvary">
      <div class="tvar"><label>Infinitiv</label><input id="in0" autocomplete="off"><span class="reseni" id="re0"></span></div>
      <div class="tvar"><label>Past simple</label><input id="in1" autocomplete="off"><span class="reseni" id="re1"></span></div>
      <div class="tvar"><label>Past participle</label><input id="in2" autocomplete="off"><span class="reseni" id="re2"></span></div>
    </div>
    <div class="tlacitka">
      <button class="b-hlavni" id="btnZkontrolovat">Zkontrolovat</button>
      <button class="b-vedle" id="btnDalsi">Další →</button>
    </div>
    <div class="zprava" id="zprava"></div>
  </div>
  <div class="stav" id="stav" style="display:none">
    <span class="serie" id="serie"></span>
    <span id="skore"></span>
  </div>

<script>
const $ = id => document.getElementById(id);
// [infinitiv, past simple, past participle, český význam]
const SLOVESA = [
  ['be', 'was/were', 'been', 'být'], ['become', 'became', 'become', 'stát se'], ['begin', 'began', 'begun', 'začít'],
  ['break', 'broke', 'broken', 'rozbít'], ['bring', 'brought', 'brought', 'přinést'], ['build', 'built', 'built', 'stavět'],
  ['buy', 'bought', 'bought', 'koupit'], ['catch', 'caught', 'caught', 'chytit'], ['choose', 'chose', 'chosen', 'vybrat'],
  ['come', 'came', 'come', 'přijít'], ['cost', 'cost', 'cost', 'stát (peníze)'], ['cut', 'cut', 'cut', 'řezat'],
  ['do', 'did', 'done', 'dělat'], ['draw', 'drew', 'drawn', 'kreslit'], ['drink', 'drank', 'drunk', 'pít'],
  ['drive', 'drove', 'driven', 'řídit'], ['eat', 'ate', 'eaten', 'jíst'], ['fall', 'fell', 'fallen', 'padat'],
  ['feel', 'felt', 'felt', 'cítit'], ['find', 'found', 'found', 'najít'], ['fly', 'flew', 'flown', 'létat'],
  ['forget', 'forgot', 'forgotten', 'zapomenout'], ['get', 'got', 'got', 'dostat'], ['give', 'gave', 'given', 'dát'],
  ['go', 'went', 'gone', 'jít'], ['grow', 'grew', 'grown', 'růst'], ['have', 'had', 'had', 'mít'],
  ['hear', 'heard', 'heard', 'slyšet'], ['hold', 'held', 'held', 'držet'], ['keep', 'kept', 'kept', 'udržet'],
  ['know', 'knew', 'known', 'vědět, znát'], ['learn', 'learnt', 'learnt', 'učit se'], ['leave', 'left', 'left', 'odejít, nechat'],
  ['lose', 'lost', 'lost', 'ztratit'], ['make', 'made', 'made', 'vyrobit'], ['meet', 'met', 'met', 'potkat'],
  ['pay', 'paid', 'paid', 'platit'], ['put', 'put', 'put', 'položit'], ['read', 'read', 'read', 'číst'],
  ['ride', 'rode', 'ridden', 'jet (na kole)'], ['run', 'ran', 'run', 'běžet'], ['say', 'said', 'said', 'říct'],
  ['see', 'saw', 'seen', 'vidět'], ['sell', 'sold', 'sold', 'prodat'], ['send', 'sent', 'sent', 'poslat'],
  ['sing', 'sang', 'sung', 'zpívat'], ['sit', 'sat', 'sat', 'sedět'], ['sleep', 'slept', 'slept', 'spát'],
  ['speak', 'spoke', 'spoken', 'mluvit'], ['spend', 'spent', 'spent', 'utratit, strávit'], ['stand', 'stood', 'stood', 'stát'],
  ['swim', 'swam', 'swum', 'plavat'], ['take', 'took', 'taken', 'vzít'], ['teach', 'taught', 'taught', 'učit'],
  ['tell', 'told', 'told', 'vyprávět'], ['think', 'thought', 'thought', 'myslet'], ['throw', 'threw', 'thrown', 'házet'],
  ['understand', 'understood', 'understood', 'rozumět'], ['wake', 'woke', 'woken', 'probudit'], ['wear', 'wore', 'worn', 'nosit (oblečení)'],
  ['win', 'won', 'won', 'vyhrát'], ['write', 'wrote', 'written', 'psát'],
];

/* přehled + hledání */
function vykresli(filtr = '') {
  const f = filtr.trim().toLowerCase();
  $('telo').innerHTML = SLOVESA
    .filter(s => !f || s.some(x => x.toLowerCase().includes(f)))
    .map(s => `<tr><td class="en">${s[0]}</td><td class="en">${s[1]}</td><td class="en">${s[2]}</td><td class="cz">${s[3]}</td></tr>`).join('')
    || '<tr><td colspan="4" style="color:var(--text-faint);padding:20px">Nic nenalezeno.</td></tr>';
}
$('hledej').addEventListener('input', e => vykresli(e.target.value));
vykresli();

/* trénink */
let rezim = 'prehled', uloha = null, zadany = [], spravne = 0, celkem = 0, serie = 0, vyhodnoceno = false, posledni = -1;
const norm = s => s.trim().toLowerCase();
function spravneTvar(spravny, zadano) {
  // "was/were" i "learnt/learned" – uznej kteroukoli variantu
  return spravny.toLowerCase().split('/').some(v => v === norm(zadano));
}
function nova() {
  vyhodnoceno = false;
  let i; do { i = Math.floor(Math.random() * SLOVESA.length); } while (i === posledni); posledni = i;
  uloha = SLOVESA[i];
  // schovej 1–2 náhodné tvary, aspoň jeden zůstane vidět
  const schovej = new Set();
  const kolik = Math.random() < 0.5 ? 1 : 2;
  while (schovej.size < kolik) schovej.add(Math.floor(Math.random() * 3));
  zadany = [0, 1, 2].map(k => schovej.has(k));
  $('tInfinitiv').textContent = uloha[0];
  $('tVyznam').textContent = uloha[3];
  for (let k = 0; k < 3; k++) {
    const inp = $('in' + k);
    inp.value = zadany[k] ? '' : uloha[k];
    inp.disabled = !zadany[k];
    inp.classList.remove('ok', 'spatne');
    $('re' + k).textContent = '';
  }
  $('zprava').textContent = ''; $('zprava').className = 'zprava';
  $('btnZkontrolovat').textContent = 'Zkontrolovat';
  const prvni = zadany.indexOf(true); if (prvni >= 0) $('in' + prvni).focus();
}
function zkontroluj() {
  if (vyhodnoceno) { nova(); return; }
  let vsechnyOk = true;
  for (let k = 0; k < 3; k++) {
    if (!zadany[k]) continue;
    const inp = $('in' + k);
    if (spravneTvar(uloha[k], inp.value)) { inp.classList.add('ok'); }
    else { inp.classList.add('spatne'); $('re' + k).textContent = '→ ' + uloha[k]; vsechnyOk = false; }
  }
  vyhodnoceno = true; celkem++;
  if (vsechnyOk) { spravne++; serie++; $('zprava').textContent = '✅ Správně!'; $('zprava').className = 'zprava ok'; }
  else { serie = 0; $('zprava').textContent = '❌ Zkontroluj zvýrazněné tvary.'; $('zprava').className = 'zprava spatne'; }
  $('serie').textContent = serie >= 3 ? '🔥 série ' + serie : '';
  $('skore').textContent = spravne + ' / ' + celkem;
  $('btnZkontrolovat').textContent = 'Další →';
}
$('btnZkontrolovat').onclick = zkontroluj;
$('btnDalsi').onclick = nova;
$('trenink').addEventListener('keydown', e => { if (e.key === 'Enter') zkontroluj(); });

document.querySelectorAll('#rezimy button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#rezimy button').forEach(x => x.classList.remove('active'));
  b.classList.add('active'); rezim = b.dataset.rezim;
  const tr = rezim === 'trenink';
  $('prehled').style.display = tr ? 'none' : '';
  $('trenink').style.display = tr ? '' : 'none';
  $('stav').style.display = tr ? '' : 'none';
  if (tr) { posledni = -1; nova(); }
});
</script>
</body>
</html>
