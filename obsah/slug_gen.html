<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔗 Slug generátor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:700px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600;text-align:center}
.sub{text-align:center;color:#888;font-size:.85rem;margin-bottom:20px}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
textarea{width:100%;min-height:80px;background:#404040;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:12px;font-size:1rem;resize:vertical;margin-bottom:14px}
.output{display:flex;gap:8px;margin-bottom:16px}
.output input{flex:1;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#27ae60;padding:14px;font-family:monospace;font-size:1.1rem}
.btn{background:#6aa6fd;color:#fff;border:none;padding:14px 18px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.opts{display:flex;gap:14px;flex-wrap:wrap}
.opts label{display:flex;align-items:center;gap:6px;font-size:.85rem;color:#bbb}
.opts input,.opts select{accent-color:#6aa6fd;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:5px}
.preview{margin-top:16px;font-size:.85rem;color:#888;word-break:break-all}
.preview b{color:#6aa6fd}
</style>
</head>
<body>
<div class="container">
  <h1>🔗 Slug generátor</h1>
  <p class="sub">Převede text na čistou URL-friendly podobu</p>
  <div class="card">
    <textarea id="input" placeholder="Zadej název/nadpis…">Příliš žluťoučký kůň: úpěl ďábelské ódy! (2026)</textarea>
    <div class="output">
      <input id="slug" readonly>
      <button class="btn" id="copyBtn">📋</button>
    </div>
    <div class="opts">
      <label>Oddělovač <select id="sep"><option value="-">pomlčka (-)</option><option value="_">podtržítko (_)</option></select></label>
      <label><input type="checkbox" id="lower" checked> malá písmena</label>
      <label><input type="checkbox" id="strict" checked> odstranit diakritiku</label>
      <label>Max. délka <input type="number" id="maxlen" value="0" min="0" style="width:70px"> (0 = bez limitu)</label>
    </div>
    <div class="preview" id="preview"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function slugify(){
  let s=$('input').value;
  if($('strict').checked)s=s.normalize('NFD').replace(/[̀-ͯ]/g,'');
  if($('lower').checked)s=s.toLowerCase();
  const sep=$('sep').value;
  s=s.replace(/[^a-zA-Z0-9\s-_]/g,'').trim().replace(/[\s-_]+/g,sep);
  s=s.replace(new RegExp(`^\\${sep}+|\\${sep}+$`,'g'),'');
  const max=+$('maxlen').value;
  if(max>0&&s.length>max){s=s.slice(0,max);s=s.replace(new RegExp(`\\${sep}[^${sep}]*$`),'');}
  $('slug').value=s;
  $('preview').innerHTML=s?`Příklad URL: https://example.cz/<b>${s}</b>`:'';
}
['input','sep','lower','strict','maxlen'].forEach(id=>$(id).oninput=slugify);
$('sep').onchange=slugify;
$('copyBtn').onclick=()=>{navigator.clipboard.writeText($('slug').value);$('copyBtn').textContent='✅';setTimeout(()=>$('copyBtn').textContent='📋',1000);};
slugify();
</script>
</body>
</html>
