<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌐 HTTP stavové kódy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:860px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.search{width:100%;background:#404040;border:1px solid #555;border-radius:8px;color:#e0e0e0;padding:12px;font-size:1rem;margin-bottom:14px}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:center}
.cat{padding:7px 14px;background:#2a2a2a;border:1px solid #404040;border-radius:20px;cursor:pointer;font-size:.84rem}
.cat.active{background:#6aa6fd;border-color:#6aa6fd;color:#fff}
.code-item{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:14px 18px;margin-bottom:8px;display:flex;gap:16px;align-items:start}
.code-item .num{font-size:1.6rem;font-weight:700;min-width:60px}
.code-item .info{flex:1}
.code-item .name{font-weight:600;font-size:1.05rem}
.code-item .desc{font-size:.85rem;color:#888;margin-top:3px}
.c1{color:#3498db}.c2{color:#27ae60}.c3{color:#f1c40f}.c4{color:#e67e22}.c5{color:#e74c3c}
.empty{text-align:center;color:#666;padding:30px}
</style>
</head>
<body>
<div class="container">
  <h1>🌐 HTTP stavové kódy</h1>
  <input class="search" id="search" placeholder="🔍 Hledat (404, not found, přesměrování…)">
  <div class="cats" id="cats">
    <div class="cat active" data-c="">Vše</div>
    <div class="cat" data-c="1">1xx Info</div>
    <div class="cat" data-c="2">2xx Úspěch</div>
    <div class="cat" data-c="3">3xx Přesměrování</div>
    <div class="cat" data-c="4">4xx Chyba klienta</div>
    <div class="cat" data-c="5">5xx Chyba serveru</div>
  </div>
  <div id="list"></div>
</div>
<script>
const $=id=>document.getElementById(id);
const CODES=[
  [100,'Continue','Pokračuj – server přijal hlavičky, klient může poslat tělo požadavku.'],
  [101,'Switching Protocols','Server přepíná protokol (např. na WebSocket).'],
  [200,'OK','Požadavek byl úspěšný.'],
  [201,'Created','Zdroj byl úspěšně vytvořen (typicky po POST).'],
  [202,'Accepted','Požadavek přijat ke zpracování, ale ještě nedokončen.'],
  [204,'No Content','Úspěch, ale není co vrátit (prázdné tělo).'],
  [206,'Partial Content','Vrácena část zdroje (Range požadavek, stahování).'],
  [301,'Moved Permanently','Zdroj trvale přesunut na novou URL.'],
  [302,'Found','Dočasné přesměrování na jinou URL.'],
  [304,'Not Modified','Zdroj se nezměnil, použij verzi z cache.'],
  [307,'Temporary Redirect','Dočasné přesměrování se zachováním metody.'],
  [308,'Permanent Redirect','Trvalé přesměrování se zachováním metody.'],
  [400,'Bad Request','Chybný požadavek – server mu nerozumí.'],
  [401,'Unauthorized','Vyžadováno přihlášení / chybí autentizace.'],
  [403,'Forbidden','Přístup zakázán, i když je klient ověřen.'],
  [404,'Not Found','Hledaný zdroj nebyl nalezen.'],
  [405,'Method Not Allowed','HTTP metoda není pro tento zdroj povolena.'],
  [408,'Request Timeout','Klient neposlal požadavek včas.'],
  [409,'Conflict','Konflikt se stavem zdroje (např. duplicita).'],
  [410,'Gone','Zdroj byl trvale odstraněn.'],
  [413,'Payload Too Large','Tělo požadavku je příliš velké.'],
  [418,'I\'m a teapot','Žertovný kód (RFC 2324) – jsem konvička na čaj. ☕'],
  [422,'Unprocessable Entity','Data jsou syntakticky OK, ale sémanticky chybná (validace).'],
  [429,'Too Many Requests','Příliš mnoho požadavků – rate limit.'],
  [500,'Internal Server Error','Obecná chyba na straně serveru.'],
  [501,'Not Implemented','Server neumí metodu zpracovat.'],
  [502,'Bad Gateway','Chybná odpověď od nadřazeného serveru (proxy/gateway).'],
  [503,'Service Unavailable','Služba dočasně nedostupná (přetížení/údržba).'],
  [504,'Gateway Timeout','Nadřazený server neodpověděl včas.']
];
let activeCat='';
document.querySelectorAll('.cat').forEach(c=>c.onclick=()=>{activeCat=c.dataset.c;document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));c.classList.add('active');render();});
function render(){
  const q=$('search').value.toLowerCase().trim();
  const list=CODES.filter(([num,name,desc])=>{
    if(activeCat&&String(num)[0]!==activeCat)return false;
    if(!q)return true;
    return String(num).includes(q)||name.toLowerCase().includes(q)||desc.toLowerCase().includes(q);
  });
  $('list').innerHTML=list.length?list.map(([num,name,desc])=>`<div class="code-item"><div class="num c${String(num)[0]}">${num}</div><div class="info"><div class="name">${name}</div><div class="desc">${desc}</div></div></div>`).join(''):'<div class="empty">Nic nenalezeno 🤷</div>';
}
$('search').oninput=render;
render();
</script>
</body>
</html>
