<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💻 Live HTML/CSS/JS editor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:#2a2a2a;border-bottom:1px solid #404040;flex-wrap:wrap}
.bar h1{font-size:1.1rem;font-weight:600}
.btn{background:#6aa6fd;color:#fff;border:none;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}
.auto{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:.82rem;color:#888}
.main{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:1px;background:#404040;overflow:hidden}
@media(max-width:760px){.main{grid-template-columns:1fr;grid-template-rows:auto auto auto 1fr}}
.pane{display:flex;flex-direction:column;background:#1a1a1a;overflow:hidden}
.pane .h{font-size:.74rem;padding:6px 12px;background:#222;color:#6aa6fd;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between}
.tag-html{color:#e67e22}.tag-css{color:#3498db}.tag-js{color:#f1c40f}
textarea{flex:1;background:#1e1e1e;border:none;color:#e0e0e0;padding:12px;font-family:'SF Mono',Consolas,monospace;font-size:.86rem;resize:none;line-height:1.5;tab-size:2}
textarea:focus{outline:none}
.preview-pane{grid-row:1/3;grid-column:2}
@media(max-width:760px){.preview-pane{grid-row:auto;grid-column:auto;min-height:300px}}
iframe{flex:1;background:#fff;border:none;width:100%}
</style>
</head>
<body>
<div class="bar">
  <h1>💻 Live editor</h1>
  <button class="btn" id="runBtn">▶️ Spustit</button>
  <button class="btn btn-sec" id="resetBtn">🔄 Vzorek</button>
  <button class="btn btn-sec" id="dlBtn">💾 Stáhnout HTML</button>
  <label class="auto"><input type="checkbox" id="autorun" checked> Auto-spouštění</label>
</div>
<div class="main">
  <div class="pane"><div class="h"><span class="tag-html">HTML</span></div><textarea id="html" spellcheck="false"></textarea></div>
  <div class="pane preview-pane"><div class="h">Náhled</div><iframe id="preview"></iframe></div>
  <div class="pane"><div class="h"><span class="tag-css">CSS</span></div><textarea id="css" spellcheck="false"></textarea></div>
  <div class="pane"><div class="h"><span class="tag-js">JavaScript</span></div><textarea id="js" spellcheck="false"></textarea></div>
</div>
<script>
const $=id=>document.getElementById(id);
const SAMPLE={
  html:'<h1>Ahoj světe! 👋</h1>\n<button onclick="pozdrav()">Klikni na mě</button>\n<p id="out"></p>',
  css:'body{font-family:sans-serif;text-align:center;padding:30px;background:#f0f4ff}\nh1{color:#6aa6fd}\nbutton{padding:10px 20px;border:none;background:#6aa6fd;color:#fff;border-radius:6px;cursor:pointer;font-size:1rem}',
  js:'function pozdrav(){\n  document.getElementById("out").textContent="Tlačítko stisknuto v "+new Date().toLocaleTimeString();\n}'
};
function run(){
  const doc=`<!DOCTYPE html><html><head><style>${$('css').value}</style></head><body>${$('html').value}<script>${$('js').value}<\/script></body></html>`;
  $('preview').srcdoc=doc;
}
let timer;
['html','css','js'].forEach(id=>$(id).oninput=()=>{if($('autorun').checked){clearTimeout(timer);timer=setTimeout(run,500);}});
$('runBtn').onclick=run;
$('resetBtn').onclick=()=>{$('html').value=SAMPLE.html;$('css').value=SAMPLE.css;$('js').value=SAMPLE.js;run();};
$('dlBtn').onclick=()=>{const doc=`<!DOCTYPE html>\n<html lang="cs">\n<head>\n<meta charset="UTF-8">\n<style>\n${$('css').value}\n</style>\n</head>\n<body>\n${$('html').value}\n<script>\n${$('js').value}\n<\/script>\n</body>\n</html>`;
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([doc],{type:'text/html'}));a.download='stranka.html';a.click();};
$('html').value=SAMPLE.html;$('css').value=SAMPLE.css;$('js').value=SAMPLE.js;run();
</script>
</body>
</html>
