<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧵 Spotřeba filamentu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:780px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px;margin-bottom:12px}
.toggle{display:flex;gap:8px;margin-bottom:14px}
.toggle button{flex:1;padding:9px;background:#404040;border:1px solid #555;border-radius:6px;color:#bbb;cursor:pointer;font-size:.85rem}
.toggle button.active{background:#6aa6fd;color:#fff}
.big{font-size:2rem;font-weight:700;color:#6aa6fd;text-align:center;margin:8px 0}
.res-row{display:flex;justify-content:space-between;padding:11px 0;border-bottom:1px solid #333}
.res-row:last-child{border:none}.res-row b{color:#4caf50}
.note{font-size:.78rem;color:#666;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <h1>🧵 Spotřeba filamentu 3D tisku</h1>
  <div class="card">
    <h2>Zadej, co znáš</h2>
    <div class="toggle" id="inputMode">
      <button class="active" data-m="weight">Znám hmotnost (g)</button>
      <button data-m="length">Znám délku (m)</button>
      <button data-m="volume">Znám objem (cm³)</button>
    </div>
    <div class="grid">
      <div id="fieldWeight"><label>Hmotnost (g)</label><input type="number" id="weight" value="25" step="any"></div>
      <div id="fieldLength" style="display:none"><label>Délka (m)</label><input type="number" id="length" value="8" step="any"></div>
      <div id="fieldVolume" style="display:none"><label>Objem (cm³)</label><input type="number" id="volume" value="20" step="any"></div>
      <div><label>Materiál</label>
        <select id="material"><option value="1.24">PLA (1,24 g/cm³)</option><option value="1.27">PETG (1,27)</option><option value="1.04">ABS (1,04)</option><option value="1.20">ASA (1,20)</option><option value="1.08">TPU (1,08)</option><option value="1.30">Nylon (1,30)</option></select>
      </div>
      <div><label>Průměr filamentu (mm)</label><select id="diameter"><option value="1.75">1,75 mm</option><option value="2.85">2,85 mm</option></select></div>
      <div><label>Cena za cívku (Kč)</label><input type="number" id="spoolPrice" value="500"></div>
      <div><label>Hmotnost cívky (g)</label><input type="number" id="spoolWeight" value="1000"></div>
    </div>
  </div>
  <div class="card">
    <h2>📋 Výsledek</h2>
    <div class="big" id="costOut">–</div>
    <p style="text-align:center;color:#888;margin-bottom:14px">cena materiálu na výtisk</p>
    <div class="res-row"><span>Hmotnost</span><b id="rWeight">–</b></div>
    <div class="res-row"><span>Délka filamentu</span><b id="rLength">–</b></div>
    <div class="res-row"><span>Objem</span><b id="rVolume">–</b></div>
    <div class="res-row"><span>Podíl z cívky</span><b id="rSpool">–</b></div>
    <p class="note">Délka se počítá z průřezu filamentu (π·r²). Nezahrnuje odpad (skirt, support, čištění trysky). Pro přesné hodnoty použij údaj z sliceru (PrusaSlicer/Cura).</p>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let mode='weight';
document.querySelectorAll('#inputMode button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#inputMode button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  mode=b.dataset.m;$('fieldWeight').style.display=mode==='weight'?'block':'none';$('fieldLength').style.display=mode==='length'?'block':'none';$('fieldVolume').style.display=mode==='volume'?'block':'none';calc();
});
function calc(){
  const density=+$('material').value,dia=+$('diameter').value;
  const area=Math.PI*Math.pow(dia/2,2); // mm²
  let weight,length,volume; // g, m, cm³
  if(mode==='weight'){weight=+$('weight').value;volume=weight/density;length=volume*1000/area;}
  else if(mode==='length'){length=+$('length').value;volume=length*1000*area/1000;weight=volume*density;}
  else{volume=+$('volume').value;weight=volume*density;length=volume*1000/area;}
  const pricePerG=+$('spoolPrice').value/+$('spoolWeight').value;
  $('rWeight').textContent=weight.toFixed(1)+' g';
  $('rLength').textContent=length.toFixed(2)+' m';
  $('rVolume').textContent=volume.toFixed(2)+' cm³';
  $('rSpool').textContent=(weight/+$('spoolWeight').value*100).toFixed(1)+' %';
  $('costOut').textContent=(weight*pricePerG).toFixed(2)+' Kč';
}
['weight','length','volume','material','diameter','spoolPrice','spoolWeight'].forEach(id=>$(id).oninput=calc);
['material','diameter'].forEach(id=>$(id).onchange=calc);
calc();
</script>
</body>
</html>
