<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 Desetinná čísla</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:560px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
.setup{display:flex;gap:12px;flex-wrap:wrap;align-items:end;justify-content:center}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 28px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.game,.results{display:none;text-align:center}
.scorebar{display:flex;justify-content:space-around;margin-bottom:18px}
.scorebar .v{font-size:1.5rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.question{font-size:2.2rem;font-weight:700;margin:18px 0}
.answer{font-size:1.8rem;width:220px;text-align:center;background:#1e1e1e;border:2px solid #555;border-radius:10px;color:#fff;padding:12px}
.answer.correct{border-color:#27ae60}.answer.wrong{border-color:#e74c3c}
.feedback{font-size:1.2rem;margin:14px 0;min-height:32px;font-weight:600}
.compareOpts{display:flex;gap:12px;justify-content:center;margin-top:12px}
.copt{background:#333;border:1px solid #555;border-radius:6px;padding:12px 20px;cursor:pointer;font-size:1.3rem}
.copt:hover{border-color:#6aa6fd}
.results .big{font-size:2.6rem;font-weight:700;color:#6aa6fd}
</style>
</head>
<body>
<div class="container">
  <h1>🔢 Desetinná čísla</h1>
  <div class="card" id="setupCard">
    <div class="setup">
      <div><label>Cvičení</label><select id="mode">
        <option value="add">Sčítání a odčítání</option>
        <option value="cmp">Porovnávání (&lt; &gt; =)</option>
        <option value="round">Zaokrouhlování</option>
      </select></div>
      <button class="btn" id="startBtn">▶️ Start</button>
    </div>
  </div>

  <div class="card game" id="gameCard">
    <div class="scorebar">
      <div><div class="v" id="score">0</div><div class="l">Správně</div></div>
      <div><div class="v" id="idx">0/10</div><div class="l">Příklad</div></div>
    </div>
    <div class="question" id="question"></div>
    <input class="answer" id="answer" type="text" inputmode="decimal" style="display:none">
    <div class="compareOpts" id="compareOpts" style="display:none"></div>
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="card results" id="resultsCard">
    <div style="font-size:2rem" id="emoji"></div>
    <div class="big" id="finalScore"></div>
    <p style="color:#888" id="finalDetail"></p>
    <button class="btn" id="againBtn" style="margin-top:14px">🔄 Znovu</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let mode,score,idx,total=10,answer,decPlaces;
function rnd(n){return Math.round(n*100)/100;}
function randDec(max,places){const f=Math.pow(10,places);return Math.round((Math.random()*max)*f)/f;}
function gen(){
  if(mode==='add'){
    const op=Math.random()<0.5?'+':'-';
    let a=randDec(50,1),b=randDec(50,1);
    if(op==='-'&&b>a)[a,b]=[b,a];
    answer=rnd(op==='+'?a+b:a-b);
    $('question').textContent=`${a} ${op} ${b} = ?`;
    $('answer').style.display='block';$('compareOpts').style.display='none';
    $('answer').value='';$('answer').className='answer';$('answer').focus();
  } else if(mode==='cmp'){
    let a=randDec(20,2),b=Math.random()<0.3?a:randDec(20,2);
    answer=a>b?'>':a<b?'<':'=';
    $('question').textContent=`${a}   ?   ${b}`;
    $('answer').style.display='none';
    const box=$('compareOpts');box.style.display='flex';box.innerHTML='';
    ['<','=','>'].forEach(sym=>{
      const b2=document.createElement('div');b2.className='copt';b2.textContent=sym;
      b2.onclick=()=>checkCompare(sym,b2);
      box.appendChild(b2);
    });
  } else {
    decPlaces=[0,1][Math.floor(Math.random()*2)];
    const num=randDec(200,2+Math.floor(Math.random()*1));
    const val=Math.round(num*100)/100;
    answer=decPlaces===0?Math.round(val):rnd(Math.round(val*10)/10);
    $('question').innerHTML=`Zaokrouhli ${val} na ${decPlaces===0?'celé číslo':'desetiny'}:`;
    $('answer').style.display='block';$('compareOpts').style.display='none';
    $('answer').value='';$('answer').className='answer';$('answer').focus();
  }
}
function checkCompare(sym,btn){
  [...$('compareOpts').children].forEach(c=>c.style.pointerEvents='none');
  if(sym===answer){btn.style.borderColor='#27ae60';score++;}
  else{btn.style.borderColor='#e74c3c';[...$('compareOpts').children].find(c=>c.textContent===answer).style.borderColor='#27ae60';}
  $('score').textContent=score;
  setTimeout(next,700);
}
function checkTyped(){
  const v=parseFloat(($('answer').value||'').replace(',','.'));
  if(Math.abs(v-answer)<0.005){$('answer').className='answer correct';score++;$('feedback').textContent='✅';$('feedback').style.color='#27ae60';}
  else{$('answer').className='answer wrong';$('feedback').textContent='❌ Správně: '+answer;$('feedback').style.color='#e74c3c';}
  $('score').textContent=score;
  setTimeout(()=>{$('feedback').textContent='';next();},800);
}
function next(){
  idx++;
  if(idx>=total){finish();return;}
  $('idx').textContent=`${idx+1}/${total}`;
  gen();
}
$('answer').addEventListener('keydown',e=>{if(e.key==='Enter'&&$('answer').value!=='')checkTyped();});
function start(){
  mode=$('mode').value;score=0;idx=0;
  $('setupCard').style.display='none';$('resultsCard').style.display='none';$('gameCard').style.display='block';
  $('score').textContent=0;$('idx').textContent=`1/${total}`;
  gen();
}
function finish(){
  $('gameCard').style.display='none';$('resultsCard').style.display='block';
  $('finalScore').textContent=`${score} / ${total}`;
  const pct=Math.round(score/total*100);
  $('emoji').textContent=pct>=80?'🏆':pct>=50?'👍':'💪';
  $('finalDetail').textContent=`Úspěšnost ${pct}%`;
}
$('startBtn').onclick=start;
$('againBtn').onclick=()=>{$('setupCard').style.display='block';$('resultsCard').style.display='none';};
</script>
</body>
</html>
