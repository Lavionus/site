<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Tepové zóny</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px;margin-bottom:12px}
.maxhr{text-align:center;font-size:1.1rem;margin-bottom:6px}
.maxhr b{font-size:2rem;color:#6aa6fd}
.zone{display:flex;align-items:center;gap:14px;padding:14px;border-radius:8px;margin-bottom:8px;color:#fff}
.zone .num{font-size:1.6rem;font-weight:700;width:30px}
.zone .info{flex:1}.zone .name{font-weight:600}.zone .desc{font-size:.8rem;opacity:.9}
.zone .bpm{font-size:1.2rem;font-weight:700;white-space:nowrap}
.note{font-size:.78rem;color:#666;margin-top:6px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <h1>❤️ Kalkulačka tepových zón</h1>
  <div class="card">
    <h2>Vstupní údaje</h2>
    <div class="grid">
      <div><label>Věk (let)</label><input type="number" id="age" value="35" min="10" max="100"></div>
      <div><label>Klidový tep (volitelné, pro Karvonen)</label><input type="number" id="rest" value="60" min="30" max="120"></div>
      <div><label>Vzorec max. tepu</label>
        <select id="formula"><option value="220">220 − věk (klasický)</option><option value="tanaka">208 − 0,7×věk (Tanaka)</option></select>
      </div>
      <div><label>Metoda zón</label>
        <select id="method"><option value="max">% max. tepu</option><option value="karvonen">Karvonen (rezerva tepu)</option></select>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="maxhr">Maximální tep: <b id="maxhr">–</b> /min</div>
    <p style="text-align:center;color:#888;margin-bottom:16px" id="restNote"></p>
    <div id="zones"></div>
    <p class="note">Zóny dle metodiky sportovního tréninku. Karvonenova metoda zohledňuje klidový tep (přesnější). Hodnoty orientační.</p>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const ZONES=[
  {n:1,name:'Regenerace',desc:'Velmi lehká, rozcvičení/odpočinek',lo:50,hi:60,col:'#3498db'},
  {n:2,name:'Základní vytrvalost',desc:'Spalování tuků, dlouhé tempo',lo:60,hi:70,col:'#27ae60'},
  {n:3,name:'Aerobní',desc:'Zlepšení kondice, tempo',lo:70,hi:80,col:'#f1c40f'},
  {n:4,name:'Anaerobní práh',desc:'Zvyšování výkonu, náročné',lo:80,hi:90,col:'#e67e22'},
  {n:5,name:'Maximální',desc:'Sprinty, krátké intervaly',lo:90,hi:100,col:'#e74c3c'}
];
function calc(){
  const age=+$('age').value,rest=+$('rest').value;
  const maxhr=$('formula').value==='tanaka'?Math.round(208-0.7*age):220-age;
  $('maxhr').textContent=maxhr;
  const karvonen=$('method').value==='karvonen';
  $('restNote').textContent=karvonen?`Karvonen: rezerva tepu = ${maxhr} − ${rest} = ${maxhr-rest} /min`:'Metoda: % maximálního tepu';
  $('zones').innerHTML=ZONES.map(z=>{
    let lo,hi;
    if(karvonen){lo=Math.round((maxhr-rest)*z.lo/100+rest);hi=Math.round((maxhr-rest)*z.hi/100+rest);}
    else{lo=Math.round(maxhr*z.lo/100);hi=Math.round(maxhr*z.hi/100);}
    return `<div class="zone" style="background:linear-gradient(90deg,${z.col}cc,${z.col}77)">
      <div class="num">Z${z.n}</div><div class="info"><div class="name">${z.name} <span style="opacity:.8">(${z.lo}–${z.hi} %)</span></div><div class="desc">${z.desc}</div></div>
      <div class="bpm">${lo}–${hi}</div></div>`;
  }).join('');
}
['age','rest','formula','method'].forEach(id=>$(id).oninput=calc);
['formula','method'].forEach(id=>$(id).onchange=calc);
calc();
</script>
</body>
</html>
