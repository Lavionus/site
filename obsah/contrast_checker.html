<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌗 Kontrast barev (WCAG)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:820px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
.pickers{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:560px){.pickers{grid-template-columns:1fr}}
.pick label{display:block;font-size:.82rem;color:#888;margin-bottom:6px}
.pick .row{display:flex;gap:8px}
.pick input[type=color]{width:54px;height:46px;border:none;border-radius:8px;background:none;cursor:pointer}
.pick input[type=text]{flex:1;background:#404040;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:11px;font-family:monospace}
.preview{border-radius:10px;padding:30px;text-align:center;margin:20px 0}
.preview .big{font-size:1.8rem;font-weight:700;margin-bottom:8px}
.preview .small{font-size:1rem}
.ratio{text-align:center}
.ratio .v{font-size:3rem;font-weight:700;color:#6aa6fd}
.ratio .l{color:#888}
.grades{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-top:18px}
.grade{background:#1e1e1e;border-radius:8px;padding:14px;text-align:center}
.grade .lvl{font-size:.8rem;color:#888}
.grade .st{font-size:1.4rem;font-weight:700;margin-top:4px}
.pass{color:#27ae60}.fail{color:#e74c3c}
.swap{text-align:center;margin-top:10px}
.btn{background:#404040;color:#e0e0e0;border:1px solid #555;padding:8px 16px;border-radius:6px;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <h1>🌗 Kontrola kontrastu barev (WCAG)</h1>
  <div class="card">
    <div class="pickers">
      <div class="pick"><label>Barva textu (popředí)</label><div class="row"><input type="color" id="fgColor" value="#e0e0e0"><input type="text" id="fgHex" value="#E0E0E0"></div></div>
      <div class="pick"><label>Barva pozadí</label><div class="row"><input type="color" id="bgColor" value="#2a2a2a"><input type="text" id="bgHex" value="#2A2A2A"></div></div>
    </div>
    <div class="swap"><button class="btn" id="swapBtn">🔄 Prohodit barvy</button></div>
    <div class="preview" id="preview">
      <div class="big">Velký nadpis textu</div>
      <div class="small">Toto je ukázka běžného textu o velikosti 16 px pro kontrolu čitelnosti.</div>
    </div>
    <div class="ratio"><div class="v" id="ratioVal">–</div><div class="l">poměr kontrastu</div></div>
    <div class="grades" id="grades"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function lum(hex){const c=[parseInt(hex.slice(1,3),16),parseInt(hex.slice(3,5),16),parseInt(hex.slice(5,7),16)].map(v=>{v/=255;return v<=0.03928?v/12.92:Math.pow((v+0.055)/1.055,2.4);});return 0.2126*c[0]+0.7152*c[1]+0.0722*c[2];}
function ratio(a,b){const l1=lum(a),l2=lum(b);return (Math.max(l1,l2)+0.05)/(Math.min(l1,l2)+0.05);}
function update(){
  const fg=$('fgHex').value,bg=$('bgHex').value;
  if(!/^#[0-9a-fA-F]{6}$/.test(fg)||!/^#[0-9a-fA-F]{6}$/.test(bg))return;
  $('preview').style.background=bg;$('preview').style.color=fg;
  const r=ratio(fg,bg);
  $('ratioVal').textContent=r.toFixed(2)+' : 1';
  const checks=[
    ['AA běžný text','≥ 4.5',r>=4.5],
    ['AA velký text','≥ 3.0',r>=3],
    ['AAA běžný text','≥ 7.0',r>=7],
    ['AAA velký text','≥ 4.5',r>=4.5],
    ['UI komponenty','≥ 3.0',r>=3]
  ];
  $('grades').innerHTML=checks.map(([l,req,pass])=>`<div class="grade"><div class="lvl">${l}<br><small>${req}</small></div><div class="st ${pass?'pass':'fail'}">${pass?'✓ AND':'✗'}</div></div>`).join('').replace(/AND/g,'Vyhovuje');
}
function sync(src){
  if(src==='fgColor'){$('fgHex').value=$('fgColor').value.toUpperCase();}
  if(src==='bgColor'){$('bgHex').value=$('bgColor').value.toUpperCase();}
  if(src==='fgHex'&&/^#[0-9a-fA-F]{6}$/.test($('fgHex').value))$('fgColor').value=$('fgHex').value;
  if(src==='bgHex'&&/^#[0-9a-fA-F]{6}$/.test($('bgHex').value))$('bgColor').value=$('bgHex').value;
  update();
}
['fgColor','bgColor','fgHex','bgHex'].forEach(id=>$(id).oninput=()=>sync(id));
$('swapBtn').onclick=()=>{const f=$('fgHex').value;$('fgHex').value=$('bgHex').value;$('bgHex').value=f;$('fgColor').value=$('fgHex').value;$('bgColor').value=$('bgHex').value;update();};
update();
</script>
</body>
</html>
