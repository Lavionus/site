<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💶 Cestovní rozpočet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:860px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;margin-bottom:18px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:14px}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input,select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px 11px;font-size:.9rem}
button{background:#383838;border:1px solid #4a4a4a;color:#c0c0c0;border-radius:6px;padding:9px 14px;font-size:.85rem;cursor:pointer}
button:hover{background:#444}
button.primary{background:#6aa6fd;border-color:#6aa6fd;color:#fff;font-weight:600}
.osoby{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.osoba-tag{display:inline-flex;align-items:center;gap:7px;background:#383838;border:1px solid #4a4a4a;border-radius:16px;padding:5px 12px;font-size:.85rem}
.osoba-tag button{background:none;border:none;color:#888;padding:0;font-size:.9rem}
.osoba-tag button:hover{color:#c0392b}
.radek{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end}
.radek>div{display:flex;flex-direction:column}
.vydaj-form input[type=number]{width:110px}
.vydaj-form input[type=text]{width:180px}
.ucastnici-chk{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
.ucastnici-chk label{display:flex;align-items:center;gap:5px;color:#bbb;font-size:.83rem;margin:0;cursor:pointer}
.ucastnici-chk input{accent-color:#6aa6fd}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:8px 9px;text-align:left;border-bottom:1px solid #333}
th{color:#6aa6fd;font-weight:600}
td.castka,th.castka{text-align:right;white-space:nowrap}
tr:hover td{background:#303030}
.smaz{background:none;border:none;color:#555;cursor:pointer}
.smaz:hover{color:#c0392b}
.bilance{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.bil-karta{background:#333;border-radius:8px;padding:12px 14px}
.bil-karta .jmeno{font-weight:600;margin-bottom:6px}
.bil-karta .detail{font-size:.78rem;color:#999}
.bil-karta .saldo{font-size:1.1rem;font-weight:700;margin-top:4px}
.plus{color:#4caf50}.minus{color:#e67e22}
.vyrovnani div{padding:8px 0;border-bottom:1px solid #333;font-size:.9rem}
.vyrovnani div:last-child{border:none}
.vyrovnani b{color:#6aa6fd}
.souhrn{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:6px}
.souhrn .box{flex:1;min-width:140px;text-align:center;background:#333;border-radius:8px;padding:12px}
.souhrn .box .cislo{font-size:1.3rem;font-weight:700;color:#6aa6fd}
.souhrn .box .pop{font-size:.75rem;color:#888}
.prazdno{color:#777;font-size:.85rem;text-align:center;padding:14px}
@media(max-width:600px){.vydaj-form input[type=text],.vydaj-form input[type=number]{width:100%}.radek>div{flex:1 1 45%}}
</style>
</head>
<body>
<div class="container">
  <h1>💶 Cestovní rozpočet & rozdělení útraty</h1>

  <div class="card">
    <h2>👥 Účastníci</h2>
    <div class="osoby" id="osoby"></div>
    <div class="radek">
      <div><label>Jméno</label><input type="text" id="noveJmeno" placeholder="např. Petr" style="width:160px"></div>
      <button class="primary" id="pridatOsobu">➕ Přidat</button>
      <div><label>Měna</label><input type="text" id="mena" value="Kč" style="width:70px"></div>
      <div><label>Rozpočet celkem (volitelné)</label><input type="number" id="rozpocet" min="0" step="100" style="width:130px" placeholder="–"></div>
    </div>
  </div>

  <div class="card vydaj-form">
    <h2>🧾 Nový výdaj</h2>
    <div class="radek">
      <div><label>Zaplatil</label><select id="platce"></select></div>
      <div><label>Částka</label><input type="number" id="castka" min="0" step="1" placeholder="0"></div>
      <div><label>Za co</label><input type="text" id="popis" placeholder="např. večeře, benzín…"></div>
    </div>
    <label style="margin-top:10px">Dělí se mezi:</label>
    <div class="ucastnici-chk" id="deliMezi"></div>
    <button class="primary" id="pridatVydaj">➕ Přidat výdaj</button>
  </div>

  <div class="card">
    <h2>📊 Souhrn</h2>
    <div class="souhrn">
      <div class="box"><div class="cislo" id="celkem">0</div><div class="pop">celkem utraceno</div></div>
      <div class="box"><div class="cislo" id="naOsobu">0</div><div class="pop">průměr na osobu</div></div>
      <div class="box" id="zbyvaBox" style="display:none"><div class="cislo" id="zbyva">0</div><div class="pop">zbývá z rozpočtu</div></div>
    </div>
    <div class="bilance" id="bilance"></div>
  </div>

  <div class="card">
    <h2>🤝 Kdo komu kolik pošle</h2>
    <div class="vyrovnani" id="vyrovnani"><div class="prazdno">Zatím žádné výdaje.</div></div>
  </div>

  <div class="card">
    <h2>📜 Výdaje</h2>
    <table id="tabulka"><thead><tr><th>Za co</th><th>Zaplatil</th><th>Dělí se</th><th class="castka">Částka</th><th></th></tr></thead><tbody></tbody></table>
    <div class="prazdno" id="prazdnaTab">Zatím žádné výdaje.</div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const STORE='travelBudget.v1';
let stav={osoby:['Já'],vydaje:[],mena:'Kč',rozpocet:''};

function uloz(){stav.mena=$('mena').value;stav.rozpocet=$('rozpocet').value;localStorage.setItem(STORE,JSON.stringify(stav));}
function fmt(n){return n.toLocaleString('cs-CZ',{maximumFractionDigits:0})+' '+(stav.mena||'Kč');}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function vykresliOsoby(){
  $('osoby').innerHTML=stav.osoby.map((o,i)=>
    `<span class="osoba-tag">${esc(o)}<button data-i="${i}" title="Odebrat">✕</button></span>`).join('');
  $('osoby').querySelectorAll('button').forEach(b=>b.onclick=()=>{
    const jmeno=stav.osoby[+b.dataset.i];
    if(stav.vydaje.some(v=>v.platce===jmeno||v.deli.includes(jmeno))){
      if(!confirm(jmeno+' má zaznamenané výdaje. Opravdu odebrat? Výdaje osoby zůstanou v seznamu.'))return;
    }
    stav.osoby.splice(+b.dataset.i,1);uloz();vykresliVse();
  });
  $('platce').innerHTML=stav.osoby.map(o=>`<option>${esc(o)}</option>`).join('');
  $('deliMezi').innerHTML=stav.osoby.map(o=>
    `<label><input type="checkbox" value="${esc(o)}" checked>${esc(o)}</label>`).join('');
}

function vykresliVydaje(){
  const tb=$('tabulka').querySelector('tbody');
  tb.innerHTML=stav.vydaje.map((v,i)=>
    `<tr><td>${esc(v.popis)||'–'}</td><td>${esc(v.platce)}</td>
     <td>${v.deli.length===stav.osoby.length?'všichni':v.deli.map(esc).join(', ')}</td>
     <td class="castka">${fmt(v.castka)}</td>
     <td><button class="smaz" data-i="${i}">✕</button></td></tr>`).join('');
  $('prazdnaTab').style.display=stav.vydaje.length?'none':'block';
  tb.querySelectorAll('.smaz').forEach(b=>b.onclick=()=>{
    stav.vydaje.splice(+b.dataset.i,1);uloz();vykresliVse();
  });
}

function vykresliBilanci(){
  const zaplatil={},podil={};
  stav.osoby.forEach(o=>{zaplatil[o]=0;podil[o]=0;});
  let celkem=0;
  stav.vydaje.forEach(v=>{
    celkem+=v.castka;
    if(zaplatil[v.platce]!==undefined)zaplatil[v.platce]+=v.castka;
    const ucastnici=v.deli.filter(o=>podil[o]!==undefined);
    if(ucastnici.length)ucastnici.forEach(o=>podil[o]+=v.castka/ucastnici.length);
  });
  $('celkem').textContent=fmt(celkem);
  $('naOsobu').textContent=stav.osoby.length?fmt(celkem/stav.osoby.length):'–';
  const rozp=+$('rozpocet').value;
  $('zbyvaBox').style.display=rozp>0?'block':'none';
  if(rozp>0){$('zbyva').textContent=fmt(rozp-celkem);$('zbyva').style.color=rozp-celkem<0?'#e67e22':'#4caf50';}

  $('bilance').innerHTML=stav.osoby.map(o=>{
    const saldo=zaplatil[o]-podil[o];
    return `<div class="bil-karta"><div class="jmeno">${esc(o)}</div>
      <div class="detail">zaplatil ${fmt(zaplatil[o])} · podíl ${fmt(podil[o])}</div>
      <div class="saldo ${saldo>=0?'plus':'minus'}">${saldo>=0?'+':''}${fmt(saldo)}</div></div>`;
  }).join('');

  // vyrovnání – dlužníci posílají věřitelům (hladový algoritmus)
  const veritele=[],dluznici=[];
  stav.osoby.forEach(o=>{
    const s=Math.round((zaplatil[o]-podil[o])*100)/100;
    if(s>0.5)veritele.push({o,s});else if(s<-0.5)dluznici.push({o,s:-s});
  });
  veritele.sort((a,b)=>b.s-a.s);dluznici.sort((a,b)=>b.s-a.s);
  const prevody=[];
  let vi=0,di=0;
  while(vi<veritele.length&&di<dluznici.length){
    const x=Math.min(veritele[vi].s,dluznici[di].s);
    prevody.push(`<div><b>${esc(dluznici[di].o)}</b> pošle <b>${esc(veritele[vi].o)}</b> ${fmt(x)}</div>`);
    veritele[vi].s-=x;dluznici[di].s-=x;
    if(veritele[vi].s<0.5)vi++;
    if(dluznici[di].s<0.5)di++;
  }
  $('vyrovnani').innerHTML=prevody.length?prevody.join(''):
    '<div class="prazdno">'+(stav.vydaje.length?'✅ Všichni jsou vyrovnaní.':'Zatím žádné výdaje.')+'</div>';
}

function vykresliVse(){vykresliOsoby();vykresliVydaje();vykresliBilanci();}

$('pridatOsobu').onclick=()=>{
  const j=$('noveJmeno').value.trim();
  if(!j)return;
  if(stav.osoby.includes(j)){alert('Toto jméno už v seznamu je.');return;}
  stav.osoby.push(j);$('noveJmeno').value='';uloz();vykresliVse();
};
$('noveJmeno').onkeydown=e=>{if(e.key==='Enter')$('pridatOsobu').click();};

$('pridatVydaj').onclick=()=>{
  const castka=+$('castka').value;
  if(!(castka>0)){alert('Zadejte částku.');return;}
  const deli=[...$('deliMezi').querySelectorAll('input:checked')].map(i=>i.value);
  if(!deli.length){alert('Vyberte, mezi koho se výdaj dělí.');return;}
  stav.vydaje.push({platce:$('platce').value,castka,popis:$('popis').value.trim(),deli});
  $('castka').value='';$('popis').value='';
  $('deliMezi').querySelectorAll('input').forEach(i=>i.checked=true);
  uloz();vykresliVse();
};
$('mena').oninput=()=>{uloz();vykresliBilanci();};
$('rozpocet').oninput=()=>{uloz();vykresliBilanci();};

try{
  const s=JSON.parse(localStorage.getItem(STORE));
  if(s&&s.osoby)stav=s;
}catch(e){}
$('mena').value=stav.mena||'Kč';
$('rozpocet').value=stav.rozpocet||'';
vykresliVse();
</script>
</body>
</html>
