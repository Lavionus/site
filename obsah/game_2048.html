<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600}
.top{display:flex;gap:12px;align-items:center;margin-bottom:16px;width:100%;max-width:420px;justify-content:space-between}
.scores{display:flex;gap:10px}
.score{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:8px 16px;text-align:center}
.score .l{font-size:.7rem;color:#888;text-transform:uppercase}.score .v{font-size:1.3rem;font-weight:700;color:#6aa6fd}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.board{background:#2a2a2a;border-radius:10px;padding:10px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:min(420px,90vw);aspect-ratio:1;position:relative}
.cell{background:#1e1e1e;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:clamp(1.2rem,7vw,2.2rem);font-weight:700;transition:all .12s}
.t2{background:#3a3a3a;color:#e0e0e0}.t4{background:#45433a;color:#e0e0e0}
.t8{background:#e6794a;color:#fff}.t16{background:#e6603a;color:#fff}.t32{background:#e64a3a;color:#fff}
.t64{background:#e63a2a;color:#fff}.t128{background:#e6c64a;color:#fff;font-size:clamp(1rem,6vw,1.9rem)}
.t256{background:#e6c23a;color:#fff;font-size:clamp(1rem,6vw,1.9rem)}.t512{background:#e6bf2a;color:#fff;font-size:clamp(1rem,6vw,1.9rem)}
.t1024{background:#e6bb1a;color:#fff;font-size:clamp(.8rem,5vw,1.5rem)}.t2048{background:#f7d000;color:#fff;font-size:clamp(.8rem,5vw,1.5rem)}
.t4096{background:#3c3a32;color:#f7d000}
.hint{color:#888;font-size:.85rem;margin-top:16px;text-align:center}
.overlay{position:absolute;inset:0;background:rgba(26,26,26,.85);border-radius:10px;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.overlay.show{display:flex}.overlay h2{font-size:2rem;color:#6aa6fd}
</style>
</head>
<body>
<h1>🔢 2048</h1>
<div class="top">
  <button class="btn" id="newBtn">🔄 Nová hra</button>
  <div class="scores">
    <div class="score"><div class="l">Skóre</div><div class="v" id="score">0</div></div>
    <div class="score"><div class="l">Nejlepší</div><div class="v" id="best">0</div></div>
  </div>
</div>
<div class="board" id="board"><div class="overlay" id="overlay"><h2 id="overTitle"></h2><button class="btn" id="overBtn">Hrát znovu</button></div></div>
<p class="hint">Ovládání: šipky / WASD na klávesnici nebo tažení prstem. Spojuj stejná čísla a dosáhni 2048!</p>
<script>
const $=id=>document.getElementById(id);
const N=4;let grid,score,best=+(localStorage.getItem('2048_best')||0),won=false;
$('best').textContent=best;
const board=$('board');
let cells=[];
function buildCells(){
  // create 16 cell divs once (overlay stays)
  for(let i=0;i<N*N;i++){const c=document.createElement('div');c.className='cell';board.insertBefore(c,$('overlay'));cells.push(c);}
}
function init(){
  grid=Array.from({length:N},()=>Array(N).fill(0));score=0;won=false;
  $('overlay').classList.remove('show');
  addTile();addTile();render();
}
function addTile(){
  const empty=[];grid.forEach((r,i)=>r.forEach((v,j)=>{if(!v)empty.push([i,j]);}));
  if(!empty.length)return;
  const[i,j]=empty[Math.floor(Math.random()*empty.length)];
  grid[i][j]=Math.random()<0.9?2:4;
}
function render(){
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){
    const v=grid[i][j],c=cells[i*N+j];
    c.textContent=v||'';c.className='cell'+(v?' t'+v:'');
  }
  $('score').textContent=score;
  if(score>best){best=score;localStorage.setItem('2048_best',best);$('best').textContent=best;}
}
function slide(row){
  let arr=row.filter(v=>v);
  for(let i=0;i<arr.length-1;i++){if(arr[i]===arr[i+1]){arr[i]*=2;score+=arr[i];if(arr[i]===2048&&!won){won=true;gameOver('🎉 Vyhráls 2048!');}arr.splice(i+1,1);}}
  while(arr.length<N)arr.push(0);
  return arr;
}
function rotate(g){const r=Array.from({length:N},()=>Array(N).fill(0));for(let i=0;i<N;i++)for(let j=0;j<N;j++)r[j][N-1-i]=g[i][j];return r;}
function move(dir){
  const before=JSON.stringify(grid);
  let g=grid;
  for(let r=0;r<dir;r++)g=rotate(g);
  g=g.map(slide);
  for(let r=0;r<(4-dir)%4;r++)g=rotate(g);
  grid=g;
  if(JSON.stringify(grid)!==before){addTile();render();checkOver();}
}
function checkOver(){
  for(let i=0;i<N;i++)for(let j=0;j<N;j++){
    if(!grid[i][j])return;
    if(j<N-1&&grid[i][j]===grid[i][j+1])return;
    if(i<N-1&&grid[i][j]===grid[i+1][j])return;
  }
  gameOver('💀 Konec hry');
}
function gameOver(t){$('overTitle').textContent=t;$('overlay').classList.add('show');}
// dir: 0=left,1=up,2=right,3=down
const KEYS={ArrowLeft:0,a:0,ArrowUp:1,w:1,ArrowRight:2,d:2,ArrowDown:3,s:3};
document.addEventListener('keydown',e=>{const d=KEYS[e.key];if(d!==undefined){e.preventDefault();move(d);}});
let tsx,tsy;
board.addEventListener('touchstart',e=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;},{passive:true});
board.addEventListener('touchend',e=>{if(tsx==null)return;const dx=e.changedTouches[0].clientX-tsx,dy=e.changedTouches[0].clientY-tsy;
  if(Math.max(Math.abs(dx),Math.abs(dy))<24)return;
  move(Math.abs(dx)>Math.abs(dy)?(dx>0?2:0):(dy>0?3:1));tsx=null;},{passive:true});
$('newBtn').onclick=init;$('overBtn').onclick=init;
buildCells();init();
</script>
</body>
</html>
