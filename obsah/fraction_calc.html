<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>➗ Kalkulačka zlomků</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:680px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
.calc{display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
.frac{display:flex;flex-direction:column;align-items:center;gap:4px}
.frac input{width:80px;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#6aa6fd;padding:10px;text-align:center;font-size:1.3rem;font-weight:700}
.frac .bar{width:80px;height:3px;background:#6aa6fd;border-radius:2px}
.op select{background:#404040;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:14px;font-size:1.3rem}
.eq{font-size:1.6rem;color:#888}
.result{text-align:center;margin-top:24px}
.result .big{font-size:3rem;font-weight:700;color:#27ae60}
.result .sub{color:#888;margin-top:6px}
.steps{background:#1e1e1e;border-radius:8px;padding:16px;margin-top:16px;font-size:.9rem;line-height:1.9}
.steps h3{color:#6aa6fd;font-size:.9rem;margin-bottom:8px}
.steps .step{color:#bbb}
</style>
</head>
<body>
<div class="container">
  <h1>➗ Kalkulačka zlomků</h1>
  <div class="card">
    <div class="calc">
      <div class="frac"><input type="number" id="n1" value="1"><div class="bar"></div><input type="number" id="d1" value="2"></div>
      <div class="op"><select id="op"><option value="+">+</option><option value="-">−</option><option value="*">×</option><option value="/">÷</option></select></div>
      <div class="frac"><input type="number" id="n2" value="1"><div class="bar"></div><input type="number" id="d2" value="3"></div>
      <span class="eq">=</span>
      <div class="frac"><div id="rn" style="font-size:2rem;font-weight:700;color:#27ae60">5</div><div class="bar" style="background:#27ae60"></div><div id="rd" style="font-size:2rem;font-weight:700;color:#27ae60">6</div></div>
    </div>
    <div class="result">
      <div class="sub" id="decimal"></div>
    </div>
    <div class="steps" id="steps"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b];}return a||1;}
function calc(){
  const n1=+$('n1').value,d1=+$('d1').value,n2=+$('n2').value,d2=+$('d2').value,op=$('op').value;
  if(!d1||!d2){$('rn').textContent='∞';$('rd').textContent='';$('steps').innerHTML='<span class="step">Jmenovatel nesmí být 0.</span>';return;}
  let rn,rd,steps=[];
  if(op==='+'){rn=n1*d2+n2*d1;rd=d1*d2;steps.push(`Společný jmenovatel: ${d1}×${d2} = ${d1*d2}`,`${n1}×${d2} + ${n2}×${d1} = ${n1*d2} + ${n2*d1} = ${rn}`);}
  else if(op==='-'){rn=n1*d2-n2*d1;rd=d1*d2;steps.push(`Společný jmenovatel: ${d1}×${d2} = ${d1*d2}`,`${n1}×${d2} − ${n2}×${d1} = ${n1*d2} − ${n2*d1} = ${rn}`);}
  else if(op==='*'){rn=n1*n2;rd=d1*d2;steps.push(`Čitatel: ${n1}×${n2} = ${rn}`,`Jmenovatel: ${d1}×${d2} = ${rd}`);}
  else{rn=n1*d2;rd=d1*n2;steps.push(`Dělení = násobení převrácenou hodnotou`,`${n1}/${d1} × ${d2}/${n2} = ${rn}/${rd}`);}
  const g=gcd(rn,rd);
  if(g>1)steps.push(`Krácení číslem ${g}: ${rn}/${rd} = ${rn/g}/${rd/g}`);
  let fn=rn/g,fd=rd/g;
  if(fd<0){fn=-fn;fd=-fd;}
  $('rn').textContent=fn;$('rd').textContent=fd;
  const dec=fn/fd;
  let mixed='';
  if(Math.abs(fn)>=fd&&fd!==1){const whole=Math.trunc(fn/fd),rem=Math.abs(fn%fd);mixed=` = ${whole} ${rem}/${fd}`;}
  $('decimal').textContent=`Desetinně: ${dec.toFixed(4).replace(/\.?0+$/,'')}${mixed}`;
  $('steps').innerHTML='<h3>Postup:</h3>'+steps.map(s=>`<div class="step">• ${s}</div>`).join('');
}
['n1','d1','n2','d2','op'].forEach(id=>$(id).oninput=calc);
$('op').onchange=calc;
calc();
</script>
</body>
</html>
