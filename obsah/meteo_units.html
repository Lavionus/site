<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌡️ Převodník meteo jednotek</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.row label{width:160px;font-size:.9rem;color:#bbb}
.row input{flex:1;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#6aa6fd;padding:11px;font-family:monospace;font-size:1.05rem}
.beaufort{margin-top:14px;padding:14px;background:#1e1e1e;border-radius:8px;display:flex;align-items:center;gap:14px}
.beaufort .num{font-size:2.2rem;font-weight:700;color:#6aa6fd}
.beaufort .desc{flex:1}.beaufort .name{font-weight:600}.beaufort .effect{font-size:.82rem;color:#888}
</style>
</head>
<body>
<div class="container">
  <h1>🌡️ Převodník meteo jednotek</h1>
  <div class="card">
    <h2>🌡️ Teplota</h2>
    <div class="row"><label>Celsius (°C)</label><input type="number" id="c" data-t="temp" value="20" step="any"></div>
    <div class="row"><label>Fahrenheit (°F)</label><input type="number" id="f" data-t="temp" step="any"></div>
    <div class="row"><label>Kelvin (K)</label><input type="number" id="k" data-t="temp" step="any"></div>
  </div>
  <div class="card">
    <h2>📊 Tlak</h2>
    <div class="row"><label>Hektopascal (hPa)</label><input type="number" id="hpa" data-t="pres" value="1013" step="any"></div>
    <div class="row"><label>Milimetr rtuti (mmHg)</label><input type="number" id="mmhg" data-t="pres" step="any"></div>
    <div class="row"><label>Palec rtuti (inHg)</label><input type="number" id="inhg" data-t="pres" step="any"></div>
    <div class="row"><label>Milibar (mbar)</label><input type="number" id="mbar" data-t="pres" step="any"></div>
  </div>
  <div class="card">
    <h2>💨 Rychlost větru</h2>
    <div class="row"><label>Metr za sekundu (m/s)</label><input type="number" id="ms" data-t="wind" value="5" step="any"></div>
    <div class="row"><label>Kilometr za hodinu (km/h)</label><input type="number" id="kmh" data-t="wind" step="any"></div>
    <div class="row"><label>Uzel (kn)</label><input type="number" id="kn" data-t="wind" step="any"></div>
    <div class="row"><label>Míle za hodinu (mph)</label><input type="number" id="mph" data-t="wind" step="any"></div>
    <div class="beaufort" id="beaufort"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const BFT=[[0,'Bezvětří','kouř stoupá svisle'],[0.3,'Vánek','směr větru znát z kouře'],[1.6,'Slabý vítr','listí šustí'],[3.4,'Mírný vítr','vlaje prapor'],[5.5,'Dosti čerstvý','zvedá prach a papír'],[8,'Čerstvý vítr','listnaté keře se hýbou'],[10.8,'Silný vítr','obtížné používat deštník'],[13.9,'Prudký vítr','chůze proti větru obtížná'],[17.2,'Bouřlivý vítr','láme větve'],[20.8,'Vichřice','menší škody na budovách'],[24.5,'Silná vichřice','vyvrací stromy'],[28.5,'Mohutná vichřice','rozsáhlé škody'],[32.7,'Orkán','ničivé účinky']];
function setTemp(c,except){if(except!=='c')$('c').value=+c.toFixed(2);if(except!=='f')$('f').value=+(c*9/5+32).toFixed(2);if(except!=='k')$('k').value=+(c+273.15).toFixed(2);}
function setPres(hpa,except){if(except!=='hpa')$('hpa').value=+hpa.toFixed(2);if(except!=='mmhg')$('mmhg').value=+(hpa*0.750062).toFixed(2);if(except!=='inhg')$('inhg').value=+(hpa*0.02953).toFixed(3);if(except!=='mbar')$('mbar').value=+hpa.toFixed(2);}
function setWind(ms,except){
  if(except!=='ms')$('ms').value=+ms.toFixed(2);if(except!=='kmh')$('kmh').value=+(ms*3.6).toFixed(2);if(except!=='kn')$('kn').value=+(ms*1.94384).toFixed(2);if(except!=='mph')$('mph').value=+(ms*2.23694).toFixed(2);
  let bft=0;for(let i=0;i<BFT.length;i++)if(ms>=BFT[i][0])bft=i;
  $('beaufort').innerHTML=`<div class="num">${bft}</div><div class="desc"><div class="name">${BFT[bft][1]} (${bft}° Beaufort)</div><div class="effect">${BFT[bft][2]}</div></div>`;
}
$('c').oninput=()=>setTemp(+$('c').value,'c');
$('f').oninput=()=>setTemp((+$('f').value-32)*5/9,'f');
$('k').oninput=()=>setTemp(+$('k').value-273.15,'k');
$('hpa').oninput=()=>setPres(+$('hpa').value,'hpa');
$('mmhg').oninput=()=>setPres(+$('mmhg').value/0.750062,'mmhg');
$('inhg').oninput=()=>setPres(+$('inhg').value/0.02953,'inhg');
$('mbar').oninput=()=>setPres(+$('mbar').value,'mbar');
$('ms').oninput=()=>setWind(+$('ms').value,'ms');
$('kmh').oninput=()=>setWind(+$('kmh').value/3.6,'kmh');
$('kn').oninput=()=>setWind(+$('kn').value/1.94384,'kn');
$('mph').oninput=()=>setWind(+$('mph').value/2.23694,'mph');
setTemp(20);setPres(1013);setWind(5);
</script>
</body>
</html>
