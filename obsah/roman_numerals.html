<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏛️ Římské číslice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:680px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
.row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.row label{width:120px;font-size:.9rem;color:#bbb}
.row input{flex:1;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#6aa6fd;padding:14px;font-size:1.4rem;text-align:center;font-weight:700}
.swap{text-align:center;color:#888;margin:6px 0}
.breakdown{background:#1e1e1e;border-radius:8px;padding:14px;margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.part{text-align:center;padding:8px 12px;background:#2a3548;border-radius:6px}
.part .r{font-size:1.4rem;font-weight:700;color:#6aa6fd}.part .v{font-size:.75rem;color:#888}
.err{color:#e74c3c;text-align:center;font-size:.85rem;margin-top:8px}
.ref{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px;margin-top:8px}
.ref div{background:#1e1e1e;border-radius:4px;padding:6px 8px;text-align:center;font-size:.85rem}
.ref b{color:#6aa6fd}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:10px}
</style>
</head>
<body>
<div class="container">
  <h1>🏛️ Převodník římských číslic</h1>
  <div class="card">
    <div class="row"><label>Arabské číslo</label><input type="number" id="arabic" value="2026" min="1" max="3999"></div>
    <div class="swap">⇅</div>
    <div class="row"><label>Římské číslo</label><input type="text" id="roman" value="MMXXVI"></div>
    <div class="err" id="err"></div>
    <div class="breakdown" id="breakdown"></div>
  </div>
  <div class="card">
    <h2>📖 Základní hodnoty</h2>
    <div class="ref">
      <div><b>I</b> = 1</div><div><b>V</b> = 5</div><div><b>X</b> = 10</div><div><b>L</b> = 50</div>
      <div><b>C</b> = 100</div><div><b>D</b> = 500</div><div><b>M</b> = 1000</div>
    </div>
    <p style="font-size:.78rem;color:#666;margin-top:10px">Rozsah 1–3999. Pravidlo odčítání: IV=4, IX=9, XL=40, XC=90, CD=400, CM=900.</p>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const MAP=[[1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],[100,'C'],[90,'XC'],[50,'L'],[40,'XL'],[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
function toRoman(n){let r='';for(const[v,s]of MAP)while(n>=v){r+=s;n-=v;}return r;}
function fromRoman(s){
  s=s.toUpperCase();const vals={I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
  if(!/^[IVXLCDM]+$/.test(s))return null;
  let total=0;
  for(let i=0;i<s.length;i++){const cur=vals[s[i]],next=vals[s[i+1]]||0;if(cur<next)total-=cur;else total+=cur;}
  if(toRoman(total)!==s)return null; // validate canonical form
  return total;
}
function breakdown(n){
  const parts=[];for(const[v,s]of MAP)while(n>=v){parts.push([s,v]);n-=v;}
  $('breakdown').innerHTML=parts.map(([r,v])=>`<div class="part"><div class="r">${r}</div><div class="v">${v}</div></div>`).join('');
}
$('arabic').oninput=()=>{
  $('err').textContent='';
  const n=parseInt($('arabic').value);
  if(isNaN(n)||n<1||n>3999){$('err').textContent='Zadej číslo 1–3999.';$('roman').value='';$('breakdown').innerHTML='';return;}
  $('roman').value=toRoman(n);breakdown(n);
};
$('roman').oninput=()=>{
  $('err').textContent='';
  const v=fromRoman($('roman').value.trim());
  if(v===null){$('err').textContent='Neplatné římské číslo.';$('breakdown').innerHTML='';return;}
  $('arabic').value=v;breakdown(v);
};
breakdown(2026);
</script>
</body>
</html>
