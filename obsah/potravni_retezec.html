<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌾 Potravní řetězce</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:640px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:16px}
.scorebar{display:flex;justify-content:space-around;margin-bottom:16px}
.scorebar .v{font-size:1.4rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.instr{text-align:center;color:#888;font-size:.85rem;margin-bottom:14px}
.pool{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;min-height:50px;padding:10px;background:#1e1e1e;border-radius:8px}
.slots{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap;margin-bottom:16px}
.slot{width:90px;height:60px;border:2px dashed #555;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;background:#1e1e1e}
.slot.filled{border-style:solid;border-color:#6aa6fd}
.arrow{color:#888;font-size:1.2rem}
.chip{background:#333;border:1px solid #555;border-radius:8px;padding:10px 14px;font-size:1.6rem;cursor:grab;user-select:none}
.chip.used{opacity:.25;cursor:default}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer;font-weight:600;display:block;margin:0 auto}
.btn:hover{background:#5694f0}
.feedback{text-align:center;font-weight:600;min-height:28px;margin-top:10px}
.label{text-align:center;font-size:.7rem;color:#888;margin-top:2px}
.slotwrap{display:flex;flex-direction:column;align-items:center}
</style>
</head>
<body>
<div class="container">
  <h1>🌾 Potravní řetězce</h1>
  <div class="card">
    <div class="scorebar"><div><div class="v" id="score">0</div><div class="l">Správně</div></div><div><div class="v" id="idx">0/0</div><div class="l">Řetězec</div></div></div>
    <div class="instr">Klikáním doplň organismy do řetězce ve správném pořadí (producent → konzument → …).</div>
    <div class="slots" id="slots"></div>
    <div class="pool" id="pool"></div>
    <div class="feedback" id="feedback"></div>
    <button class="btn" id="checkBtn">✅ Zkontrolovat</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const RETEZCE=[
{items:['🌾 obilí','🐭 myš','🦉 sova'],labels:['producent','1. konzument','2. konzument']},
{items:['🌿 tráva','🦗 kobylka','🐸 žába','🐍 had'],labels:['producent','1. konzument','2. konzument','3. konzument']},
{items:['🌱 rostlinný plankton','🐟 malá ryba','🐟 velká ryba','🐻 medvěd'],labels:['producent','1. konzument','2. konzument','3. konzument']},
{items:['🌾 pšenice','🐛 housenka','🐦 sýkorka','🦅 jestřáb'],labels:['producent','1. konzument','2. konzument','3. konzument']},
{items:['🍃 list','🐌 hlemýžď','🐦 kos','🦊 liška'],labels:['producent','1. konzument','2. konzument','3. konzument']}
];
let deck,idx,score,current,slotState;
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function start(){
  deck=shuffle([...RETEZCE]);idx=0;score=0;$('score').textContent=0;
  next();
}
function next(){
  if(idx>=deck.length){
    $('slots').innerHTML='';$('pool').innerHTML='';$('feedback').innerHTML=`<span style="color:#6aa6fd">Hotovo! Výsledek: ${score}/${deck.length}</span>`;
    $('checkBtn').style.display='none';
    return;
  }
  $('idx').textContent=`${idx+1}/${deck.length}`;
  current=deck[idx];
  slotState=new Array(current.items.length).fill(null);
  const slotsBox=$('slots');slotsBox.innerHTML='';
  current.items.forEach((_,i)=>{
    if(i>0){const ar=document.createElement('div');ar.className='arrow';ar.textContent='→';slotsBox.appendChild(ar);}
    const wrap=document.createElement('div');wrap.className='slotwrap';
    const s=document.createElement('div');s.className='slot';s.dataset.i=i;
    wrap.appendChild(s);
    const lab=document.createElement('div');lab.className='label';lab.textContent=current.labels[i];
    wrap.appendChild(lab);
    slotsBox.appendChild(wrap);
  });
  const pool=$('pool');pool.innerHTML='';
  shuffle([...current.items]).forEach(item=>{
    const c=document.createElement('div');c.className='chip';c.textContent=item;
    c.onclick=()=>{
      if(c.classList.contains('used'))return;
      const empty=slotState.findIndex(v=>v===null);
      if(empty===-1)return;
      slotState[empty]=item;c.classList.add('used');
      const slotEl=slotsBox.querySelector(`.slot[data-i="${empty}"]`);
      slotEl.textContent=item;slotEl.classList.add('filled');
    };
    pool.appendChild(c);
  });
  $('feedback').textContent='';
  $('checkBtn').style.display='block';
}
$('checkBtn').onclick=()=>{
  if(slotState.includes(null)){$('feedback').innerHTML='<span style="color:#f39c12">Doplň všechny pozice.</span>';return;}
  const ok=slotState.every((v,i)=>v===current.items[i]);
  if(ok){score++;$('score').textContent=score;$('feedback').innerHTML='<span style="color:#27ae60">✅ Správně!</span>';}
  else{$('feedback').innerHTML='<span style="color:#e74c3c">❌ Špatné pořadí, zkus to znovu.</span>';
    slotState=new Array(current.items.length).fill(null);
    document.querySelectorAll('.slot').forEach(s=>{s.textContent='';s.classList.remove('filled');});
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('used'));
    return;
  }
  setTimeout(()=>{idx++;next();},1000);
};
start();
</script>
</body>
</html>
