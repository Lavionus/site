<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slepá mapa ČR</title>
  <link rel="stylesheet" href="../common.css">
  <script>
    if (localStorage.getItem('webapp_theme') === 'light') document.documentElement.dataset.theme = 'light';
  </script>
  <style>
    body { background-color: var(--bg-deep); padding: 20px clamp(12px, 3vw, 36px); min-height: 100vh; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .podtitul { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 14px; }
    .rezimy { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .rezimy button {
      background: var(--bg-control); border: 1px solid var(--border-strong); color: var(--text-muted);
      border-radius: 6px; padding: 8px 14px; font-size: 0.85rem; cursor: pointer;
    }
    .rezimy button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .panel {
      display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 16px; margin-bottom: 12px;
    }
    #otazka { font-size: 1.05rem; font-weight: 600; }
    #otazka b { color: var(--accent); }
    #skore { margin-left: auto; color: var(--text-muted); font-size: 0.88rem; font-variant-numeric: tabular-nums; }
    #zprava { font-size: 0.9rem; min-width: 130px; }
    #zprava.ok { color: var(--ok); }
    #zprava.spatne { color: var(--danger); }
    .mapa-wrap {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px; max-width: 980px;
    }
    svg { width: 100%; height: auto; display: block; }
    .kraj {
      fill: var(--bg-control); stroke: var(--text-faint); stroke-width: 0.8; cursor: pointer;
      transition: fill 0.15s ease;
    }
    .kraj:hover { fill: var(--accent-soft); }
    .kraj.spravne { fill: var(--ok); pointer-events: none; }
    .kraj.blik { fill: var(--danger); }
    .kraj.uceni:hover { fill: var(--accent); }
    .mesto { fill: var(--accent); stroke: #fff; stroke-width: 1; cursor: pointer; transition: r 0.1s ease; }
    .mesto:hover { r: 9; }
    .mesto.spravne { fill: var(--ok); pointer-events: none; }
    .mesto.blik { fill: var(--danger); }
    .popisek { fill: var(--text); font-size: 11px; pointer-events: none; text-anchor: middle; font-weight: 600;
      paint-order: stroke; stroke: var(--bg-deep); stroke-width: 3px; }
  </style>
</head>

5,49.409],[17.333,49.382],[17.357,49.343],[17.315,49.332],[17.277,49.295],[17.255,49.303],[17.212,49.289],[17.194,49.297],[17.177,49.269],[17.159,49.275],[17.131,49.247],[17.148,49.23],[17.136,49.215],[17.165,49.19],[17.147,49.175],[17.181,49.173],[17.196,49.184],[17.203,49.176],[17.188,49.138],[17.149,49.133],[17.142,49.104],[17.113,49.103],[17.12,49.086],[17.11,49.077]]]}}];

    const MESTA = [
      { nazev: 'Praha', lon: 14.421, lat: 50.088 },
      { nazev: 'Brno', lon: 16.606, lat: 49.195 },
      { nazev: 'Ostrava', lon: 18.292, lat: 49.821 },
      { nazev: 'Plzeň', lon: 13.377, lat: 49.747 },
      { nazev: 'Liberec', lon: 15.058, lat: 50.767 },
      { nazev: 'Olomouc', lon: 17.251, lat: 49.594 },
      { nazev: 'Ústí nad Labem', lon: 14.040, lat: 50.661 },
      { nazev: 'Hradec Králové', lon: 15.832, lat: 50.209 },
      { nazev: 'Pardubice', lon: 15.779, lat: 50.034 },
      { nazev: 'Zlín', lon: 17.667, lat: 49.224 },
      { nazev: 'Karlovy Vary', lon: 12.871, lat: 50.232 },
      { nazev: 'České Budějovice', lon: 14.475, lat: 48.975 },
      { nazev: 'Jihlava', lon: 15.591, lat: 49.396 },
    ];

    /* projekce: rovnoběžková s korekcí šířky, napasovaná na viewBox */
    const LON = [12.09, 18.86], LAT = [48.55, 51.06];
    const KOR = Math.cos(49.8 * Math.PI / 180);
    const W = 1000, H = 560, PAD = 14;
    const sirka = (LON[1] - LON[0]) * KOR, vyska = LAT[1] - LAT[0];
    const scale = Math.min((W - 2 * PAD) / sirka, (H - 2 * PAD) / vyska);
    const px = lon => PAD + (lon - LON[0]) * KOR * scale;
    const py = lat => H - PAD - (lat - LAT[0]) * scale;

    const svg = document.getElementById('mapa');
    const NS = 'http://www.w3.org/2000/svg';

    function cestaKraje(geom) {
      const rings = geom.type === 'Polygon' ? geom.coordinates : geom.coordinates.flat(1);
      return rings.map(ring =>
        'M' + ring.map(([lon, lat]) => `${px(lon).toFixed(1)},${py(lat).toFixed(1)}`).join('L') + 'Z'
      ).join('');
    }

    /* vykreslení mapy */
    const cesty = new Map();
    KRAJE.forEach(k => {
      const p = document.createElementNS(NS, 'path');
      p.setAttribute('d', cestaKraje(k.geometrie));
      p.classList.add('kraj');
      p.dataset.nazev = k.nazev;
      svg.appendChild(p);
      cesty.set(k.nazev, p);
    });

    const body = new Map();
    MESTA.forEach(m => {
      const c = document.createElementNS(NS, 'circle');
      c.setAttribute('cx', px(m.lon));
      c.setAttribute('cy', py(m.lat));
      c.setAttribute('r', 7);
      c.classList.add('mesto');
      c.dataset.nazev = m.nazev;
      c.style.display = 'none';
      svg.appendChild(c);
      body.set(m.nazev, c);
    });

    /* stav kvízu */
    let rezim = 'kraje';
    let fronta = [];
    let hledane = null;
    let spravneCelkem = 0, pokusy = 0;

    const otazkaEl = document.getElementById('otazka');
    const zpravaEl = document.getElementById('zprava');
    const skoreEl = document.getElementById('skore');

    const zamichej = arr => arr.map(x => [Math.random(), x]).sort((a, b) => a[0] - b[0]).map(x => x[1]);

    function ukazSkore() {
      skoreEl.textContent = pokusy ? `Úspěšnost: ${spravneCelkem}/${pokusy}` : '';
    }

    function dalsiOtazka() {
      if (!fronta.length) {
        hledane = null;
        otazkaEl.innerHTML = `🎉 Hotovo! Úspěšnost ${spravneCelkem} z ${pokusy}.`;
        zpravaEl.textContent = '';
        return;
      }
      hledane = fronta.shift();
      otazkaEl.innerHTML = (rezim === 'kraje' ? 'Klikni na: ' : 'Kde leží: ') + `<b></b>`;
      otazkaEl.querySelector('b').textContent = hledane;
      zpravaEl.textContent = '';
      zpravaEl.className = '';
    }

    function restart() {
      spravneCelkem = 0; pokusy = 0;
      svg.querySelectorAll('.kraj').forEach(p => {
        p.classList.remove('spravne', 'blik', 'uceni');
        p.style.pointerEvents = '';
      });
      svg.querySelectorAll('.mesto').forEach(c => {
        c.classList.remove('spravne', 'blik');
        c.style.display = rezim === 'mesta' ? '' : 'none';
        c.style.pointerEvents = '';
      });
      svg.querySelectorAll('.popisek').forEach(t => t.remove());
      ukazSkore();

      if (rezim === 'uceni') {
        hledane = null;
        otazkaEl.textContent = 'Najeď nebo klikni na kraj či město – zobrazí se název.';
        zpravaEl.textContent = '';
        svg.querySelectorAll('.kraj').forEach(p => p.classList.add('uceni'));
        svg.querySelectorAll('.mesto').forEach(c => { c.style.display = ''; });
        return;
      }
      fronta = zamichej(rezim === 'kraje' ? KRAJE.map(k => k.nazev) : MESTA.map(m => m.nazev));
      dalsiOtazka();
    }

    function popisek(x, y, text) {
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('x', x);
      t.setAttribute('y', y - 10);
      t.classList.add('popisek');
      t.textContent = text;
      svg.appendChild(t);
      return t;
    }

    function stredKraje(nazev) {
      const b = cesty.get(nazev).getBBox();
      return [b.x + b.width / 2, b.y + b.height / 2];
    }

    svg.addEventListener('click', e => {
      const cil = e.target.closest('.kraj, .mesto');
      if (!cil) return;
      const nazev = cil.dataset.nazev;

      if (rezim === 'uceni') {
        svg.querySelectorAll('.popisek').forEach(t => t.remove());
        if (cil.classList.contains('mesto')) {
          popisek(+cil.getAttribute('cx'), +cil.getAttribute('cy'), nazev);
        } else {
          const [x, y] = stredKraje(nazev);
          popisek(x, y, nazev);
        }
        return;
      }

      const jeMesto = cil.classList.contains('mesto');
      if ((rezim === 'kraje' && jeMesto) || (rezim === 'mesta' && !jeMesto) || !hledane) return;

      pokusy++;
      if (nazev === hledane) {
        spravneCelkem++;
        cil.classList.add('spravne');
        if (jeMesto) popisek(+cil.getAttribute('cx'), +cil.getAttribute('cy'), nazev);
        else { const [x, y] = stredKraje(nazev); popisek(x, y, nazev); }
        zpravaEl.textContent = '✓ Správně!';
        zpravaEl.className = 'ok';
        ukazSkore();
        setTimeout(dalsiOtazka, 700);
      } else {
        zpravaEl.textContent = `✗ Tohle je ${nazev}`;
        zpravaEl.className = 'spatne';
        cil.classList.add('blik');
        setTimeout(() => cil.classList.remove('blik'), 600);
        // špatně zodpovězené zařadit znovu na konec
        if (!fronta.includes(hledane)) fronta.push(hledane);
        ukazSkore();
      }
    });

    document.getElementById('rezimy').addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      document.querySelectorAll('#rezimy button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      rezim = b.dataset.rezim;
      restart();
    });

    restart();
  </script>
