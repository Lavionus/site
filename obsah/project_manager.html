<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗂️ Správce projektů</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh}
.wrap{display:flex;height:100vh;overflow:hidden}

/* ---- Levý panel se stromem ---- */
.panel{width:340px;min-width:220px;max-width:70vw;background:#222;border-right:1px solid #404040;display:flex;flex-direction:column;flex-shrink:0}
.panel-head{padding:14px 14px 10px;border-bottom:1px solid #353535}
.panel-head h1{font-size:1.05rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.panel-head h1{justify-content:space-between}
.panel-close{display:none;background:none;border:none;color:#999;font-size:1.1rem;cursor:pointer}
.panel-head .search{width:100%;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:7px 9px;font-size:.82rem;margin-bottom:8px}
.panel-head .search:focus{outline:none;border-color:#6aa6fd}
.panel-head .actions{display:flex;gap:6px;flex-wrap:wrap}
.panel-foot{padding:8px 14px 12px;border-top:1px solid #353535;display:flex;gap:6px;flex-wrap:wrap}
.panel-foot input[type=file]{display:none}
.btn{background:#6aa6fd;border:none;border-radius:6px;color:#fff;padding:7px 10px;cursor:pointer;font-size:.78rem;font-weight:600;white-space:nowrap}
.btn:hover{background:#5691e8}
.btn-sec{background:#3a3a3a;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:7px 10px;cursor:pointer;font-size:.78rem}
.btn-sec:hover{background:#454545}
.btn-danger{background:#3a3a3a;border:1px solid #6b3232;color:#e37e7e}
.btn-danger:hover{background:#4a2c2c}

.tree{flex:1;overflow-y:auto;padding:8px}
.resizer{width:5px;cursor:col-resize;background:#2d2d2d;flex-shrink:0}
.resizer:hover{background:#6aa6fd}

/* stromové uzly */
.node{user-select:none}
.node-row{display:flex;align-items:center;gap:4px;padding:6px 6px;border-radius:6px;cursor:pointer;border:1px solid transparent;font-size:.86rem}
.node-row:hover{background:#2c2c2c}
.node-row.active{background:#2a3a52;border-color:#6aa6fd}
.node-row.dragover{border-color:#6aa6fd;background:#1e2530}
.node-row.dragover-before{box-shadow:inset 0 2px 0 #6aa6fd}
.node-row.dragover-after{box-shadow:inset 0 -2px 0 #6aa6fd}
.node-row .toggle{width:16px;text-align:center;color:#999;flex-shrink:0}
.node-row .icon{flex-shrink:0}
.node-row .lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.node-row .lbl[contenteditable=true]{outline:1px dashed #6aa6fd;background:#1e1e1e;border-radius:3px;padding:0 2px}
.node-row .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#27ae60}
.dot-soon{background:#f39c12}
.dot-late{background:#e74c3c}
.dot-done{background:#3a3a3a;border:1px solid #6aa6fd}
.node-row .done-chk{flex-shrink:0;cursor:pointer;accent-color:#6aa6fd}
.node-row.is-done .lbl{color:#888;text-decoration:line-through}
.node-row.no-match{display:none}
.node-row .row-actions{display:none;gap:2px;flex-shrink:0}
.node-row:hover .row-actions{display:flex}
.row-actions button{background:none;border:none;color:#999;cursor:pointer;font-size:.85rem;padding:2px 3px;border-radius:4px}
.row-actions button:hover{color:#fff;background:#444}

.lvl1>.node-row{font-weight:700}
.lvl2>.node-row{padding-left:20px}
.lvl2>.node-row .icon{font-size:.85rem}
.lvl3-list{padding-left:0}
.lvl3{padding-left:40px}
.lvl3>.node-row{font-weight:400;color:#d5d5d5}
.children{overflow:hidden}
.children.collapsed{display:none}

.empty-tree{color:#888;font-size:.85rem;padding:16px;text-align:center}

/* ---- Pravý panel s obsahem stránky ---- */
.content{flex:1;display:flex;flex-direction:column;min-width:0}
.content-head{padding:14px 22px;border-bottom:1px solid #404040;background:#232323;display:flex;flex-wrap:wrap;align-items:center;gap:12px}
.content-head .path{color:#999;font-size:.78rem;flex-basis:100%}
.content-head h2{font-size:1.15rem;font-weight:600;flex:1;min-width:150px}
.deadline-box{display:flex;align-items:center;gap:6px;font-size:.82rem;color:#bbb}
.deadline-box input[type=date]{background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:6px 8px;font-size:.82rem}
.status-chip{padding:3px 10px;border-radius:12px;font-size:.75rem;font-weight:600}
.chip-ok{background:#1f3c2a;color:#4ad57e}
.chip-soon{background:#3c3320;color:#f6b93b}
.chip-late{background:#3c2020;color:#f47c7c}
.chip-none{background:#333;color:#999}
.chip-done{background:#28324a;color:#8fb4f7}
.done-toggle{display:flex;align-items:center;gap:6px;font-size:.82rem;color:#bbb;cursor:pointer}
.done-toggle input{accent-color:#6aa6fd;cursor:pointer}

/* ---- Přehled (dashboard) ---- */
.dashboard{flex:1;overflow-y:auto;padding:22px}
.dashboard h2{font-size:1.15rem;margin-bottom:4px}
.dashboard .sub{color:#999;font-size:.82rem;margin-bottom:16px}
.dash-list{display:flex;flex-direction:column;gap:8px;max-width:640px}
.dash-item{display:flex;align-items:center;gap:10px;background:#232323;border:1px solid #383838;border-radius:8px;padding:10px 14px;cursor:pointer}
.dash-item:hover{border-color:#6aa6fd}
.dash-item .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dash-item .txt{flex:1;overflow:hidden}
.dash-item .txt .nm{font-size:.9rem}
.dash-item .txt .pth{font-size:.74rem;color:#888}
.dash-item .when{font-size:.78rem;color:#aaa;white-space:nowrap}
.dash-empty{color:#888;font-size:.85rem}

.editor-wrap{flex:1;padding:18px 22px;overflow-y:auto}
textarea{width:100%;height:100%;min-height:300px;background:#1e1e1e;border:1px solid #404040;border-radius:8px;color:#e0e0e0;padding:16px;font-size:.95rem;line-height:1.55;resize:none;font-family:inherit}
textarea:focus{outline:none;border-color:#6aa6fd}

.placeholder{flex:1;display:flex;align-items:center;justify-content:center;color:#777;font-size:.95rem;text-align:center;padding:20px}

.savehint{position:fixed;bottom:14px;right:20px;background:#27ae60;color:#fff;padding:8px 14px;border-radius:6px;font-size:.8rem;opacity:0;transition:opacity .3s;pointer-events:none}
.savehint.show{opacity:.92}

::-webkit-scrollbar{width:9px}
::-webkit-scrollbar-thumb{background:#444;border-radius:5px}

.mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:20;background:#2d2d2d;border:1px solid #555;color:#e0e0e0;border-radius:6px;padding:8px 11px;cursor:pointer;font-size:1rem}
.overlay{display:none}
@media(max-width:760px){
  .mobile-toggle{display:block}
  .resizer{display:none}
  .panel{position:fixed;top:0;left:0;bottom:0;z-index:19;width:82vw!important;max-width:340px;transform:translateX(-100%);transition:transform .2s;box-shadow:2px 0 12px rgba(0,0,0,.5)}
  .panel.open{transform:translateX(0)}
  .panel-close{display:block}
  .overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:18}
  .content{padding-top:48px}
}
</style>
</head>
<body>
<button class="mobile-toggle" id="mobileToggle">☰</button>
<div class="overlay" id="overlay"></div>
<div class="wrap">
  <div class="panel" id="panel">
    <div class="panel-head">
      <h1>🗂️ Správce projektů <button class="panel-close" id="panelClose">✕</button></h1>
      <input type="text" class="search" id="searchBox" placeholder="🔍 Hledat ve stromu…">
      <div class="actions">
        <button class="btn" id="addProject">+ Projekt</button>
        <button class="btn-sec" id="expandAll">⊞ Rozbalit</button>
        <button class="btn-sec" id="collapseAll">⊟ Sbalit</button>
      </div>
    </div>
    <div class="tree" id="tree"></div>
    <div class="panel-foot">
      <button class="btn-sec" id="exportBtn">⬇️ Export</button>
      <button class="btn-sec" id="importBtn">⬆️ Import</button>
      <input type="file" id="importFile" accept="application/json">
    </div>
  </div>
  <div class="resizer" id="resizer"></div>
  <div class="content" id="contentArea">
    <div class="placeholder" id="placeholder">👈 Vyberte nebo vytvořte stránku ve stromu vlevo</div>
  </div>
</div>
<div class="savehint" id="savehint">💾 Uloženo</div>

<script>
const $=s=>document.querySelector(s);
const STORAGE_KEY='projectManagerData_v1';
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);

function defaultData(){
  return {
    tree:[
      {id:uid(),type:'project',name:'Můj první projekt',children:[
        {id:uid(),type:'category',name:'Nápady',children:[
          {id:uid(),type:'page',name:'Úvodní poznámka',content:'Sem můžete psát obsah stránky…',deadline:'',done:false}
        ]}
      ]}
    ],
    activeId:null,
    collapsed:[]
  };
}

let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||'null')||defaultData();
let collapsedSet=new Set(data.collapsed||[]);
let dragId=null;

function save(){
  data.collapsed=[...collapsedSet];
  localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
  const h=$('#savehint');h.classList.add('show');clearTimeout(save._t);save._t=setTimeout(()=>h.classList.remove('show'),900);
}

function findNode(id,list=data.tree,parent=null){
  for(const n of list){
    if(n.id===id)return {node:n,parent:list,parentNode:parent};
    if(n.children){const r=findNode(id,n.children,n);if(r)return r;}
  }
  return null;
}

function removeNode(id){
  const res=findNode(id);
  if(!res)return;
  const idx=res.parent.indexOf(res.node);
  res.parent.splice(idx,1);
}

function addChild(parentId,type,name){
  const node={id:uid(),type,name,children: type==='page'?undefined:[]};
  if(type==='page'){node.content='';node.deadline='';node.done=false;}
  if(parentId===null){
    data.tree.push(node);
  }else{
    const res=findNode(parentId);
    if(!res)return node;
    res.node.children=res.node.children||[];
    res.node.children.push(node);
    collapsedSet.delete(parentId);
  }
  save();
  return node;
}

function deadlineStatus(deadline){
  if(!deadline)return 'none';
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(deadline+'T00:00:00');
  const diffDays=Math.round((d-today)/86400000);
  if(diffDays<0)return 'late';
  if(diffDays<=3)return 'soon';
  return 'ok';
}

// Vrátí nejbližší/nejhorší stav termínu ze všech nesplněných stránek pod uzlem (pro tečky u projektu/kategorie)
function aggregateStatus(node){
  if(node.type==='page')return node.done?null:deadlineStatus(node.deadline);
  if(!node.children||!node.children.length)return null;
  let worst=null;
  const rank={late:3,soon:2,ok:1,none:0};
  for(const c of node.children){
    const s=aggregateStatus(c);
    if(s&&(!worst||rank[s]>rank[worst]))worst=s;
  }
  return worst;
}

const ICONS={project:'📁',category:'📂',page:'📄'};

// vrátí true, pokud tento uzel nebo některý z jeho potomků odpovídá vyhledávanému textu
function matchesSearch(node,q){
  if(!q)return true;
  if(node.name.toLowerCase().includes(q))return true;
  if(node.children)return node.children.some(c=>matchesSearch(c,q));
  return false;
}

function renderTree(){
  const container=$('#tree');
  container.innerHTML='';
  if(!data.tree.length){
    container.innerHTML='<div class="empty-tree">Zatím žádné projekty.<br>Klikněte na „+ Projekt“ výše.</div>';
    return;
  }
  const q=($('#searchBox')?.value||'').trim().toLowerCase();
  const buildLevel=(list,lvl)=>{
    const wrap=document.createElement('div');
    list.forEach(node=>{
      if(matchesSearch(node,q))wrap.appendChild(buildNode(node,lvl,q));
    });
    return wrap;
  };
  function buildNode(node,lvl,q){
    const el=document.createElement('div');
    el.className='node lvl'+lvl;
    el.dataset.id=node.id;

    const row=document.createElement('div');
    row.className='node-row';
    row.draggable=true;
    if(data.activeId===node.id)row.classList.add('active');
    if(node.type==='page'&&node.done)row.classList.add('is-done');

    const hasChildren = node.type!=='page';
    const isCollapsed = collapsedSet.has(node.id);
    const effectiveCollapsed = q ? false : isCollapsed;

    const toggle=document.createElement('span');
    toggle.className='toggle';
    if(hasChildren && node.children && node.children.length){
      toggle.textContent = effectiveCollapsed ? '▸' : '▾';
      toggle.onclick=(e)=>{e.stopPropagation();
        if(isCollapsed)collapsedSet.delete(node.id);else collapsedSet.add(node.id);
        save();renderTree();
      };
    }else{
      toggle.textContent='';
    }
    row.appendChild(toggle);

    const icon=document.createElement('span');
    icon.className='icon';
    icon.textContent=ICONS[node.type];
    row.appendChild(icon);

    if(node.type==='page'){
      const chk=document.createElement('input');
      chk.type='checkbox';
      chk.className='done-chk';
      chk.checked=!!node.done;
      chk.title='Označit jako hotové';
      chk.onclick=(e)=>e.stopPropagation();
      chk.onchange=()=>{node.done=chk.checked;save();renderTree();if(node.id===data.activeId)renderContent();};
      row.appendChild(chk);
    }

    const lbl=document.createElement('span');
    lbl.className='lbl';
    lbl.textContent=node.name;
    row.appendChild(lbl);

    if(node.type==='page'){
      if(node.done){
        const dot=document.createElement('span');
        dot.className='dot dot-done';
        dot.title='Hotovo';
        row.appendChild(dot);
      }else{
        const st=deadlineStatus(node.deadline);
        if(st!=='none'){
          const dot=document.createElement('span');
          dot.className='dot dot-'+st;
          dot.title=node.deadline?('Termín: '+node.deadline):'';
          row.appendChild(dot);
        }
      }
    }else{
      const st=aggregateStatus(node);
      if(st&&st!=='none'){
        const dot=document.createElement('span');
        dot.className='dot dot-'+st;
        dot.title='Nejbližší/prošlý termín uvnitř';
        row.appendChild(dot);
      }
    }

    const actions=document.createElement('span');
    actions.className='row-actions';
    if(node.type!=='page'){
      const addBtn=document.createElement('button');
      addBtn.textContent='+';
      addBtn.title = node.type==='project' ? 'Přidat kategorii' : 'Přidat stránku';
      addBtn.onclick=(e)=>{e.stopPropagation();
        const childType = node.type==='project' ? 'category' : 'page';
        const label = childType==='category' ? 'Název kategorie' : 'Název stránky';
        const name=prompt(label,'');
        if(name&&name.trim()){
          const n=addChild(node.id,childType,name.trim());
          data.activeId=n.id;
          renderTree();openNode(n.id);
        }
      };
      actions.appendChild(addBtn);
    }
    const renBtn=document.createElement('button');
    renBtn.textContent='✏️';
    renBtn.title='Přejmenovat';
    renBtn.onclick=(e)=>{e.stopPropagation();startRename(lbl,node);};
    actions.appendChild(renBtn);

    const delBtn=document.createElement('button');
    delBtn.textContent='🗑️';
    delBtn.title='Smazat';
    delBtn.onclick=(e)=>{e.stopPropagation();
      const what = node.type==='project'?'projekt':(node.type==='category'?'kategorii':'stránku');
      if(confirm('Opravdu smazat '+what+' „'+node.name+'“ včetně veškerého obsahu?')){
        if(data.activeId===node.id || isDescendantActive(node)){
          data.activeId=null;renderContent();
        }
        removeNode(node.id);save();renderTree();
      }
    };
    actions.appendChild(delBtn);
    row.appendChild(actions);

    row.onclick=()=>{
      data.activeId=node.id;save();
      renderTree();
      openNode(node.id);
      if(node.type==='page')closeMobilePanel();
    };

    // Drag & drop
    row.ondragstart=(e)=>{dragId=node.id;e.dataTransfer.effectAllowed='move';e.stopPropagation();};
    row.ondragover=(e)=>{
      e.preventDefault();e.stopPropagation();
      if(dragId===null||dragId===node.id)return;
      const rect=row.getBoundingClientRect();
      const rel=(e.clientY-rect.top)/rect.height;
      row.classList.remove('dragover-before','dragover-after','dragover');
      if(node.type!=='page' && rel>0.25 && rel<0.75){
        row.classList.add('dragover');
      }else if(rel<=0.25){
        row.classList.add('dragover-before');
      }else{
        row.classList.add('dragover-after');
      }
    };
    row.ondragleave=(e)=>{e.stopPropagation();row.classList.remove('dragover','dragover-before','dragover-after');};
    row.ondrop=(e)=>{
      e.preventDefault();e.stopPropagation();
      row.classList.remove('dragover','dragover-before','dragover-after');
      if(dragId===null||dragId===node.id)return;
      handleDrop(dragId,node,row);
      dragId=null;
    };

    el.appendChild(row);

    if(hasChildren){
      const childWrap=document.createElement('div');
      childWrap.className='children'+(effectiveCollapsed?' collapsed':'');
      if(node.children&&node.children.length){
        childWrap.appendChild(buildLevel(node.children,lvl+1));
      }
      el.appendChild(childWrap);
    }
    return el;
  }
  container.appendChild(buildLevel(data.tree,1));
}

function isDescendantActive(node){
  if(!node.children)return false;
  for(const c of node.children){
    if(c.id===data.activeId)return true;
    if(isDescendantActive(c))return true;
  }
  return false;
}

function typeRank(t){return t==='project'?1:t==='category'?2:3;}

function handleDrop(draggedId,targetNode,targetRow){
  const draggedRes=findNode(draggedId);
  if(!draggedRes)return;
  const dragged=draggedRes.node;
  const isInto = targetRow.classList.contains('dragover');
  if(isInto && targetNode.type!=='page'){
    // vložit jako dítě cíle, pokud typ dítěte odpovídá o úroveň níž
    const expectedChildType = targetNode.type==='project' ? 'category' : 'page';
    if(dragged.type!==expectedChildType)return;
    removeNode(draggedId);
    targetNode.children=targetNode.children||[];
    targetNode.children.push(dragged);
    collapsedSet.delete(targetNode.id);
  }else{
    // reorder / reparent vedle cíle - musí být stejný typ a stejný rodič-typ kontext
    if(dragged.type!==targetNode.type)return;
    const targetRes=findNode(targetNode.id);
    removeNode(draggedId);
    const idx=targetRes.parent.indexOf(targetNode);
    const before=targetRow.classList.contains('dragover-before');
    targetRes.parent.splice(before?idx:idx+1,0,dragged);
  }
  save();renderTree();
}

function startRename(lbl,node){
  lbl.contentEditable='true';
  lbl.focus();
  document.execCommand('selectAll',false,null);
  const finish=(commit)=>{
    lbl.contentEditable='false';
    if(commit){
      const v=lbl.textContent.trim();
      if(v){node.name=v;save();}else{lbl.textContent=node.name;}
    }else{
      lbl.textContent=node.name;
    }
    if(node.id===data.activeId)renderContent();
    lbl.onblur=null;lbl.onkeydown=null;
  };
  lbl.onblur=()=>finish(true);
  lbl.onkeydown=(e)=>{
    if(e.key==='Enter'){e.preventDefault();lbl.blur();}
    if(e.key==='Escape'){e.preventDefault();finish(false);}
  };
}

function openNode(id){
  const res=findNode(id);
  if(!res||res.node.type!=='page'){data.activeId=id;save();renderContent();return;}
  data.activeId=id;save();
  renderContent();
}

function pathTo(id){
  function walk(list,trail){
    for(const n of list){
      const t=[...trail,n.name];
      if(n.id===id)return t;
      if(n.children){const r=walk(n.children,t);if(r)return r;}
    }
    return null;
  }
  return walk(data.tree,[])||[];
}

function collectPages(list=data.tree,trail=[]){
  let out=[];
  for(const n of list){
    const t=[...trail,n.name];
    if(n.type==='page')out.push({node:n,path:t});
    if(n.children)out=out.concat(collectPages(n.children,t));
  }
  return out;
}

function renderDashboard(){
  const pages=collectPages().filter(p=>p.node.deadline&&!p.node.done);
  const rank={late:0,soon:1,ok:2};
  pages.sort((a,b)=>a.node.deadline.localeCompare(b.node.deadline));
  const items=pages.map(p=>{
    const st=deadlineStatus(p.node.deadline);
    const today=new Date();today.setHours(0,0,0,0);
    const d=new Date(p.node.deadline+'T00:00:00');
    const diff=Math.round((d-today)/86400000);
    const when = diff===0?'dnes': diff===1?'zítra' : diff===-1?'včera' : diff>1?('za '+diff+' dní') : (Math.abs(diff)+' dní po termínu');
    return `<div class="dash-item" data-id="${p.node.id}">
      <span class="dot dot-${st}"></span>
      <span class="txt"><div class="nm">${p.node.name.replace(/</g,'&lt;')}</div><div class="pth">${p.path.slice(0,-1).join(' › ').replace(/</g,'&lt;')}</div></span>
      <span class="when">${when}</span>
    </div>`;
  }).join('');
  return `<div class="dashboard">
    <h2>📋 Přehled termínů</h2>
    <div class="sub">Nesplněné stránky s nastaveným termínem, seřazené od nejbližšího.</div>
    <div class="dash-list">${items||'<div class="dash-empty">Žádné nadcházející termíny. Vyberte stránku vlevo, nebo si nějakou vytvořte.</div>'}</div>
  </div>`;
}

function renderContent(){
  const area=$('#contentArea');
  const res=data.activeId?findNode(data.activeId):null;
  if(!res){
    area.innerHTML=renderDashboard();
    area.querySelectorAll('.dash-item').forEach(el=>{
      el.onclick=()=>{data.activeId=el.dataset.id;save();renderTree();renderContent();};
    });
    return;
  }
  const node=res.node;
  if(node.type!=='page'){
    area.innerHTML=`<div class="placeholder">${ICONS[node.type]} „${node.name.replace(/</g,'&lt;')}“ — vyberte konkrétní stránku ve stromu, nebo klikněte na „+“ u tohoto uzlu pro přidání položky.</div>`;
    return;
  }
  const crumbs=pathTo(node.id).join('  ›  ');
  const st=node.done?'done':deadlineStatus(node.deadline);
  const chipTxt={ok:'✅ V termínu',soon:'⚠️ Blíží se termín',late:'⏰ Po termínu',none:'Bez termínu',done:'✔️ Hotovo'}[st];
  const chipCls={ok:'chip-ok',soon:'chip-soon',late:'chip-late',none:'chip-none',done:'chip-done'}[st];
  area.innerHTML=`
    <div class="content-head">
      <div class="path">${crumbs.replace(/</g,'&lt;')}</div>
      <h2>📄 ${node.name.replace(/</g,'&lt;')}</h2>
      <label class="done-toggle"><input type="checkbox" id="doneToggle" ${node.done?'checked':''}> Hotovo</label>
      <div class="deadline-box">
        <span>📅 Termín splnění:</span>
        <input type="date" id="deadlineInput" value="${node.deadline||''}">
        <span class="status-chip ${chipCls}" id="statusChip">${chipTxt}</span>
      </div>
    </div>
    <div class="editor-wrap">
      <textarea id="pageEditor" placeholder="Sem pište obsah stránky…">${node.content?escapeTA(node.content):''}</textarea>
    </div>
  `;
  const ta=$('#pageEditor');
  ta.oninput=()=>{node.content=ta.value;save();};
  const di=$('#deadlineInput');
  di.onchange=()=>{node.deadline=di.value;save();renderTree();renderContent();};
  const dt=$('#doneToggle');
  dt.onchange=()=>{node.done=dt.checked;save();renderTree();renderContent();};
}
function escapeTA(s){return s.replace(/</g,'&lt;');}

$('#addProject').onclick=()=>{
  const name=prompt('Název nového projektu','Nový projekt');
  if(name&&name.trim()){
    const n=addChild(null,'project',name.trim());
    data.activeId=n.id;save();renderTree();renderContent();
  }
};
$('#expandAll').onclick=()=>{collapsedSet.clear();save();renderTree();};
$('#collapseAll').onclick=()=>{
  const collectContainers=(list)=>list.forEach(n=>{if(n.type!=='page'){collapsedSet.add(n.id);if(n.children)collectContainers(n.children);}});
  collectContainers(data.tree);save();renderTree();
};
$('#searchBox').oninput=()=>renderTree();

// Export / import zálohy
$('#exportBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='spravce-projektu-zaloha-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
};
$('#importBtn').onclick=()=>$('#importFile').click();
$('#importFile').onchange=(e)=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const parsed=JSON.parse(reader.result);
      if(!parsed||!Array.isArray(parsed.tree))throw new Error('Neplatný formát souboru.');
      if(!confirm('Import nahradí aktuální data ve Správci projektů. Pokračovat?'))return;
      data=parsed;
      collapsedSet=new Set(data.collapsed||[]);
      save();renderTree();renderContent();
    }catch(err){
      alert('Import se nezdařil: '+err.message);
    }
    e.target.value='';
  };
  reader.readAsText(file);
};

// Mobilní přepínač panelu
function closeMobilePanel(){
  $('#panel').classList.remove('open');
  $('#overlay').classList.remove('show');
}
(function(){
  const panel=$('#panel'),overlay=$('#overlay');
  const open=()=>{panel.classList.add('open');overlay.classList.add('show');};
  $('#mobileToggle').onclick=open;
  $('#panelClose').onclick=closeMobilePanel;
  overlay.onclick=closeMobilePanel;
})();

// Resizer panelu
(function(){
  const panel=$('#panel'),resizer=$('#resizer');
  let dragging=false;
  resizer.addEventListener('mousedown',()=>{dragging=true;document.body.style.userSelect='none';});
  window.addEventListener('mousemove',(e)=>{
    if(!dragging)return;
    const w=Math.min(Math.max(e.clientX,220),window.innerWidth*0.7);
    panel.style.width=w+'px';
  });
  window.addEventListener('mouseup',()=>{dragging=false;document.body.style.userSelect='';});
})();

renderTree();
renderContent();
</script>
</body>
</html>
