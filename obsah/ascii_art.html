<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔤 ASCII art z obrázku</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
.drop{border:2px dashed #555;border-radius:10px;padding:30px;text-align:center;cursor:pointer}
.drop:hover,.drop.over{border-color:#6aa6fd;background:#1e2530}
.opts{display:flex;gap:16px;flex-wrap:wrap;align-items:end;margin-top:16px}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
select,input{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.chk{display:flex;align-items:center;gap:6px;color:#bbb;font-size:.88rem}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
pre#out{background:#0d0d0d;border-radius:8px;padding:12px;overflow:auto;line-height:1;font-family:monospace;white-space:pre;font-size:6px;max-height:600px}
.toolbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.toolbar label{margin:0}
</style>
</head>
<body>
<div class="container">
  <h1>🔤 ASCII art z obrázku</h1>
  <div class="card">
    <div class="drop" id="drop">📁 Přetáhni obrázek sem nebo klikni pro výběr<input type="file" id="file" accept="image/*" hidden></div>
    <div class="opts">
      <div><label>Šířka (znaků)</label><input type="number" id="width" value="120" min="20" max="400" style="width:100px"></div>
      <div><label>Znaková sada</label>
        <select id="charset">
          <option value=" .:-=+*#%@">Standardní (10)</option>
          <option value=" .'`^&quot;,:;Il!i&gt;&lt;~+_-?][}{1)(|/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&amp;8%B@$">Detailní (70)</option>
          <option value=" ░▒▓█">Bloky</option>
          <option value=" .oO0">Kuličky</option>
        </select>
      </div>
      <div class="chk"><input type="checkbox" id="invert"> <label for="invert" style="display:inline">Invertovat</label></div>
      <button class="btn" id="genBtn">🔄 Generovat</button>
    </div>
  </div>
  <div class="card" id="resultCard" style="display:none">
    <div class="toolbar">
      <button class="btn btn-sec" id="copyBtn">📋 Kopírovat</button>
      <button class="btn btn-sec" id="txtBtn">💾 Stáhnout .txt</button>
      <button class="btn btn-sec" id="pngBtn">🖼️ Stáhnout PNG</button>
      <label>Velikost písma: <input type="range" id="fontSize" min="3" max="14" value="6" style="vertical-align:middle"></label>
    </div>
    <pre id="out"></pre>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let img=null;
const drop=$('drop'),fileInput=$('file');
drop.onclick=()=>fileInput.click();
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over');};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');if(e.dataTransfer.files[0])load(e.dataTransfer.files[0]);};
fileInput.onchange=()=>{if(fileInput.files[0])load(fileInput.files[0]);};
function load(file){img=new Image();img.onload=()=>{generate();};img.src=URL.createObjectURL(file);}
function generate(){
  if(!img)return;
  let chars=$('charset').value;
  // decode HTML entities used in option values
  const ta=document.createElement('textarea');ta.innerHTML=chars;chars=ta.value;
  if($('invert').checked)chars=[...chars].reverse().join('');
  const w=+$('width').value;
  const ratio=img.height/img.width;
  const h=Math.round(w*ratio*0.5);
  const c=document.createElement('canvas');c.width=w;c.height=h;
  const cx=c.getContext('2d');cx.drawImage(img,0,0,w,h);
  const data=cx.getImageData(0,0,w,h).data;
  let out='';
  for(let y=0;y<h;y++){for(let x=0;x<w;x++){
    const i=(y*w+x)*4;const lum=(0.299*data[i]+0.587*data[i+1]+0.114*data[i+2])/255;
    out+=chars[Math.min(chars.length-1,Math.floor(lum*(chars.length-1)))];
  }out+='\n';}
  $('out').textContent=out;$('resultCard').style.display='block';
}
$('genBtn').onclick=generate;
$('fontSize').oninput=()=>$('out').style.fontSize=$('fontSize').value+'px';
$('copyBtn').onclick=()=>{navigator.clipboard.writeText($('out').textContent);$('copyBtn').textContent='✅ Zkopírováno';setTimeout(()=>$('copyBtn').textContent='📋 Kopírovat',1200);};
$('txtBtn').onclick=()=>{const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([$('out').textContent],{type:'text/plain'}));a.download='ascii.txt';a.click();};
$('pngBtn').onclick=()=>{
  const txt=$('out').textContent,lines=txt.split('\n'),fs=12,c=document.createElement('canvas');
  const cx=c.getContext('2d');cx.font=fs+'px monospace';
  const cw=cx.measureText('M').width;
  c.width=Math.max(...lines.map(l=>l.length))*cw;c.height=lines.length*fs;
  cx.fillStyle='#000';cx.fillRect(0,0,c.width,c.height);
  cx.fillStyle='#0f0';cx.font=fs+'px monospace';cx.textBaseline='top';
  lines.forEach((l,i)=>cx.fillText(l,0,i*fs));
  const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download='ascii.png';a.click();
};
</script>
</body>
</html>
