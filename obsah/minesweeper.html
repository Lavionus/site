<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💣 Hledání min</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600}
.top{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.info{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:8px 16px;font-size:1.1rem;font-weight:700;min-width:90px;text-align:center}
.board{display:grid;gap:2px;background:#404040;padding:6px;border-radius:8px;touch-action:manipulation}
.cell{width:32px;height:32px;background:#3a3a3a;border:1px solid #4a4a4a;border-radius:3px;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;font-size:1rem}
.cell.open{background:#1e1e1e;border-color:#2a2a2a;cursor:default}
.cell.mine{background:#c0392b}
.cell.flag{background:#2a3a4a}
.c1{color:#6aa6fd}.c2{color:#27ae60}.c3{color:#e74c3c}.c4{color:#9b59b6}.c5{color:#e67e22}.c6{color:#1abc9c}.c7{color:#ecf0f1}.c8{color:#95a5a6}
.hint{color:#888;font-size:.85rem;margin-top:16px;text-align:center;max-width:480px}
.msg{margin-top:12px;font-size:1.2rem;font-weight:700;min-height:28px}
.msg.win{color:#27ae60}.msg.lose{color:#e74c3c}
</style>
</head>
<body>
<h1>💣 Hledání min (Minesweeper)</h1>
<div class="top">
  <div class="info">💣 <span id="mines">0</span></div>
  <div class="info">⏱️ <span id="time">0</span></div>
  <select id="level">
    <option value="9,9,10">Lehká (9×9, 10 min)</option>
    <option value="16,16,40">Střední (16×16, 40 min)</option>
    <option value="24,16,70">Těžká (24×16, 70 min)</option>
  </select>
  <button class="btn" id="newBtn">🙂 Nová hra</button>
</div>
<div class="board" id="board"></div>
<div class="msg" id="msg"></div>
<p class="hint">Levý klik = odkrýt, pravý klik (nebo dlouhý dotyk) = vlajka 🚩. Cíl: odkrýt všechna pole bez min.</p>
<script>
const $=id=>document.getElementById(id);
let cols,rows,mineCount,grid,revealed,flagged,gameDone,first,timer,seconds;
function init(){
  [cols,rows,mineCount]=$('level').value.split(',').map(Number);
  grid=Array.from({length:rows},()=>Array(cols).fill(0));
  revealed=Array.from({length:rows},()=>Array(cols).fill(false));
  flagged=Array.from({length:rows},()=>Array(cols).fill(false));
  gameDone=false;first=true;seconds=0;clearInterval(timer);$('time').textContent=0;
  $('mines').textContent=mineCount;$('msg').textContent='';$('msg').className='msg';
  const b=$('board');b.style.gridTemplateColumns=`repeat(${cols},32px)`;
  b.innerHTML='';
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    const c=document.createElement('div');c.className='cell';c.dataset.x=x;c.dataset.y=y;
    b.appendChild(c);
  }
}
function placeMines(sx,sy){
  let placed=0;
  while(placed<mineCount){
    const x=Math.floor(Math.random()*cols),y=Math.floor(Math.random()*rows);
    if(grid[y][x]===-1||(Math.abs(x-sx)<=1&&Math.abs(y-sy)<=1))continue;
    grid[y][x]=-1;placed++;
  }
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++){
    if(grid[y][x]===-1)continue;let n=0;
    for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const ny=y+dy,nx=x+dx;if(ny>=0&&ny<rows&&nx>=0&&nx<cols&&grid[ny][nx]===-1)n++;}
    grid[y][x]=n;
  }
}
function cellEl(x,y){return $('board').children[y*cols+x];}
function reveal(x,y){
  if(revealed[y][x]||flagged[y][x])return;
  revealed[y][x]=true;const c=cellEl(x,y);c.classList.add('open');
  if(grid[y][x]===-1){c.classList.add('mine');c.textContent='💥';lose();return;}
  if(grid[y][x]>0){c.textContent=grid[y][x];c.classList.add('c'+grid[y][x]);}
  else{for(let dy=-1;dy<=1;dy++)for(let dx=-1;dx<=1;dx++){const ny=y+dy,nx=x+dx;if(ny>=0&&ny<rows&&nx>=0&&nx<cols)reveal(nx,ny);}}
}
function lose(){gameDone=true;clearInterval(timer);$('msg').textContent='💀 Šlápls na minu!';$('msg').className='msg lose';
  for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)if(grid[y][x]===-1&&!flagged[y][x]){const c=cellEl(x,y);c.classList.add('open');c.textContent='💣';}}
function checkWin(){
  let unrevealed=0;for(let y=0;y<rows;y++)for(let x=0;x<cols;x++)if(!revealed[y][x])unrevealed++;
  if(unrevealed===mineCount){gameDone=true;clearInterval(timer);$('msg').textContent='🎉 Vyhráls! Čas: '+seconds+' s';$('msg').className='msg win';}
}
function flagsUsed(){let n=0;flagged.forEach(r=>r.forEach(f=>{if(f)n++;}));return n;}
$('board').addEventListener('click',e=>{
  const c=e.target.closest('.cell');if(!c||gameDone)return;
  const x=+c.dataset.x,y=+c.dataset.y;
  if(flagged[y][x])return;
  if(first){placeMines(x,y);first=false;timer=setInterval(()=>{seconds++;$('time').textContent=seconds;},1000);}
  reveal(x,y);if(!gameDone)checkWin();
});
$('board').addEventListener('contextmenu',e=>{
  e.preventDefault();const c=e.target.closest('.cell');if(!c||gameDone)return;
  const x=+c.dataset.x,y=+c.dataset.y;if(revealed[y][x])return;
  flagged[y][x]=!flagged[y][x];c.classList.toggle('flag',flagged[y][x]);c.textContent=flagged[y][x]?'🚩':'';
  $('mines').textContent=mineCount-flagsUsed();
});
// long-press for touch flag
let lpTimer;
$('board').addEventListener('touchstart',e=>{const c=e.target.closest('.cell');if(!c)return;
  lpTimer=setTimeout(()=>{c.dispatchEvent(new Event('contextmenu',{bubbles:true}));lpTimer=null;},450);},{passive:true});
$('board').addEventListener('touchend',e=>{if(lpTimer){clearTimeout(lpTimer);}},{passive:true});
$('newBtn').onclick=init;$('level').onchange=init;
init();
</script>
</body>
</html>
