<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍽️ Týdenní jídelníček</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th,td{padding:6px;border:1px solid #404040;vertical-align:top}
th{color:#6aa6fd;font-size:.8rem;text-transform:uppercase;background:#242424}
td:first-child{width:90px;color:#6aa6fd;font-weight:600;font-size:.85rem;background:#242424}
textarea{width:100%;background:#333;border:1px solid #444;border-radius:4px;color:#e0e0e0;padding:6px;font-size:.85rem;resize:vertical;min-height:44px;font-family:inherit}
input{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;margin-right:8px}
.btn-sec{background:#404040}
.btn-red{background:#c0392b}
ul{list-style:none;margin-top:10px}
li{padding:7px 4px;border-bottom:1px solid #333;display:flex;align-items:center;gap:10px}
li.hotovo span{text-decoration:line-through;color:#666}
li input[type=checkbox]{width:auto}
li span{flex:1}
li button{background:none;border:none;color:#c0392b;cursor:pointer}
.naradek{display:flex;gap:8px;margin-top:10px}
.naradek input{flex:1}
@media print{
  body{background:#fff;color:#000;padding:0}
  .btn,.naradek,li button,li input[type=checkbox]{display:none}
  .card{border:1px solid #999;background:#fff}
  th,td,td:first-child{background:#fff;color:#000;border-color:#999}
  textarea{border:none;background:#fff;color:#000}
  h1,h2{color:#000}
  li{color:#000;border-color:#ccc}
}
@media(max-width:760px){
  table,thead,tbody,tr,td,th{display:block;width:100%}
  thead{display:none}
  td:first-child{width:100%}
  td[data-jidlo]::before{content:attr(data-jidlo);display:block;font-size:.72rem;color:#888;margin-bottom:2px}
}
</style>
</head>
<body>
<div class="container">
  <h1>🍽️ Týdenní jídelníček</h1>
  <div class="card">
    <h2>Plán na týden</h2>
    <table id="plan"><thead><tr><th></th><th>Snídaně</th><th>Oběd</th><th>Večeře</th></tr></thead><tbody></tbody></table>
    <div style="margin-top:14px">
      <button class="btn" onclick="window.print()">🖨️ Tisk</button>
      <button class="btn btn-red" id="smazPlan">🗑️ Vymazat plán</button>
    </div>
  </div>
  <div class="card">
    <h2>🛒 Nákupní seznam</h2>
    <ul id="nakup"></ul>
    <div class="naradek">
      <input type="text" id="novaPol" placeholder="Přidat položku… (Enter)">
      <button class="btn" id="pridej">➕</button>
    </div>
    <div style="margin-top:12px">
      <button class="btn btn-sec" id="kopiruj">📋 Kopírovat seznam</button>
      <button class="btn btn-red" id="smazHotove">Smazat odškrtnuté</button>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const DNY=['Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota','Neděle'];
const JIDLA=['Snídaně','Oběd','Večeře'];
const STORE='mealPlanner.v1';
let data;
try{data=JSON.parse(localStorage.getItem(STORE))||{};}catch(e){data={};}
data.plan=data.plan||{};data.nakup=data.nakup||[];
const save=()=>localStorage.setItem(STORE,JSON.stringify(data));

const tbody=document.querySelector('#plan tbody');
DNY.forEach((den,di)=>{
  const tr=document.createElement('tr');
  tr.innerHTML=`<td>${den}</td>`+JIDLA.map((j,ji)=>
    `<td data-jidlo="${j}"><textarea data-k="${di}-${ji}" placeholder="–"></textarea></td>`).join('');
  tbody.appendChild(tr);
});
document.querySelectorAll('textarea[data-k]').forEach(t=>{
  t.value=data.plan[t.dataset.k]||'';
  t.addEventListener('input',()=>{data.plan[t.dataset.k]=t.value;save();});
});
$('smazPlan').onclick=()=>{
  if(!confirm('Opravdu vymazat celý týdenní plán?'))return;
  data.plan={};save();
  document.querySelectorAll('textarea[data-k]').forEach(t=>t.value='');
};

function vykresliNakup(){
  $('nakup').innerHTML=data.nakup.map((p,i)=>
    `<li class="${p.done?'hotovo':''}"><input type="checkbox" data-i="${i}" ${p.done?'checked':''}><span>${p.text.replace(/</g,'&lt;')}</span><button data-del="${i}">✕</button></li>`).join('');
}
$('nakup').addEventListener('click',e=>{
  if(e.target.dataset.i!==undefined){data.nakup[+e.target.dataset.i].done=e.target.checked;save();vykresliNakup();}
  if(e.target.dataset.del!==undefined){data.nakup.splice(+e.target.dataset.del,1);save();vykresliNakup();}
});
function pridejPol(){
  const v=$('novaPol').value.trim();
  if(!v)return;
  v.split(',').map(s=>s.trim()).filter(Boolean).forEach(text=>data.nakup.push({text,done:false}));
  $('novaPol').value='';save();vykresliNakup();
}
$('pridej').onclick=pridejPol;
$('novaPol').addEventListener('keydown',e=>{if(e.key==='Enter')pridejPol();});
$('smazHotove').onclick=()=>{data.nakup=data.nakup.filter(p=>!p.done);save();vykresliNakup();};
$('kopiruj').onclick=()=>{
  navigator.clipboard.writeText(data.nakup.filter(p=>!p.done).map(p=>'- '+p.text).join('\n')).then(()=>{
    $('kopiruj').textContent='✅ Zkopírováno';setTimeout(()=>$('kopiruj').textContent='📋 Kopírovat seznam',1500);
  });
};
vykresliNakup();
</script>
</body>
</html>
