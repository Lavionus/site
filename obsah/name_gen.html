<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Generátor jmen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:780px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:16px}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:520px){.grid{grid-template-columns:1fr}}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem}
.btn:hover{background:#5591e8}
.btn-sec{background:#404040}
ul{list-style:none;margin-top:16px}
li{padding:9px 12px;border-bottom:1px solid #333;font-size:1.05rem;display:flex;justify-content:space-between;align-items:center}
li:last-child{border:none}
li button{background:none;border:none;color:#6aa6fd;cursor:pointer;font-size:.8rem}
</style>
</head>
<body>
<div class="container">
  <h1>🎲 Generátor jmen</h1>
  <div class="card">
    <div class="grid">
      <div><label>Typ</label>
        <select id="typ">
          <option value="osoba">Osoba (CZ)</option>
          <option value="muz">Muž (CZ)</option>
          <option value="zena">Žena (CZ)</option>
          <option value="fantasy">Fantasy postava</option>
          <option value="projekt">Projekt / kódové jméno</option>
          <option value="tym">Název týmu</option>
        </select>
      </div>
      <div><label>Počet</label><input type="number" id="pocet" value="10" min="1" max="100"></div>
      <div><label>&nbsp;</label><button class="btn" id="gen" style="width:100%">🎲 Generovat</button></div>
    </div>
    <ul id="seznam"></ul>
    <button class="btn btn-sec" id="kopirovat" style="margin-top:10px">📋 Kopírovat vše</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const MUZI=['Jan','Petr','Pavel','Martin','Tomáš','Jiří','Josef','Jaroslav','Miroslav','Zdeněk','František','Václav','Michal','Milan','Karel','Lukáš','David','Ladislav','Jakub','Stanislav','Ondřej','Radek','Vladimír','Roman','Filip','Aleš','Libor','Daniel','Marek','Vojtěch','Antonín','Dušan','Adam','Matěj','Vít','Šimon','Dominik','Radim','Oldřich','Bohumil'];
const ZENY=['Marie','Jana','Eva','Hana','Anna','Lenka','Kateřina','Věra','Lucie','Alena','Petra','Veronika','Jaroslava','Tereza','Martina','Michaela','Jitka','Helena','Ludmila','Zdeňka','Ivana','Monika','Zuzana','Markéta','Eliška','Barbora','Klára','Adéla','Kristýna','Dagmar','Simona','Radka','Andrea','Iveta','Renata','Nikola','Sára','Karolína','Vlasta','Božena'];
const PRIJMENI=['Novák','Svoboda','Novotný','Dvořák','Černý','Procházka','Kučera','Veselý','Horák','Němec','Marek','Pokorný','Pospíšil','Hájek','Král','Jelínek','Růžička','Beneš','Fiala','Sedláček','Doležal','Zeman','Kolář','Navrátil','Čermák','Vaněk','Urban','Blažek','Kříž','Kovář','Kadlec','Šimek','Vlček','Polák','Musil','Konečný','Malý','Holub','Čech','Staněk'];
const FAN_PRE=['Al','Bel','Cor','Dra','El','Fen','Gal','Hal','Ith','Kel','Lor','Mor','Nar','Or','Per','Quel','Rav','Syl','Thal','Ul','Val','Wyn','Xan','Yl','Zar'];
const FAN_MID=['ad','an','ar','en','ess','ia','il','im','ion','ir','on','or','ub','um','und','ur','yn','ys'];
const FAN_SUF=['dor','dil','gorn','las','mir','nor','rian','riel','thas','thor','wen','wyn','zar','dric','fast','grim'];
const FAN_TITUL=['Statečný','Moudrý','Temný','Bystrý','z Severu','Tichý','Železný','Stříbrovlasý','Toulavý','Nezlomný'];
const PROJ_ADJ=['Rychlý','Tichý','Modrý','Zlatý','Ostrý','Skrytý','Divoký','Ledový','Rudý','Bystrý','Ocelový','Noční','Jasný','Horský','Severní'];
const PROJ_SUB=['Sokol','Jestřáb','Vlk','Rys','Jelen','Havran','Blesk','Vítr','Kámen','Pramen','Maják','Kompas','Horizont','Meteor','Granát'];
const TYM_A=['Létající','Divocí','Ohnivé','Bleskoví','Zuřiví','Nespoutaní','Půlnoční','Betonoví','Rychlé','Vesmírní'];
const TYM_B=['Bobři','Jestřábi','Šípy','Berani','Tygři','Vlci','Komety','Buldoci','Rakety','Piráti'];
const nahodne=a=>a[Math.floor(Math.random()*a.length)];
function prechylPrijmeni(p){
  if(p.endsWith('ý'))return p.slice(0,-1)+'á';
  if(p.endsWith('a')||p.endsWith('e'))return p;
  return p+'ová';
}
function jedno(typ){
  switch(typ){
    case 'muz':return nahodne(MUZI)+' '+nahodne(PRIJMENI);
    case 'zena':return nahodne(ZENY)+' '+prechylPrijmeni(nahodne(PRIJMENI));
    case 'osoba':return Math.random()<0.5?jedno('muz'):jedno('zena');
    case 'fantasy':{
      let j=nahodne(FAN_PRE)+nahodne(FAN_MID)+(Math.random()<0.6?nahodne(FAN_SUF):'');
      if(Math.random()<0.4)j+=' '+nahodne(FAN_TITUL);
      return j;
    }
    case 'projekt':return nahodne(PROJ_ADJ)+' '+nahodne(PROJ_SUB);
    case 'tym':return TYM_A[Math.floor(Math.random()*TYM_A.length)]+' '+nahodne(TYM_B);
  }
}
function generuj(){
  const typ=$('typ').value,n=Math.min(100,Math.max(1,+$('pocet').value||10));
  const set=new Set();
  let pojistka=0;
  while(set.size<n&&pojistka++<n*40)set.add(jedno(typ));
  $('seznam').innerHTML=[...set].map(j=>`<li><span>${j}</span><button onclick="navigator.clipboard.writeText('${j.replace(/'/g,"\\'")}')">kopírovat</button></li>`).join('');
}
$('gen').onclick=generuj;
$('kopirovat').onclick=()=>{
  const t=[...document.querySelectorAll('#seznam li span')].map(s=>s.textContent).join('\n');
  navigator.clipboard.writeText(t).then(()=>{$('kopirovat').textContent='✅ Zkopírováno';setTimeout(()=>$('kopirovat').textContent='📋 Kopírovat vše',1500);});
};
generuj();
</script>
</body>
</html>
