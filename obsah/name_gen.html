<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎲 Generátor jmen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:780px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
h2 button{background:none;border:none;color:#666;cursor:pointer;font-size:.78rem}
h2 button:hover{color:#ff8888}
label{display:block;font-size:.82rem;color:#888;margin-bottom:5px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px;margin-bottom:12px}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
@media(max-width:520px){.grid,.grid2{grid-template-columns:1fr}}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.9rem}
.btn:hover{background:#5591e8}
.btn-sec{background:#404040}
.btn-sec:hover{background:#4d4d4d}
.btn-row{display:flex;gap:10px;margin-top:10px;flex-wrap:wrap}
ul{list-style:none;margin-top:16px}
li{padding:9px 12px;border-bottom:1px solid #333;font-size:1.05rem;display:flex;justify-content:space-between;align-items:center;gap:8px}
li:last-child{border:none}
li .akce{display:flex;gap:4px;flex-shrink:0}
li button{background:none;border:none;color:#6aa6fd;cursor:pointer;font-size:.85rem;padding:2px 6px;border-radius:4px}
li button:hover{background:#333}
li button.hvezda{color:#888}
li button.hvezda.aktivni,li button.hvezda:hover{color:#ffd93d}
.prazdne{color:#666;font-size:.85rem;text-align:center;padding:10px 0}
</style>
</head>
<body>
<div class="container">
  <h1>🎲 Generátor jmen</h1>
  <div class="card">
    <div class="grid">
      <div><label>Typ</label>
        <select id="typ">
          <optgroup label="Osoby">
            <option value="osoba">Osoba (CZ)</option>
            <option value="muz">Muž (CZ)</option>
            <option value="zena">Žena (CZ)</option>
          </optgroup>
          <optgroup label="Ostatní">
            <option value="fantasy">Fantasy postava</option>
            <option value="mazlicek">Mazlíček (pes/kočka)</option>
            <option value="obec">Fiktivní obec</option>
            <option value="firma">Firma</option>
            <option value="uzivatel">Uživatelské jméno</option>
            <option value="projekt">Projekt / kódové jméno</option>
            <option value="tym">Název týmu</option>
          </optgroup>
        </select>
      </div>
      <div><label>Počet</label><input type="number" id="pocet" value="10" min="1" max="100"></div>
      <div><label>&nbsp;</label><button class="btn" id="gen" style="width:100%">🎲 Generovat</button></div>
    </div>
    <div class="grid2">
      <div id="formatBox"><label>Formát jména</label>
        <select id="format">
          <option value="jp">Jméno Příjmení</option>
          <option value="pj">Příjmení Jméno</option>
          <option value="ip">J. Příjmení</option>
          <option value="j">Jen křestní</option>
        </select>
      </div>
      <div><label>Začíná na písmeno</label>
        <select id="pismeno"><option value="">Libovolné</option></select>
      </div>
    </div>
    <ul id="seznam"></ul>
    <div class="btn-row">
      <button class="btn btn-sec" id="kopirovat">📋 Kopírovat vše</button>
      <button class="btn btn-sec" id="stahnout">⬇ Stáhnout TXT</button>
    </div>
  </div>
  <div class="card">
    <h2>⭐ Oblíbená jména <button id="smazOblibene">vymazat vše</button></h2>
    <ul id="oblibene"></ul>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const MUZI=['Jan','Petr','Pavel','Martin','Tomáš','Jiří','Josef','Jaroslav','Miroslav','Zdeněk','František','Václav','Michal','Milan','Karel','Lukáš','David','Ladislav','Jakub','Stanislav','Ondřej','Radek','Vladimír','Roman','Filip','Aleš','Libor','Daniel','Marek','Vojtěch','Antonín','Dušan','Adam','Matěj','Vít','Šimon','Dominik','Radim','Oldřich','Bohumil'];
const ZENY=['Marie','Jana','Eva','Hana','Anna','Lenka','Kateřina','Věra','Lucie','Alena','Petra','Veronika','Jaroslava','Tereza','Martina','Michaela','Jitka','Helena','Ludmila','Zdeňka','Ivana','Monika','Zuzana','Markéta','Eliška','Barbora','Klára','Adéla','Kristýna','Dagmar','Simona','Radka','Andrea','Iveta','Renata','Nikola','Sára','Karolína','Vlasta','Božena'];
const PRIJMENI=['Novák','Svoboda','Novotný','Dvořák','Černý','Procházka','Kučera','Veselý','Horák','Němec','Marek','Pokorný','Pospíšil','Hájek','Král','Jelínek','Růžička','Beneš','Fiala','Sedláček','Doležal','Zeman','Kolář','Navrátil','Čermák','Vaněk','Urban','Blažek','Kříž','Kovář','Kadlec','Šimek','Vlček','Polák','Musil','Konečný','Malý','Holub','Čech','Staněk'];
const FAN_PRE=['Al','Bel','Cor','Dra','El','Fen','Gal','Hal','Ith','Kel','Lor','Mor','Nar','Or','Per','Quel','Rav','Syl','Thal','Ul','Val','Wyn','Xan','Yl','Zar'];
const FAN_MID=['ad','an','ar','en','ess','ia','il','im','ion','ir','on','or','ub','um','und','ur','yn','ys'];
const FAN_SUF=['dor','dil','gorn','las','mir','nor','rian','riel','thas','thor','wen','wyn','zar','dric','fast','grim'];
const FAN_TITUL=['Statečný','Moudrý','Temný','Bystrý','ze Severu','Tichý','Železný','Stříbrovlasý','Toulavý','Nezlomný'];
const PROJ_ADJ=['Rychlý','Tichý','Modrý','Zlatý','Ostrý','Skrytý','Divoký','Ledový','Rudý','Bystrý','Ocelový','Noční','Jasný','Horský','Severní'];
const PROJ_SUB=['Sokol','Jestřáb','Vlk','Rys','Jelen','Havran','Blesk','Vítr','Kámen','Pramen','Maják','Kompas','Horizont','Meteor','Granát'];
const TYM_A=['Létající','Divocí','Ohniví','Bleskoví','Zuřiví','Nespoutaní','Půlnoční','Betonoví','Rychlí','Vesmírní'];
const TYM_B=['Bobři','Jestřábi','Šípy','Berani','Tygři','Vlci','Komety','Buldoci','Rakety','Piráti'];
const MAZLICCI=['Max','Rex','Ben','Bady','Aisha','Bára','Ťapka','Micka','Mourek','Punťa','Azor','Rita','Nela','Fík','Žeryk','Alík','Brok','Cézar','Dino','Elza','Fanda','Gina','Haryk','Charlie','Jessie','Kessy','Lesan','Mia','Nero','Ozzy','Rocky','Sam','Tara','Vilda','Zorka','Boryš','Matylda','Ferda','Berta','Čenda'];
// Obce: kmen + rod (kvůli shodě přídavného jména)
const OBEC_KMEN=[['Lhota','f'],['Ves','f'],['Bystřice','f'],['Řečice','f'],['Kamenice','f'],['Olešnice','f'],['Újezd','m'],['Brod','m'],['Kostelec','m'],['Týnec','m'],['Žďár','m'],['Bor','m'],['Hradiště','n'],['Poříčí','n'],['Sedliště','n'],['Meziříčí','n']];
const OBEC_ADJ={m:['Horní','Dolní','Velký','Malý','Starý','Nový','Český','Zadní'],f:['Horní','Dolní','Velká','Malá','Stará','Nová','Česká','Zadní'],n:['Horní','Dolní','Velké','Malé','Staré','Nové','České','Zadní']};
const OBEC_KONEC=['nad Sázavou','nad Labem','pod Horou','u Prahy','v Čechách','nad Jizerou','pod Lesem'];
const FIRMA_A=['Agro','Eko','Tech','Ino','Pro','Delta','Omega','Astra','Vega','Nova','Inter','Bohemia','Alfa','Terra','Uni'];
const FIRMA_B=['plast','stav','mont','servis','trade','tex','chem','metal','soft','farm','dřevo','strojírny','logistik','energo','data'];
const FIRMA_C=[' s.r.o.',' a.s.',' s.r.o.',' CZ s.r.o.','',''];
const UZIV_A=['rychly','tichy','divoky','modry','zlaty','tajny','nocni','ostry','lesni','horsky','ledovy','ohnivy'];
const UZIV_B=['sokol','vlk','jezek','medved','orel','rys','datel','jelen','havran','bobr','tygr','lisak'];
const UZIV_SEP=['','_','.','','_'];
const nahodne=a=>a[Math.floor(Math.random()*a.length)];

function prechylPrijmeni(p){
  if(p.endsWith('ý'))return p.slice(0,-1)+'á';           // Novotný → Novotná
  if(p.endsWith('a'))return p.slice(0,-1)+'ová';          // Kučera → Kučerová, Růžička → Růžičková
  if(p.endsWith('něk'))return p.slice(0,-3)+'ňková';      // Staněk → Staňková, Vaněk → Vaňková
  if(p.endsWith('ek'))return p.slice(0,-2)+'ková';        // Marek → Marková, Vlček → Vlčková
  return p+'ová';
}
function osobaDleFormatu(krestni,prijmeni){
  switch($('format').value){
    case 'pj':return prijmeni+' '+krestni;
    case 'ip':return krestni[0]+'. '+prijmeni;
    case 'j':return krestni;
    default:return krestni+' '+prijmeni;
  }
}
function jedno(typ){
  switch(typ){
    case 'muz':return osobaDleFormatu(nahodne(MUZI),nahodne(PRIJMENI));
    case 'zena':return osobaDleFormatu(nahodne(ZENY),prechylPrijmeni(nahodne(PRIJMENI)));
    case 'osoba':return Math.random()<0.5?jedno('muz'):jedno('zena');
    case 'fantasy':{
      let j=nahodne(FAN_PRE)+nahodne(FAN_MID)+(Math.random()<0.6?nahodne(FAN_SUF):'');
      if(Math.random()<0.4)j+=' '+nahodne(FAN_TITUL);
      return j;
    }
    case 'mazlicek':return nahodne(MAZLICCI);
    case 'obec':{
      const [kmen,rod]=nahodne(OBEC_KMEN);
      let j=nahodne(OBEC_ADJ[rod])+' '+kmen;
      if(Math.random()<0.35)j+=' '+nahodne(OBEC_KONEC);
      return j;
    }
    case 'firma':{
      const a=nahodne(FIRMA_A),b=nahodne(FIRMA_B);
      return a+b.charAt(0).toUpperCase()+b.slice(1)+nahodne(FIRMA_C);
    }
    case 'uzivatel':return nahodne(UZIV_A)+nahodne(UZIV_SEP)+nahodne(UZIV_B)+(Math.random()<0.7?Math.floor(Math.random()*99)+1:'');
    case 'projekt':return nahodne(PROJ_ADJ)+' '+nahodne(PROJ_SUB);
    case 'tym':return nahodne(TYM_A)+' '+nahodne(TYM_B);
  }
}
// Odstraní diakritiku pro porovnání počátečního písmene
const bezDiakritiky=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'');

function generuj(){
  const typ=$('typ').value,n=Math.min(100,Math.max(1,+$('pocet').value||10));
  const pismeno=$('pismeno').value;
  const set=new Set();
  let pojistka=0;
  while(set.size<n&&pojistka++<n*300){
    const j=jedno(typ);
    if(pismeno&&bezDiakritiky(j)[0].toUpperCase()!==pismeno)continue;
    set.add(j);
  }
  const polozky=[...set];
  $('seznam').innerHTML=polozky.length
    ?polozky.map((j,i)=>`<li><span>${j}</span><div class="akce"><button class="hvezda" data-i="${i}" title="Přidat k oblíbeným">★</button><button class="kop" data-i="${i}">kopírovat</button></div></li>`).join('')
    :'<li class="prazdne">Pro zvolené písmeno se nic nenašlo – zkuste jiné.</li>';
  $('seznam').querySelectorAll('.kop').forEach(b=>b.onclick=()=>navigator.clipboard.writeText(polozky[+b.dataset.i]));
  $('seznam').querySelectorAll('.hvezda').forEach(b=>{
    const jmeno=polozky[+b.dataset.i];
    b.classList.toggle('aktivni',oblibena().includes(jmeno));
    b.onclick=()=>{pridatOblibene(jmeno);b.classList.add('aktivni');};
  });
}

// ── Oblíbená jména (localStorage) ──
function oblibena(){
  try{return JSON.parse(localStorage.getItem('name_gen_fav'))||[];}catch(e){return[];}
}
function pridatOblibene(j){
  const list=oblibena();
  if(!list.includes(j)){list.push(j);localStorage.setItem('name_gen_fav',JSON.stringify(list));}
  vykresliOblibene();
}
function odebratOblibene(j){
  const list=oblibena().filter(x=>x!==j);
  localStorage.setItem('name_gen_fav',JSON.stringify(list));
  vykresliOblibene();
  generuj();
}
function vykresliOblibene(){
  const list=oblibena();
  $('oblibene').innerHTML=list.length
    ?list.map((j,i)=>`<li><span>${j}</span><div class="akce"><button class="kop" data-i="${i}">kopírovat</button><button class="odeber" data-i="${i}" title="Odebrat">✕</button></div></li>`).join('')
    :'<li class="prazdne">Zatím žádná – hvězdičkou ★ si uložíte jména, která se vám líbí.</li>';
  $('oblibene').querySelectorAll('.kop').forEach(b=>b.onclick=()=>navigator.clipboard.writeText(list[+b.dataset.i]));
  $('oblibene').querySelectorAll('.odeber').forEach(b=>b.onclick=()=>odebratOblibene(list[+b.dataset.i]));
}
$('smazOblibene').onclick=()=>{
  if(oblibena().length&&!confirm('Vymazat všechna oblíbená jména?'))return;
  localStorage.removeItem('name_gen_fav');vykresliOblibene();generuj();
};

// ── Ovládání ──
'ABCDEFGHIJKLMNOPRSTUVZ'.split('').forEach(p=>{
  const o=document.createElement('option');o.value=p;o.textContent=p;$('pismeno').appendChild(o);
});
$('typ').onchange=()=>{
  const osobni=['osoba','muz','zena'].includes($('typ').value);
  $('formatBox').style.display=osobni?'':'none';
  generuj();
};
$('format').onchange=generuj;
$('pismeno').onchange=generuj;
$('gen').onclick=generuj;

function textSeznamu(){
  return [...document.querySelectorAll('#seznam li span')].map(s=>s.textContent).join('\n');
}
$('kopirovat').onclick=()=>{
  navigator.clipboard.writeText(textSeznamu()).then(()=>{$('kopirovat').textContent='✅ Zkopírováno';setTimeout(()=>$('kopirovat').textContent='📋 Kopírovat vše',1500);});
};
$('stahnout').onclick=()=>{
  const blob=new Blob([textSeznamu()],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='jmena.txt';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
};
generuj();vykresliOblibene();
</script>
</body>
</html>
