<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lineární rovnice</title>
  <link rel="stylesheet" href="../common.css">
  <script>
    if (localStorage.getItem('webapp_theme') === 'light') document.documentElement.dataset.theme = 'light';
  </script>
  <style>
    body { background-color: var(--bg-deep); padding: 24px clamp(14px, 3vw, 40px); min-height: 100vh; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .podtitul { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 16px; }
    .rezimy { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .rezimy button {
      background: var(--bg-control); border: 1px solid var(--border-strong); color: var(--text-muted);
      border-radius: 6px; padding: 7px 13px; font-size: 0.84rem; cursor: pointer;
    }
    .rezimy button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .karta { background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 26px; max-width: 640px; }
    .rovnice { font-size: clamp(1.8rem, 7vw, 2.6rem); font-weight: 700; text-align: center; margin-bottom: 22px; font-variant-numeric: tabular-nums; }
    .odpovedni { display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
    .odpovedni .x { font-size: 1.5rem; font-style: italic; }
    input[type=number] {
      background: var(--bg-input); border: 2px solid var(--border-strong); border-radius: 8px;
      color: var(--text); font-size: 1.3rem; text-align: center; width: 130px; padding: 9px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .potvrdit {
      background: var(--accent); border: none; color: #fff; border-radius: 8px;
      padding: 11px 26px; font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .potvrdit:hover { background: var(--accent-hover); }
    .zprava { margin-top: 14px; min-height: 1.5rem; font-size: 0.98rem; text-align: center; }
    .zprava.ok { color: var(--ok); } .zprava.spatne { color: var(--danger); }
    .reseni { margin-top: 12px; padding: 12px 16px; background: var(--bg-elevated); border-left: 3px solid var(--accent); border-radius: 6px; font-size: 1rem; color: var(--text-muted); line-height: 2; display: none; font-variant-numeric: tabular-nums; }
    .stav { display: flex; justify-content: space-between; max-width: 640px; margin-top: 12px; color: var(--text-muted); font-size: 0.9rem; }
    .serie { color: var(--warn); }
    i { font-style: italic; }
  </style>
</head>
<body>
  <h1>🧮 Lineární rovnice</h1>
  <p class="podtitul">Řešení rovnic o jedné neznámé (8.–9. ročník ZŠ). Všechny mají celočíselné řešení.</p>

  <div class="rezimy" id="rezimy">
    <button data-uroven="1" class="active">x + a = b</button>
    <button data-uroven="2">a·x = b</button>
    <button data-uroven="3">a·x + b = c</button>
    <button data-uroven="4">a·x + b = c·x + d</button>
    <button data-uroven="5">se závorkou</button>
  </div>

  <div class="karta">
    <div class="rovnice" id="rovnice"></div>
    <div class="odpovedni">
      <span class="x">x =</span>
      <input type="number" id="odpoved" autocomplete="off">
      <button class="potvrdit" id="btnPotvrdit">Potvrdit</button>
    </div>
    <div class="zprava" id="zprava"></div>
    <div class="reseni" id="reseni"></div>
  </div>
  <div class="stav">
    <span class="serie" id="serie"></span>
    <span id="skore"></span>
  </div>

<script>
const $ = id => document.getElementById(id);
let uroven = 1, x, zapis = '', kroky = [], spravne = 0, celkem = 0, serie = 0, vyhodnoceno = false;

const ni = (od, doC) => od + Math.floor(Math.random() * (doC - od + 1));      // celé číslo v rozsahu
const neNula = (od, doC) => { let v; do { v = ni(od, doC); } while (!v); return v; };
const clen = (k, prvni) => {                                                  // k·x hezky zapsaný
  const abs = Math.abs(k) === 1 ? 'x' : Math.abs(k) + 'x';
  return (k < 0 ? (prvni ? '−' : '− ') : (prvni ? '' : '+ ')) + abs;
};
const cst = (k, prvni) => (k < 0 ? (prvni ? '−' : '− ') : (prvni ? '' : '+ ')) + Math.abs(k);

function nova() {
  vyhodnoceno = false;
  x = ni(-9, 9);
  if (uroven === 1) {
    const a = neNula(-15, 15), b = x + a;
    zapis = `x ${cst(a)} = ${b}`;
    kroky = [`x = ${b} ${cst(-a)}`, `x = ${x}`];
  } else if (uroven === 2) {
    const a = neNula(-9, 9), b = a * x;
    zapis = `${clen(a, true)} = ${b}`;
    kroky = [`x = ${b} ÷ (${a})`, `x = ${x}`];
  } else if (uroven === 3) {
    const a = neNula(-9, 9), b = neNula(-12, 12), c = a * x + b;
    zapis = `${clen(a, true)} ${cst(b)} = ${c}`;
    kroky = [`${clen(a, true)} = ${c} ${cst(-b)}`, `${clen(a, true)} = ${c - b}`, `x = ${c - b} ÷ (${a})`, `x = ${x}`];
  } else if (uroven === 4) {
    let a = neNula(-8, 8), c = neNula(-8, 8);
    if (a === c) a += (a < 8 ? 1 : -1);
    const b = neNula(-12, 12), d = (a - c) * x + b;   // a·x + b = c·x + d
    zapis = `${clen(a, true)} ${cst(b)} = ${clen(c, true)} ${cst(d)}`;
    kroky = [`${clen(a - c, true)} = ${d - b}`, `x = ${d - b} ÷ (${a - c})`, `x = ${x}`];
  } else {
    const a = neNula(-6, 6), b = neNula(-9, 9), k = neNula(2, 5);   // k·(a·x + b) = c
    const cc = k * (a * x + b);
    zapis = `${k}·(${clen(a, true)} ${cst(b)}) = ${cc}`;
    kroky = [`${clen(k * a, true)} ${cst(k * b)} = ${cc}`, `${clen(k * a, true)} = ${cc - k * b}`, `x = ${cc - k * b} ÷ (${k * a})`, `x = ${x}`];
  }
  $('rovnice').textContent = zapis;
  $('odpoved').value = '';
  $('zprava').textContent = ''; $('zprava').className = 'zprava';
  $('reseni').style.display = 'none';
  $('btnPotvrdit').textContent = 'Potvrdit';
  $('odpoved').focus();
}
function vyhodnot() {
  if (vyhodnoceno) { nova(); return; }
  const v = $('odpoved').value.trim();
  if (v === '') { $('odpoved').focus(); return; }
  vyhodnoceno = true; celkem++;
  const ok = Number(v) === x;
  if (ok) { spravne++; serie++; $('zprava').textContent = '✅ Správně, x = ' + x + '.'; $('zprava').classList.add('ok'); }
  else { serie = 0; $('zprava').textContent = '❌ Správné řešení je x = ' + x + '.'; $('zprava').classList.add('spatne'); }
  $('reseni').innerHTML = '💡 Postup:<br>' + zapis + '<br>' + kroky.join('<br>');
  $('reseni').style.display = 'block';
  $('serie').textContent = serie >= 3 ? '🔥 série ' + serie : '';
  $('skore').textContent = spravne + ' / ' + celkem;
  $('btnPotvrdit').textContent = 'Další →';
}
$('btnPotvrdit').onclick = vyhodnot;
$('odpoved').addEventListener('keydown', e => { if (e.key === 'Enter') vyhodnot(); });
document.querySelectorAll('#rezimy button').forEach(b => b.onclick = () => {
  document.querySelectorAll('#rezimy button').forEach(x2 => x2.classList.remove('active'));
  b.classList.add('active'); uroven = +b.dataset.uroven; nova();
});
nova();
</script>
</body>
</html>
