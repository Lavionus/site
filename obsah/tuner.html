<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎸 Ladička</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:560px;margin:0 auto;text-align:center}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600}
.pod{color:#888;font-size:.85rem;margin-bottom:18px}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:26px;margin-bottom:20px}
.nota{font-size:5rem;font-weight:700;color:#6aa6fd;line-height:1;min-height:5.4rem}
.nota.ladi{color:#4caf50}
.frekvence{color:#888;font-size:1.05rem;margin:6px 0 18px}
.stupnice{position:relative;height:60px;background:#1e1e1e;border-radius:8px;overflow:hidden;margin-bottom:8px}
.stupnice .stredova{position:absolute;left:50%;top:0;bottom:0;width:2px;background:#4caf50}
.rucicka{position:absolute;top:8px;bottom:8px;width:4px;background:#e67e22;border-radius:2px;left:50%;transition:left .12s ease;transform:translateX(-50%)}
.rucicka.ladi{background:#4caf50}
.centy{display:flex;justify-content:space-between;color:#666;font-size:.75rem;margin-bottom:18px;padding:0 4px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 26px;border-radius:8px;cursor:pointer;font-weight:600;font-size:1rem}
.btn-red{background:#c0392b}
.chyba{color:#e74c3c;margin-top:12px}
.struny{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px}
.struna{background:#404040;border:1px solid #555;color:#ccc;border-radius:6px;padding:8px 12px;font-size:.85rem;cursor:pointer}
.struna:hover{background:#6aa6fd;color:#fff}
</style>
</head>
<body>
<div class="container">
  <h1>🎸 Chromatická ladička</h1>
  <p class="pod">Zahrajte tón – ladička ukáže nejbližší notu a odchylku v centech. Komorní a = 440 Hz.</p>
  <div class="card">
    <div class="nota" id="nota">–</div>
    <div class="frekvence" id="frek">… Hz</div>
    <div class="stupnice">
      <div class="stredova"></div>
      <div class="rucicka" id="rucicka"></div>
    </div>
    <div class="centy"><span>-50</span><span>-25</span><span>0</span><span>+25</span><span>+50 centů</span></div>
    <button class="btn" id="start">🎤 Spustit</button>
    <div class="chyba" id="chyba"></div>
    <div class="struny" id="struny"></div>
    <p class="pod" style="margin-top:14px">Kytara E2 A2 D3 G3 H3 E4 · Housle G3 D4 A4 E5 · klik = přehrát referenční tón</p>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const NOTY=['C','C♯','D','D♯','E','F','F♯','G','G♯','A','A♯','H'];
let actx,analyser,bezi=false,anim;

function notaZFrek(f){
  const n=12*Math.log2(f/440)+69; // MIDI číslo
  const cele=Math.round(n);
  return {nazev:NOTY[((cele%12)+12)%12],oktava:Math.floor(cele/12)-1,centy:Math.round((n-cele)*100)};
}
// autokorelace
function detekuj(buf,sr){
  const N=buf.length;
  let rms=0;
  for(let i=0;i<N;i++)rms+=buf[i]*buf[i];
  if(Math.sqrt(rms/N)<0.008)return -1; // ticho
  let nejlepsi=-1,nejKor=0;
  const min=Math.floor(sr/1100),max=Math.floor(sr/60);
  let posledni=1,klesa=false;
  for(let lag=min;lag<=max&&lag<N/2;lag++){
    let kor=0;
    for(let i=0;i<N/2;i++)kor+=buf[i]*buf[i+lag];
    if(kor>nejKor){nejKor=kor;nejlepsi=lag;}
  }
  if(nejlepsi<0)return -1;
  // parabolická interpolace vrcholu
  const y=(l)=>{let k=0;for(let i=0;i<N/2;i++)k+=buf[i]*buf[i+l];return k;};
  const y0=y(nejlepsi-1),y1=nejKor,y2=y(nejlepsi+1);
  const posun=(y0-y2)/(2*(y0-2*y1+y2))||0;
  return sr/(nejlepsi+posun);
}
async function start(){
  if(bezi){bezi=false;cancelAnimationFrame(anim);$('start').textContent='🎤 Spustit';$('start').className='btn';return;}
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false}});}
  catch(e){$('chyba').textContent='Mikrofon není dostupný: '+e.message;return;}
  $('chyba').textContent='';
  actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const src=actx.createMediaStreamSource(stream);
  analyser=actx.createAnalyser();analyser.fftSize=4096;
  src.connect(analyser);
  bezi=true;
  $('start').textContent='⏹ Zastavit';$('start').className='btn btn-red';
  const buf=new Float32Array(analyser.fftSize);
  (function smycka(){
    if(!bezi)return;
    anim=requestAnimationFrame(smycka);
    analyser.getFloatTimeDomainData(buf);
    const f=detekuj(buf,actx.sampleRate);
    if(f>0){
      const n=notaZFrek(f);
      $('nota').textContent=n.nazev+n.oktava;
      $('frek').textContent=f.toFixed(1)+' Hz · '+(n.centy>0?'+':'')+n.centy+' centů';
      const ladi=Math.abs(n.centy)<=5;
      $('nota').classList.toggle('ladi',ladi);
      $('rucicka').classList.toggle('ladi',ladi);
      $('rucicka').style.left=(50+Math.max(-50,Math.min(50,n.centy)))+'%';
    }
  })();
}
$('start').onclick=start;
// referenční tóny
const STRUNY=[['E2',82.41],['A2',110],['D3',146.83],['G3',196],['H3',246.94],['E4',329.63],['G3 (housle)',196],['D4',293.66],['A4',440],['E5',659.25]];
$('struny').innerHTML=STRUNY.map(([n,f],i)=>`<button class="struna" data-f="${f}">${n}</button>`).join('');
$('struny').addEventListener('click',e=>{
  const f=+e.target.dataset.f;
  if(!f)return;
  actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='triangle';o.frequency.value=f;
  o.connect(g);g.connect(actx.destination);
  const t=actx.currentTime;
  g.gain.setValueAtTime(0.001,t);g.gain.exponentialRampToValueAtTime(0.35,t+0.03);
  g.gain.exponentialRampToValueAtTime(0.001,t+1.6);
  o.start(t);o.stop(t+1.65);
});
</script>
</body>
</html>
