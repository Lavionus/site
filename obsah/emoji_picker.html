<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😀 Picker emoji &amp; symbolů</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:860px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.search{width:100%;background:#404040;border:1px solid #555;border-radius:8px;color:#e0e0e0;padding:12px;font-size:1rem;margin-bottom:14px}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;justify-content:center}
.cat{padding:7px 12px;background:#2a2a2a;border:1px solid #404040;border-radius:20px;cursor:pointer;font-size:1.2rem}
.cat.active{background:#6aa6fd;border-color:#6aa6fd}
.recent{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:12px;margin-bottom:14px}
.recent h2{font-size:.8rem;color:#888;margin-bottom:8px;text-transform:uppercase}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:4px}
.emoji{font-size:1.7rem;text-align:center;padding:6px 0;cursor:pointer;border-radius:8px;transition:.1s}
.emoji:hover{background:#333;transform:scale(1.2)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:10px 18px;border-radius:6px;opacity:0;transition:.3s;pointer-events:none;font-size:1.1rem}
.toast.show{opacity:1}
.empty{grid-column:1/-1;text-align:center;color:#666;padding:20px}
</style>
</head>
<body>
<div class="container">
  <h1>😀 Picker emoji &amp; symbolů</h1>
  <input class="search" id="search" placeholder="🔍 Hledat (např. srdce, úsměv, šipka)…">
  <div class="cats" id="cats"></div>
  <div class="recent" id="recentBox" style="display:none"><h2>Naposledy použité</h2><div class="grid" id="recent"></div></div>
  <div class="grid" id="grid"></div>
</div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
const DATA={
  '😀 Smajlíci':[['😀','úsměv smích'],['😃','radost'],['😄','smích'],['😁','zuby úsměv'],['😆','smích'],['😅','pot smích'],['🤣','řev smíchy'],['😂','slzy smíchu'],['🙂','mírný úsměv'],['😉','mrknutí'],['😊','spokojený'],['😍','zamilovaný srdce oči'],['😘','pusa'],['😜','jazyk'],['🤔','přemýšlení'],['😐','neutrální'],['😴','spánek'],['😎','sluneční brýle cool'],['🥳','oslava párty'],['😭','pláč'],['😡','vztek zlost'],['🤯','exploze hlavy'],['🥰','láska'],['😇','anděl'],['🤗','objetí'],['😬','rozpaky']],
  '👋 Gesta':[['👋','ahoj mávání'],['👍','palec nahoru like'],['👎','palec dolů'],['👏','potlesk'],['🙌','hurá ruce'],['🤝','podání ruky'],['✌️','mír vítězství'],['🤞','držím palce'],['👌','ok'],['🙏','prosba děkuji'],['💪','sval síla'],['👀','oči'],['🫶','srdce ruce'],['🤙','zavolej'],['✋','stop dlaň'],['👆','nahoru prst']],
  '❤️ Srdce':[['❤️','srdce láska červené'],['🧡','oranžové srdce'],['💛','žluté srdce'],['💚','zelené srdce'],['💙','modré srdce'],['💜','fialové srdce'],['🖤','černé srdce'],['🤍','bílé srdce'],['💔','zlomené srdce'],['💕','dvě srdce'],['💖','třpytivé srdce'],['💗','rostoucí srdce'],['💘','srdce šíp']],
  '🐶 Zvířata':[['🐶','pes'],['🐱','kočka'],['🐭','myš'],['🐹','křeček'],['🐰','králík'],['🦊','liška'],['🐻','medvěd'],['🐼','panda'],['🐮','kráva'],['🐷','prase'],['🐔','slepice'],['🐴','kůň'],['🐝','včela'],['🦋','motýl'],['🐢','želva'],['🐟','ryba'],['🦅','orel'],['🦉','sova']],
  '🍎 Jídlo':[['🍎','jablko'],['🍌','banán'],['🍇','hrozny'],['🍓','jahoda'],['🍉','meloun'],['🥕','mrkev'],['🌽','kukuřice'],['🍞','chléb'],['🧀','sýr'],['🍕','pizza'],['🍔','hamburger'],['🍟','hranolky'],['☕','káva'],['🍺','pivo'],['🍷','víno'],['🎂','dort']],
  '⭐ Symboly':[['⭐','hvězda'],['🌟','zářící hvězda'],['✨','jiskry'],['🔥','oheň'],['💧','kapka voda'],['⚡','blesk'],['❄️','sněhová vločka'],['☀️','slunce'],['🌙','měsíc'],['✅','fajfka hotovo'],['❌','křížek ne'],['⚠️','varování'],['❓','otazník'],['❗','vykřičník'],['💯','sto procent'],['🎯','terč cíl'],['🔔','zvonek'],['💡','žárovka nápad']],
  '➡️ Šipky':[['➡️','vpravo'],['⬅️','vlevo'],['⬆️','nahoru'],['⬇️','dolů'],['↗️','vpravo nahoru'],['↘️','vpravo dolů'],['🔄','obnovit cyklus'],['🔁','opakovat'],['▶️','přehrát'],['⏸️','pauza'],['⏩','rychle vpřed'],['🔼','nahoru'],['🔽','dolů']],
  '🚀 Objekty':[['🚀','raketa'],['💻','notebook'],['📱','telefon'],['📷','foťák'],['🎧','sluchátka'],['🔑','klíč'],['🔒','zámek'],['💰','peníze'],['📅','kalendář'],['📌','připínáček'],['✏️','tužka'],['📎','sponka'],['🛒','vozík nákup'],['🎁','dárek'],['🏆','pohár'],['⚙️','ozubené kolo']]
};
let recent=JSON.parse(localStorage.getItem('emoji_recent')||'[]');
let activeCat=Object.keys(DATA)[0];
$('cats').innerHTML=Object.keys(DATA).map(c=>`<div class="cat ${c===activeCat?'active':''}" data-c="${c}">${c.split(' ')[0]}</div>`).join('');
document.querySelectorAll('.cat').forEach(c=>c.onclick=()=>{activeCat=c.dataset.c;$('search').value='';document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));c.classList.add('active');render();});
function copy(em){navigator.clipboard.writeText(em);const t=$('toast');t.textContent='Zkopírováno: '+em;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1000);
  recent=[em,...recent.filter(e=>e!==em)].slice(0,16);localStorage.setItem('emoji_recent',JSON.stringify(recent));renderRecent();}
function renderRecent(){if(!recent.length){$('recentBox').style.display='none';return;}$('recentBox').style.display='block';
  $('recent').innerHTML=recent.map(e=>`<div class="emoji" data-e="${e}">${e}</div>`).join('');
  $('recent').querySelectorAll('.emoji').forEach(el=>el.onclick=()=>copy(el.dataset.e));}
function render(){
  const q=$('search').value.toLowerCase().trim();
  let list;
  if(q){list=[];Object.values(DATA).forEach(arr=>arr.forEach(([e,kw])=>{if(kw.includes(q)||e===q)list.push(e);}));}
  else list=DATA[activeCat].map(x=>x[0]);
  $('grid').innerHTML=list.length?list.map(e=>`<div class="emoji" data-e="${e}">${e}</div>`).join(''):'<div class="empty">Nic nenalezeno 🤷</div>';
  $('grid').querySelectorAll('.emoji').forEach(el=>el.onclick=()=>copy(el.dataset.e));
}
$('search').oninput=render;
renderRecent();render();
</script>
</body>
</html>
