<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😀 Picker emoji &amp; symbolů</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:860px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.search{width:100%;background:#404040;border:1px solid #555;border-radius:8px;color:#e0e0e0;padding:12px;font-size:1rem;margin-bottom:14px}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;justify-content:center}
.cat{padding:7px 12px;background:#2a2a2a;border:1px solid #404040;border-radius:20px;cursor:pointer;font-size:1.2rem}
.cat.active{background:#6aa6fd;border-color:#6aa6fd}
.tones{display:flex;gap:5px;align-items:center;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.tones span{font-size:.78rem;color:#888;margin-right:4px}
.tone{font-size:1.25rem;padding:3px 7px;background:#2a2a2a;border:1px solid #404040;border-radius:8px;cursor:pointer}
.tone.active{background:#6aa6fd;border-color:#6aa6fd}
.builder{display:flex;gap:8px;align-items:center;background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:8px 10px;margin-bottom:14px}
.build-line{flex:1;min-height:34px;font-size:1.4rem;display:flex;align-items:center;flex-wrap:wrap;word-break:break-all}
.build-line.empty{font-size:.82rem;color:#666}
.bbtn{background:#404040;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:7px 12px;cursor:pointer;font-size:.85rem;white-space:nowrap}
.bbtn:hover{background:#505050;border-color:#6aa6fd}
.recent{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:12px;margin-bottom:14px}
.recent .hlava{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.recent h2{font-size:.8rem;color:#888;text-transform:uppercase}
.recent .smaz{background:none;border:none;color:#666;cursor:pointer;font-size:.78rem}
.recent .smaz:hover{color:#ff8888}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:4px}
.emoji{font-size:1.7rem;text-align:center;padding:6px 0;cursor:pointer;border-radius:8px;transition:.1s}
.emoji:hover{background:#333;transform:scale(1.2)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:10px 18px;border-radius:6px;opacity:0;transition:.3s;pointer-events:none;font-size:1.1rem}
.toast.show{opacity:1}
.empty-msg{grid-column:1/-1;text-align:center;color:#666;padding:20px}
</style>
</head>
<body>
<div class="container">
  <h1>😀 Picker emoji &amp; symbolů</h1>
  <input class="search" id="search" placeholder="🔍 Hledat (např. srdce, úsměv, šipka, euro)…">
  <div class="cats" id="cats"></div>
  <div class="tones" id="tones"><span>Odstín pleti (gesta):</span></div>
  <div class="builder">
    <div class="build-line empty" id="buildLine">Klikáním se emoji skládají sem – pak zkopírujte vše najednou</div>
    <button class="bbtn" id="copyLine">📋 Kopírovat vše</button>
    <button class="bbtn" id="clearLine">🗑</button>
  </div>
  <div class="recent" id="recentBox" style="display:none">
    <div class="hlava"><h2>Naposledy použité</h2><button class="smaz" id="clearRecent">vymazat historii</button></div>
    <div class="grid" id="recent"></div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<div class="toast" id="toast"></div>

  '❤️ Srdce':[['❤️','srdce láska červené'],['🧡','oranžové srdce'],['💛','žluté srdce'],['💚','zelené srdce'],['💙','modré srdce'],['💜','fialové srdce'],['🖤','černé srdce'],['🤍','bílé srdce'],['🤎','hnědé srdce'],['💔','zlomené srdce'],['💕','dvě srdce'],['💖','třpytivé srdce'],['💗','rostoucí srdce'],['💘','srdce šíp'],['💝','srdce mašle dárek'],['💞','kroužící srdce'],['❣️','srdce vykřičník']],
  '🐶 Zvířata':[['🐶','pes'],['🐱','kočka'],['🐭','myš'],['🐹','křeček'],['🐰','králík'],['🦊','liška'],['🐻','medvěd'],['🐼','panda'],['🐮','kráva'],['🐷','prase'],['🐔','slepice'],['🐴','kůň'],['🐑','ovce'],['🐐','koza'],['🐝','včela'],['🦋','motýl'],['🐢','želva'],['🐟','ryba'],['🦅','orel'],['🦉','sova'],['🐺','vlk'],['🦌','jelen'],['🐗','divočák kanec'],['🐍','had'],['🐸','žába'],['🦂','škorpion'],['🕷️','pavouk'],['🐌','šnek hlemýžď']],
  '🍎 Jídlo':[['🍎','jablko'],['🍌','banán'],['🍇','hrozny'],['🍓','jahoda'],['🍉','meloun'],['🍒','třešně'],['🍑','broskev'],['🥕','mrkev'],['🌽','kukuřice'],['🥔','brambora'],['🍅','rajče'],['🥒','okurka'],['🍞','chléb'],['🧀','sýr'],['🥚','vejce'],['🍗','kuře stehno'],['🍕','pizza'],['🍔','hamburger'],['🍟','hranolky'],['🌭','hotdog párek'],['🍝','špagety těstoviny'],['🍜','polévka nudle'],['☕','káva'],['🍵','čaj'],['🍺','pivo'],['🍷','víno'],['🥛','mléko'],['🎂','dort'],['🍦','zmrzlina'],['🍪','sušenka'],['🍫','čokoláda'],['🍯','med']],
  '🌸 Příroda':[['🌸','květ sakura'],['🌹','růže'],['🌻','slunečnice'],['🌷','tulipán'],['🌼','sedmikráska'],['🌲','jehličnan strom'],['🌳','listnáč strom'],['🌴','palma'],['🌵','kaktus'],['🍀','čtyřlístek štěstí'],['🍁','javorový list podzim'],['🍂','spadané listí'],['🍄','houba muchomůrka'],['🌾','obilí klas'],['🌱','sazenice klíček'],['🌍','země planeta svět'],['🌈','duha'],['☀️','slunce'],['⛅','polojasno oblačno'],['☁️','mrak zataženo'],['🌧️','déšť'],['⛈️','bouřka'],['🌩️','blesk bouře'],['❄️','sníh vločka'],['⛄','sněhulák'],['🌫️','mlha'],['🌪️','tornádo vichr'],['🌊','vlna moře'],['🌕','úplněk měsíc'],['🌙','měsíc srpek']],
  '🏃 Sport':[['⚽','fotbal míč'],['🏀','basketbal'],['🏈','americký fotbal'],['🎾','tenis'],['🏐','volejbal'],['🏓','stolní tenis ping pong'],['🏸','badminton'],['🏒','hokej'],['⛳','golf'],['🎳','bowling kuželky'],['🏹','lukostřelba luk šíp'],['🎣','rybaření'],['🥊','box rukavice'],['🎿','lyže lyžování'],['⛸️','brusle krasobruslení'],['🛷','sáně boby'],['🏊','plavání',1],['🚴','cyklista kolo',1],['🏋️','vzpírání posilovna',1],['🧘','jóga meditace',1],['🏃','běh běžec',1],['🥇','zlatá medaile první'],['🥈','stříbrná medaile druhý'],['🥉','bronzová medaile třetí'],['🏆','pohár trofej'],['🎖️','vyznamenání']],
  '🚗 Doprava':[['🚗','auto'],['🚕','taxi'],['🚌','autobus'],['🚎','trolejbus'],['🏎️','závodní auto formule'],['🚓','policie auto'],['🚑','sanitka záchranka'],['🚒','hasiči auto'],['🚚','náklaďák kamion'],['🚜','traktor'],['🚲','kolo bicykl'],['🛵','skútr'],['🏍️','motorka'],['🚂','vlak lokomotiva parní'],['🚆','vlak'],['🚇','metro'],['🚊','tramvaj'],['✈️','letadlo'],['🚁','vrtulník helikoptéra'],['⛵','plachetnice'],['🚤','motorový člun'],['🚢','loď'],['🚀','raketa'],['🛸','ufo létající talíř'],['⚓','kotva'],['🚦','semafor'],['⛽','benzínka palivo'],['🛞','pneumatika kolo']],
  '⭐ Symboly':[['⭐','hvězda'],['🌟','zářící hvězda'],['✨','jiskry'],['🔥','oheň'],['💧','kapka voda'],['⚡','blesk'],['✅','fajfka hotovo'],['❌','křížek ne'],['⚠️','varování'],['🚫','zákaz'],['❓','otazník'],['❗','vykřičník'],['💯','sto procent'],['🎯','terč cíl'],['🔔','zvonek'],['💡','žárovka nápad'],['♻️','recyklace'],['⛔','vjezd zakázán'],['🆗','ok'],['🆕','nové'],['🔞','osmnáct'],['☮️','mír'],['☯️','jin jang'],['✝️','kříž'],['💤','spánek zzz'],['💢','vztek'],['💥','výbuch'],['🕐','hodiny čas'],['⌛','přesýpací hodiny'],['♾️','nekonečno']],
  '➡️ Šipky':[['➡️','vpravo'],['⬅️','vlevo'],['⬆️','nahoru'],['⬇️','dolů'],['↗️','vpravo nahoru'],['↘️','vpravo dolů'],['↖️','vlevo nahoru'],['↙️','vlevo dolů'],['↩️','zpět doleva'],['↪️','vpřed doprava'],['🔄','obnovit cyklus'],['🔁','opakovat'],['▶️','přehrát'],['⏸️','pauza'],['⏹️','stop'],['⏩','rychle vpřed'],['⏪','rychle zpět'],['🔼','nahoru'],['🔽','dolů'],['🔀','náhodně zamíchat']],
  '🚀 Objekty':[['🚀','raketa'],['💻','notebook počítač'],['🖥️','monitor počítač'],['⌨️','klávesnice'],['🖱️','myš počítač'],['📱','telefon mobil'],['📷','foťák fotoaparát'],['🎥','kamera'],['🎧','sluchátka'],['🎤','mikrofon'],['📺','televize'],['🔋','baterie'],['🔌','zástrčka'],['🔑','klíč'],['🔒','zámek'],['🔓','odemčeno'],['💰','peníze pytel'],['💳','platební karta'],['📅','kalendář'],['📌','připínáček'],['✏️','tužka'],['🖊️','propiska pero'],['📎','sponka'],['📏','pravítko'],['✂️','nůžky'],['🔨','kladivo'],['🔧','klíč nářadí'],['🪛','šroubovák'],['🛒','vozík nákup'],['🎁','dárek'],['📦','balík krabice'],['📚','knihy'],['🗑️','koš'],['🧲','magnet'],['🔭','dalekohled'],['🔬','mikroskop'],['💊','lék pilulka'],['🌡️','teploměr']],
  '©️ Textové znaky':[['©','copyright autorská práva'],['®','registrovaná známka'],['™','trademark ochranná známka'],['€','euro měna'],['£','libra měna'],['¥','jen jüan měna'],['$','dolar měna'],['¢','cent'],['§','paragraf zákon'],['°','stupeň teplota'],['±','plus minus'],['×','krát násobení'],['÷','děleno dělení'],['≈','přibližně rovno'],['≠','nerovná se'],['≤','menší nebo rovno'],['≥','větší nebo rovno'],['∞','nekonečno'],['√','odmocnina'],['∑','suma'],['µ','mikro'],['π','pí'],['Ω','ohm omega'],['Δ','delta rozdíl'],['α','alfa'],['β','beta'],['λ','lambda'],['…','trojtečka výpustka'],['–','pomlčka krátká'],['—','pomlčka dlouhá'],['„','uvozovky dole české'],['“','uvozovky nahoře'],['«','francouzské uvozovky levé'],['»','francouzské uvozovky pravé'],['‚','čárka dole'],['’','apostrof'],['•','odrážka puntík'],['·','střední tečka'],['‰','promile'],['′','minuta stopa čárka'],['″','vteřina palec'],['†','kříž dýka'],['✓','fajfka ano'],['✗','křížek ne'],['★','hvězda plná'],['☆','hvězda prázdná'],['♠','piky karty'],['♣','kříže karty'],['♥','srdce karty'],['♦','káry karty'],['♪','nota hudba'],['♫','noty hudba'],['☺','úsměv textový'],['☹','smutek textový'],['☼','slunce textové'],['☂','deštník'],['№','číslo numero'],['✉','obálka dopis'],['☎','telefon'],['⌀','průměr']]
};
const TONES=[['','✋'],['\u{1F3FB}','✋🏻'],['\u{1F3FC}','✋🏼'],['\u{1F3FD}','✋🏽'],['\u{1F3FE}','✋🏾'],['\u{1F3FF}','✋🏿']];
let recent=JSON.parse(localStorage.getItem('emoji_recent')||'[]');
let activeCat=Object.keys(DATA)[0];
let tone='';
let line='';

$('cats').innerHTML=Object.keys(DATA).map(c=>`<div class="cat ${c===activeCat?'active':''}" data-c="${c}" title="${c}">${c.split(' ')[0]}</div>`).join('');
document.querySelectorAll('.cat').forEach(c=>c.onclick=()=>{activeCat=c.dataset.c;$('search').value='';document.querySelectorAll('.cat').forEach(x=>x.classList.remove('active'));c.classList.add('active');render();});

// Volba odstínu pleti
TONES.forEach(([t,label],i)=>{
  const b=document.createElement('button');
  b.className='tone'+(i===0?' active':'');
  b.textContent=label;
  b.title=i===0?'Výchozí (žlutá)':'Odstín '+i;
  b.onclick=()=>{tone=t;document.querySelectorAll('.tone').forEach(x=>x.classList.remove('active'));b.classList.add('active');render();};
  $('tones').appendChild(b);
});

// Aplikuje zvolený odstín pleti na emoji, které ho podporují
function applyTone(item){
  const [e,,toneable]=item;
  if(!tone||!toneable)return e;
  return e.replace(/\uFE0F/g,'')+tone;
}
function unicodeTitle(e){
  return Array.from(e).map(c=>'U+'+c.codePointAt(0).toString(16).toUpperCase()).join(' ');
}
function toast(msg){
  const t=$('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toast._tm);toast._tm=setTimeout(()=>t.classList.remove('show'),1000);
}
function updateLine(){
  const el=$('buildLine');
  if(line){el.textContent=line;el.classList.remove('empty');}
  else{el.textContent='Klikáním se emoji skládají sem – pak zkopírujte vše najednou';el.classList.add('empty');}
}
function copy(em){
  navigator.clipboard.writeText(em);
  toast('Zkopírováno: '+em);
  line+=em;updateLine();
  recent=[em,...recent.filter(e=>e!==em)].slice(0,16);
  localStorage.setItem('emoji_recent',JSON.stringify(recent));
  renderRecent();
}
$('copyLine').onclick=()=>{
  if(!line)return;
  navigator.clipboard.writeText(line);
  toast('Zkopírováno: '+line);
};
$('clearLine').onclick=()=>{line='';updateLine();};
$('clearRecent').onclick=()=>{recent=[];localStorage.removeItem('emoji_recent');renderRecent();};

function mountGrid(container,emojis,titles){
  container.innerHTML=emojis.length
    ?emojis.map((e,i)=>`<div class="emoji" data-i="${i}" title="${titles?titles[i]:''}">${e}</div>`).join('')
    :'<div class="empty-msg">Nic nenalezeno 🤷</div>';
  container.querySelectorAll('.emoji').forEach(el=>el.onclick=()=>copy(emojis[+el.dataset.i]));
}
function renderRecent(){
  if(!recent.length){$('recentBox').style.display='none';return;}
  $('recentBox').style.display='block';
  mountGrid($('recent'),recent);
}
function render(){
  const q=$('search').value.toLowerCase().trim();
  let items;
  if(q){
    items=[];
    Object.values(DATA).forEach(arr=>arr.forEach(it=>{if(it[1].includes(q)||it[0]===q)items.push(it);}));
  }else items=DATA[activeCat];
  const emojis=items.map(applyTone);
  const titles=items.map((it,i)=>`${it[1]} (${unicodeTitle(emojis[i])})`);
  mountGrid($('grid'),emojis,titles);
}
$('search').oninput=render;
renderRecent();render();updateLine();
</script>
</body>
</html>
