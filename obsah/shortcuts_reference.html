<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⌨️ Přehled klávesových zkratek</title>
<link rel="stylesheet" href="../common.css">
<script>
  if (localStorage.getItem('webapp_theme') === 'light') document.documentElement.dataset.theme = 'light';
</script>
<style>
body{background:var(--bg-deep);padding:20px clamp(14px,3vw,40px);min-height:100vh}
.container{max-width:900px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:4px}
.sub{color:var(--text-muted);font-size:.85rem;margin-bottom:16px}
.apps{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.app-pill{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-muted);border-radius:14px;padding:6px 14px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:6px}
.app-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.toolbar{display:flex;gap:8px;margin-bottom:14px}
.toolbar input[type=search]{flex:1;background:var(--bg-input);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:10px 12px;font-size:.9rem}
.toolbar select{background:var(--bg-input);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 10px;font-size:.85rem}
.cats{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.cat-pill{background:var(--bg-elevated);border:1px solid var(--border);color:var(--text-muted);border-radius:14px;padding:5px 12px;font-size:.76rem;cursor:pointer}
.cat-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.list{display:grid;gap:0;background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item .desc{flex:1;font-size:.88rem}
.item .desc .cat{display:block;font-size:.68rem;color:var(--text-faint);margin-top:2px}
.keys{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.kbd{font-family:ui-monospace,Consolas,monospace;background:var(--bg-control);border:1px solid var(--border-strong);border-bottom-width:2px;border-radius:5px;padding:3px 8px;font-size:.8rem;color:var(--accent);cursor:pointer;white-space:nowrap}
.kbd:hover{background:var(--bg-hover)}
.kbd.copied{color:var(--ok);border-color:var(--ok)}
.platform{font-size:.65rem;color:var(--text-faint);align-self:center;margin-right:2px}
.empty{padding:30px;text-align:center;color:var(--text-faint)}
</style>
</head>
<body>
<div class="container">
  <h1>⌨️ Přehled klávesových zkratek</h1>
  <p class="sub">Rychlá offline referenční příručka pro nejpoužívanější aplikace. Klikem na zkratku ji zkopíruješ.</p>

  <div class="apps" id="apps"></div>
  <div class="toolbar">
    <input type="search" id="search" placeholder="🔍 Hledat akci nebo zkratku…">
  </div>
  <div class="cats" id="cats"></div>
  <div class="list" id="list"></div>
</div>

<script>
const $=id=>document.getElementById(id);
function norm(s){return (s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');}

/* [kategorie, akce, win, mac(volitelné - pokud chybí, použije se win)] */
const DATA={
  obecne:{label:'🖥️ Windows / obecné',items:[
    ['Okna a plocha','Přepínání mezi otevřenými okny','Alt + Tab'],
    ['Okna a plocha','Zobrazit / skrýt plochu','Win + D'],
    ['Okna a plocha','Přichytit okno vlevo/vpravo','Win + ←/→'],
    ['Okna a plocha','Minimalizovat všechna okna','Win + M'],
    ['Okna a plocha','Uzamknout počítač','Win + L'],
    ['Okna a plocha','Přepínání virtuálních ploch','Ctrl + Win + ←/→'],
    ['Okna a plocha','Nová virtuální plocha','Win + Ctrl + D'],
    ['Text a soubory','Kopírovat','Ctrl + C','⌘ + C'],
    ['Text a soubory','Vyjmout','Ctrl + X','⌘ + X'],
    ['Text a soubory','Vložit','Ctrl + V','⌘ + V'],
    ['Text a soubory','Vložit bez formátování','Ctrl + Shift + V','⌘ + Shift + V'],
    ['Text a soubory','Zpět / Znovu','Ctrl + Z / Ctrl + Y','⌘ + Z / ⌘ + Shift + Z'],
    ['Text a soubory','Vybrat vše','Ctrl + A','⌘ + A'],
    ['Text a soubory','Přejmenovat soubor','F2','Enter'],
    ['Text a soubory','Trvale smazat (bez koše)','Shift + Delete','⌘ + Shift + Delete'],
    ['Snímky obrazovky','Výřez obrazovky','Win + Shift + S','⌘ + Shift + 4'],
    ['Snímky obrazovky','Celá obrazovka do schránky','Win + PrtScn','⌘ + Shift + 3'],
    ['Hledání a spouštění','Otevřít hledání / Spotlight','Win + S','⌘ + Mezerník'],
    ['Hledání a spouštění','Správce úloh','Ctrl + Shift + Esc','⌘ + Alt + Esc'],
  ]},
  excel:{label:'📊 Excel',items:[
    ['Pohyb a výběr','Přejít na začátek listu','Ctrl + Home'],
    ['Pohyb a výběr','Přejít na konec dat','Ctrl + End'],
    ['Pohyb a výběr','Vybrat celý sloupec / řádek','Ctrl + Mezerník / Shift + Mezerník'],
    ['Pohyb a výběr','Vybrat aktuální oblast dat','Ctrl + Shift + *'],
    ['Úpravy','Vložit nový řádek/sloupec','Ctrl + Plus'],
    ['Úpravy','Smazat řádek/sloupec','Ctrl + Minus'],
    ['Úpravy','Upravit obsah buňky','F2'],
    ['Úpravy','Vyplnit dolů / doprava','Ctrl + D / Ctrl + R'],
    ['Úpravy','Zopakovat poslední akci','F4'],
    ['Vzorce','Vložit funkci SUM','Alt + ="'],
    ['Vzorce','Přepnout typ odkazu (relativní/absolutní)','F4 (v editaci vzorce)'],
    ['Vzorce','Zobrazit vzorce místo výsledků','Ctrl + `'],
    ['Formát','Formát buňky','Ctrl + 1'],
    ['Formát','Formát jako měna / procenta','Ctrl + Shift + 4 / Ctrl + Shift + 5'],
    ['Formát','Tučné / kurzíva / podtržené','Ctrl + B / I / U'],
    ['Listy a soubor','Nový list','Shift + F11'],
    ['Listy a soubor','Přepnout list vpravo/vlevo','Ctrl + PageDown/PageUp'],
    ['Listy a soubor','Uložit / Uložit jako','Ctrl + S / F12'],
  ]},
  vscode:{label:'💻 VS Code',items:[
    ['Navigace','Rychlé otevření souboru','Ctrl + P','⌘ + P'],
    ['Navigace','Paleta příkazů','Ctrl + Shift + P','⌘ + Shift + P'],
    ['Navigace','Přejít na symbol v souboru','Ctrl + Shift + O','⌘ + Shift + O'],
    ['Navigace','Přejít na definici','F12'],
    ['Navigace','Vrátit se zpět','Alt + ←','Ctrl + −'],
    ['Editace','Duplikovat řádek','Shift + Alt + ↓','Shift + ⌥ + ↓'],
    ['Editace','Přesunout řádek nahoru/dolů','Alt + ↑/↓','⌥ + ↑/↓'],
    ['Editace','Zakomentovat řádek','Ctrl + /','⌘ + /'],
    ['Editace','Vybrat další výskyt (multi-cursor)','Ctrl + D','⌘ + D'],
    ['Editace','Kurzor na všechny výskyty','Ctrl + Shift + L','⌘ + Shift + L'],
    ['Editace','Přejmenovat symbol','F2'],
    ['Editace','Formátovat dokument','Shift + Alt + F','Shift + ⌥ + F'],
    ['Panely','Zobrazit/skrýt terminál','Ctrl + `','⌘ + `'],
    ['Panely','Zobrazit/skrýt Sidebar','Ctrl + B','⌘ + B'],
    ['Panely','Rozdělit editor','Ctrl + \\','⌘ + \\'],
    ['Hledání','Hledat v souboru','Ctrl + F','⌘ + F'],
    ['Hledání','Hledat napříč projektem','Ctrl + Shift + F','⌘ + Shift + F'],
  ]},
  prohlizec:{label:'🌐 Prohlížeč',items:[
    ['Karty','Nová karta','Ctrl + T','⌘ + T'],
    ['Karty','Zavřít kartu','Ctrl + W','⌘ + W'],
    ['Karty','Znovu otevřít zavřenou kartu','Ctrl + Shift + T','⌘ + Shift + T'],
    ['Karty','Přepnout na další/předchozí kartu','Ctrl + Tab / Ctrl + Shift + Tab'],
    ['Karty','Přeskočit na kartu 1–8','Ctrl + 1…8','⌘ + 1…8'],
    ['Navigace','Adresní řádek','Ctrl + L','⌘ + L'],
    ['Navigace','Obnovit stránku','F5 / Ctrl + R','⌘ + R'],
    ['Navigace','Tvrdé obnovení (bez cache)','Ctrl + Shift + R','⌘ + Shift + R'],
    ['Navigace','Zpět / Vpřed','Alt + ←/→','⌘ + [ / ]'],
    ['Nástroje','Vývojářská konzole','F12 / Ctrl + Shift + I','⌘ + Alt + I'],
    ['Nástroje','Hledat na stránce','Ctrl + F','⌘ + F'],
    ['Nástroje','Přiblížit / oddálit / reset','Ctrl + + / − / 0','⌘ + + / − / 0'],
    ['Okna','Nové anonymní okno','Ctrl + Shift + N','⌘ + Shift + N'],
    ['Okna','Uložit stránku','Ctrl + S','⌘ + S'],
  ]},
  photoshop:{label:'🎨 Photoshop',items:[
    ['Nástroje','Přesun','V'],
    ['Nástroje','Výběr (obdélník/elipsa)','M'],
    ['Nástroje','Laso','L'],
    ['Nástroje','Kouzelná hůlka / Quick selection','W'],
    ['Nástroje','Ořez','C'],
    ['Nástroje','Klonovací razítko','S'],
    ['Nástroje','Retušovací štětec','J'],
    ['Nástroje','Štětec','B'],
    ['Nástroje','Guma','E'],
    ['Nástroje','Kapátko','I'],
    ['Nástroje','Text','T'],
    ['Nástroje','Ruka / Lupa','H / Z'],
    ['Vrstvy','Nová vrstva','Ctrl + Shift + N','⌘ + Shift + N'],
    ['Vrstvy','Duplikovat vrstvu','Ctrl + J','⌘ + J'],
    ['Vrstvy','Sloučit viditelné vrstvy','Ctrl + Shift + E','⌘ + Shift + E'],
    ['Vrstvy','Seskupit vrstvy','Ctrl + G','⌘ + G'],
    ['Výběr','Zrušit výběr','Ctrl + D','⌘ + D'],
    ['Výběr','Invertovat výběr','Ctrl + Shift + I','⌘ + Shift + I'],
    ['Úpravy','Volná transformace','Ctrl + T','⌘ + T'],
    ['Úpravy','Úrovně / Křivky','Ctrl + L / Ctrl + M','⌘ + L / ⌘ + M'],
    ['Soubor','Uložit pro web','Ctrl + Shift + Alt + S','⌘ + Shift + ⌥ + S'],
  ]}
};

let activeApp='obecne';
let activeCat='';

function renderApps(){
  $('apps').innerHTML=Object.keys(DATA).map(k=>
    `<div class="app-pill${k===activeApp?' active':''}" data-app="${k}">${DATA[k].label}</div>`
  ).join('');
  $('apps').querySelectorAll('.app-pill').forEach(p=>{
    p.onclick=()=>{ activeApp=p.dataset.app; activeCat=''; renderApps(); renderCats(); renderList(); };
  });
}

function renderCats(){
  const cats=['Vše',...new Set(DATA[activeApp].items.map(i=>i[0]))];
  $('cats').innerHTML=cats.map(c=>
    `<div class="cat-pill${(c==='Vše'&&!activeCat)||c===activeCat?' active':''}" data-cat="${c==='Vše'?'':c}">${c}</div>`
  ).join('');
  $('cats').querySelectorAll('.cat-pill').forEach(p=>{
    p.onclick=()=>{ activeCat=p.dataset.cat; renderCats(); renderList(); };
  });
}

function renderList(){
  const q=norm($('search').value.trim());
  const items=DATA[activeApp].items.filter(([cat,action,win,mac])=>
    (!activeCat||cat===activeCat) &&
    (!q||norm(cat+' '+action+' '+win+' '+(mac||'')).includes(q))
  );
  if(!items.length){
    $('list').innerHTML='<div class="empty">Nic nenalezeno.</div>';
    return;
  }
  $('list').innerHTML=items.map(([cat,action,win,mac])=>`
    <div class="item">
      <div class="desc">${action}<span class="cat">${cat}</span></div>
      <div class="keys">
        <span class="platform">Win</span><span class="kbd" data-copy="${win.replace(/"/g,'&quot;')}">${win}</span>
        ${mac?`<span class="platform">Mac</span><span class="kbd" data-copy="${mac.replace(/"/g,'&quot;')}">${mac}</span>`:''}
      </div>
    </div>`).join('');
  $('list').querySelectorAll('.kbd').forEach(el=>{
    el.onclick=()=>{
      navigator.clipboard.writeText(el.dataset.copy);
      const orig=el.textContent;
      el.textContent='✅';
      el.classList.add('copied');
      setTimeout(()=>{el.textContent=orig;el.classList.remove('copied');},900);
    };
  });
}

$('search').addEventListener('input',renderList);
renderApps();
renderCats();
renderList();
</script>
</body>
</html>
