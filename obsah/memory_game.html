<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>рЯГП Pexeso</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px;display:flex;flex-direction:column;align-items:center}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600}
.top{display:flex;gap:12px;align-items:center;margin-bottom:18px;flex-wrap:wrap;justify-content:center}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.info{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:8px 16px;text-align:center}
.info .l{font-size:.68rem;color:#888;text-transform:uppercase}.info .v{font-size:1.2rem;font-weight:700;color:#6aa6fd}
.board{display:grid;gap:10px;perspective:800px}
.card{aspect-ratio:1;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .4s}
.card.flipped,.card.matched{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(1.5rem,6vw,2.4rem);backface-visibility:hidden}
.back{background:linear-gradient(135deg,#3a6fd8,#6aa6fd);color:#fff}
.front{background:#2a2a2a;border:1px solid #404040;transform:rotateY(180deg)}
.card.matched .front{background:#1e3a26;border-color:#27ae60}
.msg{margin-top:18px;font-size:1.3rem;font-weight:700;color:#27ae60;min-height:30px;text-align:center}
.hint{color:#888;font-size:.85rem;margin-top:10px}
</style>
</head>
<body>
<h1>рЯГП Pexeso (Memory)</h1>
<div class="top">
  <div class="info"><div class="l">Tahy</div><div class="v" id="moves">0</div></div>
  <div class="info"><div class="l">P√°ry</div><div class="v" id="pairs">0</div></div>
  <div class="info"><div class="l">ƒМas</div><div class="v" id="time">0 s</div></div>
  <select id="level">
    <option value="4">Snadn√© (4√Ч4)</option>
    <option value="6">St≈Щedn√≠ (6√Ч6)</option>
    <option value="8">TƒЫ≈Њk√© (8√Ч8)</option>
  </select>
  <button class="btn" id="newBtn">рЯФД Nov√° hra</button>
</div>
<div class="board" id="board"></div>
<div class="msg" id="msg"></div>
<p class="hint">Ot√°ƒНej karty a hledej shodn√© dvojice. Najdi v≈°echny p√°ry na co nejm√©nƒЫ tah≈ѓ!</p>
<script>
const $=id=>document.getElementById(id);
const EMOJI=['рЯНО','рЯНМ','рЯНЗ','рЯНУ','рЯНС','рЯНТ','рЯ•Э','рЯНН','рЯ••','рЯМљ','рЯ•Х','рЯНЕ','рЯ•Ф','рЯІЕ','рЯМґпЄП','рЯНЖ','рЯ•¶','рЯНД','рЯМ∞','рЯ•Ь','рЯМї','рЯМЈ','рЯМє','рЯМµ','рЯРД','рЯРЦ','рЯРС','рЯРФ','рЯРУ','рЯРЭ','рЯ¶Л','рЯРЮ'];
let cols,cards,flipped,matched,moves,canFlip,timer,seconds,started;
function init(){
  cols=+$('level').value;const total=cols*cols;const need=total/2;
  const pool=[...EMOJI].sort(()=>Math.random()-0.5).slice(0,need);
  cards=[...pool,...pool].sort(()=>Math.random()-0.5);
  flipped=[];matched=0;moves=0;canFlip=true;seconds=0;started=false;
  clearInterval(timer);$('time').textContent='0 s';$('moves').textContent=0;$('pairs').textContent='0/'+need;$('msg').textContent='';
  const b=$('board');b.style.gridTemplateColumns=`repeat(${cols},minmax(0,1fr))`;
  b.style.width='min('+(cols*70)+'px,92vw)';
  b.innerHTML=cards.map((e,i)=>`<div class="card" data-i="${i}"><div class="face back">вЭУ</div><div class="face front">${e}</div></div>`).join('');
  b.querySelectorAll('.card').forEach(c=>c.onclick=()=>flip(c));
}
function flip(card){
  if(!canFlip||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  if(!started){started=true;timer=setInterval(()=>{seconds++;$('time').textContent=seconds+' s';},1000);}
  card.classList.add('flipped');flipped.push(card);
  if(flipped.length===2){
    moves++;$('moves').textContent=moves;canFlip=false;
    const[a,b]=flipped;
    if(cards[+a.dataset.i]===cards[+b.dataset.i]){
      setTimeout(()=>{a.classList.add('matched');b.classList.add('matched');flipped=[];canFlip=true;matched++;
        $('pairs').textContent=matched+'/'+(cols*cols/2);
        if(matched===cols*cols/2){clearInterval(timer);$('msg').textContent=`рЯОЙ Hotovo! ${moves} tah≈ѓ za ${seconds} s`;}},450);
    }else{
      setTimeout(()=>{a.classList.remove('flipped');b.classList.remove('flipped');flipped=[];canFlip=true;},800);
    }
  }
}
$('newBtn').onclick=init;$('level').onchange=init;
init();
</script>
</body>
</html>
