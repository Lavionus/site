<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🩸 Deník krevního tlaku</title>
<script src="lib/chart.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:960px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:14px}
.form{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
label{display:block;font-size:.76rem;color:#888;margin-bottom:4px}
input{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px;width:110px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.cat{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.78rem;color:#fff;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;color:#888;padding:6px;font-size:.74rem;text-transform:uppercase}
td{padding:8px 6px;border-bottom:1px solid #333}
.del{background:none;border:none;color:#c0392b;cursor:pointer}
.legend{display:flex;gap:10px;flex-wrap:wrap;font-size:.76rem;margin-top:10px}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:11px;height:11px;border-radius:3px;display:inline-block}
</style>
</head>
<body>
<div class="container">
  <h1>🩸 Deník krevního tlaku</h1>
  <div class="card">
    <h2>Nové měření</h2>
    <div class="form">
      <div><label>Systolický (horní)</label><input type="number" id="sys" value="120" min="50" max="260"></div>
      <div><label>Diastolický (dolní)</label><input type="number" id="dia" value="80" min="30" max="160"></div>
      <div><label>Tep (/min)</label><input type="number" id="pulse" value="70" min="30" max="220"></div>
      <div><label>Datum a čas</label><input type="datetime-local" id="dt" style="width:200px"></div>
      <button class="btn" id="addBtn">➕ Zaznamenat</button>
    </div>
    <div class="legend">
      <span><i class="dot" style="background:#3498db"></i>Nízký</span>
      <span><i class="dot" style="background:#27ae60"></i>Normální</span>
      <span><i class="dot" style="background:#f1c40f"></i>Zvýšený</span>
      <span><i class="dot" style="background:#e67e22"></i>Hypertenze 1</span>
      <span><i class="dot" style="background:#e74c3c"></i>Hypertenze 2</span>
      <span><i class="dot" style="background:#c0392b"></i>Krize</span>
    </div>
  </div>
  <div class="card"><h2>Trend</h2><canvas id="chart" height="110"></canvas></div>
  <div class="card">
    <h2>Záznamy <button class="btn" id="clearBtn" style="float:right;padding:4px 12px;font-size:.78rem;background:#404040">Vymazat vše</button></h2>
    <table><thead><tr><th>Datum</th><th>Tlak</th><th>Tep</th><th>Hodnocení</th><th></th></tr></thead><tbody id="list"></tbody></table>
    <p style="font-size:.76rem;color:#666;margin-top:10px">Orientační hodnocení dle ESC/ESH. Nenahrazuje lékařskou diagnózu – při opakovaně vysokých hodnotách kontaktujte lékaře.</p>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const now=new Date();now.setMinutes(now.getMinutes()-now.getTimezoneOffset());$('dt').value=now.toISOString().slice(0,16);
let data=JSON.parse(localStorage.getItem('bp_log')||'[]');
const save=()=>localStorage.setItem('bp_log',JSON.stringify(data));
let chart;
function categorize(s,d){
  if(s>=180||d>=120)return['Hypertenzní krize','#c0392b'];
  if(s>=160||d>=100)return['Hypertenze 2. st.','#e74c3c'];
  if(s>=140||d>=90)return['Hypertenze 1. st.','#e67e22'];
  if(s>=130||d>=85)return['Zvýšený','#f1c40f'];
  if(s<90||d<60)return['Nízký tlak','#3498db'];
  return['Normální','#27ae60'];
}
$('addBtn').onclick=()=>{
  data.push({id:Date.now(),sys:+$('sys').value,dia:+$('dia').value,pulse:+$('pulse').value,dt:$('dt').value});
  data.sort((a,b)=>a.dt.localeCompare(b.dt));save();render();
};
$('clearBtn').onclick=()=>{if(confirm('Smazat všechny záznamy?')){data=[];save();render();}};
function render(){
  $('list').innerHTML=data.slice().reverse().map(r=>{
    const[cat,col]=categorize(r.sys,r.dia);
    return `<tr><td>${new Date(r.dt).toLocaleString('cs',{day:'numeric',month:'numeric',hour:'2-digit',minute:'2-digit'})}</td><td><b>${r.sys}/${r.dia}</b></td><td>${r.pulse||'–'}</td><td><span class="cat" style="background:${col}">${cat}</span></td><td><button class="del" data-id="${r.id}">🗑️</button></td></tr>`;
  }).join('')||'<tr><td colspan="5" style="text-align:center;color:#666;padding:20px">Zatím žádná měření</td></tr>';
  $('list').querySelectorAll('.del').forEach(b=>b.onclick=()=>{data=data.filter(r=>r.id!=b.dataset.id);save();render();});
  if(chart)chart.destroy();
  chart=new Chart($('chart'),{type:'line',data:{labels:data.map(r=>new Date(r.dt).toLocaleDateString('cs',{day:'numeric',month:'numeric'})),
    datasets:[
      {label:'Systolický',data:data.map(r=>r.sys),borderColor:'#e74c3c',tension:.2},
      {label:'Diastolický',data:data.map(r=>r.dia),borderColor:'#3498db',tension:.2},
      {label:'Tep',data:data.map(r=>r.pulse),borderColor:'#27ae60',borderDash:[4,4],tension:.2}
    ]},options:{plugins:{legend:{labels:{color:'#bbb'}}},scales:{x:{ticks:{color:'#888'},grid:{color:'#333'}},y:{ticks:{color:'#888'},grid:{color:'#333'}}}}});
}
render();
</script>
</body>
</html>
