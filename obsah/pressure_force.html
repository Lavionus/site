<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 Převodník tlaku, síly a momentu</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:14px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.row label{width:170px;font-size:.88rem;color:#bbb}
.row input{flex:1;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#6aa6fd;padding:11px;font-family:monospace;font-size:1.05rem}
</style>
</head>
<body>
<div class="container">
  <h1>🔧 Převodník tlaku, síly a momentu</h1>
  <div class="card">
    <h2>📊 Tlak</h2>
    <div class="row"><label>Pascal (Pa)</label><input type="number" id="pa" data-g="pres" value="100000" step="any"></div>
    <div class="row"><label>Kilopascal (kPa)</label><input type="number" id="kpa" data-g="pres" step="any"></div>
    <div class="row"><label>Bar</label><input type="number" id="bar" data-g="pres" step="any"></div>
    <div class="row"><label>PSI (lb/in²)</label><input type="number" id="psi" data-g="pres" step="any"></div>
    <div class="row"><label>Atmosféra (atm)</label><input type="number" id="atm" data-g="pres" step="any"></div>
  </div>
  <div class="card">
    <h2>💪 Síla</h2>
    <div class="row"><label>Newton (N)</label><input type="number" id="n" data-g="force" value="1000" step="any"></div>
    <div class="row"><label>Kilonewton (kN)</label><input type="number" id="kn" data-g="force" step="any"></div>
    <div class="row"><label>Kilopond / kgf</label><input type="number" id="kgf" data-g="force" step="any"></div>
    <div class="row"><label>Libra síly (lbf)</label><input type="number" id="lbf" data-g="force" step="any"></div>
  </div>
  <div class="card">
    <h2>🔩 Krouticí moment</h2>
    <div class="row"><label>Newton-metr (Nm)</label><input type="number" id="nm" data-g="torque" value="100" step="any"></div>
    <div class="row"><label>Kilogram-metr (kgm)</label><input type="number" id="kgm" data-g="torque" step="any"></div>
    <div class="row"><label>Libra-stopa (lb-ft)</label><input type="number" id="lbft" data-g="torque" step="any"></div>
    <div class="row"><label>Libra-palec (lb-in)</label><input type="number" id="lbin" data-g="torque" step="any"></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function setPres(pa,ex){if(ex!=='pa')$('pa').value=+pa.toFixed(2);if(ex!=='kpa')$('kpa').value=+(pa/1000).toFixed(4);if(ex!=='bar')$('bar').value=+(pa/1e5).toFixed(5);if(ex!=='psi')$('psi').value=+(pa/6894.76).toFixed(4);if(ex!=='atm')$('atm').value=+(pa/101325).toFixed(5);}
function setForce(n,ex){if(ex!=='n')$('n').value=+n.toFixed(3);if(ex!=='kn')$('kn').value=+(n/1000).toFixed(5);if(ex!=='kgf')$('kgf').value=+(n/9.80665).toFixed(4);if(ex!=='lbf')$('lbf').value=+(n/4.44822).toFixed(4);}
function setTorque(nm,ex){if(ex!=='nm')$('nm').value=+nm.toFixed(3);if(ex!=='kgm')$('kgm').value=+(nm/9.80665).toFixed(4);if(ex!=='lbft')$('lbft').value=+(nm/1.35582).toFixed(4);if(ex!=='lbin')$('lbin').value=+(nm/0.112985).toFixed(3);}
$('pa').oninput=()=>setPres(+$('pa').value,'pa');
$('kpa').oninput=()=>setPres(+$('kpa').value*1000,'kpa');
$('bar').oninput=()=>setPres(+$('bar').value*1e5,'bar');
$('psi').oninput=()=>setPres(+$('psi').value*6894.76,'psi');
$('atm').oninput=()=>setPres(+$('atm').value*101325,'atm');
$('n').oninput=()=>setForce(+$('n').value,'n');
$('kn').oninput=()=>setForce(+$('kn').value*1000,'kn');
$('kgf').oninput=()=>setForce(+$('kgf').value*9.80665,'kgf');
$('lbf').oninput=()=>setForce(+$('lbf').value*4.44822,'lbf');
$('nm').oninput=()=>setTorque(+$('nm').value,'nm');
$('kgm').oninput=()=>setTorque(+$('kgm').value*9.80665,'kgm');
$('lbft').oninput=()=>setTorque(+$('lbft').value*1.35582,'lbft');
$('lbin').oninput=()=>setTorque(+$('lbin').value*0.112985,'lbin');
setPres(100000);setForce(1000);setTorque(100);
</script>
</body>
</html>
