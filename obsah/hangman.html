<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🪢 Šibenice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:680px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:16px;font-weight:600;text-align:center}
.horni{display:flex;gap:10px;justify-content:center;align-items:center;margin-bottom:14px;flex-wrap:wrap}
select,button{background:#383838;border:1px solid #4a4a4a;color:#e0e0e0;border-radius:6px;padding:9px 14px;font-size:.88rem;cursor:pointer}
button.primary{background:#6aa6fd;border-color:#6aa6fd;color:#fff;font-weight:600}
.hra{display:flex;gap:20px;align-items:flex-start;justify-content:center;flex-wrap:wrap}
.sibenice{width:180px;flex-shrink:0}
.sibenice svg{width:100%}
.pravy{flex:1;min-width:280px}
.kategorie{text-align:center;color:#888;font-size:.85rem;margin-bottom:10px}
.kategorie b{color:#6aa6fd}
.slovo{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;min-height:44px}
.pismeno-box{width:32px;height:40px;border-bottom:3px solid #6aa6fd;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700}
.pismeno-box.mezera{border:none;width:16px}
.klavesnice{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.klavesnice button{width:38px;height:40px;padding:0;font-size:.95rem;font-weight:600}
.klavesnice button:hover:not(:disabled){background:#6aa6fd;color:#fff}
.klavesnice button:disabled{cursor:default}
.klavesnice button.trefa{background:#2e7d32;border-color:#2e7d32;color:#fff;opacity:.85}
.klavesnice button.vedle{background:#4a2020;border-color:#5a2a2a;color:#775;opacity:.6}
.stav{text-align:center;margin:14px 0;font-size:1.05rem;min-height:30px}
.stav.vyhra{color:#4caf50;font-weight:700}
.stav.prohra{color:#e67e22;font-weight:700}
.skore{text-align:center;color:#888;font-size:.83rem}
.skore b{color:#6aa6fd}
.zivoty{text-align:center;font-size:.85rem;color:#999;margin-bottom:8px}
</style>
</head>
<body>
<div class="container">
  <h1>🪢 Šibenice</h1>
  <div class="horni">
    <select id="kategorie">
      <option value="vse">🎲 Všechny kategorie</option>
      <option value="zvirata">🐾 Zvířata</option>
      <option value="mesta">🏙️ Česká města</option>
      <option value="jidlo">🍽️ Jídlo</option>
      <option value="sport">⚽ Sport</option>
      <option value="povolani">👷 Povolání</option>
      <option value="priroda">🌲 Příroda</option>
    </select>
    <button class="primary" id="nova">🔄 Nové slovo</button>
  </div>
  <div class="hra">
    <div class="sibenice">
      <svg viewBox="0 0 120 150">
        <line id="p1" x1="10" y1="145" x2="90" y2="145" stroke="#8b6f47" stroke-width="5" visibility="hidden"/>
        <line id="p2" x1="30" y1="145" x2="30" y2="15"  stroke="#8b6f47" stroke-width="5" visibility="hidden"/>
        <line id="p3" x1="28" y1="17" x2="85" y2="17"  stroke="#8b6f47" stroke-width="5" visibility="hidden"/>
        <line id="p4" x1="83" y1="15" x2="83" y2="38"  stroke="#aaa" stroke-width="3" visibility="hidden"/>
        <circle id="p5" cx="83" cy="50" r="12" stroke="#e0e0e0" stroke-width="3" fill="none" visibility="hidden"/>
        <line id="p6" x1="83" y1="62" x2="83" y2="100" stroke="#e0e0e0" stroke-width="3" visibility="hidden"/>
        <line id="p7" x1="83" y1="72" x2="65" y2="88"  stroke="#e0e0e0" stroke-width="3" visibility="hidden"/>
        <line id="p8" x1="83" y1="72" x2="101" y2="88" stroke="#e0e0e0" stroke-width="3" visibility="hidden"/>
        <line id="p9" x1="83" y1="100" x2="67" y2="126" stroke="#e0e0e0" stroke-width="3" visibility="hidden"/>
        <line id="p10" x1="83" y1="100" x2="99" y2="126" stroke="#e0e0e0" stroke-width="3" visibility="hidden"/>
      </svg>
      <div class="zivoty" id="zivoty"></div>
    </div>
    <div class="pravy">
      <div class="kategorie">Nápověda: <b id="napoveda">–</b></div>
      <div class="slovo" id="slovo"></div>
      <div class="klavesnice" id="klavesnice"></div>
      <div class="stav" id="stav"></div>
      <div class="skore">Výhry: <b id="vyhry">0</b> · Prohry: <b id="prohry">0</b></div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const SLOVA={
 zvirata:{nazev:'Zvířata',s:['VEVERKA','MEDVĚD','ŽIRAFA','VELBLOUD','JEŽEK','SLEPÝŠ','VYDRA','NETOPÝR','KROKODÝL','PAPOUŠEK','CHOBOTNICE','DELFÍN','TUČŇÁK','MRAVENEC','MOTÝL','SOVA','ORANGUTAN','HROCH','GEPARD','LEDNÍ MEDVĚD','KLOKAN','ŽELVA','ŠTIKA','ČÁP','VLAŠTOVKA','SÝKORA','JEZEVEC','RYS OSTROVID']},
 mesta:{nazev:'Česká města',s:['PRAHA','OSTRAVA','OLOMOUC','PLZEŇ','LIBEREC','PARDUBICE','HRADEC KRÁLOVÉ','ČESKÉ BUDĚJOVICE','KARLOVY VARY','JIHLAVA','ZLÍN','TŘEBÍČ','KROMĚŘÍŽ','TELČ','PÍSEK','TÁBOR','CHEB','ZNOJMO','MĚLNÍK','KUTNÁ HORA','ŽATEC','PŘEROV','ŠUMPERK','TRUTNOV','DOMAŽLICE']},
 jidlo:{nazev:'Jídlo a pití',s:['SVÍČKOVÁ','KNEDLÍK','GULÁŠ','PALAČINKA','BRAMBORÁK','ŘÍZEK','KOLÁČ','BUCHTA','ŠPAGETY','RAJČE','OKURKA','MRKEV','ČOČKA','BORŮVKA','MALINA','TVAROH','ROHLÍK','POLÉVKA','UTOPENEC','TRDELNÍK','ŠVESTKA','MERUŇKA','KVĚTÁK','ZELÍ','ČESNEK']},
 sport:{nazev:'Sport',s:['FOTBAL','HOKEJ','ATLETIKA','PLAVÁNÍ','CYKLISTIKA','GYMNASTIKA','LYŽOVÁNÍ','BIATLON','VOLEJBAL','BASKETBAL','FLORBAL','TENIS','BADMINTON','VESLOVÁNÍ','ŠERM','MARATON','SKOKY NA LYŽÍCH','HÁZENÁ','STOLNÍ TENIS','HOROLEZECTVÍ','KRASOBRUSLENÍ']},
 povolani:{nazev:'Povolání',s:['UČITEL','ZEDNÍK','KUCHAŘ','ŘIDIČ','ZAHRADNÍK','TRUHLÁŘ','ELEKTRIKÁŘ','ZDRAVOTNÍ SESTRA','HASIČ','POLICISTA','PRÁVNÍK','ARCHITEKT','VETERINÁŘ','PEKAŘ','KOMINÍK','ZEMĚDĚLEC','PROGRAMÁTOR','NOVINÁŘ','PILOT','LÉKÁRNÍK','VČELAŘ']},
 priroda:{nazev:'Příroda',s:['POTOK','VODOPÁD','JESKYNĚ','LOUKA','RYBNÍK','MECH','KAPRADÍ','BOROVICE','MODŘÍN','JAVOR','PAMPELIŠKA','KOPRETINA','BLEDULE','DUHA','BOUŘKA','JINOVATKA','ROSA','SKÁLA','ÚDOLÍ','PRAMEN','BAŽINA','VŘESOVIŠTĚ']}
};
const ABECEDA='AÁBCČDĎEÉĚFGHIÍJKLMNŇOÓPQRŘSŠTŤUÚŮVWXYÝZŽ'.split('');
const MAX=10;
const STORE='hangman.skore';

let slovo='',hadano=new Set(),chyby=0,konec=false;
let skore={v:0,p:0};
try{skore=JSON.parse(localStorage.getItem(STORE))||skore;}catch(e){}

function novaHra(){
  const kat=$('kategorie').value;
  const kandidati=kat==='vse'
    ?Object.entries(SLOVA).flatMap(([k,v])=>v.s.map(s=>({s,n:v.nazev})))
    :SLOVA[kat].s.map(s=>({s,n:SLOVA[kat].nazev}));
  const vyber=kandidati[Math.floor(Math.random()*kandidati.length)];
  slovo=vyber.s;
  $('napoveda').textContent=vyber.n;
  hadano=new Set();chyby=0;konec=false;
  $('stav').textContent='';$('stav').className='stav';
  vykresli();
}

function vykresli(){
  // slovo
  $('slovo').innerHTML=[...slovo].map(ch=>{
    if(ch===' ')return '<div class="pismeno-box mezera"></div>';
    const viditelne=hadano.has(ch)||konec;
    return `<div class="pismeno-box" style="${!hadano.has(ch)&&konec?'color:#e67e22':''}">${viditelne?ch:''}</div>`;
  }).join('');
  // šibenice
  for(let i=1;i<=MAX;i++)$('p'+i).setAttribute('visibility',i<=chyby?'visible':'hidden');
  $('zivoty').textContent='❤️ '.repeat(MAX-chyby)||'💀';
  // klávesnice
  $('klavesnice').innerHTML=ABECEDA.map(p=>{
    const pouzito=hadano.has(p);
    const cls=pouzito?(slovo.includes(p)?'trefa':'vedle'):'';
    return `<button data-p="${p}" class="${cls}" ${pouzito||konec?'disabled':''}>${p}</button>`;
  }).join('');
  $('klavesnice').querySelectorAll('button:not(:disabled)').forEach(b=>b.onclick=()=>hadej(b.dataset.p));
  $('vyhry').textContent=skore.v;$('prohry').textContent=skore.p;
}

function hadej(p){
  if(konec||hadano.has(p))return;
  hadano.add(p);
  if(!slovo.includes(p)){
    chyby++;
    if(chyby>=MAX){
      konec=true;skore.p++;localStorage.setItem(STORE,JSON.stringify(skore));
      $('stav').textContent='💀 Prohra! Slovo bylo: '+slovo;
      $('stav').classList.add('prohra');
    }
  }else{
    const vyhrano=[...slovo].every(ch=>ch===' '||hadano.has(ch));
    if(vyhrano){
      konec=true;skore.v++;localStorage.setItem(STORE,JSON.stringify(skore));
      $('stav').textContent='🎉 Výhra! Uhodl jsi: '+slovo;
      $('stav').classList.add('vyhra');
    }
  }
  vykresli();
}

document.addEventListener('keydown',e=>{
  const p=e.key.toUpperCase();
  if(ABECEDA.includes(p))hadej(p);
  if(e.key==='Enter'&&konec)novaHra();
});
$('nova').onclick=novaHra;
$('kategorie').onchange=novaHra;
novaHra();
</script>
</body>
</html>
