<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✖️ Procvičování násobilky</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
.setup{display:flex;gap:12px;flex-wrap:wrap;align-items:end;justify-content:center}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
select,input{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:11px 22px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.game{text-align:center;display:none}
.scorebar{display:flex;justify-content:space-around;margin-bottom:20px}
.scorebar .v{font-size:1.5rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.74rem;color:#888}
.question{font-size:3.5rem;font-weight:700;margin:20px 0}
.answer{font-size:2.5rem;width:200px;text-align:center;background:#1e1e1e;border:2px solid #555;border-radius:10px;color:#fff;padding:12px}
.answer.correct{border-color:#27ae60}.answer.wrong{border-color:#e74c3c}
.feedback{font-size:1.4rem;margin:16px 0;min-height:36px;font-weight:600}
.timer-bar{height:8px;background:#404040;border-radius:4px;overflow:hidden;margin-bottom:20px}
.timer-bar>div{height:100%;background:#6aa6fd;transition:width .1s linear}
.results{text-align:center;display:none}
.results .big{font-size:3rem;font-weight:700;color:#6aa6fd;margin:10px 0}
.star{font-size:2rem}
</style>
</head>
<body>
<div class="container">
  <h1>✖️ Procvičování násobilky</h1>
  <div class="card" id="setupCard">
    <div class="setup">
      <div><label>Rozsah</label><select id="range"><option value="5">do 5×5</option><option value="10" selected>malá násobilka (×10)</option><option value="20">velká (×20)</option></select></div>
      <div><label>Počet příkladů</label><select id="numQ"><option>10</option><option>20</option><option>30</option></select></div>
      <div><label>Operace</label><select id="op"><option value="x">Násobení ×</option><option value="d">Dělení ÷</option><option value="both">Obojí</option></select></div>
      <button class="btn" id="startBtn">▶️ Start</button>
    </div>
  </div>

  <div class="card game" id="gameCard">
    <div class="scorebar">
      <div><div class="v" id="qNum">1</div><div class="l">Příklad</div></div>
      <div><div class="v" id="correct">0</div><div class="l">Správně</div></div>
      <div><div class="v" id="streak">0</div><div class="l">Série 🔥</div></div>
    </div>
    <div class="timer-bar"><div id="timerFill" style="width:100%"></div></div>
    <div class="question" id="question">3 × 4</div>
    <input class="answer" id="answer" type="number" inputmode="numeric" autocomplete="off">
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="card results" id="resultsCard">
    <div class="star" id="stars"></div>
    <div class="big" id="finalScore"></div>
    <p style="color:#888" id="finalDetail"></p>
    <button class="btn" id="againBtn" style="margin-top:16px">🔄 Hrát znovu</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let questions=[],idx=0,correct=0,streak=0,timer,timeLeft;
function gen(){
  const max=+$('range').value,n=+$('numQ').value,op=$('op').value;
  questions=[];
  for(let i=0;i<n;i++){
    const a=1+Math.floor(Math.random()*max),b=1+Math.floor(Math.random()*max);
    let useDiv=op==='d'||(op==='both'&&Math.random()<0.5);
    if(useDiv)questions.push({text:`${a*b} ÷ ${a}`,ans:b});
    else questions.push({text:`${a} × ${b}`,ans:a*b});
  }
}
function start(){
  gen();idx=0;correct=0;streak=0;
  $('setupCard').style.display='none';$('resultsCard').style.display='none';$('gameCard').style.display='block';
  showQ();
}
function showQ(){
  if(idx>=questions.length){finish();return;}
  $('qNum').textContent=idx+1;$('correct').textContent=correct;$('streak').textContent=streak;
  $('question').textContent=questions[idx].text;
  $('answer').value='';$('answer').className='answer';$('answer').focus();$('feedback').textContent='';
  timeLeft=100;$('timerFill').style.width='100%';
  clearInterval(timer);timer=setInterval(()=>{timeLeft-=1;$('timerFill').style.width=timeLeft+'%';if(timeLeft<=0){clearInterval(timer);check(true);}},100);
}
function check(timeout){
  clearInterval(timer);
  const val=+$('answer').value;const ok=!timeout&&val===questions[idx].ans;
  if(ok){correct++;streak++;$('answer').className='answer correct';$('feedback').textContent='✅ Správně!';$('feedback').style.color='#27ae60';}
  else{streak=0;$('answer').className='answer wrong';$('feedback').textContent=(timeout?'⏰ Čas vypršel! ':'❌ ')+'Správně: '+questions[idx].ans;$('feedback').style.color='#e74c3c';}
  setTimeout(()=>{idx++;showQ();},900);
}
$('answer').addEventListener('keydown',e=>{if(e.key==='Enter'&&$('answer').value!=='')check(false);});
function finish(){
  clearInterval(timer);
  $('gameCard').style.display='none';$('resultsCard').style.display='block';
  const pct=Math.round(correct/questions.length*100);
  $('finalScore').textContent=correct+' / '+questions.length+' ('+pct+'%)';
  const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐':pct>=50?'⭐':'💪';
  $('stars').textContent=stars;
  $('finalDetail').textContent=pct>=90?'Výborně! Skvělý výsledek!':pct>=70?'Dobrá práce!':pct>=50?'Není to špatné, jen tak dál!':'Trénuj dál, zlepšíš se!';
}
$('startBtn').onclick=start;$('againBtn').onclick=()=>{$('setupCard').style.display='block';$('resultsCard').style.display='none';};
</script>
</body>
</html>
