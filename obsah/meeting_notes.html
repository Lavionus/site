<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗒️ Zápis z porady</title>
<link rel="stylesheet" href="../common.css">
<script>
  if (localStorage.getItem('webapp_theme') === 'light') document.documentElement.dataset.theme = 'light';
</script>
<style>
body{background:var(--bg-deep);padding:20px clamp(14px,3vw,40px);min-height:100vh}
.container{max-width:820px;margin:0 auto}
h1{font-size:1.5rem;margin-bottom:4px}
.sub{color:var(--text-muted);font-size:.85rem;margin-bottom:18px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.btn{background:var(--bg-control);color:var(--text);border:1px solid var(--border-strong);padding:8px 14px;border-radius:6px;cursor:pointer;font-size:.85rem}
.btn:hover{background:var(--bg-hover)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.card{background:var(--bg-panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:16px}
.card h2{font-size:.85rem;color:var(--accent);margin-bottom:10px;text-transform:uppercase;letter-spacing:.5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
label{display:block;font-size:.75rem;color:var(--text-faint);margin-bottom:4px}
input,textarea{width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px;font-family:inherit;font-size:.9rem}
textarea{resize:vertical;min-height:70px}
.attendees{margin-top:10px}
.attendees .list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{background:var(--accent-soft);color:var(--accent);border-radius:14px;padding:4px 10px;font-size:.8rem;display:flex;align-items:center;gap:6px}
.chip button{background:none;border:none;color:var(--accent);cursor:pointer;font-size:.8rem}
.addrow{display:flex;gap:8px;margin-top:8px}
.addrow input{flex:1}
.points{display:flex;flex-direction:column;gap:8px}
.point{display:flex;gap:8px;align-items:flex-start}
.point textarea{flex:1;min-height:40px}
.point .del{background:none;border:none;color:var(--danger);cursor:pointer;font-size:1rem;padding-top:6px}
.actions-table{width:100%;border-collapse:collapse}
.actions-table th{text-align:left;font-size:.72rem;color:var(--text-faint);padding-bottom:6px}
.actions-table td{padding:5px 4px}
.actions-table input{font-size:.85rem}
@media print{
  .toolbar,#navScript{display:none!important}
  body{background:#fff;color:#000;padding:0}
  .card{background:#fff;border:1px solid #ccc;break-inside:avoid}
  .card h2{color:#000}
  input,textarea{background:#fff;color:#000;border:1px solid #999}
}
</style>
</head>
<body>
<div class="container">
  <h1>🗒️ Zápis z porady</h1>
  <p class="sub">Vyplň agendu a body jednání, přidej úkoly s termíny, vytiskni nebo ulož jako PDF.</p>

  <div class="toolbar">
    <button class="btn primary" id="btnPrint">🖨️ Tisk / PDF</button>
    <button class="btn" id="btnSave">💾 Uložit</button>
    <button class="btn" id="btnNew">🗑️ Nový zápis</button>
  </div>

  <div class="card">
    <h2>Základní údaje</h2>
    <div class="grid2">
      <div><label>Název porady</label><input id="title" placeholder="Týdenní porada týmu"></div>
      <div><label>Datum a čas</label><input id="datetime" type="datetime-local"></div>
      <div><label>Místo / odkaz na hovor</label><input id="place" placeholder="Zasedačka 2 / Meet link"></div>
      <div><label>Zapsal(a)</label><input id="author" placeholder="Jméno"></div>
    </div>
    <div class="attendees">
      <label>Účastníci</label>
      <div class="addrow"><input id="attendeeInput" placeholder="Jméno účastníka…"><button class="btn" id="btnAddAttendee">+ Přidat</button></div>
      <div class="list" id="attendeeList"></div>
    </div>
  </div>

  <div class="card">
    <h2>Body jednání</h2>
    <div class="points" id="points"></div>
    <button class="btn" id="btnAddPoint" style="margin-top:10px">+ Přidat bod</button>
  </div>

  <div class="card">
    <h2>Úkoly a termíny</h2>
    <table class="actions-table">
      <thead><tr><th>Úkol</th><th>Zodpovídá</th><th>Termín</th><th></th></tr></thead>
      <tbody id="actionsBody"></tbody>
    </table>
    <button class="btn" id="btnAddAction" style="margin-top:10px">+ Přidat úkol</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const STORAGE_KEY='meeting_notes_v1';

let state={title:'',datetime:'',place:'',author:'',attendees:[],points:[''],actions:[{task:'',who:'',due:''}]};

function load(){
  const raw=localStorage.getItem(STORAGE_KEY);
  if(raw){try{state=JSON.parse(raw);}catch(e){}}
  $('title').value=state.title||'';
  $('datetime').value=state.datetime||'';
  $('place').value=state.place||'';
  $('author').value=state.author||'';
  renderAttendees();
  renderPoints();
  renderActions();
}

function save(){
  state.title=$('title').value;
  state.datetime=$('datetime').value;
  state.place=$('place').value;
  state.author=$('author').value;
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}

function renderAttendees(){
  $('attendeeList').innerHTML=state.attendees.map((a,i)=>`<span class="chip">${escHtml(a)}<button data-i="${i}">✕</button></span>`).join('');
  $('attendeeList').querySelectorAll('button').forEach(b=>b.onclick=()=>{state.attendees.splice(+b.dataset.i,1);renderAttendees();save();});
}
$('btnAddAttendee').onclick=()=>{
  const v=$('attendeeInput').value.trim();
  if(!v)return;
  state.attendees.push(v);
  $('attendeeInput').value='';
  renderAttendees();save();
};
$('attendeeInput').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();$('btnAddAttendee').click();}});

function renderPoints(){
  $('points').innerHTML=state.points.map((p,i)=>`
    <div class="point">
      <textarea data-i="${i}" placeholder="Bod jednání, diskuze, závěr…">${escHtml(p)}</textarea>
      <button class="del" data-del="${i}">✕</button>
    </div>`).join('');
  $('points').querySelectorAll('textarea').forEach(t=>t.oninput=()=>{state.points[+t.dataset.i]=t.value;save();});
  $('points').querySelectorAll('.del').forEach(b=>b.onclick=()=>{state.points.splice(+b.dataset.del,1);if(!state.points.length)state.points=[''];renderPoints();save();});
}
$('btnAddPoint').onclick=()=>{state.points.push('');renderPoints();save();};

function renderActions(){
  $('actionsBody').innerHTML=state.actions.map((a,i)=>`
    <tr>
      <td><input data-f="task" data-i="${i}" value="${escAttr(a.task)}" placeholder="Co je třeba udělat"></td>
      <td><input data-f="who" data-i="${i}" value="${escAttr(a.who)}" placeholder="Jméno" style="width:110px"></td>
      <td><input data-f="due" data-i="${i}" type="date" value="${escAttr(a.due)}" style="width:140px"></td>
      <td><button class="del" data-del="${i}">✕</button></td>
    </tr>`).join('');
  $('actionsBody').querySelectorAll('input').forEach(inp=>inp.oninput=()=>{state.actions[+inp.dataset.i][inp.dataset.f]=inp.value;save();});
  $('actionsBody').querySelectorAll('.del').forEach(b=>b.onclick=()=>{state.actions.splice(+b.dataset.del,1);if(!state.actions.length)state.actions=[{task:'',who:'',due:''}];renderActions();save();});
}
$('btnAddAction').onclick=()=>{state.actions.push({task:'',who:'',due:''});renderActions();save();};

['title','datetime','place','author'].forEach(id=>$(id).oninput=save);

$('btnPrint').onclick=()=>{save();window.print();};
$('btnSave').onclick=()=>{save();$('btnSave').textContent='✅ Uloženo';setTimeout(()=>$('btnSave').textContent='💾 Uložit',1200);};
$('btnNew').onclick=()=>{
  if(!confirm('Založit nový zápis? Neuložené změny v tomto se ztratí.'))return;
  state={title:'',datetime:'',place:'',author:'',attendees:[],points:[''],actions:[{task:'',who:'',due:''}]};
  save();load();
};

function escHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return escHtml(s).replace(/"/g,'&quot;');}

load();
</script>
</body>
</html>
