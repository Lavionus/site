<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔢 Převodník číselných soustav</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:720px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:16px}
.row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.row label{width:130px;font-size:.9rem;color:#bbb}
.row input{flex:1;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#6aa6fd;padding:12px;font-family:monospace;font-size:1.1rem}
.row .copy{background:#404040;border:1px solid #555;color:#bbb;border-radius:6px;padding:12px 14px;cursor:pointer}
.row .copy:hover{background:#4a4a4a}
.custom{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.custom input[type=number]{width:80px;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.bits{font-family:monospace;font-size:1rem;background:#1e1e1e;border-radius:8px;padding:14px;word-break:break-all;line-height:2}
.bit{display:inline-block;width:26px;text-align:center;cursor:pointer;border-radius:4px;padding:2px 0}
.bit.on{background:#6aa6fd;color:#fff}.bit.off{background:#333;color:#888}
.err{color:#e74c3c;font-size:.85rem;text-align:center}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:10px 18px;border-radius:6px;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <h1>🔢 Převodník číselných soustav</h1>
  <div class="card">
    <div class="row"><label>Dvojková (BIN)</label><input id="bin" data-base="2" spellcheck="false"><button class="copy" data-c="bin">📋</button></div>
    <div class="row"><label>Osmičková (OCT)</label><input id="oct" data-base="8" spellcheck="false"><button class="copy" data-c="oct">📋</button></div>
    <div class="row"><label>Desítková (DEC)</label><input id="dec" data-base="10" spellcheck="false"><button class="copy" data-c="dec">📋</button></div>
    <div class="row"><label>Šestnáctková (HEX)</label><input id="hex" data-base="16" spellcheck="false"><button class="copy" data-c="hex">📋</button></div>
    <div class="custom"><label style="color:#888;font-size:.85rem">Vlastní soustava:</label><input type="number" id="customBase" min="2" max="36" value="3"><span style="color:#888">→</span><input id="custom" spellcheck="false" style="flex:1;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#6aa6fd;padding:10px;font-family:monospace"></div>
    <div class="err" id="err"></div>
  </div>
  <div class="card">
    <h2>Bitová reprezentace (klikni pro přepnutí)</h2>
    <div class="bits" id="bits"></div>
    <p style="font-size:.78rem;color:#666;margin-top:10px">Zobrazeno jako 32bitové celé číslo bez znaménka.</p>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
let value=255n;
function render(except){
  if(except!=='bin')$('bin').value=value.toString(2);
  if(except!=='oct')$('oct').value=value.toString(8);
  if(except!=='dec')$('dec').value=value.toString(10);
  if(except!=='hex')$('hex').value=value.toString(16).toUpperCase();
  if(except!=='custom')$('custom').value=value.toString(+$('customBase').value);
  renderBits();
}
function renderBits(){
  const v=value&0xFFFFFFFFn;let html='';
  for(let i=31;i>=0;i--){const on=(v>>BigInt(i))&1n;
    html+=`<span class="bit ${on?'on':'off'}" data-i="${i}">${on}</span>`;
    if(i%8===0&&i>0)html+=' ';
  }
  $('bits').innerHTML=html;
  $('bits').querySelectorAll('.bit').forEach(b=>b.onclick=()=>{value^=(1n<<BigInt(b.dataset.i));render();});
}
function parse(str,base){str=str.trim();if(!str){value=0n;render();return;}
  try{
    let v=0n;const bb=BigInt(base);
    for(const ch of str.toLowerCase()){const d=parseInt(ch,base);if(isNaN(d))throw 0;v=v*bb+BigInt(d);}
    value=v;$('err').textContent='';render(arguments[2]);
  }catch(e){$('err').textContent='⚠️ Neplatná číslice pro danou soustavu';}
}
['bin','oct','dec','hex'].forEach(id=>$(id).oninput=()=>parse($(id).value,+$(id).dataset.base,id));
$('custom').oninput=()=>parse($('custom').value,+$('customBase').value,'custom');
$('customBase').oninput=()=>render();
document.querySelectorAll('.copy').forEach(b=>b.onclick=()=>{const v=$(b.dataset.c).value;navigator.clipboard.writeText(v);const t=$('toast');t.textContent='Zkopírováno: '+v;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1100);});
render();
</script>
</body>
</html>
