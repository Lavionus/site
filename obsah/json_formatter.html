<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🗂️ JSON formatter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1300px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:14px;font-weight:600;text-align:center}
.toolbar{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 15px;border-radius:6px;cursor:pointer;font-size:.84rem;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:8px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:820px){.grid{grid-template-columns:1fr}}
.panel{background:#2a2a2a;border:1px solid #404040;border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.panel h2{font-size:.82rem;color:#6aa6fd;padding:10px 14px;background:#333;border-bottom:1px solid #404040;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between}
textarea{flex:1;min-height:480px;background:#1e1e1e;border:none;color:#e0e0e0;padding:14px;font-family:'SF Mono',Consolas,monospace;font-size:.88rem;resize:none;line-height:1.5}
textarea:focus{outline:none}
.output{flex:1;min-height:480px;padding:14px;overflow:auto;font-family:'SF Mono',Consolas,monospace;font-size:.88rem;line-height:1.5;white-space:pre}
.status{text-align:center;padding:8px;font-size:.88rem;min-height:32px}
.status.ok{color:#27ae60}.status.err{color:#e74c3c}
.k{color:#6aa6fd}.s{color:#a5d6a7}.n{color:#f39c12}.b{color:#ce93d8}.nu{color:#888}
</style>
</head>
<body>
<div class="container">
  <h1>🗂️ JSON formatter / validátor</h1>
  <div class="toolbar">
    <button class="btn" id="formatBtn">✨ Formátovat</button>
    <button class="btn btn-sec" id="minifyBtn">🗜️ Minifikovat</button>
    <select id="indent"><option value="2">2 mezery</option><option value="4">4 mezery</option><option value="tab">Tabulátor</option></select>
    <button class="btn btn-sec" id="copyBtn">📋 Kopírovat</button>
    <button class="btn btn-sec" id="sampleBtn">📄 Vzorek</button>
    <button class="btn btn-sec" id="clearBtn">🗑️ Vyčistit</button>
  </div>
  <div class="status" id="status"></div>
  <div class="grid">
    <div class="panel"><h2>Vstup</h2><textarea id="input" placeholder='Vlož JSON: {"klic":"hodnota"}'></textarea></div>
    <div class="panel"><h2>Výstup <span id="stats"></span></h2><div class="output" id="output"></div></div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
function getIndent(){const v=$('indent').value;return v==='tab'?'\t':+v;}
function syntaxHighlight(json){
  return json.replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
    m=>{let c='n';if(/^"/.test(m)){c=/:$/.test(m)?'k':'s';}else if(/true|false/.test(m))c='b';else if(/null/.test(m))c='nu';return`<span class="${c}">${m}</span>`;});
}
function process(action){
  const raw=$('input').value.trim();
  if(!raw){$('output').innerHTML='';$('status').textContent='';$('stats').textContent='';return;}
  try{
    const obj=JSON.parse(raw);
    const out=action==='min'?JSON.stringify(obj):JSON.stringify(obj,null,getIndent());
    $('output').innerHTML=syntaxHighlight(out);
    $('status').className='status ok';$('status').textContent='✅ Platný JSON';
    const count=o=>{let n=0;if(Array.isArray(o)){n+=o.length;o.forEach(x=>n+=count(x));}else if(o&&typeof o==='object'){const k=Object.keys(o);n+=k.length;k.forEach(key=>n+=count(o[key]));}return n;};
    $('stats').textContent=`${out.length} znaků`;
    $('output').dataset.raw=out;
  }catch(e){
    $('status').className='status err';
    const m=e.message.match(/position (\d+)/);
    let pos='';if(m){const p=+m[1];const before=raw.slice(0,p);const line=before.split('\n').length;pos=` (řádek ${line})`;}
    $('status').textContent='❌ Chyba: '+e.message+pos;
  }
}
$('formatBtn').onclick=()=>process('fmt');
$('minifyBtn').onclick=()=>process('min');
$('input').oninput=()=>process('fmt');
$('indent').onchange=()=>process('fmt');
$('copyBtn').onclick=()=>{const t=$('output').dataset.raw||'';navigator.clipboard.writeText(t);$('copyBtn').textContent='✅';setTimeout(()=>$('copyBtn').textContent='📋 Kopírovat',1000);};
$('clearBtn').onclick=()=>{$('input').value='';process('fmt');};
$('sampleBtn').onclick=()=>{$('input').value=JSON.stringify({jmeno:"Farma Zelený statek",zalozeno:1998,bio:true,plodiny:["pšenice","řepka","kukuřice"],kontakt:{email:"info@example.cz",telefon:null},vymery_ha:{orna:245.5,louky:38}});process('fmt');};
$('sampleBtn').onclick();
</script>
</body>
</html>
