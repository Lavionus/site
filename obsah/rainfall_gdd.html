<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌧️ Srážky &amp; GDD</title>
<script src="lib/chart.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:960px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.tabs{display:flex;margin-bottom:18px;border-bottom:1px solid #404040}
.tab{padding:11px 22px;background:#2a2a2a;border:1px solid #404040;border-bottom:none;cursor:pointer;color:#bbb;border-radius:8px 8px 0 0}
.tab.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
.pane{display:none}.pane.active{display:block}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:14px}
.form{display:flex;gap:10px;flex-wrap:wrap;align-items:end}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
input{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}
.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
table{width:100%;border-collapse:collapse;font-size:.9rem;margin-top:12px}
th{text-align:left;color:#888;padding:6px 8px;font-size:.78rem;text-transform:uppercase}
td{padding:8px;border-bottom:1px solid #333}
.del{background:none;border:none;color:#c0392b;cursor:pointer}
.big{font-size:2rem;font-weight:700;color:#4caf50;text-align:center}
.stat-row{display:flex;justify-content:space-around;text-align:center;margin-bottom:10px}
.stat .v{font-size:1.5rem;font-weight:700;color:#6aa6fd}.stat .l{font-size:.76rem;color:#888}
.note{font-size:.78rem;color:#666;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <h1>🌧️ Evidence srážek &amp; sumace teplot (GDD)</h1>
  <div class="tabs">
    <div class="tab active" data-pane="rain">🌧️ Srážky</div>
    <div class="tab" data-pane="gdd">🌡️ GDD</div>
  </div>

  <div class="pane active" id="rain">
    <div class="card">
      <h2>Přidat měření srážek</h2>
      <div class="form">
        <div><label>Datum</label><input type="date" id="rDate"></div>
        <div><label>Srážky (mm)</label><input type="number" id="rMm" value="0" min="0" step="0.1"></div>
        <button class="btn" id="rAdd">Přidat</button>
      </div>
    </div>
    <div class="card">
      <div class="stat-row">
        <div class="stat"><div class="v" id="rSum">0</div><div class="l">Celkem (mm)</div></div>
        <div class="stat"><div class="v" id="rDays">0</div><div class="l">Dní s deštěm</div></div>
        <div class="stat"><div class="v" id="rMax">0</div><div class="l">Max za den (mm)</div></div>
      </div>
      <canvas id="rChart" height="110"></canvas>
      <table id="rTable"></table>
    </div>
  </div>

  <div class="pane" id="gdd">
    <div class="card">
      <h2>Výpočet sumy efektivních teplot</h2>
      <p style="color:#888;font-size:.88rem;margin-bottom:12px">GDD = max(0, (T<sub>max</sub>+T<sub>min</sub>)/2 − T<sub>báze</sub>). Báze: kukuřice 10 °C, obiloviny 5 °C.</p>
      <div class="form">
        <div><label>Datum</label><input type="date" id="gDate"></div>
        <div><label>T min (°C)</label><input type="number" id="gMin" value="8" step="0.1"></div>
        <div><label>T max (°C)</label><input type="number" id="gMax" value="20" step="0.1"></div>
        <div><label>Báze (°C)</label><input type="number" id="gBase" value="10" step="0.5"></div>
        <button class="btn" id="gAdd">Přidat den</button>
      </div>
    </div>
    <div class="card">
      <div class="big" id="gSum">0 GDD</div>
      <p style="text-align:center;color:#888;margin-bottom:10px">kumulativní suma</p>
      <canvas id="gChart" height="110"></canvas>
      <table id="gTable"></table>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const today=new Date().toISOString().slice(0,10);
$('rDate').value=today;$('gDate').value=today;
let rain=JSON.parse(localStorage.getItem('agri_rain')||'[]');
let gdd=JSON.parse(localStorage.getItem('agri_gdd')||'[]');
const saveR=()=>localStorage.setItem('agri_rain',JSON.stringify(rain));
const saveG=()=>localStorage.setItem('agri_gdd',JSON.stringify(gdd));
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');$(t.dataset.pane).classList.add('active');
});
let rChart,gChart;
$('rAdd').onclick=()=>{rain.push({date:$('rDate').value,mm:+$('rMm').value});rain.sort((a,b)=>a.date.localeCompare(b.date));saveR();renderRain();};
function renderRain(){
  $('rSum').textContent=rain.reduce((s,r)=>s+r.mm,0).toFixed(1);
  $('rDays').textContent=rain.filter(r=>r.mm>0).length;
  $('rMax').textContent=rain.length?Math.max(...rain.map(r=>r.mm)).toFixed(1):0;
  $('rTable').innerHTML='<tr><th>Datum</th><th>mm</th><th></th></tr>'+rain.slice().reverse().map((r,i)=>`<tr><td>${r.date}</td><td>${r.mm}</td><td><button class="del" data-i="${rain.length-1-i}" data-t="r">🗑️</button></td></tr>`).join('');
  bindDel();
  const ctx=$('rChart');if(rChart)rChart.destroy();
  rChart=new Chart(ctx,{type:'bar',data:{labels:rain.map(r=>r.date.slice(5)),datasets:[{label:'mm',data:rain.map(r=>r.mm),backgroundColor:'#6aa6fd'}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888'},grid:{color:'#333'}},y:{ticks:{color:'#888'},grid:{color:'#333'}}}}});
}
$('gAdd').onclick=()=>{const v=Math.max(0,(+$('gMax').value+ +$('gMin').value)/2-+$('gBase').value);gdd.push({date:$('gDate').value,gdd:+v.toFixed(1),base:+$('gBase').value});gdd.sort((a,b)=>a.date.localeCompare(b.date));saveG();renderGdd();};
function renderGdd(){
  let cum=0;const cumData=gdd.map(g=>{cum+=g.gdd;return +cum.toFixed(1);});
  $('gSum').textContent=cum.toFixed(0)+' GDD';
  $('gTable').innerHTML='<tr><th>Datum</th><th>GDD/den</th><th>Kumulativně</th><th></th></tr>'+gdd.map((g,i)=>`<tr><td>${g.date}</td><td>${g.gdd}</td><td>${cumData[i]}</td><td><button class="del" data-i="${i}" data-t="g">🗑️</button></td></tr>`).reverse().join('');
  bindDel();
  const ctx=$('gChart');if(gChart)gChart.destroy();
  gChart=new Chart(ctx,{type:'line',data:{labels:gdd.map(g=>g.date.slice(5)),datasets:[{label:'Kumulativní GDD',data:cumData,borderColor:'#4caf50',backgroundColor:'rgba(76,175,80,.15)',fill:true,tension:.2}]},options:{plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#888'},grid:{color:'#333'}},y:{ticks:{color:'#888'},grid:{color:'#333'}}}}});
}
function bindDel(){document.querySelectorAll('.del').forEach(b=>b.onclick=()=>{
  if(b.dataset.t==='r'){rain.splice(+b.dataset.i,1);saveR();renderRain();}
  else{gdd.splice(+b.dataset.i,1);saveG();renderGdd();}
});}
renderRain();renderGdd();
</script>
</body>
</html>
