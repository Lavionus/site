<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 Generátor protokolů</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1000px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:6px;font-weight:600;text-align:center}
.sub{text-align:center;color:#888;font-size:.85rem;margin-bottom:18px}
.layout{display:flex;gap:20px;flex-wrap:wrap}
.form-col{flex:1;min-width:320px}
.preview-col{flex:1;min-width:320px}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px;margin-top:10px}
label:first-child{margin-top:0}
input,select,textarea{width:100%;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:9px 12px;font-size:.88rem;font-family:inherit}
textarea{resize:vertical;min-height:60px}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>div{flex:1;min-width:140px}
.btn{margin-top:16px;padding:10px 18px;background:#6aa6fd;border:none;border-radius:6px;color:#fff;font-weight:600;cursor:pointer;font-size:.9rem}
.btn:hover{background:#5a92e6}
.btn.sec{background:#404040;color:#bbb}
.btn.sec:hover{background:#4a4a4a}
.preview{background:#fff;color:#111;border-radius:6px;padding:30px;font-size:.85rem;line-height:1.5;min-height:400px}
.preview h3{text-align:center;font-size:1.05rem;margin-bottom:4px}
.preview .sub2{text-align:center;font-size:.78rem;color:#555;margin-bottom:18px}
.preview .field{margin-bottom:8px}
.preview .field b{display:inline-block;min-width:150px}
.preview hr{border:none;border-top:1px solid #ccc;margin:14px 0}
.preview .body{white-space:pre-wrap;margin:14px 0}
.preview .sign{display:flex;justify-content:space-between;margin-top:50px;font-size:.8rem}
.preview .sign div{border-top:1px solid #333;padding-top:4px;width:45%;text-align:center}
.note{font-size:.78rem;color:#666;margin-top:8px}
@media print{
  body{background:#fff;color:#000;padding:0}
  .form-col,h1,.sub,.note{display:none}
  .layout{display:block}
  .preview-col{min-width:0}
  .preview{padding:0}
}
</style>
</head>
<body>
<div class="container">
  <h1>📝 Generátor protokolů</h1>
  <p class="sub">Vyplň formulář vlevo, náhled vpravo se generuje průběžně. Vše zůstává jen v tomto prohlížeči.</p>

  <div class="layout">
    <div class="form-col">
      <div class="card">
        <h2>Typ protokolu</h2>
        <select id="fTemplate">
          <option value="ohledani">Protokol o ohledání místa činu</option>
          <option value="vyslech">Protokol o výslechu svědka</option>
          <option value="zajisteni">Protokol o zajištění věci</option>
        </select>

        <label>Číslo jednací / ČVS</label>
        <input id="fCislo" placeholder="ČVS: KRPA-1234/TČ-2026">
        <div class="row">
          <div><label>Datum</label><input id="fDatum" type="date"></div>
          <div><label>Čas</label><input id="fCas" type="time"></div>
        </div>
        <label>Místo úkonu</label>
        <input id="fMisto" placeholder="adresa / popis místa">
        <label>Sepsal (jméno, hodnost, útvar)</label>
        <input id="fSepsal">

        <div id="dynFields"></div>

        <label>Obsah / popis průběhu úkonu</label>
        <textarea id="fObsah" style="min-height:140px" placeholder="Volný popis průběhu…"></textarea>

        <label>Přítomné osoby</label>
        <textarea id="fOsoby" placeholder="jméno – role (jedna na řádek)"></textarea>
      </div>
      <button class="btn sec" id="btnPrint">🖨️ Tisk / export PDF</button>
    </div>

    <div class="preview-col">
      <div class="card" style="padding:0;background:transparent;border:none">
        <div class="preview" id="preview"></div>
      </div>
    </div>
  </div>
  <p class="note">Šablona je obecná organizační pomůcka — před použitím ověř soulad s aktuálně platnými formuláři a předpisy.</p>
</div>

<script>
const $=id=>document.getElementById(id);

const TEMPLATES={
  ohledani:{
    title:'PROTOKOL O OHLEDÁNÍ MÍSTA ČINU',
    extra:[
      {id:'fPovaha',label:'Povaha / druh trestné činnosti',ph:'např. vloupání do objektu'},
      {id:'fRozsah',label:'Rozsah ohledaného prostoru'}
    ]
  },
  vyslech:{
    title:'PROTOKOL O VÝSLECHU SVĚDKA',
    extra:[
      {id:'fSvedek',label:'Jméno a příjmení svědka'},
      {id:'fNarozeni',label:'Datum narození svědka'},
      {id:'fPouceni',label:'Poučení provedeno dle', ph:'§ ... trestního řádu'}
    ]
  },
  zajisteni:{
    title:'PROTOKOL O ZAJIŠTĚNÍ VĚCI',
    extra:[
      {id:'fVec',label:'Popis zajištěné věci'},
      {id:'fOd',label:'Zajištěno od (osoba/místo)'},
      {id:'fDuvod',label:'Důvod zajištění'}
    ]
  }
};

function renderDynFields(){
  const tpl=TEMPLATES[$('fTemplate').value];
  const wrap=$('dynFields');
  wrap.innerHTML='';
  tpl.extra.forEach(f=>{
    const lab=document.createElement('label');
    lab.textContent=f.label;
    const inp=document.createElement(f.id==='fVec'?'textarea':'input');
    inp.id=f.id;
    if(f.ph)inp.placeholder=f.ph;
    inp.addEventListener('input',renderPreview);
    wrap.appendChild(lab);
    wrap.appendChild(inp);
  });
}

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}

function renderPreview(){
  const tpl=TEMPLATES[$('fTemplate').value];
  const datum=$('fDatum').value?new Date($('fDatum').value).toLocaleDateString('cs-CZ'):'…';
  let html=`<h3>${esc(tpl.title)}</h3><div class="sub2">${esc($('fCislo').value)||'č.j. …'}</div>`;
  html+=`<div class="field"><b>Datum a čas úkonu:</b> ${datum} ${esc($('fCas').value)||''}</div>`;
  html+=`<div class="field"><b>Místo úkonu:</b> ${esc($('fMisto').value)||'…'}</div>`;
  html+=`<div class="field"><b>Sepsal:</b> ${esc($('fSepsal').value)||'…'}</div>`;
  tpl.extra.forEach(f=>{
    const el=$(f.id);
    if(el)html+=`<div class="field"><b>${esc(f.label)}:</b> ${esc(el.value)||'…'}</div>`;
  });
  html+=`<hr><div class="field"><b>Přítomné osoby:</b></div><div class="body">${esc($('fOsoby').value)||'—'}</div>`;
  html+=`<hr><div class="field"><b>Obsah:</b></div><div class="body">${esc($('fObsah').value)||'…'}</div>`;
  html+=`<div class="sign"><div>podpis sepisujícího</div><div>podpis přítomné osoby</div></div>`;
  $('preview').innerHTML=html;
}

['fCislo','fDatum','fCas','fMisto','fSepsal','fObsah','fOsoby'].forEach(id=>{
  $(id).addEventListener('input',renderPreview);
});
$('fTemplate').addEventListener('change',()=>{renderDynFields();renderPreview();});
$('btnPrint').onclick=()=>window.print();

renderDynFields();
renderPreview();
</script>
</body>
</html>
