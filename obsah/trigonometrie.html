<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📐 Trigonometrie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:560px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:16px}
.formulas{font-size:.85rem;color:#999;text-align:center;margin-bottom:16px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 28px;border-radius:6px;cursor:pointer;font-weight:600;display:block;margin:0 auto}
.btn:hover{background:#5694f0}
.scorebar{display:flex;justify-content:space-around;margin-bottom:18px}
.scorebar .v{font-size:1.5rem;font-weight:700;color:#6aa6fd}.scorebar .l{font-size:.72rem;color:#888}
.game,.results{display:none;text-align:center}
svg{margin:10px 0}
.question{font-size:1.1rem;margin:10px 0}
.answer{font-size:1.6rem;width:160px;text-align:center;background:#1e1e1e;border:2px solid #555;border-radius:10px;color:#fff;padding:10px}
.answer.correct{border-color:#27ae60}.answer.wrong{border-color:#e74c3c}
.feedback{font-size:1.1rem;margin:14px 0;min-height:32px;font-weight:600}
.results .big{font-size:2.4rem;font-weight:700;color:#6aa6fd}
</style>
</head>
<body>
<div class="container">
  <h1>📐 Trigonometrie pravoúhlého trojúhelníku</h1>
  <div class="card" id="setupCard">
    <div class="formulas">sin α = protilehlá/přepona &nbsp;·&nbsp; cos α = přilehlá/přepona &nbsp;·&nbsp; tg α = protilehlá/přilehlá</div>
    <button class="btn" id="startBtn">▶️ Start</button>
  </div>

  <div class="card game" id="gameCard">
    <div class="scorebar">
      <div><div class="v" id="score">0</div><div class="l">Správně</div></div>
      <div><div class="v" id="idx">0/10</div><div class="l">Příklad</div></div>
    </div>
    <svg id="tri" width="260" height="180" viewBox="0 0 260 180"></svg>
    <div class="question" id="question"></div>
    <input class="answer" id="answer" type="number" step="0.1">
    <div class="feedback" id="feedback"></div>
  </div>

  <div class="card results" id="resultsCard">
    <div class="big" id="finalScore"></div>
    <p style="color:#888" id="finalDetail"></p>
    <button class="btn" id="againBtn" style="margin-top:14px">🔄 Znovu</button>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let score,idx,total=10,answer;
function draw(a,b,c,angleLabel,unknownLabel){
  const svg=$('tri');
  const scale=Math.min(200/Math.max(a,1),120/Math.max(b,1));
  const x0=30,y0=160;
  const px=x0+a*scale,py=y0;
  const tx=x0,ty=y0-b*scale;
  svg.innerHTML=`
    <polygon points="${x0},${y0} ${px},${py} ${tx},${ty}" fill="#333" stroke="#6aa6fd" stroke-width="2"/>
    <text x="${(x0+px)/2}" y="${y0+18}" fill="#e0e0e0" font-size="13" text-anchor="middle">${angleLabel==='a'?'a = ?':'a'}</text>
    <text x="${x0-18}" y="${(y0+ty)/2}" fill="#e0e0e0" font-size="13" text-anchor="middle">${angleLabel==='b'?'b = ?':'b'}</text>
    <text x="${(px+tx)/2+18}" y="${(py+ty)/2-6}" fill="#e0e0e0" font-size="13" text-anchor="middle">${angleLabel==='c'?'c = ?':'c'}</text>
    <path d="M ${x0+18},${y0} A 18 18 0 0 1 ${x0+18*Math.cos(Math.atan2(ty-y0,tx-x0+0.001))},${y0-18*Math.sin(0.001)}" fill="none"/>
    <text x="${x0+34}" y="${y0-14}" fill="#f5c542" font-size="14">α</text>
  `;
}
function round1(n){return Math.round(n*10)/10;}
function gen(){
  const alphaDeg=20+Math.floor(Math.random()*50);
  const alpha=alphaDeg*Math.PI/180;
  const c=round1(8+Math.random()*12);
  const a=round1(c*Math.sin(alpha));
  const b=round1(c*Math.cos(alpha));
  const which=['a','b','c'][Math.floor(Math.random()*3)];
  draw(a,b,c,which,which);
  if(which==='a'){answer=a;$('question').textContent=`Trojúhelník má přeponu c = ${c} a úhel α = ${alphaDeg}°. Vypočti stranu a (protilehlou) — a = c · sin α. Zaokrouhli na 1 des. místo.`;}
  else if(which==='b'){answer=b;$('question').textContent=`Trojúhelník má přeponu c = ${c} a úhel α = ${alphaDeg}°. Vypočti stranu b (přilehlou) — b = c · cos α. Zaokrouhli na 1 des. místo.`;}
  else{answer=c;$('question').textContent=`Trojúhelník má odvěsnu a = ${a} a úhel α = ${alphaDeg}°. Vypočti přeponu c — c = a / sin α. Zaokrouhli na 1 des. místo.`;}
  $('answer').value='';$('answer').className='answer';$('answer').focus();
}
function check(){
  const v=parseFloat(($('answer').value||'').replace(',','.'));
  const ok=Math.abs(v-answer)<=0.3;
  if(ok){$('answer').className='answer correct';score++;$('feedback').textContent='✅';$('feedback').style.color='#27ae60';}
  else{$('answer').className='answer wrong';$('feedback').textContent='❌ Správně: '+answer;$('feedback').style.color='#e74c3c';}
  $('score').textContent=score;
  setTimeout(()=>{$('feedback').textContent='';next();},1100);
}
function next(){
  idx++;
  if(idx>=total){finish();return;}
  $('idx').textContent=`${idx+1}/${total}`;
  gen();
}
$('answer').addEventListener('keydown',e=>{if(e.key==='Enter'&&$('answer').value!=='')check();});
function start(){
  score=0;idx=0;
  $('setupCard').style.display='none';$('resultsCard').style.display='none';$('gameCard').style.display='block';
  $('score').textContent=0;$('idx').textContent=`1/${total}`;
  gen();
}
function finish(){
  $('gameCard').style.display='none';$('resultsCard').style.display='block';
  $('finalScore').textContent=`${score} / ${total}`;
  const pct=Math.round(score/total*100);
  $('finalDetail').textContent=`Úspěšnost ${pct}%`;
}
$('startBtn').onclick=start;
$('againBtn').onclick=()=>{$('setupCard').style.display='block';$('resultsCard').style.display='none';};
</script>
</body>
</html>
