<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Losovač / kolo štěstí</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:980px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.tabs{display:flex;margin-bottom:18px;border-bottom:1px solid #404040;flex-wrap:wrap;justify-content:center}
.tab{padding:11px 18px;background:#2a2a2a;border:1px solid #404040;border-bottom:none;cursor:pointer;color:#bbb;border-radius:8px 8px 0 0}
.tab.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
.pane{display:none}.pane.active{display:block}
.layout{display:grid;grid-template-columns:300px 1fr;gap:20px}
@media(max-width:720px){.layout{grid-template-columns:1fr}}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
textarea{width:100%;min-height:240px;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:12px;font-size:.95rem;resize:vertical}
.btn{background:#6aa6fd;color:#fff;border:none;padding:11px 20px;border-radius:6px;cursor:pointer;font-weight:600;width:100%;margin-top:10px}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
.wheelwrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:380px;position:relative}
canvas{max-width:100%}
.pointer{position:absolute;top:6px;left:50%;transform:translateX(-50%);font-size:2rem;z-index:2;color:#e74c3c}
.winner{font-size:1.6rem;font-weight:700;color:#27ae60;text-align:center;margin-top:16px;min-height:40px}
.groups{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-top:14px}
.group{background:#1e1e1e;border:1px solid #404040;border-radius:8px;padding:14px}
.group h3{color:#6aa6fd;font-size:.95rem;margin-bottom:8px}
.group ul{list-style:none;font-size:.9rem}.group li{padding:3px 0}
.opt{display:flex;gap:8px;align-items:center;margin-top:8px}
.opt input{width:80px;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:8px}
</style>
</head>
<body>
<div class="container">
  <h1>🎡 Losovač / kolo štěstí</h1>
  <div class="tabs">
    <div class="tab active" data-pane="wheel">🎡 Kolo štěstí</div>
    <div class="tab" data-pane="groups">👥 Rozdělit do skupin</div>
  </div>

  <div class="pane active" id="wheel">
    <div class="layout">
      <div class="card">
        <h2>Položky (každá na řádek)</h2>
        <textarea id="items">Anna
Petr
Jana
Tomáš
Eva
Martin</textarea>
        <button class="btn" id="spinBtn">🎯 Roztočit!</button>
        <button class="btn btn-sec" id="removeWinner">➖ Odebrat vítěze</button>
      </div>
      <div class="card">
        <div class="wheelwrap"><div class="pointer">▼</div><canvas id="wheel" width="360" height="360"></canvas></div>
        <div class="winner" id="winner"></div>
      </div>
    </div>
  </div>

  <div class="pane" id="groups">
    <div class="card">
      <h2>Rozdělení do skupin</h2>
      <div class="layout">
        <div>
          <textarea id="gItems">Anna
Petr
Jana
Tomáš
Eva
Martin
Lucie
Karel
Nina</textarea>
        </div>
        <div>
          <div class="opt"><label>Počet skupin:</label><input type="number" id="numGroups" value="3" min="1"></div>
          <button class="btn" id="splitBtn">🔀 Rozdělit náhodně</button>
          <div class="groups" id="groupResult"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.pane').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');$(t.dataset.pane).classList.add('active');
});
const canvas=$('wheel'),ctx=canvas.getContext('2d');
const COLORS=['#6aa6fd','#27ae60','#e74c3c','#f39c12','#9b59b6','#1abc9c','#e67e22','#3498db','#e84393','#00b894'];
let angle=0,spinning=false,lastWinner='';
function getItems(){return $('items').value.split('\n').map(s=>s.trim()).filter(Boolean);}
function drawWheel(){
  const items=getItems();const n=items.length;const cx=180,cy=180,r=170;
  ctx.clearRect(0,0,360,360);
  if(!n){ctx.fillStyle='#666';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText('Zadej položky',cx,cy);return;}
  const arc=2*Math.PI/n;
  for(let i=0;i<n;i++){
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle+i*arc,angle+(i+1)*arc);
    ctx.fillStyle=COLORS[i%COLORS.length];ctx.fill();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(angle+(i+0.5)*arc);
    ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='right';
    ctx.fillText(items[i].slice(0,16),r-12,5);ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,26,0,2*Math.PI);ctx.fillStyle='#2a2a2a';ctx.fill();ctx.strokeStyle='#555';ctx.stroke();
}
function spin(){
  if(spinning)return;const items=getItems();if(!items.length)return;
  spinning=true;$('winner').textContent='';
  const target=Math.random()*2*Math.PI;const total=2*Math.PI*6+target;
  const dur=4000,start=performance.now(),startAngle=angle;
  function frame(now){
    const t=Math.min(1,(now-start)/dur);const ease=1-Math.pow(1-t,3);
    angle=startAngle+total*ease;drawWheel();
    if(t<1)requestAnimationFrame(frame);
    else{spinning=false;
      const n=items.length,arc=2*Math.PI/n;
      // pointer at top (-90deg = 1.5π). Determine index under pointer
      let a=(1.5*Math.PI-angle)%(2*Math.PI);if(a<0)a+=2*Math.PI;
      const idx=Math.floor(a/arc)%n;lastWinner=items[idx];
      $('winner').textContent='🎉 '+lastWinner;
    }
  }
  requestAnimationFrame(frame);
}
$('spinBtn').onclick=spin;
$('items').oninput=()=>{if(!spinning)drawWheel();};
$('removeWinner').onclick=()=>{if(!lastWinner)return;$('items').value=getItems().filter(i=>i!==lastWinner).join('\n');lastWinner='';$('winner').textContent='';drawWheel();};
// Groups
$('splitBtn').onclick=()=>{
  const items=$('gItems').value.split('\n').map(s=>s.trim()).filter(Boolean).sort(()=>Math.random()-0.5);
  const n=Math.max(1,+$('numGroups').value);const groups=Array.from({length:n},()=>[]);
  items.forEach((it,i)=>groups[i%n].push(it));
  $('groupResult').innerHTML=groups.map((g,i)=>`<div class="group"><h3>Skupina ${i+1} (${g.length})</h3><ul>${g.map(x=>`<li>• ${x.replace(/</g,'&lt;')}</li>`).join('')}</ul></div>`).join('');
};
drawWheel();$('splitBtn').onclick();
</script>
</body>
</html>
