<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📐 Pravoúhlý trojúhelník</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:600px){.layout{grid-template-columns:1fr}}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:14px}
.field{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.field label{width:130px;font-size:.88rem}
.field label .v{color:#6aa6fd;font-weight:700}
.field input{flex:1;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px}
.btn{background:#404040;color:#e0e0e0;border:1px solid #555;padding:8px 16px;border-radius:6px;cursor:pointer;width:100%;margin-top:6px}
.res-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #333}
.res-row:last-child{border:none}.res-row b{color:#4caf50}
svg{width:100%;height:auto;background:#1e1e1e;border-radius:8px;margin-bottom:12px}
.err{color:#e74c3c;font-size:.85rem;margin-top:8px}
.note{font-size:.78rem;color:#666;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <h1>📐 Pravoúhlý trojúhelník</h1>
  <div class="layout">
    <div class="card">
      <h2>Zadej 2 hodnoty</h2>
      <div class="field"><label>Odvěsna <span class="v">a</span></label><input type="number" id="a" step="any" placeholder="kratší strana"></div>
      <div class="field"><label>Odvěsna <span class="v">b</span></label><input type="number" id="b" step="any" placeholder="kratší strana"></div>
      <div class="field"><label>Přepona <span class="v">c</span></label><input type="number" id="c" step="any" placeholder="nejdelší strana"></div>
      <div class="field"><label>Úhel α (°)</label><input type="number" id="A" step="any" placeholder="proti a"></div>
      <div class="field"><label>Úhel β (°)</label><input type="number" id="B" step="any" placeholder="proti b"></div>
      <button class="btn" id="resetBtn">🗑️ Vymazat</button>
      <div class="err" id="err"></div>
    </div>
    <div class="card">
      <h2>Výsledek</h2>
      <svg id="draw" viewBox="0 0 220 180"></svg>
      <div id="results"></div>
      <p class="note">Využívá Pythagorovu větu (a²+b²=c²) a goniometrické funkce. Úhel γ je vždy 90°.</p>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const D=x=>x*180/Math.PI,R=x=>x*Math.PI/180;
function solve(){
  $('err').textContent='';
  let a=pf('a'),b=pf('b'),c=pf('c'),A=pf('A'),B=pf('B');
  function pf(id){const v=parseFloat($(id).value);return isNaN(v)?null:v;}
  const given=[a,b,c,A,B].filter(x=>x!=null).length;
  if(given<2){$('results').innerHTML='<p style="color:#888">Zadej alespoň 2 hodnoty…</p>';drawShape(40,30);return;}
  let aA=A!=null?R(A):null,aB=B!=null?R(B):null;
  if(aA!=null&&aB==null)aB=Math.PI/2-aA;
  if(aB!=null&&aA==null)aA=Math.PI/2-aB;
  // sides
  if(a&&b){c=Math.hypot(a,b);aA=Math.atan2(a,b);aB=Math.PI/2-aA;}
  else if(a&&c){if(c<=a){$('err').textContent='Přepona musí být delší než odvěsna.';return;}b=Math.sqrt(c*c-a*a);aA=Math.asin(a/c);aB=Math.PI/2-aA;}
  else if(b&&c){if(c<=b){$('err').textContent='Přepona musí být delší než odvěsna.';return;}a=Math.sqrt(c*c-b*b);aB=Math.asin(b/c);aA=Math.PI/2-aB;}
  else if(a&&aA!=null){c=a/Math.sin(aA);b=a/Math.tan(aA);aB=Math.PI/2-aA;}
  else if(b&&aB!=null){c=b/Math.sin(aB);a=b/Math.tan(aB);aA=Math.PI/2-aB;}
  else if(a&&aB!=null){b=a*Math.tan(aB);c=a/Math.cos(aB);aA=Math.PI/2-aB;}
  else if(b&&aA!=null){a=b*Math.tan(aA);c=b/Math.cos(aA);aB=Math.PI/2-aA;}
  else if(c&&aA!=null){a=c*Math.sin(aA);b=c*Math.cos(aA);aB=Math.PI/2-aA;}
  else if(c&&aB!=null){b=c*Math.sin(aB);a=c*Math.cos(aB);aA=Math.PI/2-aB;}
  if(!a||!b||!c){$('err').textContent='Nedostatek dat pro výpočet.';return;}
  // nepřepisovat právě editované pole (jinak nejde dopsat např. „0.5")
  const active=document.activeElement;
  const setv=(id,v)=>{ if($(id)!==active) $(id).value=v; };
  setv('a',a.toFixed(3));setv('b',b.toFixed(3));setv('c',c.toFixed(3));setv('A',D(aA).toFixed(2));setv('B',D(aB).toFixed(2));
  const area=a*b/2;
  $('results').innerHTML=[['Obvod',(a+b+c).toFixed(3)],['Obsah',area.toFixed(3)],['Výška k přeponě',(a*b/c).toFixed(3)],['Úhel α',D(aA).toFixed(2)+'°'],['Úhel β',D(aB).toFixed(2)+'°'],['Úhel γ','90°']].map(([l,v])=>`<div class="res-row"><span>${l}</span><b>${v}</b></div>`).join('');
  drawShape(a,b);
}
function drawShape(a,b){
  const sc=Math.min(160/Math.max(a,1),120/Math.max(b,1));
  const ax=20,ay=150,bx=20+b*sc,by=150-a*sc;
  $('draw').innerHTML=`<polygon points="20,150 ${20+b*sc},150 20,${150-a*sc}" fill="#6aa6fd33" stroke="#6aa6fd" stroke-width="2"/>
    <rect x="20" y="${150-14}" width="14" height="14" fill="none" stroke="#888"/>
    <text x="${20+b*sc/2}" y="168" fill="#6aa6fd" font-size="12" text-anchor="middle">b</text>
    <text x="8" y="${150-a*sc/2}" fill="#6aa6fd" font-size="12">a</text>
    <text x="${20+b*sc/2+6}" y="${150-a*sc/2-2}" fill="#27ae60" font-size="12">c</text>`;
}
['a','b','c','A','B'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')solve();}));
['a','b','c','A','B'].forEach(id=>$(id).oninput=solve);
$('resetBtn').onclick=()=>{['a','b','c','A','B'].forEach(id=>$(id).value='');$('results').innerHTML='';$('err').textContent='';drawShape(40,30);};
$('a').value=3;$('b').value=4;solve();
</script>
</body>
</html>
