<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>#️⃣ Hash generátor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:840px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
textarea{width:100%;min-height:120px;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:12px;font-size:.95rem;resize:vertical}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tabs button{padding:8px 16px;background:#404040;border:1px solid #555;border-radius:6px;color:#bbb;cursor:pointer;font-size:.85rem}
.tabs button.active{background:#6aa6fd;color:#fff}
.drop{border:2px dashed #555;border-radius:8px;padding:24px;text-align:center;cursor:pointer}
.drop:hover{border-color:#6aa6fd}
.hashrow{margin-bottom:12px}
.hashrow label{font-size:.8rem;color:#888;display:block;margin-bottom:4px}
.hashval{display:flex;gap:8px}
.hashval input{flex:1;background:#1e1e1e;border:1px solid #555;border-radius:6px;color:#27ae60;padding:11px;font-family:monospace;font-size:.85rem;word-break:break-all}
.hashval button{background:#404040;border:1px solid #555;color:#bbb;border-radius:6px;padding:11px 14px;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:10px 18px;border-radius:6px;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
.note{font-size:.78rem;color:#666;margin-top:8px}
</style>
</head>
<body>
<div class="container">
  <h1>#️⃣ Hash generátor</h1>
  <div class="card">
    <div class="tabs"><button class="active" id="tabText">Text</button><button id="tabFile">Soubor</button></div>
    <div id="paneText"><textarea id="input" placeholder="Zadej text pro hashování…">Ahoj světe</textarea></div>
    <div id="paneFile" style="display:none"><div class="drop" id="drop">📁 Přetáhni soubor nebo klikni<input type="file" id="file" hidden></div><p id="fileName" style="margin-top:8px;color:#888;font-size:.85rem"></p></div>
  </div>
  <div class="card">
    <h2>Výsledné hashe</h2>
    <div class="hashrow"><label>SHA-1</label><div class="hashval"><input id="sha1" readonly><button data-c="sha1">📋</button></div></div>
    <div class="hashrow"><label>SHA-256</label><div class="hashval"><input id="sha256" readonly><button data-c="sha256">📋</button></div></div>
    <div class="hashrow"><label>SHA-384</label><div class="hashval"><input id="sha384" readonly><button data-c="sha384">📋</button></div></div>
    <div class="hashrow"><label>SHA-512</label><div class="hashval"><input id="sha512" readonly><button data-c="sha512">📋</button></div></div>
    <p class="note">Hashe se počítají lokálně přes Web Crypto API. MD5 není v prohlížeči nativně dostupný (a je kryptograficky prolomený), proto zde není.</p>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
let mode='text',fileBuffer=null;
async function hash(algo,buffer){const h=await crypto.subtle.digest(algo,buffer);return[...new Uint8Array(h)].map(b=>b.toString(16).padStart(2,'0')).join('');}
async function update(){
  let buffer;
  if(mode==='text')buffer=new TextEncoder().encode($('input').value);
  else if(fileBuffer)buffer=fileBuffer;else{['sha1','sha256','sha384','sha512'].forEach(id=>$(id).value='');return;}
  $('sha1').value=await hash('SHA-1',buffer);
  $('sha256').value=await hash('SHA-256',buffer);
  $('sha384').value=await hash('SHA-384',buffer);
  $('sha512').value=await hash('SHA-512',buffer);
}
$('input').oninput=update;
$('tabText').onclick=()=>{mode='text';$('tabText').classList.add('active');$('tabFile').classList.remove('active');$('paneText').style.display='block';$('paneFile').style.display='none';update();};
$('tabFile').onclick=()=>{mode='file';$('tabFile').classList.add('active');$('tabText').classList.remove('active');$('paneFile').style.display='block';$('paneText').style.display='none';update();};
$('drop').onclick=()=>$('file').click();
$('drop').ondragover=e=>{e.preventDefault();$('drop').style.borderColor='#6aa6fd';};
$('drop').ondrop=e=>{e.preventDefault();if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);};
$('file').onchange=()=>{if($('file').files[0])loadFile($('file').files[0]);};
function loadFile(f){$('fileName').textContent='📄 '+f.name+' ('+(f.size/1024).toFixed(1)+' KB)';const r=new FileReader();r.onload=()=>{fileBuffer=r.result;update();};r.readAsArrayBuffer(f);}
document.querySelectorAll('[data-c]').forEach(b=>b.onclick=()=>{const v=$(b.dataset.c).value;if(!v)return;navigator.clipboard.writeText(v);const t=$('toast');t.textContent='Zkopírováno';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1000);});
update();
</script>
</body>
</html>
