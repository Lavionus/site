<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🩺 BMI a kalorie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:20px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
h2{font-size:1.05rem;color:#6aa6fd;margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:560px){.grid{grid-template-columns:1fr}}
label{display:block;font-size:.85rem;color:#888;margin-bottom:6px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px;font-size:.95rem;margin-bottom:12px}
.seg{display:flex;gap:8px;margin-bottom:12px}
.seg button{flex:1;padding:10px;background:#404040;border:1px solid #555;border-radius:6px;color:#bbb;cursor:pointer}
.seg button.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
.bmi-val{font-size:3rem;font-weight:700;text-align:center;margin:6px 0}
.bmi-cat{text-align:center;font-size:1.1rem;margin-bottom:16px}
.scale{height:14px;border-radius:7px;background:linear-gradient(to right,#3498db 0%,#27ae60 25%,#27ae60 45%,#f39c12 60%,#e67e22 75%,#c0392b 100%);position:relative;margin:18px 0}
.marker{position:absolute;top:-6px;width:4px;height:26px;background:#fff;border-radius:2px;transform:translateX(-50%);box-shadow:0 0 6px rgba(0,0,0,.6)}
.cal-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #333}
.cal-row:last-child{border:none}.cal-row b{color:#4caf50}
.note{font-size:.78rem;color:#666;margin-top:10px}
</style>
</head>
<body>
<div class="container">
  <h1>🩺 BMI &amp; kalorická kalkulačka</h1>
  <div class="card">
    <h2>Vstupní údaje</h2>
    <div class="seg" id="sex"><button data-v="m" class="active">♂️ Muž</button><button data-v="f">♀️ Žena</button></div>
    <div class="grid">
      <div><label>Věk (let)</label><input type="number" id="age" value="30" min="10" max="100"></div>
      <div><label>Výška (cm)</label><input type="number" id="height" value="175" min="100" max="230"></div>
      <div><label>Hmotnost (kg)</label><input type="number" id="weight" value="75" min="30" max="250"></div>
      <div><label>Aktivita</label>
        <select id="activity">
          <option value="1.2">Sedavá (bez cvičení)</option>
          <option value="1.375" selected>Lehká (1-3× týdně)</option>
          <option value="1.55">Střední (3-5× týdně)</option>
          <option value="1.725">Vysoká (6-7× týdně)</option>
          <option value="1.9">Velmi vysoká (fyzická práce)</option>
        </select>
      </div>
    </div>
  </div>
  <div class="card">
    <h2>📊 BMI</h2>
    <div class="bmi-val" id="bmiVal">–</div>
    <div class="bmi-cat" id="bmiCat"></div>
    <div class="scale"><div class="marker" id="marker" style="left:50%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:.7rem;color:#888"><span>15</span><span>18.5</span><span>25</span><span>30</span><span>40</span></div>
  </div>
  <div class="card">
    <h2>🔥 Energetická potřeba</h2>
    <div class="cal-row"><span>Bazální metabolismus (BMR)</span><b id="bmr">–</b></div>
    <div class="cal-row"><span>Udržení hmotnosti (TDEE)</span><b id="tdee">–</b></div>
    <div class="cal-row"><span>Zhubnutí (−0,5 kg/týden)</span><b id="lose">–</b></div>
    <div class="cal-row"><span>Nabírání (+0,5 kg/týden)</span><b id="gain">–</b></div>
    <p class="note">BMR podle Mifflin-St Jeor. Orientační hodnoty, nenahrazují konzultaci s lékařem.</p>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
let sex='m';
function calc(){
  const h=+$('height').value,w=+$('weight').value,age=+$('age').value,act=+$('activity').value;
  if(!h||!w){return;}
  const bmi=w/Math.pow(h/100,2);
  $('bmiVal').textContent=bmi.toFixed(1);
  let cat,color;
  if(bmi<18.5){cat='Podváha';color='#3498db';}
  else if(bmi<25){cat='Normální váha';color='#27ae60';}
  else if(bmi<30){cat='Nadváha';color='#f39c12';}
  else if(bmi<35){cat='Obezita I. stupně';color='#e67e22';}
  else{cat='Obezita II.+ stupně';color='#c0392b';}
  $('bmiCat').textContent=cat;$('bmiCat').style.color=color;$('bmiVal').style.color=color;
  const pct=Math.max(0,Math.min(100,(bmi-15)/(40-15)*100));
  $('marker').style.left=pct+'%';
  const bmr=Math.round(10*w+6.25*h-5*age+(sex==='m'?5:-161));
  const tdee=Math.round(bmr*act);
  $('bmr').textContent=bmr+' kcal';
  $('tdee').textContent=tdee+' kcal';
  $('lose').textContent=(tdee-500)+' kcal';
  $('gain').textContent=(tdee+500)+' kcal';
}
document.querySelectorAll('#sex button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('#sex button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');sex=b.dataset.v;calc();
});
['age','height','weight','activity'].forEach(id=>$(id).oninput=calc);
calc();
</script>
</body>
</html>
