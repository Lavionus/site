<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🆔 UUID generátor</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:22px;margin-bottom:20px}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:14px}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:14px}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
input,select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.chk{display:flex;align-items:center;gap:6px;color:#bbb;font-size:.88rem}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
.output{background:#1e1e1e;border:1px solid #404040;border-radius:8px;padding:14px;font-family:monospace;font-size:.95rem;line-height:1.9;max-height:420px;overflow:auto}
.output div{display:flex;justify-content:space-between;align-items:center;padding:2px 0}
.output .copy1{background:none;border:none;color:#6aa6fd;cursor:pointer;opacity:.6}
.output .copy1:hover{opacity:1}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:10px 18px;border-radius:6px;opacity:0;transition:.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="container">
  <h1>🆔 UUID / GUID generátor</h1>
  <div class="card">
    <div class="controls">
      <div><label>Verze</label><select id="version"><option value="4">UUID v4 (náhodný)</option><option value="nil">Nil UUID</option><option value="short">Short ID (21 zn.)</option></select></div>
      <div><label>Počet</label><input type="number" id="count" value="5" min="1" max="500" style="width:90px"></div>
      <label class="chk"><input type="checkbox" id="upper"> Velká písmena</label>
      <label class="chk"><input type="checkbox" id="braces"> Složené závorky</label>
      <label class="chk"><input type="checkbox" id="noDash"> Bez pomlček</label>
      <button class="btn" id="genBtn">🎲 Generovat</button>
    </div>
    <button class="btn btn-sec" id="copyAll">📋 Kopírovat vše</button>
    <div class="output" id="output" style="margin-top:14px"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const $=id=>document.getElementById(id);
function uuid4(){return crypto.randomUUID();}
function shortId(){const a='useandom-26T198340PX75pxJACKVERYMINDBUSHWOLF_GQZbfghjklqvwyzrict';const arr=new Uint8Array(21);crypto.getRandomValues(arr);return[...arr].map(b=>a[b&63]).join('');}
function format(id){
  if($('noDash').checked)id=id.replace(/-/g,'');
  if($('upper').checked)id=id.toUpperCase();
  if($('braces').checked)id='{'+id+'}';
  return id;
}
function gen(){
  const n=Math.min(500,+$('count').value),v=$('version').value;
  const ids=[];
  for(let i=0;i<n;i++){
    let id=v==='nil'?'00000000-0000-0000-0000-000000000000':v==='short'?shortId():uuid4();
    ids.push(v==='short'?($('upper').checked?id.toUpperCase():id):format(id));
  }
  $('output').innerHTML=ids.map(id=>`<div><span>${id}</span><button class="copy1" data-v="${id}">📋</button></div>`).join('');
  $('output').querySelectorAll('.copy1').forEach(b=>b.onclick=()=>copy(b.dataset.v));
  $('output').dataset.all=ids.join('\n');
}
function copy(t){navigator.clipboard.writeText(t);const to=$('toast');to.textContent='Zkopírováno';to.classList.add('show');setTimeout(()=>to.classList.remove('show'),1000);}
$('genBtn').onclick=gen;
$('copyAll').onclick=()=>copy($('output').dataset.all||'');
['version','upper','braces','noDash'].forEach(id=>$(id).onchange=gen);
gen();
</script>
</body>
</html>
