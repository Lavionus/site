<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚛️ Periodická tabulka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:16px;font-weight:600;text-align:center}
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;font-size:.76rem}
.legend span{display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 8px;border-radius:6px}
.legend span:hover{background:#333}
.legend span.on{background:#3a3a4d;outline:1px solid #6aa6fd}
.dot{width:12px;height:12px;border-radius:3px}
.table{display:grid;grid-template-columns:repeat(18,1fr);gap:3px;overflow-x:auto;padding-bottom:10px}
.el{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:.5rem;min-width:30px;transition:transform .1s;position:relative}
.el:hover{transform:scale(1.15);z-index:5;box-shadow:0 0 10px rgba(0,0,0,.6)}
.el .num{position:absolute;top:1px;left:2px;font-size:.42rem;opacity:.8}
.el .sym{font-size:.85rem;font-weight:700}
.el.dim{opacity:.25}
.controls{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.controls input{background:#404040;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:9px 14px;width:260px}
.controls button{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.controls button:hover{background:#5694f0}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.show{display:flex}
.modalcard{background:#2a2a2a;border:1px solid #404040;border-radius:12px;padding:24px;max-width:520px;width:100%;max-height:92vh;overflow-y:auto}
.modalcard .hlava{display:flex;align-items:center;gap:16px;margin-bottom:10px}
.modalcard .big{font-size:3.2rem;font-weight:700;line-height:1}
.modalcard h2{font-size:1.4rem}
.modalcard .kat{font-size:.75rem;color:#999}
.prop{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid #333;font-size:.85rem}
.prop:last-child{border:none}.prop b{color:#6aa6fd;text-align:right}
.prop b sup{font-size:.6em}
.popis{font-size:.83rem;color:#bbb;line-height:1.55;margin:12px 0;background:#242430;border-radius:8px;padding:12px}
.bohrwrap{text-align:center}
.bohrwrap canvas{background:#20202c;border-radius:10px}
.bohrwrap .cfg{font-size:.72rem;color:#889;margin-top:4px;word-break:break-all}
.close{background:#6aa6fd;color:#fff;border:none;padding:10px;border-radius:6px;width:100%;margin-top:14px;cursor:pointer;font-weight:600}
/* kvíz */
.kviz .otazka{font-size:1.1rem;text-align:center;margin:14px 0}
.kviz .moznosti{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.kviz .moznosti button{background:#3a3a4d;border:none;color:#e0e0e0;border-radius:8px;padding:14px;font-size:1rem;font-weight:600;cursor:pointer}
.kviz .moznosti button:hover{background:#4a4a5d}
.kviz .moznosti button.spravne{background:#27ae60;color:#fff}
.kviz .moznosti button.spatne{background:#c0392b;color:#fff}
.kviz .skore{text-align:center;color:#888;font-size:.85rem;margin-top:12px}
</style>
</head>

const POPIS={
1:['Nejlehčí a zdaleka nejhojnější prvek vesmíru — tvoří asi 75 % veškeré běžné hmoty a je palivem hvězd. Na Zemi je vázán hlavně ve vodě; průmyslově slouží k výrobě amoniaku a zkoumá se jako čisté palivo budoucnosti.','1766 · Henry Cavendish'],
2:['Netečný plyn vznikající fúzí ve hvězdách — objeven byl nejdřív ve spektru Slunce a teprve pak na Zemi. Chladí supravodivé magnety tomografů, plní balony a vzducholodě a mění hlas do výšek.','1868 · Janssen a Lockyer'],
3:['Nejlehčí kov — plave na vodě a dá se krájet nožem. Pohání lithium-iontové baterie mobilů i elektromobilů; jeho soli se desítky let používají v psychiatrii.','1817 · Johan Arfwedson'],
4:['Lehký, tvrdý, ale jedovatý kov. Zpevňuje slitiny pro letectví a kosmonautiku a slouží jako okénko rentgenek, protože snadno propouští záření.','1798 · Louis Vauquelin'],
5:['Tvrdý polokov. Je v žáruvzdorném borosilikátovém skle (laboratorní i kuchyňské sklo), hnojivech, bělicích prostředcích a neutronovém stínění reaktorů.','1808 · Davy a Gay-Lussac'],
6:['Stavební kámen života a celé organické chemie. Vyskytuje se jako grafit, diamant, grafen či fullereny; s železem tvoří ocel a je základem všech fosilních paliv.','starověk'],
7:['Tvoří 78 % vzduchu. Klíčový pro výrobu hnojiv (amoniak Haberovým procesem) a výbušnin; kapalný dusík (−196 °C) slouží k rychlému mražení a chlazení.','1772 · Daniel Rutherford'],
8:['Nezbytný pro dýchání a hoření; nejrozšířenější prvek zemské kůry, vázaný v horninách i vodě. Prakticky všechen kyslík v atmosféře vyrobila fotosyntéza.','1774 · Priestley a Scheele'],
9:['Nejreaktivnější prvek vůbec — reaguje téměř se vším. V podobě sloučenin je v teflonu, zubních pastách i kyselině, která leptá sklo.','1886 · Henri Moissan'],
10:['Vzácný plyn, který po nabuzení elektřinou září oranžově červeně — odtud klasické „neonové" reklamy. Používá se i v laserech a kryogenice.','1898 · Ramsay a Travers'],
11:['Měkký kov prudce reagující s vodou. Jeho chlorid je kuchyňská sůl; oranžové sodíkové výbojky léta osvětlovaly ulice měst.','1807 · Humphry Davy'],
12:['Lehký kov hořící oslnivě bílým plamenem — pyrotechnika i dávné blesky fotografů. Sedí ve středu molekuly chlorofylu a odlehčuje slitiny kol a letadel.','1808 · Humphry Davy'],
13:['Nejrozšířenější kov zemské kůry, lehký a odolný korozi — letadla, plechovky, stavební konstrukce. Než se zvládla elektrolýza, býval vzácnější než zlato.','1825 · Hans Christian Ørsted'],
14:['Druhý nejhojnější prvek kůry a základ moderní civilizace: čipy, solární panely, sklo i beton. Křemíkové polovodiče daly jméno Silicon Valley.','1824 · Jöns Jacob Berzelius'],
15:['Bílý fosfor se na vzduchu sám vzněcuje a světélkuje — objeven byl alchymistou při destilaci moči. Je nezbytný pro DNA, ATP a kosti; průmyslově jde do hnojiv a zápalek.','1669 · Hennig Brand'],
16:['Žlutý nekov známý od sopek a horkých pramenů. Základ kyseliny sírové (nejvyráběnější chemikálie světa), vulkanizace pryže a černého střelného prachu.','starověk'],
17:['Štiplavý žlutozelený jedovatý plyn — za 1. světové války bojová látka. V malých dávkách dezinfikuje pitnou vodu a bazény; je součástí PVC.','1774 · Carl Wilhelm Scheele'],
18:['Nejběžnější vzácný plyn, necelé 1 % vzduchu. Netečnou atmosférou chrání svary při svařování a plní žárovky i izolační dvojskla.','1894 · Rayleigh a Ramsay'],
19:['Měkký kov reagující s vodou ještě bouřlivěji než sodík. Draselná hnojiva živí světové zemědělství; draslíkové ionty přenášejí nervové vzruchy.','1807 · Humphry Davy'],
20:['Stavební látka kostí, zubů a schránek mořských živočichů. Vápenec, cement, malta, křída — bez vápníku by nestála žádná stavba.','1808 · Humphry Davy'],
21:['Vzácný lehký kov, jehož existenci a vlastnosti předpověděl Mendělejev („ekabor") dřív, než byl objeven. Zpevňuje hliníkové slitiny letadel a sportovních rámů.','1879 · Lars Fredrik Nilson'],
22:['Pevný jako ocel, ale skoro o polovinu lehčí a odolný mořské vodě — kloubní implantáty, letadla, ponorky. Oxid titaničitý je nejběžnější bílý pigment barev a krémů.','1791 · William Gregor'],
23:['Přísada, která dělá ocel pružnou a houževnatou — nástroje, pružiny, klíče. Zkoumá se pro velkokapacitní průtokové baterie.','1801 · Andrés Manuel del Río'],
24:['Dává nerezové oceli odolnost a chromování zrcadlový lesk. Stopy chromu barví rubín do červena a smaragd do zelena.','1797 · Louis Vauquelin'],
25:['Nepostradatelný při výrobě oceli, kde váže síru a kyslík. Burel je v zinko-uhlíkových bateriích; manganové uzlíky pokrývají dna oceánů.','1774 · Johan Gottlieb Gahn'],
26:['Nejpoužívanější kov světa — základ oceli, mostů, aut i nástrojů. Roztavené železo v jádře Země vytváří magnetické pole a v krvi přenáší kyslík jako součást hemoglobinu.','starověk'],
27:['Od středověku barví sklo a keramiku sytě modře („kobaltová modř"). Dnes je v akumulátorech, žáruvzdorných slitinách turbín a vitaminu B12.','1735 · Georg Brandt'],
28:['Chrání ocel před rzí (nerez, pokovování) a razí se z něj mince. Niklové jádro mají i železné meteority — a podle skřítka Nickela dostal jméno.','1751 · Axel Cronstedt'],
29:['Po stříbře nejlepší vodič — elektrické rozvody, motory, plošné spoje. S cínem tvoří bronz, se zinkem mosaz; měděné povrchy hubí bakterie.','starověk'],
30:['Pozinkování chrání ocel před korozí (okapy, svodidla). Je v mosazi, bateriích i opalovacích krémech; tělo ho potřebuje pro imunitu a hojení ran.','1746 · Andreas Marggraf'],
31:['Kov, který roztaje v dlani (29,8 °C). Arsenid gallia pohání rychlé čipy, LED diody a lasery — gallium je v každém mobilu.','1875 · Lecoq de Boisbaudran'],
32:['Polovodič, na němž v roce 1947 vznikl první tranzistor. Dnes slouží v infračervené optice termovizí, optických vláknech a fotovoltaice.','1886 · Clemens Winkler'],
33:['Proslulý historický jed — dlouho nedetekovatelný „dědický prášek". Dnes se přidává do polovodičů; v částech Asie přirozeně kontaminuje studny.','~1250 · Albertus Magnus'],
34:['Fotocitlivý prvek měnící vodivost podle osvětlení — kopírky, fotobuňky, solární články. Ve stopách nezbytný pro zdraví, ve větší dávce jedovatý.','1817 · Jöns Jacob Berzelius'],
35:['Jediný nekov kapalný za pokojové teploty — těžká červenohnědá dýmající kapalina. Sloučeniny slouží jako zpomalovače hoření; bromid stříbrný umožnil fotografii.','1826 · Antoine Balard'],
36:['Vzácný plyn výbojek a blesků fotoaparátů. V letech 1960–1983 definovala vlnová délka jeho záření jednotku metr.','1898 · Ramsay a Travers'],
37:['Alkalický kov tak reaktivní, že se skladuje v zatavených ampulích. Tiká v atomových hodinách a laserové chlazení jeho atomů se blíží absolutní nule.','1861 · Bunsen a Kirchhoff'],
38:['Barví plameny karmínově — ohňostroje a signální světlice. Radioaktivní stroncium-90 z jaderných testů se ukládá v kostech místo vápníku, proto se pečlivě sleduje.','1790 · Adair Crawford'],
39:['Objeven v minerálu ze švédské vesničky Ytterby, která dala jméno hned čtyřem prvkům. YAG lasery, luminofory bílých LED, supravodivé keramiky.','1794 · Johan Gadolin'],
40:['Odolává korozi a propouští neutrony — ideální obal palivových tyčí reaktorů. Kubický zirkon je známá levná náhrada diamantu.','1789 · Martin Klaproth'],
41:['Supravodivé niobové slitiny vinou magnety urychlovačů (CERN) i tomografů. Zpevňuje oceli plynovodů a raketové trysky.','1801 · Charles Hatchett'],
42:['Taje až při 2623 °C. Zpevňuje nástrojové a pancéřové oceli; sulfid molybdeničitý je výtečné suché mazivo. Potřebují ho i enzymy rostlin vázající dusík.','1778 · Carl Wilhelm Scheele'],
43:['První uměle připravený prvek — odtud jméno (řecky technetos = umělý). Metastabilní technecium-99m je nejužívanější radionuklid nukleární medicíny, miliony vyšetření ročně.','1937 · Perrier a Segrè'],
44:['Vzácný kov platinové skupiny objevený na Kazaňské univerzitě. Tvrdí elektrické kontakty a hroty plnicích per; rutheniové katalyzátory slouží organické syntéze.','1844 · Karl Ernst Claus'],
45:['Zpravidla nejdražší obchodovaný drahý kov. Hlavní složka automobilových katalyzátorů — rozkládá jedovaté oxidy dusíku z výfuků.','1803 · William Wollaston'],
46:['Pohltí až 900násobek vlastního objemu vodíku. Autokatalyzátory, „bílé zlato" ve špercích a katalyzátory oceněné Nobelovou cenou za chemii 2010.','1803 · William Wollaston'],

const PLYNY=new Set([1,2,7,8,9,10,17,18,36,54,86]), KAPALNE=new Set([35,80]);
const skupenstvi=z=>PLYNY.has(z)?'plynné':KAPALNE.has(z)?'kapalné':z>=104?'neznámé (syntetický)':'pevné';

/* ---------- elektronová konfigurace (Madelungovo pravidlo + výjimky) ---------- */
const ORDER=['1s','2s','2p','3s','3p','4s','3d','4p','5s','4d','5p','6s','4f','5d','6p','7s','5f','6d','7p'];
const CAP={s:2,p:6,d:10,f:14};
const VYJIMKY={24:{'4s':1,'3d':5},29:{'4s':1,'3d':10},41:{'5s':1,'4d':4},42:{'5s':1,'4d':5},44:{'5s':1,'4d':7},45:{'5s':1,'4d':8},46:{'5s':0,'4d':10},47:{'5s':1,'4d':10},57:{'4f':0,'5d':1},58:{'4f':1,'5d':1},64:{'4f':7,'5d':1},78:{'6s':1,'5d':9},79:{'6s':1,'5d':10},89:{'5f':0,'6d':1},90:{'5f':0,'6d':2},91:{'5f':2,'6d':1},92:{'5f':3,'6d':1},93:{'5f':4,'6d':1},96:{'5f':7,'6d':1},103:{'6d':0,'7p':1}};
function obsazeni(z){
  let zb=z; const occ={};
  for(const o of ORDER){ if(zb<=0)break; const n=Math.min(CAP[o[1]],zb); occ[o]=n; zb-=n; }
  const v=VYJIMKY[z]; if(v)for(const k in v)occ[k]=v[k];
  for(const k in occ)if(!occ[k])delete occ[k];
  return occ;
}
const JADRA=[[86,'Rn',['1s','2s','2p','3s','3p','4s','3d','4p','5s','4d','5p','6s','4f','5d','6p']],
             [54,'Xe',['1s','2s','2p','3s','3p','4s','3d','4p','5s','4d','5p']],
             [36,'Kr',['1s','2s','2p','3s','3p','4s','3d','4p']],
             [18,'Ar',['1s','2s','2p','3s','3p']],
             [10,'Ne',['1s','2s','2p']],
             [2,'He',['1s']]];
function konfigurace(z){
  const occ=obsazeni(z);
  for(const[cz,sym,orbs]of JADRA){
    if(z>cz&&orbs.every(o=>occ[o]===CAP[o[1]])){
      const zbytek=ORDER.filter(o=>!orbs.includes(o)&&occ[o]).map(o=>o+'<sup>'+occ[o]+'</sup>').join(' ');
      return '['+sym+'] '+zbytek;
    }
  }
  return ORDER.filter(o=>occ[o]).map(o=>o+'<sup>'+occ[o]+'</sup>').join(' ');
}
function slupky(z){
  const occ=obsazeni(z), s=[0,0,0,0,0,0,0];
  for(const o in occ)s[+o[0]-1]+=occ[o];
  return s.filter((_,i)=>s[i]>0);
}

/* ---------- tabulka ---------- */
$('legend').innerHTML=Object.entries(CATS).map(([k,[n,c]])=>`<span data-cat="${k}"><i class="dot" style="background:${c}"></i>${n}</span>`).join('');
function build(){
  $('table').innerHTML=EL.map(e=>{
    const[num,sym,name,group,period,cat]=e;const col=CATS[cat][1];
    return `<div class="el" style="grid-column:${group};grid-row:${period};background:${col}" data-num="${num}">
      <span class="num">${num}</span><span class="sym">${sym}</span><span style="font-size:.42rem">${name.slice(0,7)}</span></div>`;
  }).join('');
  $('table').querySelectorAll('.el').forEach(el=>el.onclick=()=>showDetail(+el.dataset.num));
}

/* ---------- detail s Bohrovým modelem ---------- */
let bohrAnim=null;
function showDetail(num){
  const e=EL.find(x=>x[0]===num);const[n,sym,name,group,period,cat,mass]=e;
  const[popis,objev]=POPIS[n]||['',''];
  $('modalCard').innerHTML=`
    <div class="hlava">
      <div class="big" style="color:${CATS[cat][1]}">${sym}</div>
      <div><h2>${name}</h2><div class="kat">${CATS[cat][0]}</div></div>
    </div>
    <div class="prop"><span>Protonové číslo</span><b>${n}</b></div>
    <div class="prop"><span>Relativní atomová hmotnost</span><b>${mass}</b></div>
    <div class="prop"><span>Skupina / perioda</span><b>${group<=18?group:'—'} / ${period<=7?period:'—'}</b></div>
    <div class="prop"><span>Skupenství (20 °C)</span><b>${skupenstvi(n)}</b></div>
    <div class="prop"><span>Objev</span><b>${objev}</b></div>
    <div class="prop"><span>El. konfigurace</span><b>${konfigurace(n)}</b></div>
    <div class="popis">${popis}</div>
    <div class="bohrwrap">
      <canvas id="bohr" width="230" height="230"></canvas>
      <div class="cfg">Bohrův model — elektrony ve slupkách: ${slupky(n).join(' · ')}</div>
    </div>
    <button class="close" id="closeBtn">Zavřít</button>`;
  $('modal').classList.add('show');
  $('closeBtn').onclick=zavriModal;
  spustBohr(n,CATS[cat][1],sym);
}
function zavriModal(){
  $('modal').classList.remove('show');
  if(bohrAnim){cancelAnimationFrame(bohrAnim);bohrAnim=null;}
}
function spustBohr(z,barva,sym){
  if(bohrAnim)cancelAnimationFrame(bohrAnim);
  const c=$('bohr');if(!c)return;
  const ctx=c.getContext('2d'),S=slupky(z),cx=115,cy=115;
  const maxR=100,r0=S.length>1?26:34,krok=S.length>1?(maxR-r0)/(S.length-1):0;
  function frame(t){
    ctx.clearRect(0,0,230,230);
    // jádro
    ctx.fillStyle=barva;ctx.beginPath();ctx.arc(cx,cy,15,0,7);ctx.fill();
    ctx.fillStyle='#1a1a1a';ctx.font='700 11px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(sym,cx,cy);
    S.forEach((poc,i)=>{
      const r=r0+i*krok;
      ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(cx,cy,r,0,7);ctx.stroke();
      const uhel0=t/1000*(1-i*0.09)+i;      // vnější slupky pomaleji
      const zobraz=Math.min(poc,18);         // víc než 18 teček by splynulo
      for(let k=0;k<zobraz;k++){
        const u=uhel0+k/zobraz*2*Math.PI;
        ctx.fillStyle='#7fd4ff';ctx.beginPath();ctx.arc(cx+r*Math.cos(u),cy+r*Math.sin(u),3,0,7);ctx.fill();
      }
      if(poc>18){ctx.fillStyle='#7fd4ff';ctx.font='9px sans-serif';ctx.fillText('×'+poc,cx+r-2,cy-6);}
    });
    bohrAnim=requestAnimationFrame(frame);
  }
  bohrAnim=requestAnimationFrame(frame);
}
$('modal').onclick=e=>{if(e.target===$('modal'))zavriModal();};

/* ---------- hledání a filtr ---------- */
$('search').oninput=()=>{
  const q=$('search').value.toLowerCase().trim();
  aktivniKat=null;oznacLegendu();
  $('table').querySelectorAll('.el').forEach(el=>{
    const e=EL.find(x=>x[0]===+el.dataset.num);
    const match=!q||e[1].toLowerCase().includes(q)||e[2].toLowerCase().includes(q)||String(e[0])===q;
    el.classList.toggle('dim',!match);
  });
};
let aktivniKat=null;
function oznacLegendu(){
  $('legend').querySelectorAll('span').forEach(s=>s.classList.toggle('on',s.dataset.cat===aktivniKat));
}
$('legend').querySelectorAll('span').forEach(s=>s.onclick=()=>{
  aktivniKat=aktivniKat===s.dataset.cat?null:s.dataset.cat; // druhé kliknutí filtr zruší
  oznacLegendu();
  $('table').querySelectorAll('.el').forEach(el=>{
    const e=EL.find(x=>x[0]===+el.dataset.num);
    el.classList.toggle('dim',aktivniKat!==null&&e[5]!==aktivniKat);
  });
});

/* ---------- kvíz ---------- */
let kvizSkore=0,kvizKolo=0;
const KVIZ_KOL=10;
function kvizOtazka(){
  kvizKolo++;
  const spravny=EL[Math.floor(Math.random()*EL.length)];
  const typ=Math.random()<0.5;
  const moznosti=[spravny];
  while(moznosti.length<4){
    const k=EL[Math.floor(Math.random()*EL.length)];
    if(!moznosti.includes(k))moznosti.push(k);
  }
  moznosti.sort(()=>Math.random()-0.5);
  const otazka=typ?`Jakou značku má <b style="color:#6aa6fd">${spravny[2]}</b>?`
                  :`Který prvek má značku <b style="color:#6aa6fd">${spravny[1]}</b>?`;
  $('modalCard').innerHTML=`<div class="kviz">
    <h2 style="text-align:center">🎓 Kvíz ${kvizKolo}/${KVIZ_KOL}</h2>
    <div class="otazka">${otazka}</div>
    <div class="moznosti">${moznosti.map((m,i)=>`<button data-i="${i}">${typ?m[1]:m[2]}</button>`).join('')}</div>
    <div class="skore">Skóre: ${kvizSkore}</div></div>`;
  $('modal').classList.add('show');
  $('modalCard').querySelectorAll('.moznosti button').forEach((b,i)=>b.onclick=()=>{
    const ok=moznosti[i]===spravny;
    if(ok)kvizSkore++;
    $('modalCard').querySelectorAll('.moznosti button').forEach((x,j)=>{
      x.onclick=null;
      if(moznosti[j]===spravny)x.classList.add('spravne');
      else if(j===i)x.classList.add('spatne');
    });
    setTimeout(()=>{kvizKolo<KVIZ_KOL?kvizOtazka():kvizKonec();},900);
  });
}
function kvizKonec(){
  const proc=Math.round(kvizSkore/KVIZ_KOL*100);
  $('modalCard').innerHTML=`<div class="kviz" style="text-align:center">
    <h2>${proc>=80?'🏆':proc>=50?'👍':'📖'} Výsledek kvízu</h2>
    <div style="font-size:2.6rem;font-weight:700;color:#6aa6fd;margin:14px 0">${kvizSkore} / ${KVIZ_KOL}</div>
    <p style="color:#888">${proc>=80?'Výborně, chemie ti jde!':proc>=50?'Dobrá práce, jen tak dál.':'Proklikej si tabulku a zkus to znovu.'}</p>
    <button class="close" id="kvizZnovu">🔄 Hrát znovu</button>
    <button class="close" id="kvizZavrit" style="background:#404040">Zavřít</button></div>`;
  $('kvizZnovu').onclick=()=>{kvizSkore=0;kvizKolo=0;kvizOtazka();};
  $('kvizZavrit').onclick=zavriModal;
}
$('quizBtn').onclick=()=>{kvizSkore=0;kvizKolo=0;kvizOtazka();};

build();
</script>
