<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚛️ Periodická tabulka</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:1200px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:16px;font-weight:600;text-align:center}
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;font-size:.76rem}
.legend span{display:flex;align-items:center;gap:5px;cursor:pointer;padding:3px 8px;border-radius:6px}
.legend span:hover{background:#333}
.dot{width:12px;height:12px;border-radius:3px}
.table{display:grid;grid-template-columns:repeat(18,1fr);gap:3px;overflow-x:auto;padding-bottom:10px}
.el{aspect-ratio:1;border-radius:4px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:.5rem;min-width:30px;transition:transform .1s;position:relative}
.el:hover{transform:scale(1.15);z-index:5;box-shadow:0 0 10px rgba(0,0,0,.6)}
.el .num{position:absolute;top:1px;left:2px;font-size:.42rem;opacity:.8}
.el .sym{font-size:.85rem;font-weight:700}
.el.dim{opacity:.25}
.controls{text-align:center;margin-bottom:14px}
.controls input{background:#404040;border:1px solid #555;border-radius:6px;color:#e0e0e0;padding:9px 14px;width:260px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal.show{display:flex}
.modalcard{background:#2a2a2a;border:1px solid #404040;border-radius:12px;padding:24px;max-width:420px;width:100%}
.modalcard .big{font-size:4rem;font-weight:700;text-align:center}
.modalcard h2{text-align:center;margin-bottom:14px}
.prop{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #333}
.prop:last-child{border:none}.prop b{color:#6aa6fd}
.close{background:#6aa6fd;color:#fff;border:none;padding:10px;border-radius:6px;width:100%;margin-top:16px;cursor:pointer;font-weight:600}
</style>
</head>
<body>
<div class="container">
  <h1>⚛️ Periodická tabulka prvků</h1>
  <div class="controls"><input type="text" id="search" placeholder="🔍 Hledat (název, značka, číslo)…"></div>
  <div class="legend" id="legend"></div>
  <div class="table" id="table"></div>

<div class="modal" id="modal"><div class="modalcard" id="modalCard"></div></div>

$('legend').innerHTML=Object.entries(CATS).map(([k,[n,c]])=>`<span data-cat="${k}"><i class="dot" style="background:${c}"></i>${n}</span>`).join('');
function build(){
  $('table').innerHTML=EL.map(e=>{
    const[num,sym,name,group,period,cat]=e;const col=CATS[cat][1];
    return `<div class="el" style="grid-column:${group};grid-row:${period};background:${col}" data-num="${num}">
      <span class="num">${num}</span><span class="sym">${sym}</span><span style="font-size:.42rem">${name.slice(0,7)}</span></div>`;
  }).join('');
  $('table').querySelectorAll('.el').forEach(el=>el.onclick=()=>showDetail(+el.dataset.num));
}
function showDetail(num){
  const e=EL.find(x=>x[0]===num);const[n,sym,name,group,period,cat,mass]=e;
  $('modalCard').innerHTML=`<div class="big" style="color:${CATS[cat][1]}">${sym}</div>
    <h2>${name}</h2>
    <div class="prop"><span>Protonové číslo</span><b>${n}</b></div>
    <div class="prop"><span>Relativní atomová hmotnost</span><b>${mass}</b></div>
    <div class="prop"><span>Skupina / perioda</span><b>${group<=18?group:'—'} / ${period<=7?period:'—'}</b></div>
    <div class="prop"><span>Kategorie</span><b>${CATS[cat][0]}</b></div>
    <button class="close" id="closeBtn">Zavřít</button>`;
  $('modal').classList.add('show');
  $('closeBtn').onclick=()=>$('modal').classList.remove('show');
}
$('modal').onclick=e=>{if(e.target===$('modal'))$('modal').classList.remove('show');};
$('search').oninput=()=>{
  const q=$('search').value.toLowerCase().trim();
  $('table').querySelectorAll('.el').forEach(el=>{
    const e=EL.find(x=>x[0]===+el.dataset.num);
    const match=!q||e[1].toLowerCase().includes(q)||e[2].toLowerCase().includes(q)||String(e[0])===q;
    el.classList.toggle('dim',!match);
  });
};
$('legend').querySelectorAll('span').forEach(s=>s.onclick=()=>{
  const cat=s.dataset.cat;
  $('table').querySelectorAll('.el').forEach(el=>{const e=EL.find(x=>x[0]===+el.dataset.num);el.classList.toggle('dim',e[5]!==cat);});
});
build();
</script>
</body>
</html>
