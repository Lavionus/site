<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍅 Pomodoro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:600px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:20px;font-weight:600;text-align:center}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
.timer{font-size:5rem;font-weight:700;text-align:center;font-variant-numeric:tabular-nums;margin:10px 0;color:#6aa6fd}
.phase{text-align:center;color:#888;text-transform:uppercase;letter-spacing:2px;font-size:.9rem;margin-bottom:10px}
.modes{display:flex;gap:8px;justify-content:center;margin-bottom:20px}
.mode{padding:8px 16px;background:#404040;border:1px solid #555;border-radius:20px;cursor:pointer;font-size:.85rem;color:#bbb}
.mode.active{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
.controls{display:flex;gap:10px;justify-content:center}
.btn{background:#6aa6fd;color:#fff;border:none;padding:12px 28px;border-radius:6px;cursor:pointer;font-size:1rem;font-weight:600}
.btn:hover{background:#5694f0}
.btn-sec{background:#404040}.btn-sec:hover{background:#4a4a4a}
.settings{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:16px;font-size:.85rem;color:#888}
.settings label{display:flex;flex-direction:column;gap:4px;align-items:center}
input[type=number]{width:70px;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:6px;text-align:center}
.stats{display:flex;justify-content:space-around;text-align:center;margin-bottom:16px}
.stats .v{font-size:1.8rem;font-weight:700;color:#4caf50}.stats .l{font-size:.8rem;color:#888}
.log{max-height:240px;overflow-y:auto}
.log-item{display:flex;justify-content:space-between;padding:8px 10px;border-bottom:1px solid #333;font-size:.9rem}
.log-item .t{color:#888}
h2{font-size:1rem;color:#6aa6fd;margin-bottom:12px}
.empty{color:#666;text-align:center;padding:20px}
</style>
</head>
<body>
<div class="container">
  <h1>🍅 Pomodoro časovač</h1>
  <div class="card">
    <div class="modes">
      <div class="mode active" data-mode="work">Práce</div>
      <div class="mode" data-mode="short">Krátká pauza</div>
      <div class="mode" data-mode="long">Dlouhá pauza</div>
    </div>
    <div class="phase" id="phase">Práce</div>
    <div class="timer" id="timer">25:00</div>
    <div class="controls">
      <button class="btn" id="startBtn">Start</button>
      <button class="btn btn-sec" id="resetBtn">Reset</button>
    </div>
    <div class="settings">
      <label>Práce (min)<input type="number" id="workMin" value="25" min="1" max="120"></label>
      <label>Krátká (min)<input type="number" id="shortMin" value="5" min="1" max="60"></label>
      <label>Dlouhá (min)<input type="number" id="longMin" value="15" min="1" max="60"></label>
    </div>
  </div>
  <div class="card">
    <div class="stats">
      <div><div class="v" id="todayCount">0</div><div class="l">Dnes dokončeno</div></div>
      <div><div class="v" id="totalMin">0</div><div class="l">Minut práce dnes</div></div>
    </div>
    <h2>📋 Log relací</h2>
    <div class="log" id="log"><div class="empty">Zatím žádné dokončené relace</div></div>
    <button class="btn btn-sec btn-sm" id="clearLog" style="margin-top:12px;padding:6px 14px;font-size:.8rem">Vymazat log</button>
  </div>
</div>
<script>
const durations={work:25,short:5,long:15};
let mode='work',remaining=durations.work*60,running=false,timerId=null;
const $=id=>document.getElementById(id);
let log=JSON.parse(localStorage.getItem('pomodoro_log')||'[]');

function fmt(s){const m=Math.floor(s/60),x=s%60;return `${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`;}
function render(){$('timer').textContent=fmt(remaining);document.title=fmt(remaining)+' 🍅';}
function setMode(m){mode=m;running=false;clearInterval(timerId);$('startBtn').textContent='Start';
  durations.work=+$('workMin').value;durations.short=+$('shortMin').value;durations.long=+$('longMin').value;
  remaining=durations[m]*60;
  document.querySelectorAll('.mode').forEach(e=>e.classList.toggle('active',e.dataset.mode===m));
  $('phase').textContent={work:'Práce',short:'Krátká pauza',long:'Dlouhá pauza'}[m];render();}
function tick(){remaining--;render();if(remaining<=0){finish();}}
function finish(){clearInterval(timerId);running=false;$('startBtn').textContent='Start';
  try{new AudioContext();}catch(e){}
  beep();
  if(mode==='work'){log.unshift({date:new Date().toISOString(),min:durations.work});localStorage.setItem('pomodoro_log',JSON.stringify(log));renderLog();}
  alert(mode==='work'?'Hotovo! Čas na pauzu 🎉':'Pauza skončila, zpět do práce!');
  setMode(mode==='work'?'short':'work');}
function beep(){try{const a=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=880;o.start();g.gain.setValueAtTime(.3,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.8);o.stop(a.currentTime+.8);}catch(e){}}
$('startBtn').onclick=()=>{if(running){running=false;clearInterval(timerId);$('startBtn').textContent='Start';}else{running=true;$('startBtn').textContent='Pauza';timerId=setInterval(tick,1000);}};
$('resetBtn').onclick=()=>setMode(mode);
document.querySelectorAll('.mode').forEach(e=>e.onclick=()=>setMode(e.dataset.mode));
['workMin','shortMin','longMin'].forEach(id=>$(id).onchange=()=>{if(!running)setMode(mode);});
function renderLog(){
  const today=new Date().toDateString();
  const todays=log.filter(l=>new Date(l.date).toDateString()===today);
  $('todayCount').textContent=todays.length;
  $('totalMin').textContent=todays.reduce((s,l)=>s+l.min,0);
  if(!log.length){$('log').innerHTML='<div class="empty">Zatím žádné dokončené relace</div>';return;}
  $('log').innerHTML=log.slice(0,50).map(l=>{const d=new Date(l.date);
    return `<div class="log-item"><span>✅ ${l.min} min práce</span><span class="t">${d.toLocaleDateString('cs')} ${d.toLocaleTimeString('cs',{hour:'2-digit',minute:'2-digit'})}</span></div>`;}).join('');
}
$('clearLog').onclick=()=>{if(confirm('Vymazat celý log?')){log=[];localStorage.setItem('pomodoro_log','[]');renderLog();}};
setMode('work');renderLog();
</script>
</body>
</html>
