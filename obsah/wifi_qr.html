<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📶 Wi-Fi QR kód</title>
<script src="lib/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600;text-align:center}
.sub{text-align:center;color:#888;font-size:.85rem;margin-bottom:20px}
.layout{display:grid;grid-template-columns:1fr 300px;gap:20px}
@media(max-width:640px){.layout{grid-template-columns:1fr}}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:20px}
label{display:block;font-size:.82rem;color:#888;margin:10px 0 4px}
input,select{width:100%;background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:10px}
.chk{display:flex;align-items:center;gap:8px;margin-top:12px;color:#bbb;font-size:.9rem}
.qrcard{text-align:center}
#qrcode{display:inline-flex;justify-content:center;padding:16px;background:#fff;border-radius:10px;margin-bottom:12px;min-height:60px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:10px 16px;border-radius:6px;cursor:pointer;font-weight:600;font-size:.85rem;width:100%}
.btn-sec{background:#404040;margin-top:8px}
.netname{font-weight:600;font-size:1.05rem;margin-bottom:2px}
.netpass{font-family:monospace;color:#888;font-size:.85rem}
.note{font-size:.78rem;color:#666;margin-top:14px;line-height:1.5}
</style>
</head>
<body>
<div class="container">
  <h1>📶 Generátor Wi-Fi QR kódu</h1>
  <p class="sub">Hosté naskenují kód telefonem a připojí se bez psaní hesla</p>
  <div class="layout">
    <div class="card">
      <label>Název sítě (SSID)</label><input id="ssid" value="MojeWifi" placeholder="Název Wi-Fi sítě">
      <label>Heslo</label><input id="pass" value="tajneheslo123" placeholder="Heslo k síti">
      <label>Zabezpečení</label><select id="enc"><option value="WPA">WPA/WPA2/WPA3</option><option value="WEP">WEP</option><option value="nopass">Bez hesla (otevřená)</option></select>
      <label class="chk"><input type="checkbox" id="hidden"> Skrytá síť</label>
    </div>
    <div class="card qrcard">
      <div id="qrcode"></div>
      <div class="netname" id="dispName">MojeWifi</div>
      <div class="netpass" id="dispPass">🔑 tajneheslo123</div>
      <button class="btn" id="dlBtn" style="margin-top:12px">💾 Stáhnout QR</button>
      <button class="btn btn-sec" id="printBtn">🖨️ Vytisknout cedulku</button>
    </div>
  </div>
  <p class="note">QR kód i heslo se generují lokálně v prohlížeči – nikam se neodesílají. Formát odpovídá standardu Wi-Fi QR (funguje na iOS i Androidu z fotoaparátu).</p>
</div>
<script>
const $=id=>document.getElementById(id);
let qr;
function esc(s){return s.replace(/([\\;,:"])/g,'\\$1');}
function build(){
  const enc=$('enc').value;
  $('pass').disabled=enc==='nopass';
  const ssid=$('ssid').value,pass=$('pass').value;
  const payload=`WIFI:T:${enc==='nopass'?'nopass':enc};S:${esc(ssid)};${enc==='nopass'?'':'P:'+esc(pass)+';'}${$('hidden').checked?'H:true;':''};`;
  $('qrcode').innerHTML='';
  qr=new QRCode($('qrcode'),{text:payload,width:220,height:220,correctLevel:QRCode.CorrectLevel.M});
  $('dispName').textContent=ssid||'—';
  $('dispPass').textContent=enc==='nopass'?'🔓 Otevřená síť':'🔑 '+pass;
}
['ssid','pass','enc','hidden'].forEach(id=>$(id).oninput=build);
$('enc').onchange=build;
$('dlBtn').onclick=()=>{const img=$('qrcode').querySelector('img')||$('qrcode').querySelector('canvas');if(!img)return;const url=img.tagName==='IMG'?img.src:img.toDataURL();const a=document.createElement('a');a.href=url;a.download='wifi-qr.png';a.click();};
$('printBtn').onclick=()=>{
  const img=$('qrcode').querySelector('img')||$('qrcode').querySelector('canvas');const url=img.tagName==='IMG'?img.src:img.toDataURL();
  const w=window.open('');w.document.write(`<div style="text-align:center;font-family:sans-serif;padding:40px"><h1>📶 Wi-Fi</h1><p style="font-size:20px">Síť: <b>${$('ssid').value}</b></p>${$('enc').value!=='nopass'?`<p style="font-size:18px">Heslo: <b>${$('pass').value}</b></p>`:''}<img src="${url}" style="width:300px"><p style="color:#666">Naskenujte fotoaparátem telefonu</p></div>`);w.document.close();w.print();
};
build();
</script>
</body>
</html>
