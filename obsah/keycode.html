<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⌨️ Keycode tester</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:760px;margin:0 auto;text-align:center}
h1{font-size:1.6rem;margin-bottom:8px;font-weight:600}
.pod{color:#888;font-size:.9rem;margin-bottom:22px}
.velka{background:#2a2a2a;border:2px dashed #404040;border-radius:12px;padding:50px 20px;margin-bottom:20px}
.velka .klavesa{font-size:4rem;font-weight:700;color:#6aa6fd;min-height:5rem;word-break:break-all}
.karty{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.karta{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:16px}
.karta .titulek{font-size:.75rem;color:#888;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.karta .hodnota{font-size:1.25rem;font-weight:700;color:#4caf50;font-family:monospace;word-break:break-all}
.mods{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
.mod{background:#2a2a2a;border:1px solid #404040;color:#666;border-radius:6px;padding:8px 16px;font-size:.9rem;font-family:monospace}
.mod.on{background:#6aa6fd;color:#fff;border-color:#6aa6fd}
table{width:100%;border-collapse:collapse;font-size:.85rem;background:#2a2a2a;border-radius:8px;overflow:hidden}
td,th{padding:8px 10px;border-bottom:1px solid #333;text-align:left;font-family:monospace}
th{color:#6aa6fd;background:#242424}
</style>
</head>
<body>
<div class="container">
  <h1>⌨️ Keycode tester</h1>
  <p class="pod">Stiskněte libovolnou klávesu…</p>
  <div class="velka"><div class="klavesa" id="klavesa">?</div></div>
  <div class="karty">
    <div class="karta"><div class="titulek">event.key</div><div class="hodnota" id="key">–</div></div>
    <div class="karta"><div class="titulek">event.code</div><div class="hodnota" id="code">–</div></div>
    <div class="karta"><div class="titulek">event.keyCode <small>(zastaralé)</small></div><div class="hodnota" id="keyCode">–</div></div>
    <div class="karta"><div class="titulek">event.which <small>(zastaralé)</small></div><div class="hodnota" id="which">–</div></div>
  </div>
  <div class="mods">
    <span class="mod" id="mShift">shiftKey</span>
    <span class="mod" id="mCtrl">ctrlKey</span>
    <span class="mod" id="mAlt">altKey</span>
    <span class="mod" id="mMeta">metaKey</span>
    <span class="mod" id="mRepeat">repeat</span>
  </div>
  <table>
    <thead><tr><th>key</th><th>code</th><th>keyCode</th><th>modifikátory</th></tr></thead>
    <tbody id="historie"></tbody>
  </table>
</div>
<script>
const $=id=>document.getElementById(id);
window.addEventListener('keydown',e=>{
  e.preventDefault();
  $('klavesa').textContent=e.key===' '?'␣ (mezera)':e.key;
  $('key').textContent=e.key===' '?"' '":e.key;
  $('code').textContent=e.code||'–';
  $('keyCode').textContent=e.keyCode;
  $('which').textContent=e.which;
  $('mShift').classList.toggle('on',e.shiftKey);
  $('mCtrl').classList.toggle('on',e.ctrlKey);
  $('mAlt').classList.toggle('on',e.altKey);
  $('mMeta').classList.toggle('on',e.metaKey);
  $('mRepeat').classList.toggle('on',e.repeat);
  if(!e.repeat){
    const mods=[e.shiftKey&&'Shift',e.ctrlKey&&'Ctrl',e.altKey&&'Alt',e.metaKey&&'Meta'].filter(Boolean).join('+')||'–';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${e.key===' '?"' '":esc(e.key)}</td><td>${esc(e.code)}</td><td>${e.keyCode}</td><td>${mods}</td>`;
    $('historie').prepend(tr);
    while($('historie').children.length>12)$('historie').lastChild.remove();
  }
});
const esc=s=>String(s).replace(/</g,'&lt;');
</script>
</body>
</html>
