<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⌨️ Trenažér psaní</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:860px;margin:0 auto}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600;text-align:center}
.controls{display:flex;gap:12px;justify-content:center;margin-bottom:18px;flex-wrap:wrap;align-items:end}
label{display:block;font-size:.78rem;color:#888;margin-bottom:4px}
select{background:#404040;border:1px solid #555;border-radius:4px;color:#e0e0e0;padding:9px}
.btn{background:#6aa6fd;color:#fff;border:none;padding:9px 16px;border-radius:6px;cursor:pointer;font-weight:600}
.btn:hover{background:#5694f0}.btn-sec{background:#404040}.btn-sec:hover{background:#555}
.stats{display:flex;justify-content:space-around;margin-bottom:18px;flex-wrap:wrap;gap:8px}
.stat{text-align:center;min-width:80px}
.stat .v{font-size:1.8rem;font-weight:700;color:#6aa6fd}.stat .l{font-size:.74rem;color:#888}
.stat .v.rec{color:#f1c40f}
.textbox{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;font-size:1.4rem;line-height:2;font-family:'SF Mono',Consolas,monospace;margin-bottom:14px;min-height:140px;white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word}
.textbox .char{position:relative}
.textbox .correct{color:#27ae60}
.textbox .wrong{color:#e74c3c;background:rgba(231,76,60,.2);border-radius:3px}
.textbox .current{background:#6aa6fd;color:#fff;border-radius:3px;animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:.4}}
.textbox .pending{color:#777}
#hidden{position:absolute;left:-9999px;opacity:0}
.hint{text-align:center;color:#888;font-size:.9rem;margin-bottom:12px}
.done{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;text-align:center;display:none}
.done .big{font-size:2.6rem;font-weight:700;color:#6aa6fd}
.done .record{color:#f1c40f;font-weight:700;font-size:1rem;margin-top:4px}
.done .problemy{margin-top:12px;font-size:.85rem;color:#aaa}
.done .problemy b{color:#e74c3c;font-family:monospace;font-size:1rem;background:#3a2a2a;border-radius:4px;padding:1px 7px;margin:0 2px}
.done canvas{margin-top:14px;background:#222;border-radius:6px}
.done .chartlbl{font-size:.72rem;color:#777;margin-top:4px}
/* virtuální klávesnice */
.kbd{background:#222;border:1px solid #404040;border-radius:10px;padding:12px;margin-bottom:14px;user-select:none}
.krow{display:flex;justify-content:center;gap:5px;margin-bottom:5px}
.key{min-width:42px;height:42px;background:#2f2f2f;border:1px solid #444;border-top:3px solid var(--f,#444);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:600;color:#bbb;font-family:'SF Mono',Consolas,monospace}
.key.wide{min-width:78px;font-size:.72rem}
.key.space{min-width:280px}
.key.aktivni{background:#6aa6fd;color:#fff;border-color:#6aa6fd;box-shadow:0 0 12px rgba(106,166,253,.6)}
.legenda{text-align:center;font-size:.7rem;color:#777;margin-top:6px}
.legenda span{display:inline-block;width:10px;height:10px;border-radius:2px;margin:0 3px 0 10px;vertical-align:middle}
@media(max-width:700px){.kbd{display:none}}
</style>
</head>
<body>
<div class="container">
  <h1>⌨️ Trenažér psaní všemi deseti</h1>
  <div class="controls">
    <div><label>Režim</label><select id="level">
      <optgroup label="Výukové lekce">
        <option value="lekce1">Lekce 1 — základ (f d j k)</option>
        <option value="lekce2">Lekce 2 — domácí řada</option>
        <option value="lekce3">Lekce 3 — horní řada</option>
        <option value="lekce4">Lekce 4 — dolní řada</option>
      </optgroup>
      <optgroup label="Trénink">
        <option value="words" selected>Slova</option>
        <option value="diak">Diakritika (ěščřž…)</option>
        <option value="sentences">Věty</option>
        <option value="numbers">Čísla &amp; symboly</option>
      </optgroup>
      <optgroup label="Test">
        <option value="minute">⏱️ Minutovka (60 s)</option>
      </optgroup>
    </select></div>
    <button class="btn" id="newBtn">🔄 Nový text</button>
    <button class="btn btn-sec" id="sameBtn">↻ Stejný text</button>
    <button class="btn btn-sec" id="kbdBtn">⌨️ Klávesnice</button>
  </div>
  <div class="stats">
    <div class="stat"><div class="v" id="wpm">0</div><div class="l">WPM (slov/min)</div></div>
    <div class="stat"><div class="v" id="cpm">0</div><div class="l">úhozů/min</div></div>
    <div class="stat"><div class="v" id="acc">100%</div><div class="l">Přesnost</div></div>
    <div class="stat"><div class="v" id="err">0</div><div class="l">Překlepy</div></div>
    <div class="stat"><div class="v" id="time">0 s</div><div class="l">Čas</div></div>
    <div class="stat"><div class="v rec" id="best">–</div><div class="l">Rekord WPM</div></div>
  </div>
  <div class="textbox" id="textbox"></div>
  <div class="kbd" id="kbd"></div>
  <input id="hidden" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
  <p class="hint">Klikni do textu a začni psát. Měření začne prvním stiskem klávesy, Esc vygeneruje nový text.</p>
  <div class="done" id="doneCard">
    <div class="big" id="doneWpm"></div>
    <div class="record" id="doneRecord" style="display:none">🏆 Nový rekord!</div>
    <p style="color:#888;margin:8px 0" id="doneDetail"></p>
    <div class="problemy" id="doneProblemy"></div>
    <canvas id="chart" width="340" height="72"></canvas>
    <div class="chartlbl">vývoj WPM v posledních pokusech</div>
    <div style="margin-top:14px">
      <button class="btn" id="retryBtn">🔄 Nový text</button>
      <button class="btn btn-sec" id="retrySameBtn">↻ Stejný text</button>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);

/* ---------- texty ---------- */
const WORDS=('kůň pole louka strom voda slunce vítr déšť mraky tráva kámen řeka cesta dům okno střecha brána plot zahrada studna '+
'pták lesík obilí seno sklizeň traktor pluh brázda úroda zrno mlýn město ulice most věž náměstí lampa kolo vlak nádraží auto '+
'kniha stůl židle papír tužka dopis slovo věta příběh škola úkol sešit mapa čas hodina ráno večer noc den týden '+
'jaro léto podzim zima sníh mráz led bouře duha mlha ruka noha hlava oko ucho srdce úsměv radost práce odpočinek '+
'chléb máslo mléko sýr jablko hruška švestka mrkev brambor cibule polévka oběd večeře talíř hrnek nůž vidlička lžíce sůl pepř '+
'les hora údolí potok rybník moře ostrov skála jeskyně stezka').split(' ');
const SENTENCES=[
 'Příliš žluťoučký kůň úpěl ďábelské ódy.',
 'Nechť již hříšné saxofony ďáblů rozezvučí síň úděsnými tóny waltzu, tanga a quickstepu.',
 'Na poli za vsí dozrávala pšenice.',
 'Slunce zapadalo za obzor a ochladilo se.',
 'Traktor zoral celé pole během jednoho dne.',
 'V zahradě kvetly růže a voněl bez.',
 'Déšť skrápěl suchou zem po dlouhém létě.',
 'Babička upekla koláč s tvarohem a povidly.',
 'Vlak do Prahy odjíždí v sedm hodin ráno.',
 'Děti si hrály na louce až do setmění.',
 'Rybář chytil velkého kapra u starého mostu.',
 'Podzimní vítr honil listí po celé návsi.',
 'Kovář rozžhavil železo a ukoval podkovu.',
 'Na horách napadl první sníh už v říjnu.',
 'Včelař vybíral med z úlů za teplého odpoledne.',
 'Zedník postavil zeď rovnou jako podle pravítka.',
 'Hospodář nakrmil koně, krávy i slepice.',
 'Měsíc se zrcadlil na hladině rybníka.'];
const DIAK=('žlutý kůň říčka čížek šťastný běžec čtvrť hloubka průřez těžiště ýbr účet úřad čmelák ježek žížala šiška řeřicha '+
'třešeň čočka žebřík přítel svíčka kroužek můstek vůně růže sůva louže číše šňůra ťukat ďábel žněmi předloňský čtyřicet '+
'štěstí příroda počítač měkký tvrdý čerstvý šedý zelený červený růžový').split(' ');
const LEKCE={lekce1:'fdjk',lekce2:'asdfghjklů',lekce3:'qwertzuiop',lekce4:'yxcvbnm'};

/* ---------- virtuální klávesnice (česká QWERTZ) ---------- */
const KROWS=[
 [';','+','ě','š','č','ř','ž','ý','á','í','é','=','´'],
 ['q','w','e','r','t','z','u','i','o','p','ú',')'],
 ['a','s','d','f','g','h','j','k','l','ů','§'],
 ['y','x','c','v','b','n','m',',','.','-']
];
const KFING=[ // 0=L malík … 3=L ukazovák, 4=P ukazovák … 7=P malík
 [0,0,1,2,3,3,4,4,5,6,7,7,7],
 [0,1,2,3,3,4,4,5,6,7,7,7],
 [0,1,2,3,3,4,4,5,6,7,7],
 [0,1,2,3,3,4,4,5,6,7]
];
const FBARVY=['#ef9a9a','#ffcc80','#fff59d','#a5d6a7','#90caf9','#fff59d','#ffcc80','#ef9a9a'];
const FINGER={},KEYEL={};
function stavKbd(){
  const kbd=$('kbd');kbd.innerHTML='';
  KROWS.forEach((row,ri)=>{
    const div=document.createElement('div');div.className='krow';
    if(ri===3){const sh=document.createElement('div');sh.className='key wide';sh.id='k_shiftL';sh.textContent='SHIFT';sh.style.setProperty('--f','#888');div.appendChild(sh);}
    row.forEach((k,ci)=>{
      const f=KFING[ri][ci];FINGER[k]=f;
      const el=document.createElement('div');el.className='key';el.textContent=k.toUpperCase();
      el.style.setProperty('--f',FBARVY[f]);div.appendChild(el);KEYEL[k]=el;
    });
    if(ri===3){const sh=document.createElement('div');sh.className='key wide';sh.id='k_shiftR';sh.textContent='SHIFT';sh.style.setProperty('--f','#888');div.appendChild(sh);}
    kbd.appendChild(div);
  });
  const srow=document.createElement('div');srow.className='krow';
  const sp=document.createElement('div');sp.className='key space';sp.textContent='MEZERNÍK';sp.style.setProperty('--f','#666');
  srow.appendChild(sp);kbd.appendChild(srow);KEYEL[' ']=sp;
  const leg=document.createElement('div');leg.className='legenda';
  leg.innerHTML='prsty: <span style="background:#ef9a9a"></span>malíky <span style="background:#ffcc80"></span>prsteníky <span style="background:#fff59d"></span>prostředníky <span style="background:#a5d6a7"></span>ukazovák L <span style="background:#90caf9"></span>ukazovák P';
  kbd.appendChild(leg);
}
stavKbd();
const SHIFTMAP={'1':'+','2':'ě','3':'š','4':'č','5':'ř','6':'ž','7':'ý','8':'á','9':'í','0':'é','%':'=','?':',',':':'.','_':'-'};
function klavesyPro(ch){
  if(ch===undefined)return[];
  if(ch===' ')return[' '];
  const low=ch.toLowerCase();
  let key=null,shift=false;
  if(KEYEL[low]){key=low;shift=ch!==low;}
  else if(SHIFTMAP[ch]){key=SHIFTMAP[ch];shift=true;}
  if(!key)return[];
  const out=[key];
  if(shift)out.push(FINGER[key]<4?'shiftR':'shiftL'); // shift mačká druhá ruka
  return out;
}
let podsvicene=[];
function podsvit(ch){
  podsvicene.forEach(el=>el.classList.remove('aktivni'));
  podsvicene=[];
  for(const k of klavesyPro(ch)){
    const el=k==='shiftL'?$('k_shiftL'):k==='shiftR'?$('k_shiftR'):KEYEL[k];
    if(el){el.classList.add('aktivni');podsvicene.push(el);}
  }
}

/* ---------- stav ---------- */
let target='',typed='',startTime=null,timer=null;
let preklepy=0,uhozy=0,errChars={};
const MINUTA=60;
const jeMinutovka=()=>$('level').value==='minute';
let historie=JSON.parse(localStorage.getItem('tt_hist')||'[]');
const rekord=()=>historie.reduce((m,h)=>Math.max(m,h.wpm),0);
function ukazRekord(){const r=rekord();$('best').textContent=r||'–';}
ukazRekord();

function nahodne(pole){return pole[Math.floor(Math.random()*pole.length)];}
function lekceText(sada){
  return Array.from({length:14},()=>{
    const d=2+Math.floor(Math.random()*4);
    return Array.from({length:d},()=>sada[Math.floor(Math.random()*sada.length)]).join('');
  }).join(' ');
}
function genText(stejny){
  const lvl=$('level').value;
  if(!stejny||!target){
    if(LEKCE[lvl])target=lekceText(LEKCE[lvl]);
    else if(lvl==='words')target=Array.from({length:25},()=>nahodne(WORDS)).join(' ');
    else if(lvl==='diak')target=Array.from({length:20},()=>nahodne(DIAK)).join(' ');
    else if(lvl==='sentences')target=Array.from({length:3},()=>nahodne(SENTENCES)).join(' ');
    else if(lvl==='numbers')target=Array.from({length:12},()=>Math.floor(Math.random()*9000+1000)+nahodne(['+','-','='])+Math.floor(Math.random()*90)).join(' ');
    else target=Array.from({length:90},()=>nahodne(WORDS)).join(' '); // minutovka – dlouhý proud slov
  }
  typed='';preklepy=0;uhozy=0;errChars={};startTime=null;clearInterval(timer);
  $('wpm').textContent=0;$('cpm').textContent=0;$('acc').textContent='100%';$('err').textContent=0;
  $('time').textContent=jeMinutovka()?MINUTA+' s':'0 s';
  $('doneCard').style.display='none';$('textbox').style.display='block';
  render();$('hidden').value='';$('hidden').focus();
}
function render(){
  $('textbox').innerHTML=[...target].map((ch,i)=>{
    let cls='pending';
    if(i<typed.length)cls=typed[i]===ch?'correct':'wrong';
    else if(i===typed.length)cls='current';
    return `<span class="char ${cls}">${ch===' '?' ':ch}</span>`;
  }).join('');
  podsvit(target[typed.length]);
}
function update(){
  if(!startTime)return;
  let elapsed=(Date.now()-startTime)/1000;
  if(jeMinutovka()){
    const zbyva=Math.max(0,MINUTA-elapsed);
    $('time').textContent=Math.ceil(zbyva)+' s';
    if(zbyva<=0){finish();return;}
    elapsed=Math.min(elapsed,MINUTA);
  } else $('time').textContent=Math.floor(elapsed)+' s';
  const correctChars=[...typed].filter((c,i)=>c===target[i]).length;
  $('wpm').textContent=Math.round((correctChars/5)/(elapsed/60))||0;
  $('cpm').textContent=Math.round(correctChars/(elapsed/60))||0;
  $('acc').textContent=(uhozy?Math.max(0,Math.round((uhozy-preklepy)/uhozy*100)):100)+'%';
  $('err').textContent=preklepy;
}
$('hidden').addEventListener('input',()=>{
  if($('doneCard').style.display==='block')return;
  if(!startTime){startTime=Date.now();timer=setInterval(update,200);}
  const novy=$('hidden').value;
  // zaznamenej překlepy u nově přidaných znaků
  if(novy.length>typed.length){
    for(let i=typed.length;i<novy.length&&i<target.length;i++){
      uhozy++;
      if(novy[i]!==target[i]){preklepy++;errChars[target[i]]=(errChars[target[i]]||0)+1;}
    }
  }
  typed=novy;
  if(typed.length>target.length)typed=typed.slice(0,target.length);
  render();update();
  if(typed.length>=target.length)finish();
});
$('hidden').addEventListener('paste',e=>e.preventDefault());
$('textbox').onclick=()=>$('hidden').focus();
document.addEventListener('keydown',e=>{if(e.key==='Escape')genText(false);});

function finish(){
  clearInterval(timer);
  let elapsed=(Date.now()-startTime)/1000;
  if(jeMinutovka())elapsed=Math.min(elapsed,MINUTA);
  const correctChars=[...typed].filter((c,i)=>c===target[i]).length;
  const wpm=Math.round((correctChars/5)/(elapsed/60))||0;
  const acc=uhozy?Math.max(0,Math.round((uhozy-preklepy)/uhozy*100)):100;
  const staryRekord=rekord();
  historie.push({wpm,acc,mode:$('level').value,ts:Date.now()});
  if(historie.length>50)historie=historie.slice(-50);
  localStorage.setItem('tt_hist',JSON.stringify(historie));
  ukazRekord();
  $('textbox').style.display='none';$('doneCard').style.display='block';
  $('doneWpm').textContent=wpm+' WPM';
  $('doneRecord').style.display=(wpm>staryRekord&&staryRekord>0)?'block':'none';
  $('doneDetail').textContent=`Přesnost ${acc} % · ${preklepy} překlepů · ${Math.round(elapsed)} s · ${typed.length} znaků`;
  // problémové znaky
  const top=Object.entries(errChars).sort((a,b)=>b[1]-a[1]).slice(0,5);
  $('doneProblemy').innerHTML=top.length
    ?'Nejčastěji chybuješ na: '+top.map(([ch,n])=>`<b>${ch===' '?'␣':ch}</b>×${n}`).join(' ')
    :'🎯 Bez jediného překlepu — výborně!';
  kresliGraf();
  podsvit(undefined);
}
function kresliGraf(){
  const c=$('chart'),ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  const data=historie.slice(-20).map(h=>h.wpm);
  if(data.length<2){ctx.fillStyle='#666';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('graf se objeví po více pokusech',c.width/2,c.height/2);return;}
  const max=Math.max(...data,10),pad=8;
  const xk=(c.width-2*pad)/(data.length-1);
  ctx.strokeStyle='#6aa6fd';ctx.lineWidth=2;ctx.beginPath();
  data.forEach((v,i)=>{
    const x=pad+i*xk,y=c.height-pad-(v/max)*(c.height-2*pad);
    i?ctx.lineTo(x,y):ctx.moveTo(x,y);
  });
  ctx.stroke();
  data.forEach((v,i)=>{
    const x=pad+i*xk,y=c.height-pad-(v/max)*(c.height-2*pad);
    ctx.fillStyle=i===data.length-1?'#f1c40f':'#6aa6fd';
    ctx.beginPath();ctx.arc(x,y,i===data.length-1?4:2.5,0,7);ctx.fill();
  });
  ctx.fillStyle='#888';ctx.font='10px sans-serif';ctx.textAlign='left';
  ctx.fillText(max+' WPM',pad,10);
}

$('newBtn').onclick=()=>genText(false);
$('sameBtn').onclick=()=>genText(true);
$('retryBtn').onclick=()=>genText(false);
$('retrySameBtn').onclick=()=>genText(true);
$('level').onchange=()=>genText(false);
$('kbdBtn').onclick=()=>{const k=$('kbd');k.style.display=k.style.display==='none'?'block':'none';};
genText(false);
</script>
</body>
</html>
