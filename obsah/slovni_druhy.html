<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✏️ Slovní druhy</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a1a;color:#e0e0e0;min-height:100vh;padding:20px}
.container{max-width:680px;margin:0 auto;text-align:center}
h1{font-size:1.6rem;margin-bottom:18px;font-weight:600}
.card{background:#2a2a2a;border:1px solid #404040;border-radius:8px;padding:24px;margin-bottom:20px}
.slovo{font-size:3rem;font-weight:700;color:#6aa6fd;margin:14px 0 20px;min-height:4rem}
.druhy{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.druh{background:#404040;border:1px solid #555;color:#e0e0e0;border-radius:8px;padding:11px 6px;cursor:pointer;font-size:.88rem;transition:all .12s}
.druh:hover{background:#555}
.druh.spravne{background:#27ae60;border-color:#27ae60;color:#fff}
.druh.spatne{background:#c0392b;border-color:#c0392b;color:#fff}
.druh small{display:block;color:#999;font-size:.68rem;margin-top:2px}
.druh.spravne small,.druh.spatne small{color:rgba(255,255,255,.8)}
.stav{display:flex;justify-content:space-around;color:#888;font-size:.9rem;margin-top:18px}
.stav b{color:#4caf50;font-size:1.15rem;display:block}
.zprava{min-height:1.6em;font-size:1.05rem;margin-top:14px;font-weight:600}
.zprava.ok{color:#4caf50}.zprava.chyba{color:#e74c3c}
</style>
</head>
<body>
<div class="container">
  <h1>✏️ Určování slovních druhů</h1>
  <div class="card">
    <div class="slovo" id="slovo">…</div>
    <div class="druhy" id="druhy"></div>
    <div class="zprava" id="zprava"></div>
    <div class="stav">
      <div>Správně<b id="ok">0</b></div>
      <div>Chybně<b id="chyb" style="color:#e74c3c">0</b></div>
      <div>Série<b id="serie" style="color:#6aa6fd">0</b></div>
    </div>
  </div>
</div>
<script>
const $=id=>document.getElementById(id);
const DRUHY=[
['Podstatné jméno','kdo? co?'],['Přídavné jméno','jaký? který?'],['Zájmeno','zastupuje jméno'],
['Číslovka','kolik? kolikátý?'],['Sloveso','co dělá?'],['Příslovce','kde? kdy? jak?'],
['Předložka','před jménem'],['Spojka','spojuje věty'],['Částice','uvozuje, hodnotí'],['Citoslovce','zvuky, pocity'],
];
// [slovo, index druhu 0-9]
const SLOVA=[
['pes',0],['škola',0],['maminka',0],['stůl',0],['radost',0],['Praha',0],['počítač',0],['štěstí',0],['traktor',0],['pole',0],
['krásný',1],['veselý',1],['dřevěný',1],['psí',1],['modrá',1],['rychlé',1],['otcův',1],['zimní',1],
['já',2],['ona',2],['náš',2],['tento',2],['kdo',2],['nikdo',2],['se',2],['jeho',2],['každý',2],
['pět',3],['první',3],['dvakrát',3],['sto',3],['několikátý',3],['oba',3],['trojí',3],
['běžet',4],['spal',4],['budeme',4],['čti',4],['vařila',4],['přijde',4],['smát se',4],['je',4],
['rychle',5],['včera',5],['venku',5],['hezky',5],['nahoru',5],['někdy',5],['velmi',5],['domů',5],
['pod',6],['nad',6],['ve',6],['kolem',6],['bez',6],['proti',6],['během',6],['u',6],
['a',7],['ale',7],['protože',7],['nebo',7],['aby',7],['když',7],['i',7],['že',7],
['ať',8],['kéž',8],['snad',8],['prý',8],['asi',8],['ano',8],['ne',8],['právě',8],
['haf',9],['bum',9],['au',9],['mňau',9],['fuj',9],['hurá',9],['cink',9],['žbluňk',9],
];
let aktualni=null,ok=0,chyb=0,serie=0,zamceno=false;
$('druhy').innerHTML=DRUHY.map(([n,h],i)=>`<button class="druh" data-i="${i}">${i+1}. ${n}<small>${h}</small></button>`).join('');
function dalsi(){
  zamceno=false;
  document.querySelectorAll('.druh').forEach(d=>d.className='druh');
  $('zprava').textContent='';$('zprava').className='zprava';
  let nove;
  do{nove=SLOVA[Math.floor(Math.random()*SLOVA.length)];}while(aktualni&&nove[0]===aktualni[0]);
  aktualni=nove;
  $('slovo').textContent=aktualni[0];
}
$('druhy').addEventListener('click',e=>{
  const b=e.target.closest('.druh');
  if(!b||zamceno)return;
  zamceno=true;
  const i=+b.dataset.i;
  if(i===aktualni[1]){
    b.classList.add('spravne');
    ok++;serie++;
    $('zprava').textContent='✅ Správně!';
    $('zprava').className='zprava ok';
  }else{
    b.classList.add('spatne');
    document.querySelector(`.druh[data-i="${aktualni[1]}"]`).classList.add('spravne');
    chyb++;serie=0;
    $('zprava').textContent=`❌ „${aktualni[0]}" je ${DRUHY[aktualni[1]][0].toLowerCase()}.`;
    $('zprava').className='zprava chyba';
  }
  $('ok').textContent=ok;$('chyb').textContent=chyb;$('serie').textContent=serie;
  setTimeout(dalsi,1400);
});
dalsi();
</script>
</body>
</html>
