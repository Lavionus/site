<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Slepá mapa Evropy</title>
  <link rel="stylesheet" href="../common.css">
  <script>
    if (localStorage.getItem('webapp_theme') === 'light') document.documentElement.dataset.theme = 'light';
  </script>
  <style>
    body { background-color: var(--bg-deep); padding: 20px clamp(12px, 3vw, 36px); min-height: 100vh; }
    h1 { font-size: 1.4rem; margin-bottom: 4px; }
    .podtitul { color: var(--text-muted); font-size: 0.88rem; margin-bottom: 14px; }
    .rezimy { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .rezimy button {
      background: var(--bg-control); border: 1px solid var(--border-strong); color: var(--text-muted);
      border-radius: 6px; padding: 8px 14px; font-size: 0.85rem; cursor: pointer;
    }
    .rezimy button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
    .panel {
      display: flex; flex-wrap: wrap; align-items: center; gap: 14px;
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 12px 16px; margin-bottom: 12px;
    }
    #otazka { font-size: 1.05rem; font-weight: 600; }
    #otazka b { color: var(--accent); }
    #skore { margin-left: auto; color: var(--text-muted); font-size: 0.88rem; font-variant-numeric: tabular-nums; }
    #zprava { font-size: 0.9rem; min-width: 130px; }
    #zprava.ok { color: var(--ok); }
    #zprava.spatne { color: var(--danger); }
    .mapa-wrap {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 10px; max-width: 1100px;
    }
    svg { width: 100%; height: auto; display: block; }
    .stat {
      fill: var(--bg-control); stroke: var(--text-faint); stroke-width: 0.5; cursor: pointer;
      transition: fill 0.15s ease;
    }
    .stat:hover { fill: var(--accent-soft); }
    .stat.spravne { fill: var(--ok); pointer-events: none; }
    .stat.blik { fill: var(--danger); }
    .stat.uceni:hover { fill: var(--accent); }
    .tecka { fill: var(--accent); stroke: #fff; stroke-width: 0.8; cursor: pointer; }
    .tecka:hover { r: 5; }
    .tecka.spravne { fill: var(--ok); pointer-events: none; }
    .tecka.blik { fill: var(--danger); }
    .popisek { fill: var(--text); font-size: 9px; pointer-events: none; text-anchor: middle; font-weight: 600;
      paint-order: stroke; stroke: var(--bg-deep); stroke-width: 2.5px; }
  </style>
</head>

    const $ = id => document.getElementById(id);
    const NS = 'http://www.w3.org/2000/svg';
    const svg = $('mapa');

    /* projekce: data jsou už v Mercatoru, jen posun + měřítko do viewBoxu */
    const [BX, BY, BW, BH] = MAPA_BBOX;
    const PAD = 8;
    const W = 1000, H = Math.round(W * BH / BW);
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    const sx = (W - 2 * PAD) / BW, sy = (H - 2 * PAD) / BH, s = Math.min(sx, sy);
    const px = x => PAD + (x - BX) * s;
    const py = y => PAD + (y - BY) * s;   // BY je nejsevernější (nejmenší) → nahoře

    function cesta(polygony) {
      return polygony.map(ring =>
        'M' + ring.map(([x, y]) => `${px(x).toFixed(1)},${py(y).toFixed(1)}`).join('L') + 'Z'
      ).join('');
    }

    const tvary = new Map();      // název -> element
    ZEME.forEach(z => {
      if (z.dot) {
        const c = document.createElementNS(NS, 'circle');
        c.setAttribute('cx', px(z.dot[0])); c.setAttribute('cy', py(z.dot[1])); c.setAttribute('r', 3.5);
        c.classList.add('tecka'); c.dataset.nazev = z.n;
        svg.appendChild(c); tvary.set(z.n, c);
      } else {
        const p = document.createElementNS(NS, 'path');
        p.setAttribute('d', cesta(z.p));
        p.classList.add('stat'); p.dataset.nazev = z.n;
        svg.appendChild(p); tvary.set(z.n, p);
      }
    });

    let rezim = 'staty', fronta = [], hledane = null, spravneCelkem = 0, pokusy = 0;
    const otazkaEl = $('otazka'), zpravaEl = $('zprava'), skoreEl = $('skore');
    const zamichej = arr => arr.map(x => [Math.random(), x]).sort((a, b) => a[0] - b[0]).map(x => x[1]);
    const ukazSkore = () => skoreEl.textContent = pokusy ? `Úspěšnost: ${spravneCelkem}/${pokusy}` : '';

    function stred(nazev) {
      const z = ZEME.find(x => x.n === nazev);
      if (z.dot) return [px(z.dot[0]), py(z.dot[1])];
      return [px(z.t[0]), py(z.t[1])];
    }
    function popisek(x, y, text) {
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('x', x); t.setAttribute('y', y - 6);
      t.classList.add('popisek'); t.textContent = text;
      svg.appendChild(t); return t;
    }
    function dalsiOtazka() {
      if (!fronta.length) {
        hledane = null;
        otazkaEl.innerHTML = `🎉 Hotovo! Úspěšnost ${spravneCelkem} z ${pokusy}.`;
        zpravaEl.textContent = ''; return;
      }
      hledane = fronta.shift();
      otazkaEl.innerHTML = 'Najdi stát: <b></b>';
      otazkaEl.querySelector('b').textContent = hledane;
      zpravaEl.textContent = ''; zpravaEl.className = '';
    }
    function restart() {
      spravneCelkem = 0; pokusy = 0;
      svg.querySelectorAll('.stat, .tecka').forEach(el => { el.classList.remove('spravne', 'blik', 'uceni'); el.style.pointerEvents = ''; });
      svg.querySelectorAll('.popisek').forEach(t => t.remove());
      ukazSkore();
      if (rezim === 'uceni') {
        hledane = null;
        otazkaEl.textContent = 'Klikni na stát – zobrazí se jeho název.';
        zpravaEl.textContent = '';
        svg.querySelectorAll('.stat').forEach(p => p.classList.add('uceni'));
        return;
      }
      fronta = zamichej(ZEME.map(z => z.n));
      dalsiOtazka();
    }
    svg.addEventListener('click', e => {
      const cil = e.target.closest('.stat, .tecka'); if (!cil) return;
      const nazev = cil.dataset.nazev;
      if (rezim === 'uceni') {
        svg.querySelectorAll('.popisek').forEach(t => t.remove());
        const [x, y] = stred(nazev); popisek(x, y, nazev);
        return;
      }
      if (!hledane) return;
      pokusy++;
      if (nazev === hledane) {
        spravneCelkem++; cil.classList.add('spravne');
        const [x, y] = stred(nazev); popisek(x, y, nazev);
        zpravaEl.textContent = '✓ Správně!'; zpravaEl.className = 'ok';
        ukazSkore(); setTimeout(dalsiOtazka, 650);
      } else {
        zpravaEl.textContent = `✗ Tohle je ${nazev}`; zpravaEl.className = 'spatne';
        cil.classList.add('blik'); setTimeout(() => cil.classList.remove('blik'), 600);
        if (!fronta.includes(hledane)) fronta.push(hledane);
        ukazSkore();
      }
    });
    $('rezimy').addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      document.querySelectorAll('#rezimy button').forEach(x => x.classList.remove('active'));
      b.classList.add('active'); rezim = b.dataset.rezim; restart();
    });
    restart();
  </script>
