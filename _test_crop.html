<!DOCTYPE html>
<html>
<body>
<div id="vysledky">RUNNING</div>
<iframe id="fr" src="http://127.0.0.1:8000/obsah/image_crop.html" width="900" height="700"></iframe>
<script>
const log=[];
function assert(name,cond){log.push((cond?'PASS':'FAIL')+' '+name);}
const fr=document.getElementById('fr');
fr.onload=async()=>{
  try{
    const w=fr.contentWindow,d=w.document;
    const ev=(0,w.eval);
    // vytvoř testovací obrázek 400x300 a vlož ho přes file input (reálná cesta)
    const c=d.createElement('canvas');c.width=400;c.height=300;
    const ctx=c.getContext('2d');ctx.fillStyle='#f80';ctx.fillRect(0,0,400,300);
    const blob=await new Promise(r=>c.toBlob(r,'image/png'));
    const file=new w.File([blob],'test.png',{type:'image/png'});
    const dt=new w.DataTransfer();dt.items.add(file);
    const inp=d.getElementById('soubor');
    inp.files=dt.files;
    inp.dispatchEvent(new w.Event('change'));
    // počkej na onload obrázku + init
    await new Promise(r=>setTimeout(r,600));
    const box0={...ev('box')};
    assert('box inicializovan (w>100)',box0.w>100);
    // simulace dotyku: tazeni ramecku (pointer events jako na tabletu)
    const ram=d.getElementById('ram');
    const r0=ram.getBoundingClientRect();
    const cx=r0.left+r0.width/2, cy=r0.top+r0.height/2;
    const pe=(type,x,y,target)=>target.dispatchEvent(new w.PointerEvent(type,{pointerId:7,pointerType:'touch',isPrimary:true,clientX:x,clientY:y,bubbles:true,cancelable:true}));
    pe('pointerdown',cx,cy,ram);
    pe('pointermove',cx-30,cy-20,ram);
    pe('pointerup',cx-30,cy-20,ram);
    const box1={...ev('box')};
    assert('presun dotykem funguje',Math.round(box0.x-box1.x)===30&&Math.round(box0.y-box1.y)===20);
    // pointercancel neuvizne akce
    pe('pointerdown',cx,cy,ram);
    pe('pointercancel',cx,cy,ram);
    assert('pointercancel resetuje akci',ev('akce')===null);
    // zmena velikosti pres rohovy uchyt
    const roh=d.querySelector('#ram .rohy');
    const rr=roh.getBoundingClientRect();
    assert('uchyt ma dotykovou velikost >=32px',rr.width>=32&&rr.height>=32);
    const hx=rr.left+rr.width/2, hy=rr.top+rr.height/2;
    pe('pointerdown',hx,hy,roh);
    pe('pointermove',hx-40,hy-25,roh);
    pe('pointerup',hx-40,hy-25,roh);
    const box2={...ev('box')};
    assert('zmena velikosti funguje',Math.round(box1.w-box2.w)===40&&Math.round(box1.h-box2.h)===25);
    // stazeni: zachyt klik na odkaz
    let dl=null,appended=false;
    w.onerror=(m)=>{log.push('FRAME-ERROR '+m);};
    const origAppend=d.body.appendChild.bind(d.body);
    d.body.appendChild=el=>{appended=true;if(el.tagName==='A'){el.click=()=>{dl={href:el.href,name:el.download};};}return origAppend(el);};
    log.push('debug onclick='+(typeof d.getElementById('stahnout').onclick));
    ev(`(function(){const o=HTMLCanvasElement.prototype.toBlob;window.__tb='nevolano';HTMLCanvasElement.prototype.toBlob=function(cb,t,q){window.__tb='volano '+t;return o.call(this,function(b){window.__tb='callback '+(b&&b.size);cb(b);},t,q);};})()`);
    d.getElementById('stahnout').click();
    await new Promise(r=>setTimeout(r,800));
    log.push('debug toBlob='+ev('window.__tb')+' appended='+appended+' dl='+JSON.stringify(dl));
    assert('stazeni vytvori odkaz v DOM s blobem',dl&&dl.href.startsWith('blob:')&&/_orez\.jpg$/.test(dl.name));
  }catch(e){log.push('ERROR '+e.message);}
  document.getElementById('vysledky').textContent='DONE| '+log.join(' | ');
};
</script>
</body>
</html>
